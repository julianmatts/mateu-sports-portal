function gsSheetHeaderRow(ws, r, nCols, titulo){
  ws.mergeCells(r,1,r,nCols);
  const c = ws.getCell(r,1);
  c.value = titulo;
  c.font = {bold:true, color:{argb:BRAND.white}, size:13, name:'Calibri'};
  c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:BRAND.navy}};
  c.alignment = {horizontal:'center', vertical:'middle'};
  ws.getRow(r).height = 22;
}
function gsSheetTableHeader(ws, r, headers){
  headers.forEach((h,idx)=>{
    const c = ws.getCell(r, idx+1);
    c.value = h;
    c.font = {bold:true, color:{argb:BRAND.white}, size:10.5, name:'Calibri'};
    c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:BRAND.navy}};
    c.alignment = {horizontal:'center', vertical:'middle'};
    c.border = thinBorder(BRAND.navy);
  });
  ws.getRow(r).height = 18;
}
function gsSheetDataRow(ws, r, vals, band, colorMap){
  vals.forEach((v, idx)=>{
    const c = ws.getCell(r, idx+1);
    c.value = v;
    c.font = {size:10.5, name:'Calibri', color:{argb:(colorMap&&colorMap[idx])||BRAND.navy}};
    c.alignment = {horizontal:'center', vertical:'middle'};
    c.fill = {type:'pattern', pattern:'solid', fgColor:{argb: band ? BRAND.band : BRAND.white}};
    c.border = thinBorder(BRAND.border);
  });
}
const GS_RATIO_COLOR = {low:'FFB36200', mid:'FF2E7D32', high:'FF8B0000'};
function gsRatioArgb(ratio){
  if(ratio===null||ratio===undefined) return null;
  if(ratio<3) return GS_RATIO_COLOR.low;
  if(ratio<6) return GS_RATIO_COLOR.mid;
  return GS_RATIO_COLOR.high;
}
const GS_NOTA_COLOR = {up:'FF8B0000', down:'FF2E7D32'};
function gsNotaArgb(nota){
  const d = gsNotaDelta(nota);
  if(d>0) return GS_NOTA_COLOR.up;
  if(d<0) return GS_NOTA_COLOR.down;
  return null;
}

async function gsExportarXlsx(ym, data){
  const wb = new ExcelJS.Workbook();
  const slugs = gsSlugsOrdenados().filter(s=>(data.almacenes||{})[s] || (data.resumen||{})[s]);

  // Hoja Almacenes
  const wsA = wb.addWorksheet('Almacenes', {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
  wsA.columns = [{width:20},{width:11},{width:26},{width:11},{width:26},{width:10},{width:12},{width:26},{width:11},{width:26}];
  gsSheetHeaderRow(wsA, 1, 10, 'MATEU SPORTS — ALMACENES — '+ymToLabel(ym).toUpperCase());
  gsSheetTableHeader(wsA, 2, ['SUCURSAL','FALTA UNO','NOTA','GARANTÍAS','NOTA','MOJADOS','DIFERENCIAS','NOTA','AUDITORÍA','NOTA']);
  let r = 3;
  slugs.filter(s=>(data.almacenes||{})[s]).forEach((s,i)=>{
    const d = data.almacenes[s];
    gsSheetDataRow(wsA, r, [nombreDeSlug(s), d.faltaUno, d.faltaUnoNota, d.garantias, d.garantiasNota, d.mojados, d.diferencias, d.diferenciasNota, d.auditoria, d.auditoriaNota], i%2===1,
      {2:gsNotaArgb(d.faltaUnoNota), 4:gsNotaArgb(d.garantiasNota), 7:gsNotaArgb(d.diferenciasNota), 9:gsNotaArgb(d.auditoriaNota)});
    r++;
  });
  if(data.almacenesTotal){
    const t = data.almacenesTotal;
    gsSheetDataRow(wsA, r, ['TOTAL', t.faltaUno, '', t.garantias, '', t.mojados, t.diferencias, '', t.auditoria, ''], false);
    for(let c=1;c<=10;c++){ wsA.getCell(r,c).font.bold = true; wsA.getCell(r,c).fill = {type:'pattern', pattern:'solid', fgColor:{argb:BRAND.totalBg}}; wsA.getCell(r,c).border = {top:{style:'medium',color:{argb:BRAND.navy}}}; }
  }

  // Hoja Discontinuos/Stock 1-3/Negativos
  const wsR = wb.addWorksheet('Discontinuos', {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
  wsR.columns = [{width:20},{width:13},{width:26},{width:16},{width:16},{width:11},{width:26}];
  gsSheetHeaderRow(wsR, 1, 7, 'MATEU SPORTS — DISCONTINUOS / STOCK 1-3 / NEGATIVOS — '+ymToLabel(ym).toUpperCase());
  gsSheetTableHeader(wsR, 2, ['SUCURSAL','DISCONTINUOS','NOTA','STOCK 1-3 CALZADO','STOCK 1-3 IND.','NEGATIVOS','NOTA']);
  r = 3;
  const stockCalzadoMap = gsStockLookup(data.mesesStock && data.mesesStock.calzado);
  const stockIndMap = gsStockLookup(data.mesesStock && data.mesesStock.indumentaria);
  slugs.filter(s=>(data.resumen||{})[s]).forEach((s,i)=>{
    const d = data.resumen[s];
    const pc = stockCalzadoMap[s] ? (d.stock1a3Calzado/stockCalzadoMap[s]*100).toFixed(1)+'%' : '';
    const pi = stockIndMap[s] ? (d.stock1a3Ind/stockIndMap[s]*100).toFixed(1)+'%' : '';
    gsSheetDataRow(wsR, r, [nombreDeSlug(s), d.discontinuos, d.discontinuosNota, (d.stock1a3Calzado||0)+' ('+pc+')', (d.stock1a3Ind||0)+' ('+pi+')', d.negativos, d.negativosNota], i%2===1,
      {2:gsNotaArgb(d.discontinuosNota), 6:gsNotaArgb(d.negativosNota)});
    r++;
  });
  if(data.resumenTotal){
    const t = data.resumenTotal;
    gsSheetDataRow(wsR, r, ['TOTAL', t.discontinuos, '', '', '', t.negativos, ''], false);
    for(let c=1;c<=7;c++){ wsR.getCell(r,c).font.bold = true; wsR.getCell(r,c).fill = {type:'pattern', pattern:'solid', fgColor:{argb:BRAND.totalBg}}; wsR.getCell(r,c).border = {top:{style:'medium',color:{argb:BRAND.navy}}}; }
  }

  // Hoja Horas de descarga
  const wsH = wb.addWorksheet('Horas descarga', {views:[{showGridLines:false}]});
  wsH.columns = [{width:20},{width:10},{width:14}];
  gsSheetHeaderRow(wsH, 1, 3, 'MATEU SPORTS — HORAS DE DESCARGA — '+ymToLabel(ym).toUpperCase());
  gsSheetTableHeader(wsH, 2, ['SUCURSAL','HORAS','NIVEL']);
  r = 3;
  (data.horas||[]).slice().sort((a,b)=>{
    const an = a.horas===null||a.horas===undefined, bn = b.horas===null||b.horas===undefined;
    if(an) return 1; if(bn) return -1; return a.horas-b.horas;
  }).forEach((h,i)=>{
    const sinDato = h.horas===null || h.horas===undefined;
    const nivel = sinDato ? 'S/D' : (h.horas<55?'Óptimo':(h.horas<80?'Moderado':'Crítico'));
    const color = sinDato ? null : (h.horas<55?GS_NOTA_COLOR.down:(h.horas<80?'FFB36200':GS_NOTA_COLOR.up));
    gsSheetDataRow(wsH, r, [nombreDeSlug(h.slug), sinDato?'S/D':h.horas, nivel], i%2===1, {1:color, 2:color});
    r++;
  });

  // Hojas Meses de Stock
  for(const [rubro, titulo] of [['calzado','CALZADO'],['indumentaria','INDUMENTARIA'],['accesorios','ACCESORIOS']]){
    const ws = wb.addWorksheet('Meses stock '+titulo.substring(0,20), {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
    ws.columns = [{width:20},{width:11},{width:11},{width:16}];
    gsSheetHeaderRow(ws, 1, 4, 'MESES DE STOCK — '+titulo+' — '+ymToLabel(ym).toUpperCase());
    gsSheetTableHeader(ws, 2, ['SUCURSAL','STOCK','VENTAS','MESES DE COBERTURA']);
    const lista = ((data.mesesStock||{})[rubro]||[]).slice().sort((a,b)=>a.ratio-b.ratio);
    r = 3;
    lista.forEach((x,i)=>{
      gsSheetDataRow(ws, r, [nombreDeSlug(x.slug), x.stock, x.ventas, x.ratio], i%2===1, {3:gsRatioArgb(x.ratio)});
      r++;
    });
    const totStock = lista.reduce((a,x)=>a+(x.stock||0),0);
    const totVentas = lista.reduce((a,x)=>a+(x.ventas||0),0);
    gsSheetDataRow(ws, r, ['TOTAL', totStock, totVentas, totVentas>0?(totStock/totVentas):''], false);
    for(let c=1;c<=4;c++){ ws.getCell(r,c).font.bold = true; ws.getCell(r,c).fill = {type:'pattern', pattern:'solid', fgColor:{argb:BRAND.totalBg}}; ws.getCell(r,c).border = {top:{style:'medium',color:{argb:BRAND.navy}}}; }
  }

  await downloadWorkbook(wb, 'GestionStock_'+ym+'.xlsx');
  postFireAndForget(FB+'/actividad/'+currentYYYYMM()+'/descargas.json', {
    email: SESSION.email, sucursal_o_outlet: SESSION.sucursal || SESSION.outlet_id || '-',
    tipoExport: 'reporte', mesExportado: ym, seccion: 'gestion-stock', timestamp: Date.now()
  });
}

function renderValidacion(parsed){
  const filas = SUCURSALES.map(s=>{
    const d = parsed.sucursales[s.slug];
    if(!d) return {slug:s.slug, nombre:s.nombre, esperado:'—', parseado:'—', ok:false, falta:true};
    return {slug:s.slug, nombre:s.nombre, esperado: d.totalEsperado===null?'—':d.totalEsperado, parseado:d.total, ok:d.ok, vacia:d.vacia};
  });
  const hayErrores = filas.some(f=>!f.ok);

  const html =
    '<div class="card">'+
      '<div class="card-title">Validación</div>'+
      (parsed.errores.length ? '<div class="nota-regla">'+parsed.errores.map(esc).join('<br>')+'</div>' : '')+
      '<div class="table-wrap"><table><thead><tr><th>Sucursal</th><th class="r">Total esperado</th><th class="r">Total parseado</th><th>Estado</th></tr></thead><tbody>'+
      filas.map(f=> '<tr><td>'+f.nombre+(f.vacia?' <span class="hint">(hoja vacía)</span>':'')+'</td><td class="td-num">'+f.esperado+'</td><td class="td-num">'+f.parseado+'</td><td>'+(f.ok? '<span class="val-ok">✓</span>':'<span class="val-bad">✗</span>')+'</td></tr>').join('')+
      '</tbody></table></div>'+
      (hayErrores ? '<div class="fld" style="margin-top:14px"><label><input type="checkbox" id="forzarSubida"> Subir de todos modos, a pesar de las inconsistencias</label></div>' : '')+
      '<button class="btn btn-primary" id="btnConfirmarCarga" style="margin-top:12px">Confirmar y subir</button>'+
    '</div>';
  $('cargaResultado').innerHTML = html;
  $('btnConfirmarCarga').addEventListener('click', async ()=>{
    if(hayErrores && !$('forzarSubida').checked){ alert('Hay inconsistencias. Marcá la casilla para subir de todos modos.'); return; }
    await confirmarCarga(parsed);
  });
}

async function confirmarCarga(parsed){
  const mes = parseInt($('cargaMes').value,10);
  const anio = parseInt($('cargaAnio').value,10);
  const ym = anio+'-'+String(mes).padStart(2,'0');

  const existentes = await getMonthsList();
  if(existentes.includes(ym)){
    if(!confirm('Ya existe una carga para '+ymToLabel(ym)+'. ¿Querés sobreescribirla?')) return;
  }

  const btn = $('btnConfirmarCarga'); btn.disabled=true; btn.textContent='Subiendo…';
  try{
    for(const slug in parsed.sucursales){
      const d = parsed.sucursales[slug];
      await putJSON(FB+'/discontinuos/'+ym+'/'+slug+'.json', {items:d.items, total:d.total});
    }
    await putJSON(FB+'/discontinuos/'+ym+'/meta.json', {mes, cargadoPor:SESSION.email, fecha:Date.now()});

    if(parsed.periodoAnual){
      const ciclo = cicloFromYearMonth(anio, mes);
      let existente = {};
      try{ existente = await fetchJSON(FB+'/periodoAnual/'+ciclo+'.json') || {}; }catch(e){}
      const merged = Object.assign({}, existente, parsed.periodoAnual.data);
      await putJSON(FB+'/periodoAnual/'+ciclo+'.json', merged);
    }

    delete MONTH_CACHE[ym];
    $('cargaResultado').innerHTML = '<div class="card"><div class="val-ok">✓ Carga de '+ymToLabel(ym)+' subida correctamente.</div></div>';
  }catch(err){
    $('cargaResultado').innerHTML += '<div class="card"><div class="val-bad">Error al subir: '+esc(err.message)+'</div></div>';
  }
  btn.disabled=false; btn.textContent='Confirmar y subir';
}

async function renderControlView(container){
  const seccion = container.dataset.seccion || 'discontinuos';
  const meses = seccion==='gestion-stock' ? await gsGetMonthsList() : await getMonthsList();
  if(!meses.length){
    container.innerHTML = '<div class="pg-title">Control</div>'+gsControlSeccionTabsHtml(seccion)+'<div class="empty">Todavía no hay meses cargados para esta sección.</div>';
    gsWireControlSeccionTabs(container);
    return;
  }
  const selMes = container.dataset.mes || meses[0];
  container.dataset.mes = selMes;

  const mesesOptions = meses.map(m=>'<option value="'+m+'"'+(m===selMes?' selected':'')+'>'+ymToLabel(m)+'</option>').join('');
  container.innerHTML =
    '<div class="head-row"><div><div class="pg-title">Control</div><div class="pg-sub">Cumplimiento de carga y descarga</div></div>'+
    '<select class="sel" id="ctrlMesSel">'+mesesOptions+'</select></div>'+
    gsControlSeccionTabsHtml(seccion)+
    '<div id="ctrlBody"><div class="hint">Cargando…</div></div>';
  $('ctrlMesSel').addEventListener('change', e=>{ container.dataset.mes = e.target.value; renderControlView(container); });
  gsWireControlSeccionTabs(container);

  let logins = {}, descargas = {};
  try{ logins = await fetchJSON(FB+'/actividad/'+selMes+'/logins.json') || {}; }catch(e){}
  try{ descargas = await fetchJSON(FB+'/actividad/'+selMes+'/descargas.json') || {}; }catch(e){}

  const identidades = SUCURSALES.filter(s=>esIdentidadControl(s.slug)).map(s=>({id:s.slug, nombre:s.nombre}))
    .concat(OUTLETS_LIST.map(o=>({id:o.id, nombre:o.nombre})));

  const filas = identidades.map(ident=>{
    // seccion puede faltar en registros viejos (previos a Gestión de Stock): se toman como Discontinuos.
    const loginsPropios = Object.values(logins).filter(l=>l.sucursal_o_outlet===ident.id && (l.seccion||'discontinuos')===seccion);
    const descargasDelMes = Object.values(descargas).filter(d=>d.sucursal_o_outlet===ident.id && d.mesExportado===selMes && (d.seccion||'discontinuos')===seccion);
    const ultimoLogin = loginsPropios.reduce((max,l)=> Math.max(max, l.timestamp||0), 0);
    const ultimaDescarga = descargasDelMes.reduce((max,d)=> Math.max(max, d.timestamp||0), 0);
    const ingreso = loginsPropios.length>0;
    const descargo = descargasDelMes.length>0;
    let estado = 'bad';
    if(ingreso && descargo) estado='ok'; else if(ingreso) estado='warn';
    return {id:ident.id, nombre:ident.nombre, ultimoLogin, cantidad:loginsPropios.length, descargo, ultimaDescarga, estado};
  });

  const ordenEstado = {bad:0, warn:1, ok:2};
  filas.sort((a,b)=> ordenEstado[a.estado]-ordenEstado[b.estado]);

  const ingresaron = filas.filter(f=>f.ultimoLogin>0).length;
  const descargaron = filas.filter(f=>f.descargo).length;
  const pendientes = filas.length - descargaron;

  const body = $('ctrlBody');
  body.innerHTML =
    '<div class="kpi-bar">'+
      '<div class="kpi"><div class="kpi-label">Ingresaron</div><div class="kpi-val">'+ingresaron+'/'+filas.length+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">Descargaron</div><div class="kpi-val">'+descargaron+'/'+filas.length+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">Pendientes</div><div class="kpi-val">'+pendientes+'</div></div>'+
    '</div>'+
    '<div class="ftabs" style="margin-bottom:14px">'+
      '<button class="ftab active" data-f="todos">Todos</button>'+
      '<button class="ftab" data-f="pendientes">Pendientes</button>'+
      '<button class="ftab" data-f="completos">Completos</button>'+
    '</div>'+
    '<div class="card"><div class="table-wrap"><table id="ctrlTable"><thead><tr><th>Sucursal/Outlet</th><th>Último ingreso</th><th class="r">Ingresos</th><th>Descargó Excel</th><th>Estado</th></tr></thead><tbody></tbody></table></div></div>'+
    '<div class="card">'+
      '<div class="collapsible-head" id="logHead"><span>Log cronológico</span><span class="collapsible-arrow">▾</span></div>'+
      '<div class="collapsible-body" id="logBody">'+
        '<div class="toolbar"><input class="search-box" id="logSearch" placeholder="Buscar por email o acción…"></div>'+
        '<div class="table-wrap"><table id="logTable"><thead><tr><th>Fecha/hora</th><th>Email</th><th>Acción</th><th>Detalle</th></tr></thead><tbody></tbody></table></div>'+
      '</div>'+
    '</div>'+
    '<button class="btn btn-outline" id="btnExportControl">📊 Exportar control (Excel)</button>';

  function drawTable(filtro){
    const rows = filas.filter(f=> filtro==='todos' || (filtro==='pendientes' && f.estado!=='ok') || (filtro==='completos' && f.estado==='ok'));
    const tbody = document.querySelector('#ctrlTable tbody'); tbody.innerHTML='';
    rows.forEach(f=>{
      const dotCls = f.estado==='ok'?'dot-ok':(f.estado==='warn'?'dot-warn':'dot-bad');
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>'+f.nombre+'</td><td>'+(f.ultimoLogin?fmtDate(f.ultimoLogin):'—')+'</td><td class="td-num">'+f.cantidad+'</td>'+
        '<td>'+(f.descargo? '<span class="val-ok">✓ '+fmtDate(f.ultimaDescarga)+'</span>' : '<span class="val-bad">✗</span>')+'</td>'+
        '<td><span class="dot '+dotCls+'"></span>'+(f.estado==='ok'?'Completo':(f.estado==='warn'?'Pendiente descarga':'No ingresó'))+'</td>';
      tbody.appendChild(tr);
    });
  }
  drawTable('todos');
  document.querySelectorAll('.ftab').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active')); b.classList.add('active');
      drawTable(b.dataset.f);
    });
  });

  const logEntries = [];
  Object.values(logins).forEach(l=> logEntries.push({ts:l.timestamp, email:l.email, accion:'Login', detalle:(l.rol||'')+' · '+(l.sucursal_o_outlet||'-')}));
  Object.values(descargas).forEach(d=> logEntries.push({ts:d.timestamp, email:d.email, accion:'Descarga Excel', detalle:(d.tipoExport||'')+' · mes '+(d.mesExportado||'-')}));
  logEntries.sort((a,b)=> (b.ts||0)-(a.ts||0));

  function drawLog(){
    const q = normLower($('logSearch').value);
    const tbody = document.querySelector('#logTable tbody'); tbody.innerHTML='';
    logEntries.filter(e=> !q || normLower(e.email+' '+e.accion+' '+e.detalle).includes(q)).forEach(e=>{
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>'+fmtDate(e.ts)+'</td><td>'+esc(e.email)+'</td><td>'+esc(e.accion)+'</td><td>'+esc(e.detalle)+'</td>';
      tbody.appendChild(tr);
    });
  }
  drawLog();
  $('logSearch').addEventListener('input', drawLog);
  $('logHead').addEventListener('click', ()=>{
    $('logBody').classList.toggle('open');
    $('logHead').querySelector('.collapsible-arrow').classList.toggle('open');
  });

  $('btnExportControl').addEventListener('click', ()=>{
    const wb = XLSX.utils.book_new();
    const cumpRows = [['Sucursal/Outlet','Último ingreso','Ingresos','Descargó Excel','Estado']];

function msEsProducto(){ return SESSION && SESSION.rol==='admin'; }
function msTh(rubro){ return (window.STOCK_DATA.thresholds||{})[rubro] || [1,3]; }
function msFmtN(v){ return (v===null||v===undefined) ? '–' : Math.round(v).toLocaleString('es-AR'); }
function msFmtR(v){ return (v===null||v===undefined) ? '–' : v.toFixed(1); }

// Ratios negativos nunca se clasifican como faltante → sin dato
function msStatusOfRatio(rubro, ratio){
  if(ratio===null||ratio===undefined||ratio<0) return 'sindato';
  const th = msTh(rubro);
  if(ratio<th[0]) return 'faltante';
  if(ratio<=th[1]) return 'sano';
  return 'exceso';
}
function msStatusOf(rubro, ratio, ventas, stock){
  if(ventas===null||ventas===undefined||ventas<=0) return (stock && stock>0) ? 'muerto' : 'sindato';
  return msStatusOfRatio(rubro, ratio);
}
function msTipoDe(name){
  if(name.includes('Aurelius')) return 'aurelius';
  if(name.includes('Outlet')) return 'outlet';
  if(name.includes('Adidas')) return 'adidas';
  if(name.includes('MS ')||name.includes('Mateu')) return 'mateu';
  return 'otros';
}
// Producto se excluye de agregados y KPIs (sigue visible como rubro en el drill-down)
function msEffRubros(){ return MS.rubroFiltro ? [MS.rubroFiltro] : ['ACCESORIOS','CALZADO','INDUMENTARIA']; }
function msRangoLbl(){
  const M = window.STOCK_DATA.meses, W = Math.min(MS.periodo||1, M.length);
  const hi = MS_MLAB[M[M.length-1]].toLowerCase();
  return W===1 ? hi : MS_MLAB[M[M.length-W]].toLowerCase()+'–'+hi;
}

// Meses de la ventana de cálculo: los últimos W, corridos "off" meses
// hacia atrás (off=W → la ventana anterior, para comparar). Devuelve null
// si el dataset no alcanza para la ventana pedida.
function msWinMonths(off){
  const D = window.STOCK_DATA, W = MS.periodo||1;
  if(!off) return D.meses.slice(-W);
  const months = D.meses.slice(-(W+off), -off);
  return months.length===W ? months : null;
}

// Ratio de una ventana: Σ stock / Σ ventas de los últimos N meses
function msWinCalc(rubro, serie, off){
  const W = MS.periodo||1, months = msWinMonths(off);
  if(!months) return null;
  let st=0, vt=0;
  for(const m of months){ const n = serie && serie[m]; if(!n) continue; st += (n.stock||0); vt += (n.ventas||0); }
  if(vt<=0) return {ratio:null, status: st>0?'muerto':'sindato', avgStock:st/W, avgVentas:0};
  const ratio = Math.round(st/vt*100)/100;
  return {ratio, status: msStatusOfRatio(rubro, ratio), avgStock:st/W, avgVentas:vt/W};
}

// Punto marca (respeta filtro de segmento)
function msPointCalc(rubro, node, off){
  const seg = MS.segFiltro;
  if(!seg){
    const wc = msWinCalc(rubro, node.serie, off);
    return wc && {ratio:wc.ratio, status:wc.status, stock:wc.avgStock, ventas:wc.avgVentas};
  }
  const sd = (node.segmentos||{})[seg];
  if(!sd) return null;
  const W = MS.periodo||1, months = msWinMonths(off);
  if(!months) return null;
  let st=0, vt=0;
  if(sd.serie){
    for(const mo of months){ const n = sd.serie[mo]; if(!n) continue; st += (n.stock||0); vt += (n.ventas>0?n.ventas:0); }
  } else if(off){ return null; }
  else { st = sd.stock||0; vt = sd.ventas>0 ? sd.ventas : 0; }
  if(vt<=0) return {ratio:null, status: st>0?'muerto':'sindato', stock:st/W, ventas:0};
  const ratio = Math.round(st/vt*100)/100;
  return {ratio, status: msStatusOfRatio(rubro, ratio), stock:st/W, ventas:vt/W};
}

/* ---------- Delta vs período anterior ----------
   Verde si el ratio se acercó al rango sano, rojo si se alejó
   (subir no siempre es malo: depende de dónde venías). */
function msPrevRangoLbl(){
  const months = msWinMonths(MS.periodo||1);
  if(!months) return null;
  return months.length===1 ? MS_MLAB[months[0]].toLowerCase()
    : MS_MLAB[months[0]].toLowerCase()+'–'+MS_MLAB[months[months.length-1]].toLowerCase();
}
function msDeltaInfo(cur, prev, thLo, thHi){
  if(cur===null||cur===undefined||prev===null||prev===undefined) return null;
  const d = Math.round((cur-prev)*10)/10;
  const dist = v=> v<thLo ? thLo-v : (v>thHi ? v-thHi : 0);
  const dc = dist(cur), dp = dist(prev);
  const col = Math.abs(d)<0.05 ? '#8A8FA3' : (dc<dp ? '#16A34A' : (dc>dp ? '#E11D2A' : '#8A8FA3'));
  const arrow = d>0.04 ? '▲' : (d<-0.04 ? '▼' : '=');
  return {d, col, arrow, txt:(d>0?'+':'')+d.toFixed(1)};
}
function msDeltaHtml(di, size){
  if(!di) return '';
  const lbl = msPrevRangoLbl();
  return ' <span title="vs período anterior'+(lbl?' ('+lbl+')':'')+'" style="font-size:'+(size||11)+'px;font-weight:700;font-style:normal;font-family:\'Inter\',sans-serif;color:'+di.col+';white-space:nowrap">'+di.arrow+' '+di.txt+'</span>';
}

/* ---------- Excedente en unidades ----------
   Cuánto stock hay por encima del rango sano (prom/mes de la ventana):
   stock − ventas × umbral alto. Con venta 0, todo el stock está inmovilizado. */
function msExcedente(rubro, pc){
  if(!pc) return null;
  if(pc.status==='muerto') return Math.round(pc.stock||0);
  if(pc.status!=='exceso') return null;
  const th = msTh(rubro);
  return Math.max(0, Math.round((pc.stock||0) - (pc.ventas||0)*th[1]));
}

/* ---------- Índice global de marcas (vista transversal) ---------- */
function msMarcaIndex(){
  if(MS._marcaIndex) return MS._marcaIndex;
  const D = window.STOCK_DATA, idx = {};
  for(const s in D.sucursales){
    const rs = D.sucursales[s].rubros||{};
    for(const r in rs) for(const m in (rs[r].marcas||{})){
      const e = idx[m]||(idx[m]={rubros:{}});
      (e.rubros[r]||(e.rubros[r]=[])).push(s);
    }
  }
  MS._marcaIndex = idx;
  return idx;
}
function msNormName(s){ return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase(); }
function msFindMarca(q){
  const qq = msNormName(q||'');
  if(!qq) return null;
  const keys = Object.keys(msMarcaIndex());
  let hit = keys.find(k=> msNormName(k)===qq);
  if(!hit){ const pref = keys.filter(k=> msNormName(k).startsWith(qq)); if(pref.length===1) hit = pref[0]; }
  return hit||null;
}

// Agregado por segmento con umbral ponderado por mix de ventas
function msSegCalc(sucList, rubros){
  const D = window.STOCK_DATA, W = MS.periodo||1, months = D.meses.slice(-W);
  const agg = {};
  for(const s of sucList) for(const r of rubros){
    const rn = D.sucursales[s] && D.sucursales[s].rubros[r];
    if(!rn) continue;
    const th = msTh(r);
    for(const m in rn.marcas){
      const segs = rn.marcas[m].segmentos||{};
      for(const seg in segs){
        if(seg==='Total'||seg==='TOTAL') continue;
        const sd = segs[seg];
        let sst=0, svt=0;
        if(sd.serie){ for(const mo of months){ const n = sd.serie[mo]; if(!n) continue; sst += (n.stock||0); svt += (n.ventas>0?n.ventas:0); } }
        else { sst = sd.stock||0; svt = sd.ventas>0 ? sd.ventas : 0; }
        const a = agg[seg]||(agg[seg]={st:0,vt:0,wLo:0,wHi:0});
        a.st += sst;
        if(svt>0){ a.vt += svt; a.wLo += svt*th[0]; a.wHi += svt*th[1]; }
      }
    }
  }
  return Object.keys(agg)
    .filter(seg=> MS_SEG_ORDER.indexOf(seg)>=0 && (agg[seg].st>0 || agg[seg].vt>0))
    .sort((a,b)=> MS_SEG_ORDER.indexOf(a)-MS_SEG_ORDER.indexOf(b))
    .map(seg=>{
      const a = agg[seg];
      let ratio=null, stt;
      if(a.vt<=0) stt = a.st>0?'muerto':'sindato';
      else{
        ratio = Math.round(a.st/a.vt*100)/100;
        const lo = a.wLo/a.vt, hi = a.wHi/a.vt;
        stt = ratio<0 ? 'sindato' : (ratio<lo ? 'faltante' : (ratio<=hi ? 'sano' : 'exceso'));
      }
      return {key:seg, name:MS_SEG_LBL[seg]||seg, iconD:MS_SEG_ICONS[seg]||'', ratio, status:stt,
        detail:'Stock: '+msFmtN(a.st/W)+' · Ventas: '+msFmtN(a.vt/W)};
    });
}

// Agregado multi-rubro con rango sano ponderado por mix de ventas
function msMixCalc(sucList, rubros, off){
  const D = window.STOCK_DATA, W = MS.periodo||1, months = msWinMonths(off);
  if(!months) return null;
  const RUB = rubros || msEffRubros();
  const seg = MS.segFiltro;
  let st=0, vt=0, wLo=0, wHi=0;
  for(const r of RUB){
    let str=0, vtr=0;
    for(const s of sucList){
      const rn = D.sucursales[s] && D.sucursales[s].rubros[r];
      if(!rn) continue;
      if(seg){
        for(const m in rn.marcas){
          const sd = (rn.marcas[m].segmentos||{})[seg];
          if(!sd) continue;
          if(sd.serie){ for(const mo of months){ const n = sd.serie[mo]; if(!n) continue; str += (n.stock||0); if(n.ventas>0) vtr += n.ventas; } }
          else if(!off){ str += sd.stock||0; if(sd.ventas>0) vtr += sd.ventas; }
        }
      } else {
        for(const mo of months){ const n = rn.serie[mo]; if(!n) continue; str += (n.stock||0); vtr += (n.ventas||0); }
      }
    }
    st += str;
    if(vtr>0){ vt += vtr; const th = msTh(r); wLo += vtr*th[0]; wHi += vtr*th[1]; }
  }
  if(vt<=0) return {ratio:null, status: st>0?'muerto':'sindato', thLo:null, thHi:null, avgStock:st/W, avgVentas:0};
  const ratio = Math.round(st/vt*100)/100;
  const thLo = wLo/vt, thHi = wHi/vt;
  const status = ratio<0 ? 'sindato' : (ratio<thLo ? 'faltante' : (ratio<=thHi ? 'sano' : 'exceso'));
  return {ratio, status, thLo, thHi, avgStock:st/W, avgVentas:vt/W};
}

// Delta del agregado mix: compara la ventana actual contra la anterior
function msMixDelta(sucList, rubros){
  const cur = msMixCalc(sucList, rubros);
  const prev = msMixCalc(sucList, rubros, MS.periodo||1);
  if(!cur || !prev || cur.thLo===null) return null;
  return msDeltaInfo(cur.ratio, prev===null?null:prev.ratio, cur.thLo, cur.thHi);
}

// Serie mensual agregada de un segmento (para sparklines con filtro de segmento)
function msSegSerieFor(sucList, rubros){
  const D = window.STOCK_DATA, seg = MS.segFiltro, out = {};
  for(const mo of D.meses) out[mo] = {stock:0, ventas:0, ratio:null};
  for(const s of sucList) for(const r of rubros){
    const rn = D.sucursales[s] && D.sucursales[s].rubros[r];
    if(!rn) continue;
    for(const mk in rn.marcas){
      const sd = (rn.marcas[mk].segmentos||{})[seg];
      if(!sd || !sd.serie) continue;
      for(const mo of D.meses){ const n = sd.serie[mo]; if(!n) continue; out[mo].stock += (n.stock||0); out[mo].ventas += (n.ventas>0?n.ventas:0); }
    }
  }
  for(const mo of D.meses){ const o = out[mo]; o.ratio = o.ventas>0 ? Math.round(o.stock/o.ventas*100)/100 : null; }
  return out;
}

function msIconSvg(d, size, stroke){
  if(!d) return '';
  return '<svg viewBox="0 0 24 24" style="width:'+size+'px;height:'+size+'px;flex:none" fill="none" stroke="'+stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="'+d+'"/></svg>';
}
function msBadgeHtml(st){
  const s = MS_ST[st];

function msSparkSvg(serie, H, margen){
  H = H||34;
  const M = window.STOCK_DATA.meses;
  const vals = M.map(m=> serie && serie[m] ? serie[m].ratio : null);
  const nn = vals.filter(v=>v!==null&&v!==undefined);
  let inner = '';
  if(nn.length){
    const mx = Math.max(...nn), mn = Math.min(...nn), rng = (mx-mn)||1;
    let d='', last=null;
    vals.forEach((v,i)=>{
      if(v===null||v===undefined) return;
      const x = i/(M.length-1)*200, y = H-3-((v-mn)/rng)*(H-8);
      d += (d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';
      last = {x,y};
    });
    inner = '<path d="'+d+'" fill="none" stroke="#1B1E6B" stroke-width="1.5"/>'+
      '<circle cx="'+last.x.toFixed(1)+'" cy="'+last.y.toFixed(1)+'" r="2.5" fill="#E2231A"/>';
  }
  return '<svg viewBox="0 0 200 '+H+'" preserveAspectRatio="none" style="width:100%;height:'+H+'px;'+(margen?'margin-top:10px;':'')+'display:block">'+inner+'</svg>';
}

// Gráfico de evolución del drawer, con bandas de fondo del semáforo
function msBigChartSvg(serie, rubro){
  const D = window.STOCK_DATA, M = D.meses, th = msTh(rubro);
  const vals = M.map(m=> serie && serie[m] ? serie[m].ratio : null);
  const nn = vals.filter(v=>v!==null&&v!==undefined);
  if(!nn.length) return '<div style="color:#8A8FA3;font-size:13px">Sin ventas en el período — no hay ratio para graficar (stock muerto o sin dato).</div>';
  const mx = Math.max(...nn, th[1]+1), rng = mx||1;
  const W=400, H=170, padB=22, padT=16, padX=12;
  const X = i=> padX + i/(M.length-1)*(W-padX*2);
  const Y = v=> H-padB-(v/rng)*(H-padB-padT);
  const yf = Y(th[0]), ys = Y(th[1]);
  let d='';
  vals.forEach((v,i)=>{ if(v===null||v===undefined) return; d += (d?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' '; });
  let out = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">';
  out += '<rect x="0" y="'+padT+'" width="'+W+'" height="'+Math.max(0,ys-padT).toFixed(1)+'" fill="#FCE4E5" opacity=".8"/>';
  out += '<rect x="0" y="'+ys.toFixed(1)+'" width="'+W+'" height="'+Math.max(0,yf-ys).toFixed(1)+'" fill="#E2F5E9" opacity=".8"/>';
  out += '<rect x="0" y="'+yf.toFixed(1)+'" width="'+W+'" height="'+Math.max(0,H-padB-yf).toFixed(1)+'" fill="#FDF1DC" opacity=".8"/>';
  out += '<line x1="0" y1="'+yf.toFixed(1)+'" x2="'+W+'" y2="'+yf.toFixed(1)+'" stroke="#16A34A" stroke-dasharray="3 3" opacity=".7"/>';
  out += '<line x1="0" y1="'+ys.toFixed(1)+'" x2="'+W+'" y2="'+ys.toFixed(1)+'" stroke="#E11D2A" stroke-dasharray="3 3" opacity=".7"/>';
  out += '<text x="'+(W-6)+'" y="'+(padT+11)+'" fill="#E11D2A" font-size="8.5" text-anchor="end" opacity=".9">EXCESO &gt; '+th[1]+'</text>';
  out += '<text x="'+(W-6)+'" y="'+(ys+11).toFixed(1)+'" fill="#15803D" font-size="8.5" text-anchor="end" opacity=".9">SANO '+th[0]+'–'+th[1]+'</text>';
  out += '<text x="'+(W-6)+'" y="'+(yf+11).toFixed(1)+'" fill="#B45309" font-size="8.5" text-anchor="end" opacity=".9">FALTANTE &lt; '+th[0]+'</text>';
  out += '<path d="'+d+'" fill="none" stroke="#1B1E6B" stroke-width="2"/>';
  vals.forEach((v,i)=>{
    if(v===null||v===undefined) return;
    out += '<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="3" fill="#1B1E6B"/>';
    out += '<text x="'+X(i).toFixed(1)+'" y="'+(Y(v)-8).toFixed(1)+'" fill="#16181F" font-size="9" text-anchor="middle">'+v.toFixed(1)+'</text>';
  });
  M.forEach((m,i)=>{ out += '<text x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" fill="#5A6072" font-size="9" text-anchor="middle">'+MS_MLAB[m]+'</text>'; });
  return out+'</svg>';
}

/* ---------- Corrección del dataset (red de seguridad) ----------
   El generador del Excel RATIO exporta cada fila de MARCA (y la pseudo-marca
   "Total" de cada rubro) DIVIDIDA POR 2, mientras que rubro.serie, suc.serie
   y el desglose por segmento salen en unidades reales. Verificado contra
   'RATIO 2026 ok.xlsx': Plaza Italia CALZADO junio = 5.136 pares (fila
   Marca=Total del Excel) = rubro.serie = Σ segmentos, y Nike = 380 = Hombre+
   Dama+Unisex; pero en el .js crudo quedaban 2.568 y 190 (la mitad).

   Desde el fix de raíz, datos-meses-stock.js YA viene corregido (marcas en
   unidades reales, sin pseudo-marca "Total"), así que esta función NO hace
   nada. Se deja como red de seguridad: si algún mes se vuelve a pegar un .js
   CRUDO del generador viejo, la presencia de la marca "Total" (que el export
   pone en el 100% de los rubros) la delata y se corrige al vuelo: se duplican
   las series de marca y se borra la pseudo-marca. NO se tocan rubro.serie ni
   suc.serie (ya son reales). El ratio no cambia (stock y ventas ×2 juntos).
   Es idempotente: sin marca "Total", no altera nada. */
function msCorregirDatos(){
  const D = window.STOCK_DATA;
  for(const s in D.sucursales){
    const sn = D.sucursales[s];
    for(const r in (sn.rubros||{})){
      const rn = sn.rubros[r];
      if(!(rn.marcas && rn.marcas['Total'])) continue; // dataset ya corregido
      delete rn.marcas['Total'];
      for(const m in rn.marcas){
        const mserie = rn.marcas[m].serie||{};
        for(const mo of D.meses){
          const n = mserie[mo]; if(!n) continue;
          if(typeof n.stock === 'number') n.stock *= 2;
          if(typeof n.ventas === 'number') n.ventas *= 2;
          n.ratio = n.ventas>0 ? Math.round(n.stock/n.ventas*100)/100 : null;
        }
      }
    }
  }
}

/* ---------- Comentarios: merge con respuestas de Firebase ---------- */
function msMerged(c){ const r = MS.replies[c.id]; return r ? Object.assign({}, c, r) : c; }

// Comentarios "en vivo" hechos desde el portal (Firebase /mesesStock/comentarios),
// que conviven con los que vienen embebidos en el dataset RATIO.
function msAllComments(){
  const live = Object.keys(MS.liveComments||{}).map(k=> Object.assign({id:k}, MS.liveComments[k]));
  return window.STOCK_COMMENTS.concat(live);
}

async function msNewComment(){
  const dd = MS.drawerData;
  if(!dd) return;
  const key = 'nc|'+dd.suc+'|'+dd.rubro+'|'+dd.marca;
  const text = (MS.drafts[key]||'').trim();
  if(!text) return;
  const D = window.STOCK_DATA, mes = D.meses[D.meses.length-1];
  const sn = D.sucursales[dd.suc];
  const node = sn && sn.rubros[dd.rubro] && sn.rubros[dd.rubro].marcas[dd.marca];
  const nMes = node && node.serie && node.serie[mes];
  const rec = {
    mes, suc:dd.suc, rubro:dd.rubro, marca:dd.marca, seg:'Total',
    ratio: nMes ? nMes.ratio : null, texto:text, estado:'pendiente', respuesta:null,
    autor:SESSION.email, fecha:new Date().toLocaleDateString('es-AR'), origen:'portal'
  };
  const id = 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  MS.liveComments[id] = rec;
  delete MS.drafts[key];
  msRender();
  try{
    const r = await putJSON(FB+'/mesesStock/comentarios/'+id+'.json', rec);
    if(!r.ok) throw new Error('HTTP '+r.status);
  }catch(e){
    delete MS.liveComments[id];
    MS.drafts[key] = text;
    msRender();
    alert('No se pudo guardar el comentario. Revisá la conexión y probá de nuevo.');
  }
}

async function msSend(id){
  const text = (MS.drafts[id]||'').trim();
  if(!text) return;
  const rec = {respuesta:text, estado:'resuelto', fecha:new Date().toLocaleDateString('es-AR'), autor:SESSION.email};
  MS.replies[id] = rec;
  delete MS.drafts[id];
  msRender();
  try{
    const r = await putJSON(FB+'/mesesStock/respuestas/'+id+'.json', rec);
    if(!r.ok) throw new Error('HTTP '+r.status);
  }catch(e){
    delete MS.replies[id];
    MS.drafts[id] = text;
    msRender();
    alert('No se pudo guardar la respuesta. Revisá la conexión y probá de nuevo.');
  }
}

/* ---------- Contexto compartido de un render ---------- */
function msCtx(){
  const D = window.STOCK_DATA;
  const winMonths = new Set(D.meses.slice(-(MS.periodo||1)));
  const tipo = MS.tipoFiltro||'todas';
  const MCW = msAllComments().map(msMerged).filter(c=>
    winMonths.has(c.mes)
    && (!MS.rubroFiltro || c.rubro===MS.rubroFiltro)
    && (!MS.segFiltro || c.seg===MS.segFiltro || c.seg==='Total')
    && (tipo==='todas' || msTipoDe(c.suc)===tipo));
  const bySuc={}, bySR={}, bySRM={};
  let pend=0;
  for(const c of MCW){
    bySuc[c.suc] = (bySuc[c.suc]||0)+1;
    bySR[c.suc+'|'+c.rubro] = (bySR[c.suc+'|'+c.rubro]||0)+1;
    bySRM[c.suc+'|'+c.rubro+'|'+c.marca] = (bySRM[c.suc+'|'+c.rubro+'|'+c.marca]||0)+1;
    if(c.estado==='pendiente') pend++;
  }
  const sucKeys = Object.keys(D.sucursales).filter(s=> tipo==='todas' || msTipoDe(s)===tipo);
  return {D, MCW, bySuc, bySR, bySRM, pend, sucKeys, tipo};
}

// Puntos en faltante/exceso/sano (cacheado por combinación de filtros)
function msKpiPuntos(scope){
  const ctx = MS._ctx, D = ctx.D;
  const kk = (MS.periodo||1)+'|'+ctx.tipo+'|'+(MS.rubroFiltro||'-')+'|'+(MS.segFiltro||'-')+'|'+(MS.suc||'-');
  if(!MS._kpiCache[kk]){
    let falt=0, exc=0, sano=0;
    for(const s of scope) for(const r of msEffRubros()){
      const rn = D.sucursales[s] && D.sucursales[s].rubros[r];
      if(!rn) continue;
      for(const m in rn.marcas){
        const pc = msPointCalc(r, rn.marcas[m]);
        if(!pc) continue;
        if(pc.status==='faltante') falt++;
        else if(pc.status==='exceso') exc++;
        else if(pc.status==='sano') sano++;
      }
    }
    MS._kpiCache[kk] = {falt, exc, sano};
  }
  return MS._kpiCache[kk];
}

function msPanelHtml(){

  const kpiScope = MS.suc ? [MS.suc] : sucKeys;
  let html = '';

  // --- KPIs grandes de cobertura (clickeables como filtro de rubro) ---
  const mixAll = msMixCalc(kpiScope, null);

    di: msMixDelta(kpiScope, null),

          '<div style="display:flex;align-items:center;justify-content:space-between;gap:6px">'+
            '<span style="display:flex;align-items:center;gap:5px">'+msIconSvg(sg.iconD, 15, '#1B1E6B')+'<span class="ms-lbl">'+esc(sg.name)+'</span></span>'+
            msBadgeHtml(sg.status)+
          '</div>'+
          '<div class="ms-num" style="font-size:22px;line-height:1.2;margin-top:2px;color:'+ST[sg.status].color+'">'+msFmtR(sg.ratio)+'<span class="ms-unit" style="font-size:11px"> meses</span></div>'+
          '<div class="ms-dim" style="margin-top:2px">'+sg.detail+'</div>'+
        '</div>';
      }).join('')+'</div>';
  }

  const ordenSt = {faltante:0, exceso:1, muerto:2, sano:3, sindato:4};
  const comPill = n=> n>0?'<span style="background:#E8E9F5;color:#1B1E6B;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600">'+n+' com.</span>':'';
  const excCell = exc=> exc===null?'<span style="color:#B4B8C7">–</span>':'<b style="color:#E11D2A">'+msFmtN(exc)+'</b>';

  if(MS.marca){
    // --- Vista transversal: una marca en todas las sucursales, por rubro ---
    const entry = msMarcaIndex()[MS.marca];
    MS._marcaRows = [];
    if(!entry){ html += '<div class="empty">No hay datos para esta marca.</div>'; }
    else{
      const rubros = Object.keys(entry.rubros).filter(r=> !MS.rubroFiltro || r===MS.rubroFiltro).sort();
      let algo = false;
      for(const r of rubros){
        const sucs = entry.rubros[r].filter(s=> sucKeys.indexOf(s)>=0);
        if(!sucs.length) continue;
        algo = true;
        const th = msTh(r);
        // Serie total cadena de la marca en este rubro (para el resumen y su delta)
        const serieTot = {};
        for(const mo of D.meses) serieTot[mo] = {stock:0, ventas:0, ratio:null};
        for(const s of sucs){
          const node = D.sucursales[s].rubros[r].marcas[MS.marca];
          if(!node || !node.serie) continue;
          for(const mo of D.meses){ const n = node.serie[mo]; if(!n) continue; serieTot[mo].stock += (n.stock||0); serieTot[mo].ventas += (n.ventas||0); }
        }
        for(const mo of D.meses){ const o = serieTot[mo]; o.ratio = o.ventas>0 ? Math.round(o.stock/o.ventas*100)/100 : null; }
        const wc = msWinCalc(r, serieTot);
        const wcPrev = msWinCalc(r, serieTot, Wp);
        const diTot = wcPrev ? msDeltaInfo(wc.ratio, wcPrev.ratio, th[0], th[1]) : null;
        const rows = sucs.map(s=>{
          const node = D.sucursales[s].rubros[r].marcas[MS.marca];
          const pc = msPointCalc(r, node);
          if(!pc) return null;
          const pp = msPointCalc(r, node, Wp);
          return {s, node, pc, exc: msExcedente(r, pc),
            di: pp ? msDeltaInfo(pc.ratio, pp.ratio, th[0], th[1]) : null,
            com: ctx.bySRM[s+'|'+r+'|'+MS.marca]||0,
            _o: ordenSt[pc.status], _r: pc.ratio===null?999:pc.ratio};
        }).filter(Boolean).sort((a,b)=> a._o-b._o || a._r-b._r);
        const base = MS._marcaRows.length;
        rows.forEach(x=> MS._marcaRows.push({suc:x.s, rubro:r}));
        html += '<div style="display:flex;align-items:baseline;gap:10px;margin:18px 0 8px;flex-wrap:wrap">'+
          '<span class="ms-lbl" style="font-size:12px">'+esc(r)+'</span>'+
          '<span class="ms-num" style="font-size:19px;color:'+ST[wc.status].color+'">'+msFmtR(wc.ratio)+'<span class="ms-unit" style="font-size:11px"> meses total cadena</span></span>'+msDeltaHtml(diTot)+
          '<span class="ms-dim">Stock: '+msFmtN(wc.avgStock)+' · Ventas: '+msFmtN(wc.avgVentas)+unitSuffix+' · Sano: '+th[0]+'–'+th[1]+' meses</span>'+
        '</div>';
        html += '<div class="ms-mtable"><div class="ms-mmin">'+
          '<div class="ms-mhead"><div>Sucursal</div><div>Estado</div><div>Meses ('+rangoLbl+')</div><div>'+(Wp===1?'Stock':'Stock prom.')+'</div><div>'+(Wp===1?'Ventas':'Ventas prom.')+'</div><div>Exceso (un.)</div><div>Evolución</div><div></div></div>'+
          rows.map((x,i)=>{
            const sparkSerie = MS.segFiltro ? (((x.node.segmentos||{})[MS.segFiltro]||{}).serie||{}) : x.node.serie;
            return '<div class="ms-mrow" data-ms-mrow="'+(base+i)+'">'+
              '<div style="font-weight:600">'+esc(x.s)+'</div>'+
              '<div>'+msBadgeHtml(x.pc.status)+'</div>'+
              '<div class="ms-num" style="font-weight:700;font-size:14px;color:'+ST[x.pc.status].color+'">'+msFmtR(x.pc.ratio)+msDeltaHtml(x.di)+'</div>'+
              '<div style="color:#5A6072">'+msFmtN(x.pc.stock)+'</div>'+
              '<div style="color:#5A6072">'+msFmtN(x.pc.ventas)+'</div>'+
              '<div>'+excCell(x.exc)+'</div>'+
              '<div>'+msSparkSvg(sparkSerie, 30, false)+'</div>'+
              '<div>'+comPill(x.com)+'</div>'+
            '</div>';
          }).join('')+'</div></div>';
      }
      if(!algo) html += '<div class="empty">Esta marca no tiene datos con los filtros actuales (tipo de sucursal / rubro).</div>';
    }

  } else if(!MS.suc){
    // --- Top de stock inmovilizado (exceso + sin venta) del alcance actual ---
    const inmov = [];
    for(const s of sucKeys) for(const r of msEffRubros()){
      const rn = D.sucursales[s].rubros[r];
      if(!rn) continue;
      for(const m in rn.marcas){
        const pc = msPointCalc(r, rn.marcas[m]);
        const exc = msExcedente(r, pc);
        if(exc && exc>0) inmov.push({s, r, m, exc, pc});
      }
    }
    inmov.sort((a,b)=> b.exc-a.exc);
    MS._topInmov = inmov.slice(0,10);
    if(MS._topInmov.length){
      const totInmov = inmov.reduce((a,x)=>a+x.exc,0);
      html += '<div class="ms-card" style="padding:14px 16px;margin-bottom:18px">'+
        '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px">'+
          '<span class="ms-lbl">Top 10 — stock inmovilizado (exceso + sin venta)</span>'+
          '<span class="ms-dim">Total del alcance actual: <b style="color:#E11D2A">'+msFmtN(totInmov)+'</b> un. por encima del rango sano · prom/mes '+esc(rangoLbl)+'</span>'+
        '</div>'+
        MS._topInmov.map((x,i)=>
          '<div class="ms-mrow" data-ms-top="'+i+'" style="display:flex;gap:10px;align-items:center;padding:7px 4px;font-size:12.5px">'+
            '<span style="width:18px;color:#8A8FA3;font-weight:600;flex:none">'+(i+1)+'</span>'+
            '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b>'+esc(x.m)+'</b> <span style="color:#5A6072">· '+esc(x.s)+' · '+esc(x.r)+'</span></span>'+
            msBadgeHtml(x.pc.status)+
            '<span class="ms-num" style="color:'+ST[x.pc.status].color+';font-size:13px;width:42px;text-align:right;flex:none">'+msFmtR(x.pc.ratio)+'</span>'+
            '<b style="color:#E11D2A;width:88px;text-align:right;white-space:nowrap;flex:none">'+msFmtN(x.exc)+' un.</b>'+
          '</div>').join('')+
      '</div>';
    }

    // --- Filtro por tipo de sucursal ---
    const allSucs = Object.keys(D.sucursales);
    html += '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
      [['todas','Todas'],['aurelius','Aurelius'],['mateu','Mateu de línea'],['outlet','Outlets'],['adidas','Adidas Franquicias']].map(t=>{
        const n = t[0]==='todas' ? allSucs.length : allSucs.filter(s=>msTipoDe(s)===t[0]).length;
        return '<button class="ms-pill'+(tipo===t[0]?' active':'')+'" data-ms-tipo="'+t[0]+'">'+t[1]+' ('+n+')</button>';
      }).join('')+'</div>';

    // --- Grid de sucursales (orden: menor a mayor cobertura, sin dato al final) ---
    const cards = sucKeys.map(s=>{
      const sn = D.sucursales[s];
      let falt=0, exc=0;
      for(const r of msEffRubros()){
        const rn = sn.rubros[r];
        if(!rn) continue;
        for(const m in rn.marcas){
          const pc = msPointCalc(r, rn.marcas[m]);
          if(!pc) continue;
          if(pc.status==='faltante') falt++; else if(pc.status==='exceso') exc++;
        }
      }
      const mix = msMixCalc([s], null);
      return {key:s, mix, falt, exc, com: ctx.bySuc[s]||0,
        di: msMixDelta([s], null),
        spark: msSparkSvg(MS.segFiltro ? msSegSerieFor([s], msEffRubros()) : sn.serie, 34, true),
        _crit: mix.ratio===null ? 999 : mix.ratio};
    }).sort((a,b)=> a._crit-b._crit);
    MS._sucs = cards.map(c=>c.key);
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:12px">'+
      cards.map((c,i)=>
        '<div class="ms-card ms-clickcard" data-ms-suc="'+i+'" style="padding:14px 16px">'+
          '<div style="font-weight:600;font-size:14px;margin-bottom:10px">'+esc(c.key)+'</div>'+
          '<div class="ms-num" style="font-size:30px;line-height:1;color:'+ST[c.mix.status].color+'">'+msFmtR(c.mix.ratio)+'<span class="ms-unit" style="font-size:12px"> meses prom. s/Producto</span>'+msDeltaHtml(c.di)+'</div>'+
          '<div class="ms-dim" style="margin-top:3px">Stock: '+msFmtN(c.mix.avgStock)+' · Ventas: '+msFmtN(c.mix.avgVentas)+unitSuffix+'</div>'+
          '<div style="font-size:11px;color:#5A6072;margin-top:7px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">'+
            '<span><b style="color:#F59E0B;font-weight:600">'+c.falt+'</b> faltantes</span>'+
            '<span><b style="color:#E11D2A;font-weight:600">'+c.exc+'</b> excesos</span>'+
            (c.com>0?'<span style="background:#E8E9F5;color:#1B1E6B;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600">'+c.com+' coment.</span>':'')+
          '</div>'+
          c.spark+
        '</div>').join('')+'</div>';

  } else if(!MS.rubro){
    // --- Nivel rubros de una sucursal (orden por criticidad) ---
    const sn = D.sucursales[MS.suc];
    if(!sn){ html += '<div class="empty">Sin datos para esta sucursal.</div>'; }
    else{
      const cards = Object.keys(sn.rubros)
        .filter(r=> !MS.rubroFiltro || r===MS.rubroFiltro)
        .map(r=>{
          const rn = sn.rubros[r];
          const wc = msMixCalc([MS.suc], [r]);
          return {key:r, wc, th:msTh(r), com: ctx.bySR[MS.suc+'|'+r]||0,
            di: msMixDelta([MS.suc], [r]),
            spark: msSparkSvg(MS.segFiltro ? msSegSerieFor([MS.suc], [r]) : rn.serie, 34, true),
            _o: ordenSt[wc.status]};
        }).sort((a,b)=> a._o-b._o || a.key.localeCompare(b.key));
      MS._rubs = cards.map(c=>c.key);
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px">'+
        cards.map((c,i)=>
          '<div class="ms-card ms-clickcard" data-ms-rubro="'+i+'" style="padding:14px 16px;position:relative">'+
            '<div style="position:absolute;top:12px;right:12px">'+msBadgeHtml(c.wc.status)+'</div>'+
            '<div style="font-weight:600;font-size:14px;margin-bottom:10px;padding-right:70px">'+esc(c.key)+'</div>'+
            '<div class="ms-num" style="font-size:30px;line-height:1;color:'+ST[c.wc.status].color+'">'+msFmtR(c.wc.ratio)+'<span class="ms-unit" style="font-size:12px"> meses</span>'+msDeltaHtml(c.di)+'</div>'+
            '<div style="font-size:11px;color:#5A6072;margin-top:9px;display:flex;gap:10px;align-items:center">'+
              '<span>Sano: '+c.th[0]+'–'+c.th[1]+' meses</span>'+
              (c.com>0?'<span style="background:#E8E9F5;color:#1B1E6B;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600">'+c.com+' coment.</span>':'')+
            '</div>'+
            c.spark+
          '</div>').join('')+'</div>';
    }

  } else {
    // --- Nivel marcas: tabla densa con filtro de estado y orden clickeable ---
    const rn = D.sucursales[MS.suc] && D.sucursales[MS.suc].rubros[MS.rubro];
    if(!rn){ html += '<div class="empty">Sin datos para este rubro.</div>'; }
    else{
      const th = msTh(MS.rubro);
      const all = Object.keys(rn.marcas)
        .map(m=>({m, node:rn.marcas[m], pc: msPointCalc(MS.rubro, rn.marcas[m])}))
        .filter(x=> x.pc && (MS_MOSTRAR_SINDATO || x.pc.status!=='sindato'))
        .map(x=>{
          const pp = msPointCalc(MS.rubro, x.node, Wp);
          return Object.assign(x, {_o: ordenSt[x.pc.status], _r: x.pc.ratio===null?999:x.pc.ratio,
            exc: msExcedente(MS.rubro, x.pc),
            di: pp ? msDeltaInfo(x.pc.ratio, pp.ratio, th[0], th[1]) : null,
            com: ctx.bySRM[MS.suc+'|'+MS.rubro+'|'+x.m]||0});
        });
      const cnt = {};
      all.forEach(x=> cnt[x.pc.status] = (cnt[x.pc.status]||0)+1);
      html += '<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">'+
        [['','Todas ('+all.length+')'],['faltante','Faltante ('+(cnt.faltante||0)+')'],['exceso','Exceso ('+(cnt.exceso||0)+')'],['muerto','Sin venta ('+(cnt.muerto||0)+')'],['sano','Sano ('+(cnt.sano||0)+')']].map(e=>
          '<button class="ms-pill'+((MS.estadoFiltro||'')===e[0]?' active':'')+'" data-ms-est="'+e[0]+'">'+e[1]+'</button>').join('')+'</div>';
      let rows = MS.estadoFiltro ? all.filter(x=> x.pc.status===MS.estadoFiltro) : all;
      const sv = {ratio:x=>x._r, stock:x=>x.pc.stock||0, ventas:x=>x.pc.ventas||0, exc:x=>x.exc===null?-1:x.exc};
      if(MS.sortCol && sv[MS.sortCol]) rows = rows.slice().sort((a,b)=> MS.sortDir*(sv[MS.sortCol](a)-sv[MS.sortCol](b)));
      else rows = rows.slice().sort((a,b)=> a._o-b._o || a._r-b._r);
      MS._marcas = rows.map(x=>x.m);
      const sArr = c=> MS.sortCol===c ? (MS.sortDir>0?' ↑':' ↓') : '';
      html += '<div class="ms-mtable"><div class="ms-mmin">'+
        '<div class="ms-mhead"><div>Marca</div><div>Estado</div>'+
        '<div class="ms-sorth" data-ms-sort="ratio" title="Ordenar">Meses ('+rangoLbl+')'+sArr('ratio')+'</div>'+
        '<div class="ms-sorth" data-ms-sort="stock" title="Ordenar">'+(Wp===1?'Stock':'Stock prom.')+sArr('stock')+'</div>'+
        '<div class="ms-sorth" data-ms-sort="ventas" title="Ordenar">'+(Wp===1?'Ventas':'Ventas prom.')+sArr('ventas')+'</div>'+
        '<div class="ms-sorth" data-ms-sort="exc" title="Ordenar">Exceso (un.)'+sArr('exc')+'</div>'+
        '<div>Evolución</div><div></div></div>'+
        rows.map((x,i)=>{
          const sparkSerie = MS.segFiltro ? (((x.node.segmentos||{})[MS.segFiltro]||{}).serie||{}) : x.node.serie;
          return '<div class="ms-mrow" data-ms-marca="'+i+'">'+
            '<div style="font-weight:600">'+esc(x.m)+'</div>'+
            '<div>'+msBadgeHtml(x.pc.status)+'</div>'+
            '<div class="ms-num" style="font-weight:700;font-size:14px;color:'+ST[x.pc.status].color+'">'+msFmtR(x.pc.ratio)+msDeltaHtml(x.di)+'</div>'+
            '<div style="color:#5A6072">'+msFmtN(x.pc.stock)+'</div>'+
            '<div style="color:#5A6072">'+msFmtN(x.pc.ventas)+'</div>'+
            '<div>'+excCell(x.exc)+'</div>'+
            '<div>'+msSparkSvg(sparkSerie, 30, false)+'</div>'+
            '<div>'+comPill(x.com)+'</div>'+
          '</div>';
        }).join('')+'</div></div>';
    }
  }
  return html;
}

function msInboxHtml(){
  const ctx = MS._ctx, MCW = ctx.MCW, ST = MS_ST;
  const nPend = MCW.filter(c=>c.estado==='pendiente').length, nRes = MCW.length-nPend;
  let html = '<div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center">'+
    [['pendiente','Pendientes ('+nPend+')'],['resuelto','Resueltos ('+nRes+')'],['all','Todos ('+MCW.length+')']].map(f=>
      '<button class="ms-pill'+(MS.inboxFilter===f[0]?' active':'')+'" data-ms-ibf="'+f[0]+'">'+f[1]+'</button>').join('')+
    '<span style="margin-left:auto;color:#8A8FA3;font-size:12px">Ordenados por criticidad · ratio más bajo primero</span></div>';
  let list = MS.inboxFilter==='all' ? MCW.slice() : MCW.filter(c=>c.estado===MS.inboxFilter);
  const critVal = c=> (c.ratio===null||c.ratio===undefined||c.ratio<0) ? 999 : c.ratio;
  list.sort((a,b)=> critVal(a)-critVal(b));
  const total = list.length, shown = Math.min(total, MS_FILAS_BANDEJA+MS.extraRows);
  MS._inbox = list.slice(0, shown);
  html += '<div style="color:#5A6072;font-size:12px;margin-bottom:12px">'+
    (total===0?'':'Mostrando '+shown.toLocaleString('es-AR')+' de '+total.toLocaleString('es-AR')+' comentarios · ')+
    'período '+msRangoLbl()+'</div>';
  if(total===0) html += '<div style="text-align:center;color:#8A8FA3;padding:48px;font-size:14px">No hay comentarios en este estado.</div>';
  html += '<div style="display:flex;flex-direction:column;gap:8px">'+
    MS._inbox.map((c,i)=>{
      const st = msStatusOfRatio(c.rubro, c.ratio);
      const isPend = c.estado==='pendiente';
      return '<div class="ms-card" style="border-radius:12px;padding:12px 14px;display:flex;gap:14px;align-items:center">'+
        '<div class="ms-num" style="min-width:54px;text-align:center;font-weight:700;font-size:16px;color:'+ST[st].color+'">'+((c.ratio===null||c.ratio===undefined||c.ratio<0)?'–':msFmtR(c.ratio))+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:12px;color:#5A6072">'+esc(c.suc)+' · '+esc(c.rubro)+' · '+esc(c.marca)+' · '+MS_MLAB[c.mes]+' '+msAnio()+(c.autor?' · '+esc(c.autor):'')+'</div>'+
          '<div style="font-size:13px;margin-top:3px">'+esc(c.texto)+'</div>'+
          (c.respuesta?'<div style="margin-top:6px;font-size:12px;color:#1B1E6B">↳ '+esc(c.respuesta)+'</div>':'')+
        '</div>'+
        '<span class="ms-badge" style="background:'+(isPend?'#FFF4C2':'#E2F5E9')+';color:'+(isPend?'#8A6D00':'#16A34A')+'">'+(isPend?'Pendiente':'Resuelto')+'</span>'+
        '<button class="ms-open" data-ms-open="'+i+'">Abrir</button>'+
      '</div>';
    }).join('')+'</div>';
  if(shown<total) html += '<div style="text-align:center;margin-top:14px"><button class="ms-more" id="msMore">Mostrar más</button></div>';
  return html;
}

function msDrawerHtml(){
  if(!MS.drawerOpen || !MS.drawerData || !MS.ready) return '';
  const ctx = MS._ctx, D = ctx.D, ST = MS_ST, dd = MS.drawerData;
  const sucNode = D.sucursales[dd.suc];
  // Puede no haber nodo de datos (ej. comentarios hechos sobre la fila "Total");
  // en ese caso se muestra igual el hilo de comentarios, sin gráfico.
  const node = (sucNode && sucNode.rubros[dd.rubro] && sucNode.rubros[dd.rubro].marcas[dd.marca]) || null;
  const th = msTh(dd.rubro);
  const ultimoMes = D.meses[D.meses.length-1].toLowerCase();
  const segKeys = Object.keys((node&&node.segmentos)||{}).sort((a,b)=>{
    const ia = MS_SEG_ORDER.indexOf(a), ib = MS_SEG_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib) || a.localeCompare(b);
  });
  const cs = ctx.MCW.filter(c=> c.suc===dd.suc && c.rubro===dd.rubro && c.marca===dd.marca);
  const esProd = msEsProducto();

  let html = '<div class="ms-overlay" data-ms-close="1"></div>';
  html += '<div class="ms-drawer'+(MS.drawerShown?' open':'')+'">'+
    '<button data-ms-close="1" style="position:absolute;top:14px;right:16px;cursor:pointer;color:#5A6072;font-size:20px;background:none;border:none;line-height:1;z-index:1">×</button>'+
    '<div style="padding:18px 20px;border-bottom:1px solid #E6E8F0">'+
      '<div class="ms-num" style="font-size:18px;padding-right:30px;color:#1B1E6B">'+esc(dd.marca)+'</div>'+
      '<div style="font-size:12px;color:#5A6072;margin-top:3px">'+esc(dd.suc)+' · '+esc(dd.rubro)+' · Sano '+th[0]+'–'+th[1]+' meses</div>'+
    '</div>'+
    '<div style="padding:18px 20px;overflow:auto;flex:1">'+
      '<div style="background:#F7F8FC;border:1px solid #E6E8F0;border-radius:12px;padding:14px;margin-bottom:16px">'+
        '<div class="ms-lbl" style="font-size:12px;margin-bottom:12px">Evolución meses de stock</div>'+
        (node ? msBigChartSvg(node.serie, dd.rubro) : '<div style="color:#8A8FA3;font-size:13px">Sin datos de stock para esta marca en el panel.</div>')+
      '</div>';
  if(segKeys.length){

      segKeys.map(seg=>{

  html += '<div class="ms-lbl" style="font-size:12px;margin:18px 0 10px">Comentarios ('+cs.length+')</div>';
  if(!cs.length) html += '<div style="color:#8A8FA3;font-size:13px">Sin comentarios de encargados.</div>';
  html += cs.map(c=>{
    const isPend = c.estado==='pendiente';
    let b = '<div style="background:#F7F8FC;border:1px solid #E6E8F0;border-radius:12px;padding:12px;margin-bottom:10px;border-left:3px solid '+(isPend?'#FFCC00':'#16A34A')+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5A6072;margin-bottom:6px;gap:8px">'+
        '<span>'+MS_MLAB[c.mes]+' '+msAnio()+' · '+esc(c.seg)+' · '+(c.autor?esc(c.autor):'Encargado')+'</span>'+
        '<span class="ms-badge" style="background:'+(isPend?'#FFF4C2':'#E2F5E9')+';color:'+(isPend?'#8A6D00':'#16A34A')+'">'+(isPend?'Pendiente':'Resuelto')+'</span>'+
      '</div>'+
      '<div style="font-size:13px;line-height:1.45">'+esc(c.texto)+'</div>';
    if(c.respuesta) b += '<div style="margin-top:8px;padding:8px 10px;background:#E8E9F5;border-radius:8px;font-size:12px;line-height:1.45"><b style="color:#1B1E6B">Producto ('+esc(c.fecha||'')+'):</b> '+esc(c.respuesta)+'</div>';
    if(isPend && esProd) b += '<div style="display:flex;gap:8px;margin-top:9px">'+
      '<input class="ms-reply-input" data-ms-draft="'+c.id+'" value="'+esc(MS.drafts[c.id]||'')+'" placeholder="Responder como Área de Producto…">'+
      '<button class="ms-send" data-ms-send="'+c.id+'">Enviar</button></div>';
    if(isPend && !esProd) b += '<div style="margin-top:8px;font-size:11px;color:#8A8FA3;font-style:italic">Pendiente de respuesta del Área de Producto.</div>';
    return b+'</div>';
  }).join('');
  // Alta de comentario desde el portal (cualquier usuario logueado)
  const ncKey = 'nc|'+dd.suc+'|'+dd.rubro+'|'+dd.marca;
  html += '<div style="display:flex;gap:8px;margin-top:12px">'+
    '<input class="ms-reply-input" id="msNewCommentInput" data-ms-nc="'+esc(ncKey)+'" value="'+esc(MS.drafts[ncKey]||'')+'" placeholder="Agregar comentario sobre esta marca…">'+
    '<button class="ms-send" id="msNewCommentBtn">Comentar</button></div>'+
    '<div style="margin-top:6px;font-size:11px;color:#8A8FA3">Se guarda al instante y queda pendiente en la Bandeja producto.</div>';
  html += '</div></div>';
  return html;
}

function msRender(){
  const container = $('view-meses-stock');
  if(!container) return;
  if(MS.tab==='carga' && !msEsProducto()) MS.tab = 'panel';
  MS._ctx = MS.ready ? msCtx() : null;
  let html = msHeaderHtml();
  if(MS.cargando){
    html += '<div class="ms-wrap"><div style="color:#5A6072;font-size:13px;padding:40px;text-align:center">Cargando datos de RATIO '+msAnio()+'…</div></div>';
  } else if(MS.error){
    html += '<div class="ms-wrap"><div class="empty">No se pudieron cargar los datos (datos-meses-stock.js). Recargá la página o avisá a sistemas.</div></div>';
  } else if(MS.ready){
    msSavePrefs();
    const body = MS.tab==='panel' ? msPanelHtml() : (MS.tab==='inbox' ? msInboxHtml() : msCargaHtml());
    html += '<div class="ms-wrap">'+body+'</div>'+msDrawerHtml();
  }
  container.innerHTML = html;
  msWire(container);
  if(MS.ready) msUpdateHash();
}

/* ---------- Links directos (#ms/… en el hash, para compartir) ---------- */
function msUpdateHash(){
  let h = '';
  if(MS.tab==='panel'){
    if(MS.marca) h = '#msmarca/'+encodeURIComponent(MS.marca);
    else if(MS.suc){
      h = '#ms/'+encodeURIComponent(MS.suc);
      if(MS.rubro) h += '/'+encodeURIComponent(MS.rubro);
      if(MS.drawerOpen && MS.drawerData && MS.rubro) h += '/'+encodeURIComponent(MS.drawerData.marca);
    }
  }
  try{ history.replaceState(null, '', h || location.pathname+location.search); }catch(e){}
}
function msApplyHash(){
  const raw = (location.hash||'').slice(1);
  if(!raw) return;
  let parts;
  try{ parts = raw.split('/').map(decodeURIComponent); }catch(e){ return; }
  const D = window.STOCK_DATA;
  if(parts[0]==='msmarca' && parts[1]){
    const m = msFindMarca(parts[1]);
    if(m){ MS.tab='panel'; MS.marca = m; MS.suc = null; MS.rubro = null; }
    return;
  }
  if(parts[0]!=='ms' || !parts[1]) return;
  const findKey = (obj, q)=>{ const qq = msNormName(q); return Object.keys(obj||{}).find(k=> msNormName(k)===qq) || null; };
  const suc = findKey(D.sucursales, parts[1]);
  if(!suc) return;
  MS.tab = 'panel'; MS.marca = null; MS.suc = suc;
  const rubro = parts[2] ? findKey(D.sucursales[suc].rubros, parts[2]) : null;
  if(rubro){
    MS.rubro = rubro;
    const marca = parts[3] ? findKey(D.sucursales[suc].rubros[rubro].marcas, parts[3]) : null;
    if(marca){ MS.drawerData = {suc, rubro, marca}; MS.drawerOpen = true; MS.drawerShown = false; }
  }
}

function msOpenDrawer(data){
  MS.drawerData = data;
  MS.drawerOpen = true;
  MS.drawerShown = false;
  msRender();
}
function msCloseDrawer(){
  const dr = document.querySelector('#view-meses-stock .ms-drawer');
  const ov = document.querySelector('#view-meses-stock .ms-overlay');
  MS.drawerOpen = false;
  MS.drawerShown = false;
  if(dr){
    dr.classList.remove('open');
    if(ov){ ov.style.transition = 'opacity .2s'; ov.style.opacity = '0'; }
    setTimeout(msRender, 230);
  } else msRender();
}
function msToggleFs(){
  try{
    if(document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(()=>{});
  }catch(e){}
}

function msWire(root){
  root.querySelectorAll('[data-ms-tab]').forEach(b=> b.addEventListener('click', ()=>{ MS.tab = b.dataset.msTab; MS.extraRows = 0; msRender(); }));
  const fs = root.querySelector('#msFsBtn');
  if(fs) fs.addEventListener('click', msToggleFs);
  const exp = root.querySelector('#msExportBtn');
  if(exp) exp.addEventListener('click', ()=> msExportXlsx().catch(e=> alert('No se pudo generar el Excel: '+e.message)));
  const search = root.querySelector('#msMarcaSearch');
  if(search){
    const aplicar = ()=>{
      const v = search.value.trim();
      if(!v){ if(MS.marca){ MS.marca = null; msRender(); } return; }
      const m = msFindMarca(v);
      if(m){ MS.marca = m; MS.suc = null; MS.rubro = null; msRender(); }
    };
    search.addEventListener('change', aplicar);
    search.addEventListener('keydown', e=>{ if(e.key==='Enter') aplicar(); });
  }
  root.querySelectorAll('[data-ms-sort]').forEach(el=> el.addEventListener('click', ()=>{
    const c = el.dataset.msSort;
    if(MS.sortCol===c){ if(MS.sortDir<0){ MS.sortCol = null; MS.sortDir = 1; } else MS.sortDir = -1; }
    else { MS.sortCol = c; MS.sortDir = c==='ratio' ? 1 : -1; }
    msRender();
  }));
  root.querySelectorAll('[data-ms-est]').forEach(b=> b.addEventListener('click', ()=>{ MS.estadoFiltro = b.dataset.msEst || null; msRender(); }));
  root.querySelectorAll('[data-ms-top]').forEach(el=> el.addEventListener('click', ()=>{
    const x = MS._topInmov[+el.dataset.msTop];
    if(x) msOpenDrawer({suc:x.s, rubro:x.r, marca:x.m});
  }));
  root.querySelectorAll('[data-ms-mrow]').forEach(el=> el.addEventListener('click', ()=>{
    const x = MS._marcaRows[+el.dataset.msMrow];
    if(x) msOpenDrawer({suc:x.suc, rubro:x.rubro, marca:MS.marca});
  }));
  const ncInp = root.querySelector('#msNewCommentInput');
  if(ncInp){
    const key = ncInp.dataset.msNc;
    ncInp.addEventListener('input', ()=>{ MS.drafts[key] = ncInp.value; });
    ncInp.addEventListener('keydown', e=>{ if(e.key==='Enter') msNewComment(); });
  }
  const ncBtn = root.querySelector('#msNewCommentBtn');
  if(ncBtn) ncBtn.addEventListener('click', msNewComment);
  if(MS.tab==='carga') msWireCarga(root);
  root.querySelectorAll('[data-ms-rubrokpi]').forEach(b=> b.addEventListener('click', ()=>{
    const r = b.dataset.msRubrokpi;
    if(r==='GENERAL') MS.rubroFiltro = null;
    else{
      const act = MS.rubroFiltro===r;
      MS.rubroFiltro = act ? null : r;
      if(!act && MS.rubro && MS.rubro!==r) MS.rubro = null;
    }
    msRender();
  }));
  root.querySelectorAll('[data-ms-seg]').forEach(b=> b.addEventListener('click', ()=>{
    const k = b.dataset.msSeg;
    MS.segFiltro = MS.segFiltro===k ? null : k;
    msRender();
  }));
  root.querySelectorAll('[data-ms-tipo]').forEach(b=> b.addEventListener('click', ()=>{ MS.tipoFiltro = b.dataset.msTipo; msRender(); }));
  root.querySelectorAll('[data-ms-periodo]').forEach(b=> b.addEventListener('click', ()=>{ MS.periodo = parseInt(b.dataset.msPeriodo,10); msRender(); }));
  root.querySelectorAll('[data-ms-suc]').forEach(el=> el.addEventListener('click', ()=>{ MS.suc = MS._sucs[+el.dataset.msSuc]; MS.rubro = null; MS.marca = null; MS.estadoFiltro = null; MS.sortCol = null; msRender(); }));
  root.querySelectorAll('[data-ms-rubro]').forEach(el=> el.addEventListener('click', ()=>{ MS.rubro = MS._rubs[+el.dataset.msRubro]; MS.estadoFiltro = null; MS.sortCol = null; msRender(); }));
  root.querySelectorAll('[data-ms-marca]').forEach(el=> el.addEventListener('click', ()=>{
    msOpenDrawer({suc:MS.suc, rubro:MS.rubro, marca:MS._marcas[+el.dataset.msMarca]});
  }));
  const back = root.querySelector('#msBack');
  if(back) back.addEventListener('click', ()=>{
    if(MS.drawerOpen){ msCloseDrawer(); return; }
    if(MS.marca) MS.marca = null;
    else if(MS.rubro) MS.rubro = null;
    else MS.suc = null;
    msRender();
  });
  root.querySelectorAll('[data-ms-crumb]').forEach(a=> a.addEventListener('click', ()=>{
    if(a.dataset.msCrumb==='home'){ if(!MS.suc && !MS.marca) return; MS.suc = null; MS.rubro = null; MS.marca = null; }
    else{ if(!MS.rubro) return; MS.rubro = null; }
    msRender();
  }));
  root.querySelectorAll('[data-ms-ibf]').forEach(b=> b.addEventListener('click', ()=>{ MS.inboxFilter = b.dataset.msIbf; MS.extraRows = 0; msRender(); }));
  root.querySelectorAll('[data-ms-open]').forEach(b=> b.addEventListener('click', ()=>{
    const c = MS._inbox[+b.dataset.msOpen];
    if(!c) return;
    MS.tab = 'panel'; MS.suc = c.suc; MS.rubro = c.rubro;
    msOpenDrawer({suc:c.suc, rubro:c.rubro, marca:c.marca});
  }));
  const more = root.querySelector('#msMore');
  if(more) more.addEventListener('click', ()=>{ MS.extraRows += MS_FILAS_BANDEJA; msRender(); });
  root.querySelectorAll('[data-ms-close]').forEach(el=> el.addEventListener('click', msCloseDrawer));
  root.querySelectorAll('[data-ms-draft]').forEach(inp=>{
    const id = inp.dataset.msDraft;
    inp.addEventListener('input', ()=>{ MS.drafts[id] = inp.value; });
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') msSend(id); });
  });
  root.querySelectorAll('[data-ms-send]').forEach(b=> b.addEventListener('click', ()=> msSend(b.dataset.msSend)));
  // Animación de apertura del drawer (transform 105% → 0). El setTimeout
  // es respaldo: en pestañas no visibles requestAnimationFrame no corre.
  if(MS.drawerOpen && !MS.drawerShown){
    const dr = root.querySelector('.ms-drawer');
    if(dr){
      MS.drawerShown = true;
      const abrir = ()=> dr.classList.add('open');
      requestAnimationFrame(()=> requestAnimationFrame(abrir));
      setTimeout(abrir, 120);
    }
  }
}

/* ---------- Export a Excel (respeta filtros: tipo, rubro, segmento, período) ---------- */
async function msExportXlsx(){
  const D = window.STOCK_DATA, ctx = MS._ctx || msCtx();
  const rango = msRangoLbl(), anio = msAnio();
  const wb = new ExcelJS.Workbook();

  // Hoja Sucursales
  const ws = wb.addWorksheet('Sucursales', {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
  ws.columns = [{width:26},{width:10},{width:14},{width:13},{width:13},{width:11},{width:10}];
  gsSheetHeaderRow(ws, 1, 7, 'MESES DE STOCK — RATIO '+anio+' — '+rango.toUpperCase()+' — SUCURSALES');
  gsSheetTableHeader(ws, 2, ['SUCURSAL','MESES','ESTADO','STOCK PROM','VENTAS PROM','FALTANTES','EXCESOS']);
  let r = 3;
  ctx.sucKeys.map(s=>{
    let falt=0, exc=0;
    for(const rb of msEffRubros()){
      const rn = D.sucursales[s].rubros[rb];
      if(!rn) continue;
      for(const m in rn.marcas){
        const pc = msPointCalc(rb, rn.marcas[m]);
        if(!pc) continue;
        if(pc.status==='faltante') falt++; else if(pc.status==='exceso') exc++;
      }
    }
    const mix = msMixCalc([s], null);
    return {s, mix, falt, exc, _r: mix.ratio===null?999:mix.ratio};
  }).sort((a,b)=>a._r-b._r).forEach((x,i)=>{
    gsSheetDataRow(ws, r, [x.s, x.mix.ratio===null?'S/D':x.mix.ratio, MS_ST[x.mix.status].label,
      Math.round(x.mix.avgStock), Math.round(x.mix.avgVentas), x.falt, x.exc], i%2===1);
    r++;
  });

  // Hoja Marcas (detalle suc × rubro × marca con los filtros aplicados)
  const wsM = wb.addWorksheet('Marcas', {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
  wsM.columns = [{width:26},{width:16},{width:24},{width:14},{width:9},{width:12},{width:12},{width:13}];
  gsSheetHeaderRow(wsM, 1, 8, 'MESES DE STOCK — RATIO '+anio+' — '+rango.toUpperCase()+' — DETALLE POR MARCA');
  gsSheetTableHeader(wsM, 2, ['SUCURSAL','RUBRO','MARCA','ESTADO','MESES','STOCK PROM','VENTAS PROM','EXCESO (UN.)']);
  r = 3;
  let i2 = 0;
  for(const s of ctx.sucKeys) for(const rb of msEffRubros()){
    const rn = D.sucursales[s].rubros[rb];
    if(!rn) continue;
    const marcas = Object.keys(rn.marcas)
      .map(m=>({m, pc: msPointCalc(rb, rn.marcas[m])}))
      .filter(x=> x.pc && x.pc.status!=='sindato')
      .sort((a,b)=> (a.pc.ratio===null?999:a.pc.ratio)-(b.pc.ratio===null?999:b.pc.ratio));
    for(const x of marcas){
      const exc = msExcedente(rb, x.pc);
      gsSheetDataRow(wsM, r, [s, rb, x.m, MS_ST[x.pc.status].label, x.pc.ratio===null?'S/V':x.pc.ratio,
        Math.round(x.pc.stock), Math.round(x.pc.ventas), exc===null?'':exc], i2%2===1);
      r++; i2++;
    }
  }

  // Hoja Comentarios (los visibles con los filtros actuales)
  const wsC = wb.addWorksheet('Comentarios', {views:[{showGridLines:false, state:'frozen', ySplit:2}]});
  wsC.columns = [{width:8},{width:26},{width:16},{width:22},{width:9},{width:52},{width:11},{width:42}];
  gsSheetHeaderRow(wsC, 1, 8, 'MESES DE STOCK — RATIO '+anio+' — COMENTARIOS ('+rango.toUpperCase()+')');
  gsSheetTableHeader(wsC, 2, ['MES','SUCURSAL','RUBRO','MARCA','RATIO','COMENTARIO','ESTADO','RESPUESTA']);
  r = 3;
  ctx.MCW.forEach((c,i)=>{
    gsSheetDataRow(wsC, r, [MS_MLAB[c.mes]||c.mes, c.suc, c.rubro, c.marca,
      (c.ratio===null||c.ratio===undefined)?'':c.ratio, c.texto, c.estado, c.respuesta||''], i%2===1);
    r++;
  });

  await downloadWorkbook(wb, 'MesesStock_RATIO_'+anio+'.xlsx');
  postFireAndForget(FB+'/actividad/'+currentYYYYMM()+'/descargas.json', {
    email: SESSION.email, sucursal_o_outlet: SESSION.sucursal || SESSION.outlet_id || '-',
    tipoExport: 'meses-stock', mesExportado: rango, seccion: 'meses-stock', timestamp: Date.now()
  });
}
