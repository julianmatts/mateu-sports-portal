function msParseRatioFlat(wb, anio){
  const errores = [];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, raw:true});
  const ALIAS = {mes:['MES'], suc:['SUCURSAL','SUC','TIENDA','LOCAL'], rubro:['RUBRO'], marca:['MARCA'],
    seg:['SEGMENTO','SEG'], stock:['STOCK'], ventas:['VENTAS','VENTA'],
    com:['COMENTARIO','COMENTARIOS','OBSERVACION','OBSERVACIONES']};
  let hIdx = -1, map = null;
  for(let i=0;i<Math.min(rows.length,10);i++){
    const cells = (rows[i]||[]).map(v=>normStr(v));
    const m = {};
    for(const k in ALIAS){ const j = cells.findIndex(cv=> ALIAS[k].indexOf(cv)>=0); if(j>=0) m[k]=j; }
    if(m.mes!==undefined && m.suc!==undefined && m.rubro!==undefined && m.marca!==undefined && m.stock!==undefined && m.ventas!==undefined){ hIdx=i; map=m; break; }
  }
  if(!map) return {errorFatal:'No encontré la fila de encabezados. La primera hoja necesita las columnas MES, SUCURSAL, RUBRO, MARCA, STOCK y VENTAS.', errores, comments:[], nFilas:0, nMarcas:0};
  const mesesSet = new Set(), sucursales = {}, comments = [];
  let nFilas = 0;
  for(let i=hIdx+1;i<rows.length;i++){
    const row = rows[i]||[];
    if(row.every(v=> v===null||v===undefined||v==='')) continue;
    let mes = null;
    const mesN = normStr(row[map.mes]);
    if(MS_MES_ORDEN.indexOf(mesN)>=0) mes = mesN;
    else{ const num = toNumber(row[map.mes]); if(num>=1 && num<=12) mes = MS_MES_NUM[num]; }
    const suc = String(row[map.suc]===undefined||row[map.suc]===null?'':row[map.suc]).trim();
    const rubro = normStr(row[map.rubro]);
    const marca = String(row[map.marca]===undefined||row[map.marca]===null?'':row[map.marca]).trim();
    const seg = (map.seg!==undefined && row[map.seg]) ? normStr(row[map.seg]) : 'VARIOS';
    if(!mes || !suc || !rubro || !marca){ errores.push('Fila '+(i+1)+': faltan datos (mes/sucursal/rubro/marca) — salteada.'); continue; }
    const stock = toNumber(row[map.stock])||0;
    const ventas = toNumber(row[map.ventas])||0;
    nFilas++;
    mesesSet.add(mes);
    const sn = sucursales[suc]||(sucursales[suc]={rubros:{}});
    const rn = sn.rubros[rubro]||(sn.rubros[rubro]={marcas:{}});
    const mn = rn.marcas[marca]||(rn.marcas[marca]={serie:{}, segmentos:{}});
    const acc = mn.serie[mes]||(mn.serie[mes]={stock:0, ventas:0, ratio:null});
    acc.stock += stock; acc.ventas += ventas;
    const sg = mn.segmentos[seg]||(mn.segmentos[seg]={stock:0, ventas:0, ratio:null, serie:{}});
    const sacc = sg.serie[mes]||(sg.serie[mes]={stock:0, ventas:0, ratio:null});
    sacc.stock += stock; sacc.ventas += ventas;
    const comTxt = map.com!==undefined ? String(row[map.com]===undefined||row[map.com]===null?'':row[map.com]).trim() : '';
    if(comTxt) comments.push({mes, suc, rubro, marca, seg, ratio:null, texto:comTxt, id:comments.length, estado:'pendiente', respuesta:null});
  }
  if(!nFilas) return {errorFatal:'No pude leer ninguna fila de datos válida.', errores, comments:[], nFilas:0, nMarcas:0};
  const meses = MS_MES_ORDEN.filter(m=> mesesSet.has(m));
  const thresholds = Object.assign({CALZADO:[4,6], INDUMENTARIA:[3,5], ACCESORIOS:[3,5], PRODUCTO:[4,6]},
    (window.STOCK_DATA && window.STOCK_DATA.thresholds)||{});
  const thName = wb.SheetNames.find(n=> normStr(n)==='UMBRALES');
  if(thName){
    const thr = XLSX.utils.sheet_to_json(wb.Sheets[thName], {header:1, raw:true});
    for(let i=1;i<thr.length;i++){
      const rr = thr[i]||[];
      const rb = normStr(rr[0]), lo = toNumber(rr[1]), hi = toNumber(rr[2]);
      if(rb && lo!==null && hi!==null) thresholds[rb] = [lo, hi];
    }
  }
  // Ratios, valores de "último mes" por segmento y status de cada marca
  const last = meses[meses.length-1];
  let nMarcas = 0;
  for(const s in sucursales) for(const r in sucursales[s].rubros){
    const rn = sucursales[s].rubros[r];
    for(const m in rn.marcas){
      nMarcas++;
      const mn = rn.marcas[m];
      for(const mo of meses){ const n = mn.serie[mo]; if(n) n.ratio = n.ventas>0 ? Math.round(n.stock/n.ventas*100)/100 : null; }
      for(const sgk in mn.segmentos){
        const g = mn.segmentos[sgk];
        for(const mo of meses){ const n = g.serie[mo]; if(n) n.ratio = n.ventas>0 ? Math.round(n.stock/n.ventas*100)/100 : null; }
        const ln = g.serie[last]||{stock:0, ventas:0, ratio:null};
        g.stock = ln.stock; g.ventas = ln.ventas; g.ratio = ln.ratio;
      }
      const lm = mn.serie[last]||{stock:0, ventas:0, ratio:null};
      const th = thresholds[r]||[1,3];
      mn.status = lm.ventas<=0 ? (lm.stock>0?'muerto':'sindato')
        : (lm.ratio===null||lm.ratio<0 ? 'sindato' : (lm.ratio<th[0]?'faltante':(lm.ratio<=th[1]?'sano':'exceso')));
    }
  }
  for(const cm of comments){
    const node = sucursales[cm.suc].rubros[cm.rubro].marcas[cm.marca];
    const n = node && node.serie[cm.mes];
    cm.ratio = n ? n.ratio : null;
  }
  return {data:{anio, meses, thresholds, sucursales}, comments, errores, nFilas, nMarcas};
}

function msCargaLeer(f){
  const anioInp = $('msCargaAnio');
  const anio = (anioInp && parseInt(anioInp.value,10)) || msAnio();
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      MS._carga = Object.assign({fileName:f.name, anio}, msParseRatioFlat(wb, anio));
    }catch(err){
      MS._carga = {fileName:f.name, anio, errorFatal:'No pude leer el archivo: '+err.message};
    }
    msRender();
  };
  reader.readAsArrayBuffer(f);
}

function msCargaDescargar(){
  const c = MS._carga;
  if(!c || !c.data) return;
  c.data.anio = c.anio;
  const txt = 'window.STOCK_DATA = '+JSON.stringify(c.data)+';\nwindow.STOCK_COMMENTS = '+JSON.stringify(c.comments)+';\n';
  const blob = new Blob([txt], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'datos-meses-stock.js';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
}

function msCargaProbar(){
  const c = MS._carga;
  if(!c || !c.data) return;
  c.data.anio = c.anio;
  window.STOCK_DATA = JSON.parse(JSON.stringify(c.data));
  window.STOCK_COMMENTS = c.comments.slice();
  msCorregirDatos();
  MS._marcaIndex = null; MS._kpiCache = {};
  MS.suc = null; MS.rubro = null; MS.marca = null; MS.tab = 'panel';
  msRender();
  alert('Dataset de prueba aplicado a esta sesión (no publicado). Para publicarlo: descargá el .js, reemplazá gestion-stock/datos-meses-stock.js en el repo y pusheá.');
}

function msWireCarga(root){
  const file = root.querySelector('#msCargaFile');
  if(file) file.addEventListener('change', ()=>{ if(file.files && file.files[0]) msCargaLeer(file.files[0]); });
  const zone = root.querySelector('#msUpZone');
  if(zone){
    zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('drag'));
    zone.addEventListener('drop', e=>{
      e.preventDefault(); zone.classList.remove('drag');
      if(e.dataTransfer.files && e.dataTransfer.files[0]) msCargaLeer(e.dataTransfer.files[0]);
    });
  }
  const anioInp = root.querySelector('#msCargaAnio');
  if(anioInp) anioInp.addEventListener('change', ()=>{
    if(MS._carga){ MS._carga.anio = parseInt(anioInp.value,10)||msAnio(); if(MS._carga.data) MS._carga.data.anio = MS._carga.anio; }
  });
  const dl = root.querySelector('#msCargaDescargar');
  if(dl) dl.addEventListener('click', msCargaDescargar);
  const pr = root.querySelector('#msCargaProbar');
  if(pr) pr.addEventListener('click', msCargaProbar);
}

/* ---------- Carga diferida del dataset + respuestas + comentarios ---------- */
function msInit(){
  msLoadPrefs();
  document.addEventListener('fullscreenchange', ()=>{
    MS.isFs = !!document.fullscreenElement;
    const b = $('msFsBtn');
    if(b) b.innerHTML = msFsSvg();
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape' && MS.drawerOpen) msCloseDrawer(); });
  MS.cargando = true;
  msRender();
  const s = document.createElement('script');
  s.src = 'datos-meses-stock.js';
  s.onload = async ()=>{
    msCorregirDatos();
    const [replies, live] = await Promise.all([
      fetchJSON(FB+'/mesesStock/respuestas.json').catch(()=>null),
      fetchJSON(FB+'/mesesStock/comentarios.json').catch(()=>null)
    ]);
    MS.replies = replies || {};
    MS.liveComments = live || {};
    MS.cargando = false;
    MS.ready = true;
    msApplyHash();
    msRender();
  };
  s.onerror = ()=>{ MS.cargando = false; MS.error = true; msRender(); };
  document.head.appendChild(s);
}

   INIT — la sesión la crea el Portal. Si no hay sesión válida
   con acceso a esta herramienta, se vuelve al Portal.

$('logoutBtn').addEventListener('click', logout);

(function init(){
  const s = readSession();
  if(!s || !(s.herramientas||[]).includes('gestion-stock')){ location.href='../'; return; }
  boot(s);
})();
