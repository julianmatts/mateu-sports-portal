/* ============================================================
   AUDITORÍA DE ESTANTERÍA
   Flujo sin celulares: 🖨 imprime el listado de lo que debería
   haber, el vendedor recorre con papel, y después marca en la PC
   qué está y qué falta. Los faltantes pueden quedar sin ubicación
   (la verdad física manda). Se guarda la última auditoría en la
   estantería.
   ============================================================ */
let AUDIT = null; // {estId, marcas:{artKey:'esta'|'falta'}}

// Artículos de una estantería agrupados por módulo (en orden)
function articulosPorModulo(estId){
  const e = DATA.estanterias[estId]; if(!e) return [];
  const grupos = modulosOrdenados(e).map(m=>({modId:m.id, nombre:m.nombre, arts:[]}));
  const suelto = {modId:null, nombre:'Sin módulo', arts:[]};
  for(const a of articulosLista()){
    for(const uid in (a.ubicaciones||{})){
      const u = a.ubicaciones[uid];
      if(u.estanteriaId!==estId) continue;
      const g = grupos.find(x=>x.modId===u.moduloId) || suelto;
      if(!g.arts.some(x=>x.key===a.key)) g.arts.push(a);
    }
  }
  if(suelto.arts.length) grupos.push(suelto);
  grupos.forEach(g=> g.arts.sort((x,y)=>(x.codigo||'').localeCompare(y.codigo||'')));
  return grupos.filter(g=>g.arts.length);
}

function imprimirEstanteria(estId){
  const e = DATA.estanterias[estId]; if(!e) return;
  const info = SUCURSAL_BY_SLUG[SUC];
  const grupos = articulosPorModulo(estId);
  const total = grupos.reduce((s,g)=>s+g.arts.length,0);
  $('printArea').innerHTML =
    '<h1>Auditoría de depósito — '+esc(e.nombre)+'</h1>'+
    '<div class="sub">'+esc(info?info.nombre:SUC)+' · '+fmtFecha(Date.now())+' · '+total+' artículos · Marcar ✓ lo que está / ✗ lo que falta</div>'+
    (grupos.length
      ? grupos.map(g=>'<h2>'+esc(g.nombre)+' ('+g.arts.length+')</h2>'+
          '<table><tr><th class="chk">✓/✗</th><th>Código</th><th>Descripción</th><th>Stock</th></tr>'+
          g.arts.map(a=>'<tr><td class="chk"></td><td>'+esc(a.codigo)+'</td><td>'+esc(a.descripcion||'')+'</td><td>'+esc(a.stock)+'</td></tr>').join('')+
          '</table>').join('')
      : '<p>No hay artículos ubicados en esta estantería.</p>');
  window.print();
}

const audLsKey = ()=> 'ubic_audit_'+SUC;

function iniciarAuditoria(estId){
  const guardada = readLS(audLsKey());
  const marcas = (guardada && guardada.estId===estId && (Date.now()-(guardada.ts||0)) < 86400000)
    ? (guardada.marcas||{}) : {};
  AUDIT = {estId, marcas};
  renderAuditoria();
}

function audGuardar(){
  saveLS(audLsKey(), {estId:AUDIT.estId, marcas:AUDIT.marcas, ts:Date.now()});
}

function renderAuditoria(){
  if(!AUDIT) return;
  const e = DATA.estanterias[AUDIT.estId];
  const cont = $('view-auditoria');
  document.querySelectorAll('.view').forEach(v=> v.classList.remove('active'));
  cont.classList.add('active');
  if(!e){ AUDIT=null; setTab('estanterias'); return; }
  const grupos = articulosPorModulo(AUDIT.estId);
  const total = grupos.reduce((s,g)=>s+g.arts.length,0);
  // limpiar marcas de artículos que ya no están en la estantería
  const validos = new Set(); grupos.forEach(g=>g.arts.forEach(a=>validos.add(a.key)));
  Object.keys(AUDIT.marcas).forEach(k=>{ if(!validos.has(k)) delete AUDIT.marcas[k]; });

  cont.innerHTML =
    '<button class="btn btn-outline btn-sm" id="audVolver">← Salir de la auditoría</button>'+
    '<div class="card-title" style="font-size:17px;margin-top:10px">📋 Auditoría — '+esc(e.nombre)+'</div>'+
    '<div class="hint" id="audProgreso" style="margin-bottom:10px"></div>'+
    (total
      ? grupos.map(g=>'<div class="fb-grupo">'+esc(g.nombre)+' · '+g.arts.length+'</div>'+
          g.arts.map(a=>{
            const m = AUDIT.marcas[a.key]||'';
            return '<div class="aud-row'+(m?' '+m:'')+'" data-aud="'+esc(a.key)+'">'+
              '<div class="info"><b>'+esc(a.codigo)+'</b><div class="hint">'+esc((a.descripcion||'').slice(0,60))+' · Stock: '+esc(a.stock)+'</div></div>'+
              '<button class="aud-btn si'+(m==='esta'?' on':'')+'" data-mk="esta">✓ Está</button>'+
              '<button class="aud-btn no'+(m==='falta'?' on':'')+'" data-mk="falta">✕ Falta</button>'+
            '</div>';
          }).join('')).join('')+
        '<button class="btn btn-primary btn-block" id="audTerminar" style="margin-top:14px">Terminar auditoría</button>'
      : '<div class="empty">Esta estantería no tiene artículos ubicados.</div>');

  audProgreso(total);
  $('audVolver').addEventListener('click', ()=>{ AUDIT=null; setTab('estanterias'); });
  const fin = $('audTerminar');
  if(fin) fin.addEventListener('click', ()=> terminarAuditoria(total));
  cont.querySelectorAll('.aud-row').forEach(row=>{
    const key = row.dataset.aud;
    row.querySelectorAll('.aud-btn').forEach(btn=> btn.addEventListener('click', ()=>{
      const mk = btn.dataset.mk;
      AUDIT.marcas[key] = (AUDIT.marcas[key]===mk) ? undefined : mk;
      if(!AUDIT.marcas[key]) delete AUDIT.marcas[key];
      audGuardar();
      // actualizar la fila en el lugar (sin re-render: no salta el scroll)
      const m = AUDIT.marcas[key]||'';
      row.classList.toggle('esta', m==='esta');
      row.classList.toggle('falta', m==='falta');
      row.querySelector('.aud-btn.si').classList.toggle('on', m==='esta');
      row.querySelector('.aud-btn.no').classList.toggle('on', m==='falta');
      audProgreso(total);
    }));
  });
}

function audProgreso(total){
  const marcados = Object.keys(AUDIT.marcas).length;
  const faltan = Object.values(AUDIT.marcas).filter(m=>m==='falta').length;
  const el = $('audProgreso');
  if(el) el.innerHTML = '<b>'+marcados+'</b> de '+total+' revisados · '+
    (faltan?'<b style="color:var(--red)">'+faltan+' faltante'+(faltan===1?'':'s')+'</b>':'sin faltantes')+
    '. Marcá cada artículo según el recorrido (podés imprimir el listado desde Estanterías).';
}

function terminarAuditoria(total){
  const e = DATA.estanterias[AUDIT.estId];
  const revisados = Object.keys(AUDIT.marcas).length;
  const faltantes = Object.keys(AUDIT.marcas).filter(k=>AUDIT.marcas[k]==='falta');
  const listaHtml = faltantes.length
    ? '<div style="max-height:160px;overflow-y:auto;margin:8px 0;font-size:12px">'+
        faltantes.map(k=>{ const a=DATA.articulos[k]; return '<div>'+esc(a?a.codigo:k)+' — '+esc(a?(a.descripcion||''):'')+'</div>'; }).join('')+'</div>'
    : '';
  $('modalBody').innerHTML =
    '<div class="modal-title">Terminar auditoría — '+esc(e.nombre)+'</div>'+
    '<div style="font-size:14px;line-height:1.5"><b>'+revisados+'</b> de '+total+' revisados · <b>'+faltantes.length+'</b> faltante'+(faltantes.length===1?'':'s')+'.</div>'+
    listaHtml+
    (faltantes.length
      ? '<label style="display:flex;gap:8px;align-items:flex-start;font-size:13px;margin-top:8px;cursor:pointer">'+
        '<input type="checkbox" id="audQuitar" checked style="margin-top:2px;accent-color:var(--red)">'+
        'Quitar la ubicación de los faltantes en esta estantería (los que queden sin ninguna pasan a SIN UBICAR)</label>'
      : '')+
    '<div class="modal-footer">'+
      '<button class="btn btn-outline" id="audNo">Seguir marcando</button>'+
      '<button class="btn btn-primary" id="audSi">Confirmar</button></div>';
  $('modalOverlay').classList.add('show');
  $('audNo').addEventListener('click', cerrarModal);
  $('audSi').addEventListener('click', async ()=>{
    $('audSi').disabled = true;
    const quitar = faltantes.length && $('audQuitar') && $('audQuitar').checked;
    const patch = {};
    if(quitar){
      for(const k of faltantes){
        const a = DATA.articulos[k]; if(!a) continue;
        for(const uid in (a.ubicaciones||{})){
          if(a.ubicaciones[uid].estanteriaId===AUDIT.estId) patch['articulos/'+k+'/ubicaciones/'+uid] = null;
        }
        patch['movimientos/'+newId('mv')] = {artKey:k, codigo:a.codigo, tipo:'quita', ubic:e.nombre+' (auditoría)', por:nombreOperador(), ts:Date.now()};
      }
    }
    const registro = {ts:Date.now(), por:nombreOperador(), revisados, faltantes:faltantes.length};
    patch['estanterias/'+AUDIT.estId+'/ultimaAuditoria'] = registro;
    try{
      await patchJSON(sucPath()+'.json', patch);
      if(quitar) for(const k of faltantes){
        const a = DATA.articulos[k]; if(!a || !a.ubicaciones) continue;
        Object.keys(a.ubicaciones).forEach(uid=>{ if(a.ubicaciones[uid].estanteriaId===AUDIT.estId) delete a.ubicaciones[uid]; });
      }
      e.ultimaAuditoria = registro;
      delLS(audLsKey());
      AUDIT = null; lastHash='';
      cerrarModal(); setTab('estanterias'); renderStatusbar(); patchMetaContadores();
      toast('Auditoría guardada ✓'+(quitar&&faltantes.length?' Se quitaron '+faltantes.length+' ubicaciones.':''));
    }catch(err){ toast('No se pudo guardar la auditoría.'); $('audSi').disabled=false; }
  });
}

/* ============================================================
   ACTIVIDAD — top de consultados (7 días) + ranking de ubicadores
   El Top sirve para decidir qué artículos conviene tener en las
   estanterías de más fácil acceso.
   ============================================================ */
async function renderActividad(){
  const cont = $('view-actividad');
  cont.innerHTML = '<div class="hint">Cargando actividad…</div>';
  let consultas = {};
  try{ consultas = await fetchJSON(sucPath()+'/consultas.json') || {}; }catch(e){}
  // aplanar los días retenidos (7) y agrupar por artículo
  const porArt = {};
  Object.values(consultas).forEach(dia=> Object.values(dia||{}).forEach(c=>{
    if(!c || !c.key) return;
    if(!porArt[c.key]) porArt[c.key] = {key:c.key, codigo:c.codigo, descripcion:c.descripcion||'', n:0};
    porArt[c.key].n++;
  }));
  const top = Object.values(porArt).sort((a,b)=>b.n-a.n).slice(0,15);

  // ranking: asignaciones vigentes de los últimos 7 días, por perfil
  // (se excluye lo importado de planillas)
  const lim = Date.now()-7*86400000;
  const rk = {};
  for(const a of articulosLista())
    for(const uid in (a.ubicaciones||{})){
      const u = a.ubicaciones[uid];
      if((u.ts||0)>=lim && u.por && !/\(planilla\)/.test(u.por)) rk[u.por]=(rk[u.por]||0)+1;
    }
  const ranking = Object.entries(rk).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const perfiles = perfilesOrdenados();

  cont.innerHTML =
    '<div class="card"><div class="card-title">🔎 Más consultados — últimos 7 días</div>'+
    (top.length
      ? top.map((t,i)=>{
          const art = DATA.articulos[t.key];
          const ubis = art ? Object.values(art.ubicaciones||{}).map(u=>nombreUbicacion(u)).join(' · ') : '';
          return '<div class="act-row"><span class="act-pos">'+(i+1)+'</span><span class="act-n">'+t.n+'×</span>'+
            '<div class="info"><b>'+esc(t.codigo)+'</b><div class="hint">'+esc((t.descripcion||'').slice(0,50))+'</div></div>'+
            '<span class="act-ubi">'+(art ? (ubis||'<span style="color:var(--red)">SIN UBICAR</span>') : '<span class="hint">fuera de stock</span>')+'</span></div>';
        }).join('')+
        '<div class="hint" style="margin-top:8px">Si lo más consultado está en estanterías del fondo, conviene moverlo a una de fácil acceso.</div>'
      : '<div class="empty">Sin consultas en los últimos 7 días.</div>')+'</div>'+
    '<div class="card"><div class="card-title">🏆 Ubicadores de la semana</div>'+
    (ranking.length
      ? ranking.map(([por,n],i)=>{
          const perfil = perfiles.find(p=>p.nombre===por);
          return '<div class="act-row"><span class="act-pos">'+(i+1)+'</span>'+avatarHtml(perfil||{nombre:por})+
            '<div class="info"><b>'+esc(por)+'</b></div><span class="act-n">'+n+' ubicado'+(n===1?'':'s')+'</span></div>';
        }).join('')
      : '<div class="empty">Sin ubicaciones asignadas esta semana.</div>')+'</div>';
}

/* ============================================================
   PANEL DE PERFILES (encargado / admin)
   ============================================================ */
async function renderPanelPerfiles(){
  const cont = $('view-perfiles');
  if(!canManage()){ cont.innerHTML='<div class="empty">Solo el encargado puede administrar perfiles.</div>'; return; }
  cont.innerHTML = '<div class="hint">Cargando perfiles…</div>';
  await cargarPerfiles(); // refresco al abrir el panel (no se pollea)
  const lista = perfilesOrdenados();
  cont.innerHTML =
    '<button class="btn btn-navy btn-block" id="btnNuevoPerfil" style="margin-bottom:12px">+ Nuevo perfil</button>'+
    (lista.length ? '<div class="perfil-grid">'+lista.map(p=>
      '<div class="perfil-card">'+avatarHtml(p)+
        '<div class="nm">'+esc(p.nombre)+'</div><div class="rl">'+esc(rolLabel(p.rol))+'</div>'+
        '<button class="btn btn-outline btn-sm" data-edit="'+p.id+'">Editar</button> '+
        '<button class="btn btn-outline btn-sm" data-del="'+p.id+'">✕</button>'+
      '</div>').join('')+'</div>'
    : '<div class="empty">No hay perfiles todavía.</div>');
  $('btnNuevoPerfil').addEventListener('click', ()=> abrirFormPerfil(null, false));
  cont.querySelectorAll('[data-edit]').forEach(b=> b.addEventListener('click', ()=> abrirFormPerfil(b.dataset.edit, false)));
  cont.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', ()=> eliminarPerfil(b.dataset.del)));
}

function abrirFormPerfil(perfilId, esPrimero){
  const p = perfilId ? PERFILES[perfilId] : null;
  // avatar seleccionado: id de AVATARES, o '' = iniciales
  let avatarSel = (p && p.avatar && AVATAR_BY_ID[p.avatar]) ? p.avatar : '';
  $('modalBody').innerHTML =
    '<div class="modal-title">'+(p?'Editar perfil':'Nuevo perfil')+'</div>'+
    '<div class="fld"><label>Nombre</label><input type="text" id="pfNombre" value="'+esc(p?p.nombre:'')+'" placeholder="Ej: Daniel"></div>'+
    '<div class="fld"><label>Rol</label><div class="radio-row" id="pfRolRow">'+
      PERFIL_ROLES.map(r=>{
        const sel = esPrimero ? r.id==='encargado' : (p ? p.rol===r.id : r.id==='vendedor');
        return '<label'+(sel?' class="sel"':'')+'><input type="radio" name="pfRol" value="'+r.id+'" '+(sel?'checked':'')+' '+(esPrimero?'disabled':'')+'> '+r.label+'</label>';
      }).join('')+
    '</div>'+(esPrimero?'<div class="hint" style="margin-top:4px">El primer perfil siempre es encargado.</div>':'')+'</div>'+
    '<div class="fld"><label>Avatar</label><div class="av-pick" id="pfAvPick"></div>'+
      '<div class="hint" style="margin-top:6px">Elegí un avatar, o dejá el primero para usar las iniciales.</div></div>'+
    '<div class="modal-footer">'+
      '<button class="btn btn-outline" id="pfCancelar">Cancelar</button>'+
      '<button class="btn btn-primary" id="pfGuardar">Guardar</button></div>';
  $('modalOverlay').classList.add('show');

  function pintarAvPick(){
    const nombre = ($('pfNombre').value||'').trim() || (p&&p.nombre) || '?';
    $('pfAvPick').innerHTML =
      '<button type="button" class="av-opt'+(!avatarSel?' sel':'')+'" data-av="" title="Iniciales">'+avatarHtml({nombre})+'</button>'+
      AVATARES.map(a=>'<button type="button" class="av-opt'+(avatarSel===a.id?' sel':'')+'" data-av="'+a.id+'" style="background:'+a.bg+'">'+a.emoji+'</button>').join('');
    $('pfAvPick').querySelectorAll('[data-av]').forEach(b=> b.addEventListener('click', ()=>{ avatarSel = b.dataset.av; pintarAvPick(); }));
  }
  pintarAvPick();
  $('pfNombre').addEventListener('input', ()=>{ if(!avatarSel) pintarAvPick(); });

  $('pfRolRow').querySelectorAll('input').forEach(r=> r.addEventListener('change', ()=>{
    $('pfRolRow').querySelectorAll('label').forEach(l=> l.classList.toggle('sel', l.querySelector('input').checked));
  }));
  $('pfCancelar').addEventListener('click', ()=>{ cerrarModal(); if(esPrimero) mostrarSelectorPerfiles(); });
  $('pfGuardar').addEventListener('click', async ()=>{
    const nombre = ($('pfNombre').value||'').trim();
    if(!nombre){ toast('Falta el nombre.'); return; }
    const rol = esPrimero ? 'encargado' : ($('pfRolRow').querySelector('input:checked')||{}).value || 'vendedor';
    $('pfGuardar').disabled=true;
    try{
      if(perfilId){
        const patch = {nombre, rol, avatar: avatarSel || null};
        await patchJSON(sucPath()+'/perfiles/'+perfilId+'.json', patch);
        PERFILES[perfilId] = {...PERFILES[perfilId], ...patch};
        if(PERFIL && PERFIL.id===perfilId){ PERFIL={id:perfilId, ...PERFILES[perfilId]}; montarApp(); }
      } else {
        const id = newId('p');
        const lista = perfilesOrdenados();
        const rec = {nombre, rol, orden:(lista.length?Math.max(...lista.map(x=>x.orden||0)):0)+1};
        if(avatarSel) rec.avatar = avatarSel;
        await putJSON(sucPath()+'/perfiles/'+id+'.json', rec);
        PERFILES[id]=rec;
      }
      cerrarModal();
      if(esPrimero){ mostrarSelectorPerfiles(); }
      else if(tabActiva==='perfiles') renderPanelPerfiles();
      toast('Perfil guardado ✓');
    }catch(e){ toast('No se pudo guardar.'); $('pfGuardar').disabled=false; }
  });
}

function eliminarPerfil(id){
  const p = PERFILES[id]; if(!p) return;
  const encargados = perfilesOrdenados().filter(x=>x.rol==='encargado');
  if(p.rol==='encargado' && encargados.length<=1){
    toast('No se puede eliminar: es el único perfil encargado de la sucursal.');
    return;
  }
  confirmarModal('Eliminar perfil', '¿Eliminar el perfil de <b>'+esc(p.nombre)+'</b>?<br><span class="hint">El historial no se pierde: las cargas y asignaciones guardan el nombre.</span>', async ()=>{
    try{
      await delJSON(sucPath()+'/perfiles/'+id+'.json');
      delete PERFILES[id];
      if(PERFIL && PERFIL.id===id){ cambiarPerfil(); return; }
      renderPanelPerfiles();
      toast('Perfil eliminado.');
    }catch(e){ toast('No se pudo eliminar.'); }
  });
}

/* ============================================================
   MODO GLOBAL (admin / supervisión)
   ============================================================ */
function montarGlobal(){
  $('app').style.display='block';
  $('globalBar').style.display='flex';
  $('globalModo').textContent = MODE==='admin' ? 'Edición total' : 'Solo consulta';
  $('hdrSucursal').textContent = MODE==='admin' ? 'Administración' : 'Supervisión';
  const sel = $('selSucursal');
  sel.innerHTML = '<option value="">— Resumen general —</option>'+
    SUCURSALES.map(s=>'<option value="'+s.slug+'">'+s.nombre+'</option>').join('');
  sel.addEventListener('change', ()=>{
    detenerPolling();
    SUC = sel.value || null;
    DATA = {articulos:{}, estanterias:{}, meta:{}}; lastHash='';
    renderTabs();
    if(SUC){
      $('hdrSucursal').textContent = SUCURSAL_BY_SLUG[SUC].nombre + (MODE==='admin'?' · Admin':' · Consulta');
      setTab('buscar');
      iniciarPolling();
    } else {
      $('hdrSucursal').textContent = MODE==='admin' ? 'Administración' : 'Supervisión';
      setTab('resumen');
      renderStatusbar();
    }
  });
  renderTabs();
  setTab('resumen');
}

async function renderResumenGlobal(){
  const cont = $('view-resumen');
  cont.innerHTML = '<div class="hint">Cargando resumen de sucursales…</div>';
  let slugs = [];
  try{
    const shallow = await fetchJSON(FB+'/sucursales.json?shallow=true') || {};
    slugs = SUCURSALES.map(s=>s.slug).filter(sl=>shallow[sl]);
    hideErr();
  }catch(e){
    cont.innerHTML = '';
    showErr('No se pudo conectar a la base de Ubicaciones. Verificá que la base "ubicaciones-mateu" exista y esté accesible.');
    return;
  }
  if(!slugs.length){
    cont.innerHTML = '<div class="empty">Ninguna sucursal empezó a usar el módulo todavía.</div>';
    return;
  }
  const metas = await Promise.all(slugs.map(sl=> fetchJSON(FB+'/sucursales/'+sl+'/meta.json').catch(()=>null)));
  const filas = slugs.map((sl,i)=>{
    const m = metas[i]||{};
    const est = m.ultimaCargaStock ? estadoCarga(m.ultimaCargaStock) : 'rojo';
    return '<tr class="click" data-suc="'+sl+'">'+
      '<td><b>'+esc(SUCURSAL_BY_SLUG[sl].nombre)+'</b></td>'+
      '<td><span class="semaforo '+est+'"></span>'+(m.ultimaCargaStock?fmtFecha(m.ultimaCargaStock):'Nunca')+
        (m.cargadoPor?' <span class="hint">('+esc(m.cargadoPor)+')</span>':'')+'</td>'+
      '<td class="r">'+(m.totalArticulos!=null?m.totalArticulos:'—')+'</td>'+
      '<td class="r">'+(m.sinUbicar!=null?(m.sinUbicar>0?'<span class="pill-rojo">'+m.sinUbicar+'</span>':'<span class="pill-verde">0</span>'):'—')+'</td>'+
      '<td>→</td></tr>';
  }).join('');
  cont.innerHTML =
    '<div class="card"><div class="card-title">Estado por sucursal</div>'+
    '<div class="table-wrap"><table class="resumen">'+
    '<thead><tr><th>Sucursal</th><th>Última carga</th><th style="text-align:right">Artículos</th><th style="text-align:right">Sin ubicar</th><th></th></tr></thead>'+
    '<tbody>'+filas+'</tbody></table></div>'+
    '<div class="hint" style="margin-top:8px">Semáforo: <span class="semaforo verde"></span>&lt;24 h hábiles · <span class="semaforo amarillo"></span>24–48 h · <span class="semaforo rojo"></span>+48 h o nunca. Tocá una sucursal para entrar.</div>'+
    '</div>';
  cont.querySelectorAll('tr.click').forEach(tr=> tr.addEventListener('click', ()=>{
    $('selSucursal').value = tr.dataset.suc;
    $('selSucursal').dispatchEvent(new Event('change'));
  }));
}

/* ============================================================
   MODAL DE CONFIRMACIÓN GENÉRICO
   ============================================================ */
function confirmarModal(titulo, htmlMsg, onOk){
  $('modalBody').innerHTML =
    '<div class="modal-title">'+titulo+'</div>'+
    '<div style="font-size:14px;line-height:1.5">'+htmlMsg+'</div>'+
    '<div class="modal-footer">'+
      '<button class="btn btn-outline" id="cfNo">Cancelar</button>'+
      '<button class="btn btn-primary" id="cfSi">Confirmar</button></div>';
  $('modalOverlay').classList.add('show');
  $('cfNo').addEventListener('click', cerrarModal);
  $('cfSi').addEventListener('click', async ()=>{ $('cfSi').disabled=true; await onOk(); cerrarModal(); });
}
