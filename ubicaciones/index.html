<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Artículos — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root{
  --navy:#0B1527; --navy-mid:#152238; --navy-light:#1e3252;
  --red:#CC0000; --red-soft:#ff6b6b;
  --white:#fff; --bg:#f5f7fc;
  --gray-200:#e8e7e3; --gray-400:#9a9890; --gray-600:#5a5955;
  --green:#2a6e2a; --green-bg:#e0f2e0;
  --amber:#8a6d1a; --amber-bg:#fdf3d7;
  --red-bg:#fdeaea;
  --font-d:'Bebas Neue',sans-serif; --font-c:'Barlow Condensed',sans-serif; --font-b:'Barlow',sans-serif;
}
html{ -webkit-text-size-adjust:100%; }
body{ font-family:var(--font-b); background:var(--bg); color:var(--navy); font-size:14px; }
button{ font-family:inherit; }
input,select{ font-family:inherit; font-size:16px; } /* 16px evita el zoom automático de iOS */

/* ============ HEADER ============ */
.hdr{
  background:var(--navy); border-bottom:3px solid var(--red);
  position:sticky; top:0; z-index:300;
  display:flex; align-items:center; gap:10px; padding:10px 14px;
}
.hdr-logo{ line-height:0; flex-shrink:0; }
.hdr-logo img{ height:30px; filter:brightness(0) invert(1); display:block; }
.hdr-title{ flex:1; min-width:0; }
.hdr-title .t{ font-family:var(--font-d); font-size:20px; letter-spacing:1px; color:#fff; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hdr-title .s{ font-family:var(--font-c); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.55); }
.hdr-right{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.perfil-chip{
  display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22); border-radius:20px; padding:3px 10px 3px 3px;
  cursor:pointer; color:#fff; max-width:130px;
}
.perfil-chip .av{ width:26px; height:26px; border-radius:50%; flex-shrink:0; }
.perfil-chip .nm{ font-family:var(--font-c); font-size:13px; font-weight:600; letter-spacing:.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-salir{
  background:transparent; border:1px solid rgba(255,255,255,.25); border-radius:6px;
  color:rgba(255,255,255,.7); font-family:var(--font-c); font-size:12px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase; padding:6px 10px; cursor:pointer;
}
.btn-salir:hover{ color:#fff; border-color:#fff; }

/* avatar genérico (imagen o iniciales) */
.av{ border-radius:50%; object-fit:cover; background:var(--navy-mid); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-c); font-weight:700; overflow:hidden; }
.av img{ width:100%; height:100%; object-fit:cover; display:block; }

/* ============ BARRA DE ESTADO ============ */
.statusbar{
  background:#fff; border-bottom:1px solid var(--gray-200);
  padding:7px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  font-size:12px; color:var(--gray-600);
}
.statusbar .sync{ margin-left:auto; font-size:11px; color:var(--gray-400); white-space:nowrap; }
.carga-warn{ color:var(--red); font-weight:600; }
.carga-ok{ color:var(--green); }

/* semáforo */
.semaforo{ display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:5px; vertical-align:middle; }
.semaforo.verde{ background:#3aa03a; } .semaforo.amarillo{ background:#e0b020; } .semaforo.rojo{ background:var(--red); }

/* ============ TABS ============ */
.tabs{
  background:#fff; border-bottom:1px solid var(--gray-200); display:flex;
  position:sticky; top:56px; z-index:250; overflow-x:auto;
}
.tab{
  flex:1; border:none; background:transparent; padding:11px 8px; cursor:pointer;
  font-family:var(--font-c); font-size:14px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--gray-400); border-bottom:3px solid transparent;
  white-space:nowrap; position:relative;
}
.tab.active{ color:var(--navy); border-bottom-color:var(--red); }
.tab .badge{
  background:var(--red); color:#fff; border-radius:9px; font-size:11px; font-weight:700;
  padding:1px 6px; margin-left:4px; font-family:var(--font-b); letter-spacing:0;
}

.main{ padding:12px 14px 90px; max-width:860px; margin:0 auto; }
.view{ display:none; } .view.active{ display:block; }

/* ============ CARDS / GENÉRICOS ============ */
.card{ background:#fff; border:1px solid var(--gray-200); border-radius:6px; padding:14px; margin-bottom:12px; }
.card-title{ font-family:var(--font-c); font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.empty{ text-align:center; color:var(--gray-400); padding:26px 10px; font-size:14px; }
.hint{ font-size:12px; color:var(--gray-400); }

.btn{
  font-family:var(--font-c); font-size:14px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; padding:10px 18px; border-radius:6px; cursor:pointer;
  border:none; transition:opacity .15s;
}
.btn:disabled{ opacity:.5; cursor:default; }
.btn-primary{ background:var(--red); color:#fff; }
.btn-navy{ background:var(--navy); color:#fff; }
.btn-outline{ background:transparent; border:1.5px solid var(--gray-200); color:var(--gray-600); }
.btn-outline:hover{ border-color:var(--navy); color:var(--navy); }
.btn-sm{ padding:6px 12px; font-size:12px; letter-spacing:1px; }
.btn-block{ display:block; width:100%; }

/* ============ BUSCADOR ============ */
.search-wrap{ position:relative; margin-bottom:12px; }
.search-input{
  width:100%; padding:14px 44px 14px 16px; border:2px solid var(--gray-200); border-radius:8px;
  outline:none; background:#fff;
}
.search-input:focus{ border-color:var(--navy); }
.search-clear{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  border:none; background:transparent; font-size:20px; color:var(--gray-400); cursor:pointer;
  padding:6px 10px; display:none;
}

/* sección SIN UBICAR */
.su-head{
  display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
  background:var(--navy); color:#fff; border-radius:6px; padding:11px 14px; margin-bottom:8px;
}
.su-head .tt{ font-family:var(--font-c); font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.su-head .badge{ background:var(--red); color:#fff; border-radius:10px; font-size:12px; font-weight:700; padding:2px 9px; }
.su-head .arrow{ margin-left:auto; transition:transform .15s; }
.su-head.open .arrow{ transform:rotate(180deg); }
.su-body{ display:none; margin-bottom:14px; }
.su-body.open{ display:block; }

/* card de artículo */
.art-card{
  background:#fff; border:1px solid var(--gray-200); border-left:3px solid var(--gray-200);
  border-radius:6px; padding:11px 12px; margin-bottom:8px;
}
.art-card.sin-ubicar{ border-left-color:var(--red); }
.art-top{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.art-cod{
  font-family:var(--font-c); font-size:15px; font-weight:700; letter-spacing:.5px;
  background:none; border:none; padding:0; color:var(--navy); cursor:pointer;
  border-bottom:1px dotted var(--gray-400); text-align:left;
}
.art-cod:hover{ color:var(--red); border-bottom-color:var(--red); }
.art-stock{
  margin-left:auto; font-family:var(--font-c); font-size:12px; font-weight:700;
  background:var(--bg); border:1px solid var(--gray-200); border-radius:3px; padding:2px 8px;
  color:var(--gray-600); white-space:nowrap;
}
.art-desc{ font-size:13px; color:var(--gray-600); margin:2px 0 8px; }
.ubi-chips{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.ubi-chip{
  display:inline-flex; align-items:center; gap:6px; background:var(--navy); color:#fff;
  border-radius:4px; padding:7px 10px; font-family:var(--font-c); font-size:13px;
  font-weight:600; letter-spacing:.5px;
}
.ubi-chip .x{
  border:none; background:rgba(255,255,255,.15); color:#fff; border-radius:3px;
  width:22px; height:22px; line-height:1; cursor:pointer; font-size:14px; flex-shrink:0;
}
.ubi-chip .x:hover{ background:var(--red); }
.ubi-add{
  border:1.5px dashed var(--gray-400); background:transparent; color:var(--gray-600);
  border-radius:4px; padding:7px 12px; font-family:var(--font-c); font-size:13px;
  font-weight:600; letter-spacing:.5px; cursor:pointer;
}
.ubi-add:hover{ border-color:var(--navy); color:var(--navy); }
.sin-ubi-tag{
  font-family:var(--font-c); font-size:11px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--red); background:var(--red-bg);
  border-radius:3px; padding:3px 8px;
}

/* ============ ESTANTERÍAS ============ */
.est-card{ background:#fff; border:1px solid var(--gray-200); border-radius:6px; margin-bottom:10px; overflow:hidden; }
.est-head{ display:flex; align-items:center; gap:8px; padding:11px 12px; background:var(--navy); color:#fff; }
.est-head .nm{ font-family:var(--font-c); font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; flex:1; min-width:0; }
.est-head .cnt{ font-size:11px; color:rgba(255,255,255,.6); white-space:nowrap; }
.icon-btn{
  border:none; background:rgba(255,255,255,.12); color:#fff; border-radius:4px;
  width:30px; height:30px; cursor:pointer; font-size:14px; flex-shrink:0; line-height:1;
}
.icon-btn:hover{ background:var(--red); }
.icon-btn.lite{ background:transparent; border:1px solid var(--gray-200); color:var(--gray-600); }
.icon-btn.lite:hover{ background:var(--bg); color:var(--navy); border-color:var(--gray-400); }
.mod-list{ padding:10px 12px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.mod-chip{
  display:inline-flex; align-items:center; gap:7px; background:var(--bg);
  border:1px solid var(--gray-200); border-radius:4px; padding:8px 12px; cursor:pointer;
  font-family:var(--font-c); font-size:14px; font-weight:600; letter-spacing:.5px;
}
.mod-chip:hover{ border-color:var(--navy); }
.mod-chip .n{ background:var(--navy); color:#fff; border-radius:9px; font-size:11px; padding:1px 7px; font-family:var(--font-b); }
.mod-chip .edit{ border:none; background:transparent; color:var(--gray-400); cursor:pointer; font-size:13px; padding:0 2px; }
.mod-chip .edit:hover{ color:var(--navy); }

/* ============ PERFILES ============ */
.perfil-select-screen{
  min-height:100vh; background:var(--navy); display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:30px 16px; text-align:center;
}
.pss-logo img{ height:40px; filter:brightness(0) invert(1); margin-bottom:8px; }
.pss-title{ font-family:var(--font-d); font-size:32px; letter-spacing:2px; color:#fff; }
.pss-sub{ font-family:var(--font-c); font-size:14px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:34px; }
.pss-grid{ display:flex; flex-wrap:wrap; gap:22px; justify-content:center; max-width:600px; }
.pss-item{ cursor:pointer; width:96px; background:transparent; border:none; }
.pss-item .av{ width:88px; height:88px; margin:0 auto 8px; font-size:30px; border:3px solid transparent; transition:border-color .15s; }
.pss-item:hover .av, .pss-item.kb-sel .av{ border-color:var(--red); }
.pss-item.kb-sel .nm{ color:#fff; }
.pss-item{ outline:none; }
.pss-item .nm{ font-family:var(--font-c); font-size:15px; font-weight:600; letter-spacing:.5px; color:rgba(255,255,255,.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pss-item .rl{ font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.4); }
.pss-exit{ margin-top:38px; }

.perfil-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.perfil-card{ background:#fff; border:1px solid var(--gray-200); border-radius:6px; padding:14px 10px; text-align:center; }
.perfil-card .av{ width:64px; height:64px; margin:0 auto 8px; font-size:22px; }
.perfil-card .nm{ font-family:var(--font-c); font-size:15px; font-weight:700; }
.perfil-card .rl{ font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray-400); margin-bottom:8px; }

/* ============ MODALS / SHEET ============ */
.overlay{
  display:none; position:fixed; inset:0; background:rgba(11,21,39,.55); z-index:800;
  align-items:center; justify-content:center; padding:16px;
}
.overlay.show{ display:flex; }
.modal{
  background:#fff; border-radius:8px; padding:18px; width:460px; max-width:100%;
  max-height:86vh; overflow-y:auto;
}
.modal-title{
  font-family:var(--font-c); font-size:16px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--navy);
}
.modal-footer{ margin-top:16px; display:flex; justify-content:flex-end; gap:8px; flex-wrap:wrap; }

.sheet-overlay{
  display:none; position:fixed; inset:0; background:rgba(11,21,39,.55); z-index:850;
  align-items:flex-end; justify-content:center;
}
.sheet-overlay.show{ display:flex; }
.sheet{
  background:#fff; border-radius:14px 14px 0 0; width:100%; max-width:560px;
  max-height:78vh; overflow-y:auto; padding:16px 16px 26px;
}
.sheet-title{ font-family:var(--font-c); font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.sheet-sub{ font-size:12px; color:var(--gray-400); margin-bottom:14px; }
.sheet-opt{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:var(--bg); border:1px solid var(--gray-200); border-radius:6px;
  padding:14px; margin-bottom:8px; cursor:pointer; font-family:var(--font-c);
  font-size:16px; font-weight:600; letter-spacing:.5px;
}
.sheet-opt:hover{ border-color:var(--navy); }
.sheet-opt .n{ margin-left:auto; font-size:11px; color:var(--gray-400); font-family:var(--font-b); }

/* formularios */
.fld{ margin-bottom:12px; }
.fld label{
  display:block; font-family:var(--font-c); font-size:11px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--gray-600); margin-bottom:4px;
}
.fld input[type=text], .fld input[type=number], .fld select{
  width:100%; padding:10px 12px; border:1.5px solid var(--gray-200); border-radius:6px; outline:none; background:#fff;
}
.fld input:focus, .fld select:focus{ border-color:var(--navy); }
.radio-row{ display:flex; gap:8px; flex-wrap:wrap; }
.radio-row label{
  flex:1 1 calc(50% - 8px); display:flex; align-items:center; justify-content:center; gap:6px;
  border:1.5px solid var(--gray-200); border-radius:6px; padding:10px; cursor:pointer;
  font-family:var(--font-c); font-size:14px; font-weight:600; letter-spacing:.5px; text-transform:none;
}
.radio-row input{ accent-color:var(--red); }
.radio-row label.sel{ border-color:var(--navy); background:var(--bg); }

/* selector de avatares predeterminados */
.av-pick{ display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:8px; }
.av-opt{
  width:52px; height:52px; border-radius:50%; border:2.5px solid transparent;
  cursor:pointer; font-size:26px; line-height:1; display:flex; align-items:center;
  justify-content:center; padding:0; background:var(--bg);
}
.av-opt.sel{ border-color:var(--red); box-shadow:0 0 0 2px rgba(204,0,0,.25); }
.av-opt .av{ width:100%; height:100%; font-size:17px; }
.av.av-emoji{ line-height:1; }

/* resumen de carga */
.res-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--gray-200); }
.res-row .num{ font-family:var(--font-d); font-size:26px; min-width:44px; text-align:right; }
.res-row .lbl{ font-family:var(--font-c); font-size:13px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--gray-600); }
.res-row.nuevos .num{ color:var(--red); } .res-row.elim .num{ color:var(--gray-400); }
.res-toggle{ margin-left:auto; border:none; background:transparent; color:var(--navy); cursor:pointer; font-size:12px; text-decoration:underline dotted; }
.res-lista{ display:none; font-size:12px; color:var(--gray-600); max-height:160px; overflow-y:auto; padding:6px 0 2px; }
.res-lista.open{ display:block; }
.res-lista div{ padding:2px 0; border-bottom:1px dashed var(--gray-200); }

/* tabla resumen global */
.table-wrap{ overflow-x:auto; }
table.resumen{ width:100%; border-collapse:collapse; font-size:13px; }
table.resumen th{
  font-family:var(--font-c); font-size:11px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--gray-400); text-align:left; padding:7px 8px;
  border-bottom:2px solid var(--navy); white-space:nowrap;
}
table.resumen td{ padding:9px 8px; border-bottom:1px solid var(--gray-200); white-space:nowrap; }
table.resumen tr.click{ cursor:pointer; } table.resumen tr.click:hover{ background:var(--bg); }
td.r{ text-align:right; }
.pill-rojo{ background:var(--red-bg); color:var(--red); border-radius:3px; padding:2px 8px; font-weight:600; }
.pill-verde{ background:var(--green-bg); color:var(--green); border-radius:3px; padding:2px 8px; font-weight:600; }

/* preview tabla del excel */
table.prev{ width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
table.prev th, table.prev td{ border:1px solid var(--gray-200); padding:4px 7px; text-align:left; white-space:nowrap; }
table.prev th{ background:var(--bg); font-family:var(--font-c); letter-spacing:.5px; }

/* ============ FEEDBACK DE ARTÍCULOS ============ */
.fb-row{
  display:flex; flex-wrap:wrap; gap:6px; align-items:center;
  margin-top:8px; padding-top:8px; border-top:1px dashed var(--gray-200);
}
.fb-chip{
  display:inline-flex; align-items:center; gap:4px; background:var(--bg);
  border:1px solid var(--gray-200); border-radius:4px; padding:4px 8px;
  font-family:var(--font-c); font-size:12px; font-weight:600; letter-spacing:.3px; color:var(--gray-600);
}
.fb-chip b{ color:var(--red); }
.fb-add{
  border:none; background:transparent; color:var(--gray-400);
  font-family:var(--font-c); font-size:12px; font-weight:600; letter-spacing:.5px;
  cursor:pointer; padding:4px 6px;
}
.fb-add:hover{ color:var(--navy); }
.fb-grupo{
  font-family:var(--font-c); font-size:11px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--gray-400); margin:14px 0 8px;
}
.fb-grupo.mas{ color:var(--green); } .fb-grupo.menos{ color:var(--red); }
.fb-item{
  display:flex; gap:10px; align-items:center; border:1px solid var(--gray-200);
  border-radius:6px; padding:8px 10px; margin-bottom:6px;
}
.fb-item .av{ width:32px; height:32px; flex-shrink:0; font-size:13px; }
.fb-item .info{ flex:1; min-width:0; font-size:13px; }
.fb-item .quien{ font-size:11px; color:var(--gray-400); }

/* ============ HISTORIAL DE CONSULTAS ============ */
.search-row{ display:flex; gap:8px; margin-bottom:12px; }
.search-row .search-wrap{ flex:1; margin-bottom:0; }
.hist-btn{
  width:52px; flex-shrink:0; border:2px solid var(--gray-200); border-radius:8px;
  background:#fff; font-size:20px; cursor:pointer; line-height:1;
}
.hist-btn:hover{ border-color:var(--navy); }
.hist-overlay{
  display:none; position:fixed; inset:0; background:rgba(11,21,39,.45);
  z-index:860; justify-content:flex-end;
}
.hist-overlay.show{ display:flex; }
.hist-drawer{
  background:#fff; width:min(360px,94vw); height:100%; display:flex; flex-direction:column;
  box-shadow:-12px 0 30px rgba(11,21,39,.25);
}
.hist-head{
  background:var(--navy); color:#fff; padding:12px 14px; display:flex; align-items:center;
  gap:10px; border-bottom:3px solid var(--red);
}
.hist-head .tt{ font-family:var(--font-c); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:15px; flex:1; }
.hist-head .cnt{ font-size:12px; color:rgba(255,255,255,.6); }
.hist-list{ flex:1; overflow-y:auto; padding:10px; }
.hist-item{
  display:flex; gap:10px; align-items:center; width:100%; text-align:left;
  background:#fff; border:1px solid var(--gray-200); border-radius:6px;
  padding:10px; margin-bottom:8px; cursor:pointer; font-family:var(--font-b);
}
.hist-item:hover{ border-color:var(--navy); }
.hist-item .av{ width:38px; height:38px; flex-shrink:0; font-size:15px; }
.hist-item .info{ flex:1; min-width:0; }
.hist-item .cod{ font-family:var(--font-c); font-weight:700; font-size:15px; letter-spacing:.5px; color:var(--navy); }
.hist-item .desc{ font-size:11px; color:var(--gray-600); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hist-item .quien{ font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--gray-400); font-family:var(--font-c); font-weight:600; }
.hist-item .hora{ font-size:11px; color:var(--gray-400); white-space:nowrap; align-self:flex-start; }
.art-card.flash{ outline:3px solid var(--red); }

/* barra global (admin/supervisión) */
.global-bar{
  background:var(--navy-mid); padding:8px 14px; display:flex; align-items:center; gap:8px;
  position:sticky; top:56px; z-index:260;
}
.global-bar select{
  flex:1; max-width:280px; background:rgba(255,255,255,.08); color:#fff;
  border:1px solid rgba(255,255,255,.28); border-radius:6px; padding:7px 10px;
}
.global-bar select option{ color:var(--navy); }
.global-bar .modo{ font-family:var(--font-c); font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.5); margin-left:auto; white-space:nowrap; }

.toast{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:var(--navy); color:#fff; border-left:3px solid var(--red);
  border-radius:6px; padding:11px 18px; font-size:13px; z-index:900;
  opacity:0; transition:opacity .2s; pointer-events:none; max-width:92vw;
}
.toast.show{ opacity:1; }

.err-banner{
  background:var(--red-bg); color:var(--red); border:1px solid var(--red);
  border-radius:6px; padding:10px 14px; margin-bottom:12px; font-size:13px; display:none;
}
.err-banner.show{ display:block; }

/* ============ ACTIVIDAD ============ */
.act-row{
  display:flex; gap:10px; align-items:center; padding:8px 0;
  border-bottom:1px solid var(--gray-200);
}
.act-row:last-child{ border-bottom:none; }
.act-pos{ font-family:var(--font-d); font-size:18px; color:var(--gray-400); min-width:22px; text-align:right; }
.act-n{ font-family:var(--font-c); font-weight:700; color:var(--red); white-space:nowrap; }
.act-row .info{ flex:1; min-width:0; }
.act-row .info b{ font-family:var(--font-c); font-size:14px; letter-spacing:.5px; }
.act-row .av{ width:32px; height:32px; flex-shrink:0; font-size:13px; }
.act-ubi{ font-family:var(--font-c); font-size:12px; font-weight:600; color:var(--navy); text-align:right; max-width:40%; }

/* ============ AUDITORÍA DE ESTANTERÍA ============ */
.est-foot{
  padding:8px 12px; border-top:1px solid var(--gray-200);
  display:flex; gap:12px; align-items:center; flex-wrap:wrap;
}
.est-tool{
  border:none; background:transparent; color:var(--gray-600);
  font-family:var(--font-c); font-size:12px; font-weight:600; letter-spacing:.5px;
  cursor:pointer; padding:2px 0;
}
.est-tool:hover{ color:var(--navy); }
.aud-row{
  display:flex; gap:10px; align-items:center; background:#fff;
  border:1px solid var(--gray-200); border-left:3px solid var(--gray-200);
  border-radius:6px; padding:10px 12px; margin-bottom:6px;
}
.aud-row.esta{ border-left-color:#3aa03a; }
.aud-row.falta{ border-left-color:var(--red); background:var(--red-bg); }
.aud-row .info{ flex:1; min-width:0; }
.aud-row .info b{ font-family:var(--font-c); font-size:15px; letter-spacing:.5px; }
.aud-btn{
  border:1.5px solid var(--gray-200); background:#fff; border-radius:6px;
  font-family:var(--font-c); font-size:13px; font-weight:700; letter-spacing:.5px;
  padding:9px 12px; cursor:pointer; flex-shrink:0;
}
.aud-btn.si.on{ background:var(--green-bg); border-color:#3aa03a; color:var(--green); }
.aud-btn.no.on{ background:var(--red); border-color:var(--red); color:#fff; }

/* impresión: solo el listado */
#printArea{ display:none; }
@media print{
  body > *:not(#printArea){ display:none !important; }
  #printArea{ display:block !important; color:#000; font-family:Arial,Helvetica,sans-serif; }
  #printArea h1{ font-size:16px; margin-bottom:2px; }
  #printArea .sub{ font-size:11px; color:#444; margin-bottom:12px; }
  #printArea h2{ font-size:13px; margin:14px 0 4px; }
  #printArea table{ width:100%; border-collapse:collapse; font-size:11px; page-break-inside:auto; }
  #printArea th, #printArea td{ border:1px solid #999; padding:4px 6px; text-align:left; }
  #printArea th{ background:#eee; }
  #printArea .chk{ width:34px; text-align:center; }
}

@media(min-width:640px){
  .hdr-logo img{ height:36px; }
  .hdr-title .t{ font-size:24px; }
}
</style>
</head>

</div>

<!-- App -->

    </div>

  </div>

  <div class="tabs" id="tabs"></div>

const $ = id => document.getElementById(id);
const esc = s => (s===null||s===undefined)?'':String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function saveLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function readLS(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
function delLS(k){ try{ localStorage.removeItem(k); }catch(e){} }

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
const putJSON   = (url,d)=>fetch(url,{method:'PUT',  body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});
const patchJSON = (url,d)=>fetch(url,{method:'PATCH',body:JSON.stringify(d),headers:{'Content-Type':'application/json'}});
const postJSON  = (url,d)=>fetch(url,{method:'POST', body:JSON.stringify(d),headers:{'Content-Type':'application/json'}}).then(r=>r.json());
const delJSON   = (url)=>fetch(url,{method:'DELETE'});

// Los códigos de artículo son clave de Firebase: no admiten . # $ / [ ]
function fbKey(codigo){ return String(codigo).trim().replace(/[.#$\/\[\]]/g,'-'); }
function newId(pfx){ return pfx + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtFecha(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0');
  return dd+'/'+mm+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtHora(ts){
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
// Clave del día local (YYYY-MM-DD) para el historial de consultas
function hoyKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Horas transcurridas descontando sábados y domingos completos.
function horasHabilesDesde(ts){
  if(!ts) return Infinity;
  let total = 0;
  const cur = new Date(ts);
  const now = Date.now();
  while(cur.getTime() < now){
    const finDia = new Date(cur); finDia.setHours(24,0,0,0);
    const tramo = Math.min(finDia.getTime(), now) - cur.getTime();
    const dow = cur.getDay();
    if(dow!==0 && dow!==6) total += tramo;
    cur.setTime(finDia.getTime());
  }
  return total / 3600000;
}
function estadoCarga(ts){
  const h = horasHabilesDesde(ts);
  if(h < 24) return 'verde';
  if(h < 48) return 'amarillo';
  return 'rojo';
}

let toastTimer = null;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function showErr(msg){ const b=$('errBanner'); b.textContent=msg; b.classList.add('show'); }
function hideErr(){ $('errBanner').classList.remove('show'); }

/* Avatares: predeterminados (emoji sobre la paleta) o iniciales sobre navy/rojo.
   En el perfil se guarda el id del avatar (ej: "futbol"), no una imagen. */
const AV_COLORS = ['#1e3252','#CC0000','#152238','#8b0000','#0B1527'];
const AVATARES = [
  {id:'futbol',   emoji:'⚽'}, {id:'basquet',  emoji:'🏀'}, {id:'tenis',  emoji:'🎾'},
  {id:'voley',    emoji:'🏐'}, {id:'boxeo',    emoji:'🥊'}, {id:'pesas',  emoji:'🏋️'},
  {id:'runner',   emoji:'🏃'}, {id:'bici',     emoji:'🚴'}, {id:'zapa',   emoji:'👟'},
  {id:'gorra',    emoji:'🧢'}, {id:'camiseta', emoji:'🎽'}, {id:'copa',   emoji:'🏆'},
  {id:'rayo',     emoji:'⚡'}, {id:'fuego',    emoji:'🔥'}, {id:'leon',   emoji:'🦁'},
  {id:'aguila',   emoji:'🦅'},
];
const AVATAR_BY_ID = {}; AVATARES.forEach((a,i)=>{ a.bg = AV_COLORS[i % AV_COLORS.length]; AVATAR_BY_ID[a.id]=a; });

function avatarHtml(perfil, extraClass){
  const cls = 'av'+(extraClass?' '+extraClass:'');
  const av = perfil && perfil.avatar;
  if(av && String(av).startsWith('data:')) return '<div class="'+cls+'"><img src="'+av+'" alt=""></div>'; // legado (fotos viejas)
  if(av && AVATAR_BY_ID[av]){
    const a = AVATAR_BY_ID[av];
    return '<div class="'+cls+' av-emoji" style="background:'+a.bg+'">'+a.emoji+'</div>';
  }
  const nombre = (perfil&&perfil.nombre)||'?';
  const ini = nombre.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
  let h=0; for(const c of nombre) h=(h*31+c.charCodeAt(0))>>>0;
  return '<div class="'+cls+'" style="background:'+AV_COLORS[h%AV_COLORS.length]+'">'+esc(ini)+'</div>';
}

/* ============================================================
   SESIÓN — la maneja el Portal (mateu_portal_session).
   Sin login propio: si no hay sesión o no hay acceso, al Portal.
   ============================================================ */
const SESSION = readLS(SESSION_KEY);
function tieneAcceso(s){
  if(!s || !s.email) return false;
  if((s.herramientas||[]).includes(TOOL_ID)) return true;
  if(s.rol==='admin') return true;
  return SUPERVISION_EMAILS.includes((s.email||'').toLowerCase());
}

let MODE = null;
if(SESSION){
  const email = (SESSION.email||'').toLowerCase();
  if(SESSION.rol==='admin') MODE='admin';
  else if(SESSION.rol==='sucursal' && SESSION.sucursal) MODE='sucursal';
  else if(SUPERVISION_EMAILS.includes(email)) MODE='super';
}

/* ============================================================
   ESTADO
   ============================================================ */
let SUC = null;            // slug de la sucursal activa
let PERFIL = null;         // perfil activo {id, nombre, rol, avatar} (solo MODE sucursal)
let PERFILES = {};         // perfiles de la sucursal activa
let DATA = { articulos:{}, estanterias:{}, meta:{}, consultas:{}, feedback:{} };
let lastHash = '';
let lastSyncTs = 0;
let pollTimer = null;
let tabActiva = 'buscar';
let searchQuery = '';
let suAbierto = false;     // sección SIN UBICAR expandida
let moduloVista = null;    // {estId, modId} para el filtro inverso

// Quién puede qué (se recalcula al elegir perfil / sucursal)
function canAssign(){ return MODE==='admin' || (MODE==='sucursal' && !!PERFIL); }
function canManage(){ return MODE==='admin' || (MODE==='sucursal' && PERFIL && PERFIL.rol==='encargado'); }
function nombreOperador(){
  if(MODE==='sucursal' && PERFIL) return PERFIL.nombre;
  return (SESSION && SESSION.email) || '—';
}

const sucPath = ()=> FB + '/sucursales/' + SUC;

/* ============================================================
   BOOT
   ============================================================ */
(function init(){
  if(!tieneAcceso(SESSION) || !MODE){ location.href='../'; return; }
  $('hdrLogo').src = LOGO; $('pssLogo').src = LOGO;
  $('btnSalir').addEventListener('click', ()=>{ location.href='../'; });
  $('pssSalir').addEventListener('click', ()=>{ location.href='../'; });
  wireStatic();

  if(MODE==='sucursal'){
    SUC = SESSION.sucursal;
    entrarSucursal();
  } else {
    montarGlobal();
  }
})();

async function entrarSucursal(){
  // asegurar config/nombre (primera vez que la sucursal entra)
  const info = SUCURSAL_BY_SLUG[SUC];
  try{
    const cfg = await fetchJSON(sucPath()+'/config.json');
    if(!cfg || !cfg.nombre) await putJSON(sucPath()+'/config.json', {nombre: info?info.nombre:SUC});
  }catch(e){ /* sin conexión: se reporta abajo */ }

  await cargarPerfiles();
  const recordado = readLS('ubic_perfil_'+SUC);
  if(recordado && PERFILES[recordado]) {
    seleccionarPerfil(recordado, true);
  } else {
    mostrarSelectorPerfiles();
  }
}

/* ============================================================
   PERFILES — selector estilo Netflix
   ============================================================ */
async function cargarPerfiles(){
  try{
    PERFILES = await fetchJSON(sucPath()+'/perfiles.json') || {};
    hideErr();
  }catch(e){
    PERFILES = {};
    showErr('No se pudo conectar a la base de Ubicaciones. Verificá la conexión (o que la base "ubicaciones-mateu" exista).');
  }
}

function perfilesOrdenados(){
  return Object.keys(PERFILES).map(id=>({id, ...PERFILES[id]}))
    .sort((a,b)=>(a.orden||99)-(b.orden||99) || (a.nombre||'').localeCompare(b.nombre||''));
}

function mostrarSelectorPerfiles(){
  const info = SUCURSAL_BY_SLUG[SUC];
  $('pssSucursal').textContent = info ? info.nombre : SUC;
  const lista = perfilesOrdenados();
  const grid = $('pssGrid');
  if(!lista.length){
    grid.innerHTML = '<div style="color:rgba(255,255,255,.7);max-width:340px;font-size:14px">'+
      'Todavía no hay perfiles en esta sucursal.<br><br>'+
      'Creá el primer perfil (va a ser <b>encargado</b>) para empezar.'+
      '<div style="margin-top:16px"><button class="btn btn-primary" id="pssCrearPrimero">Crear primer perfil</button></div></div>';
    $('pssCrearPrimero').addEventListener('click', ()=> abrirFormPerfil(null, true));
  } else {
    grid.innerHTML = lista.map(p=>
      '<button class="pss-item" data-perfil="'+p.id+'">'+avatarHtml(p)+
      '<div class="nm">'+esc(p.nombre)+'</div><div class="rl">'+esc(rolLabel(p.rol))+'</div></button>'
    ).join('');
    grid.querySelectorAll('[data-perfil]').forEach(b=> b.addEventListener('click', ()=> seleccionarPerfil(b.dataset.perfil, false)));
    pssIdx = 0; pssMarcar();
  }
  $('app').style.display='none';
  $('profileScreen').style.display='flex';
}

/* Navegación por teclado del selector (puestos con lectora, sin mouse):
   flechas para moverse entre perfiles y Enter para confirmar. */
let pssIdx = 0;
function pssMarcar(){
  const items = Array.from(document.querySelectorAll('.pss-item'));
  items.forEach((b,i)=> b.classList.toggle('kb-sel', i===pssIdx));
  if(items[pssIdx]) items[pssIdx].focus();
}
document.addEventListener('keydown', e=>{
  if($('profileScreen').style.display!=='flex') return;
  const items = document.querySelectorAll('.pss-item');
  if(!items.length) return;
  if(e.key==='ArrowRight' || e.key==='ArrowDown'){ e.preventDefault(); pssIdx=(pssIdx+1)%items.length; pssMarcar(); }
  else if(e.key==='ArrowLeft' || e.key==='ArrowUp'){ e.preventDefault(); pssIdx=(pssIdx-1+items.length)%items.length; pssMarcar(); }
  else if(e.key==='Enter'){ e.preventDefault(); if(items[pssIdx]) items[pssIdx].click(); }
});

function seleccionarPerfil(id, silencioso){
  PERFIL = {id, ...PERFILES[id]};
  saveLS('ubic_perfil_'+SUC, id);
  $('profileScreen').style.display='none';
  if(!silencioso) toast('Hola, '+PERFIL.nombre+' 👋');
  montarApp();
}

function cambiarPerfil(){
  PERFIL = null;
  delLS('ubic_perfil_'+SUC);
  clearTimeout(inactTimer);
  detenerPolling();
  cargarPerfiles().then(mostrarSelectorPerfiles);
}

/* Puestos compartidos (salón/depósito): tras 3 minutos sin actividad
   se vuelve solo al selector de perfiles, así el próximo vendedor
   elige su cara antes de consultar. La sesión de la sucursal no se toca. */
let INACTIVIDAD_MS = 3*60*1000;
let inactTimer = null;
function resetInactividad(){
  if(MODE!=='sucursal' || !PERFIL) return;
  clearTimeout(inactTimer);
  inactTimer = setTimeout(()=>{
    if(MODE!=='sucursal' || !PERFIL) return;
    cerrarSheet(); cerrarModal(); cerrarHistorial();
    cambiarPerfil();
  }, INACTIVIDAD_MS);
}
['pointerdown','keydown','touchstart'].forEach(ev=>
  document.addEventListener(ev, resetInactividad, {passive:true}));

/* ============================================================
   MONTAJE DE LA APP (vista sucursal)
   ============================================================ */
function montarApp(){
  const info = SUCURSAL_BY_SLUG[SUC];
  $('hdrSucursal').textContent = info ? info.nombre : SUC;
  if(MODE==='sucursal' && PERFIL){
    $('perfilChip').style.display='flex';
    $('perfilChipAv').outerHTML = avatarHtml(PERFIL).replace('<div class="av','<div id="perfilChipAv" class="av');
    $('perfilChipNm').textContent = PERFIL.nombre;
  } else {
    $('perfilChip').style.display='none';
  }
  $('app').style.display='block';
  renderTabs();
  setTab(tabActiva==='resumen' ? 'buscar' : tabActiva);
  iniciarPolling();
  resetInactividad();
}

function renderTabs(){
  const tabs = [];
  if(MODE!=='sucursal') tabs.push({id:'resumen', label:'Resumen'});
  if(SUC){
    tabs.push({id:'buscar', label:'Buscar', badge:true});
    tabs.push({id:'estanterias', label:'Estanterías'});
    tabs.push({id:'actividad', label:'Actividad'});
    if(canManage() && MODE==='sucursal') tabs.push({id:'perfiles', label:'Perfiles'});
    if(MODE==='admin') tabs.push({id:'perfiles', label:'Perfiles'});
  }
  $('tabs').innerHTML = tabs.map(t=>
    '<button class="tab" data-tab="'+t.id+'">'+t.label+
    (t.badge?'<span class="badge" id="tabBadgeSU" style="display:none">0</span>':'')+'</button>'
  ).join('');
  $('tabs').querySelectorAll('.tab').forEach(b=> b.addEventListener('click', ()=> setTab(b.dataset.tab)));
}

function setTab(id){
  tabActiva = id;
  moduloVista = null;
  AUDIT = null; // salir de una auditoría en curso (las marcas quedan guardadas en el dispositivo)
  document.querySelectorAll('.tab').forEach(b=> b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('.view').forEach(v=> v.classList.remove('active'));
  const el = $('view-'+id); if(el) el.classList.add('active');
  if(id==='buscar') renderBuscar();
  if(id==='estanterias') renderEstanterias();
  if(id==='actividad') renderActividad();
  if(id==='perfiles') renderPanelPerfiles();
  if(id==='resumen') renderResumenGlobal();
}

function wireStatic(){
  $('perfilChip').addEventListener('click', cambiarPerfil);
  $('suHead').addEventListener('click', ()=>{ suAbierto=!suAbierto; aplicarSuAbierto(); });
  $('searchInput').addEventListener('input', ()=>{
    searchQuery = $('searchInput').value;
    $('searchClear').style.display = searchQuery ? 'block' : 'none';
    renderResultados();
  });
  $('searchClear').addEventListener('click', ()=>{
    searchQuery=''; $('searchInput').value=''; $('searchClear').style.display='none'; renderResultados();
  });
  $('fileStock').addEventListener('change', onFileStock);
  $('sheetOverlay').addEventListener('click', e=>{ if(e.target===$('sheetOverlay')) cerrarSheet(); });
  $('modalOverlay').addEventListener('click', e=>{ if(e.target===$('modalOverlay')) cerrarModal(); });
  $('btnHistorial').addEventListener('click', abrirHistorial);
  $('histCerrar').addEventListener('click', cerrarHistorial);
  $('histOverlay').addEventListener('click', e=>{ if(e.target===$('histOverlay')) cerrarHistorial(); });
}

/* ============================================================
   POLLING (articulos + estanterias + meta; NUNCA perfiles)
   ============================================================ */
async function refrescarDatos(){
  if(!SUC) return false;
  const [articulos, estanterias, meta, consultas, feedback] = await Promise.all([
    fetchJSON(sucPath()+'/articulos.json').catch(()=>null),
    fetchJSON(sucPath()+'/estanterias.json').catch(()=>null),
    fetchJSON(sucPath()+'/meta.json').catch(()=>null),
    fetchJSON(sucPath()+'/consultas/'+hoyKey()+'.json').catch(()=>null),
    fetchJSON(sucPath()+'/feedback.json').catch(()=>null),
  ]);
  if(articulos===null && estanterias===null && meta===null){
    // puede ser base vacía o sin conexión: probamos un fetch que distinga
    try{ await fetchJSON(sucPath()+'/config.json'); hideErr(); }
    catch(e){ showErr('Sin conexión con la base de Ubicaciones. Reintentando…'); return false; }
  } else hideErr();
  DATA = { articulos:articulos||{}, estanterias:estanterias||{}, meta:meta||{}, consultas:consultas||{}, feedback:feedback||{} };
  lastSyncTs = Date.now();
  const hash = JSON.stringify(DATA);
  if(hash!==lastHash){ lastHash=hash; return true; }
  return false;
}

function hayUiBloqueante(){
  return $('sheetOverlay').classList.contains('show') || $('modalOverlay').classList.contains('show');
}

async function pollLoop(){
  try{
    const cambio = await refrescarDatos();
    if(cambio && !hayUiBloqueante()) renderVistaActiva();
    if(cambio && $('histOverlay').classList.contains('show')) renderHistorial();
    renderStatusbar();
  }catch(e){}
  pollTimer = setTimeout(pollLoop, POLL_MS);
}

function iniciarPolling(){
  detenerPolling();
  refrescarDatos().then(()=>{ renderVistaActiva(); renderStatusbar(); podarConsultas(); });
  pollTimer = setTimeout(pollLoop, POLL_MS);
  if(!window.__syncTicker) window.__syncTicker = setInterval(renderSyncLabel, 1000);
}
function detenerPolling(){ if(pollTimer){ clearTimeout(pollTimer); pollTimer=null; } }

function renderVistaActiva(){
  if(AUDIT) return; // auditoría en curso: no pisar las marcas con el polling
  if(tabActiva==='buscar') renderBuscar();
  else if(tabActiva==='estanterias'){ moduloVista ? renderVistaModulo() : renderEstanterias(); }
  else if(tabActiva==='resumen') {} // el resumen se actualiza a demanda
}

function renderStatusbar(){
  if(!SUC){ $('stCarga').innerHTML=''; renderSyncLabel(); return; }
  const m = DATA.meta || {};
  if(!m.ultimaCargaStock){
    $('stCarga').innerHTML = '<span class="carga-warn">Todavía no se cargó el stock de esta sucursal.</span>';
  } else {
    const est = estadoCarga(m.ultimaCargaStock);
    const cls = est==='verde' ? 'carga-ok' : 'carga-warn';
    $('stCarga').innerHTML = '<span class="semaforo '+est+'"></span>'+
      'Última carga: <b class="'+cls+'">'+fmtFecha(m.ultimaCargaStock)+'</b>'+
      (m.cargadoPor ? ' — '+esc(m.cargadoPor) : '')+
      (est!=='verde' ? ' <span class="carga-warn">(¡desactualizada!)</span>' : '');
  }
  renderSyncLabel();
  actualizarBadges();
}
function renderSyncLabel(){
  if(!lastSyncTs){ $('stSync').textContent=''; return; }
  const s = Math.max(0, Math.round((Date.now()-lastSyncTs)/1000));
  $('stSync').textContent = 'Actualizado hace '+s+' s';
}

/* ============================================================
   ARTÍCULOS — helpers
   ============================================================ */
function articulosLista(){
  return Object.keys(DATA.articulos||{}).map(k=>({key:k, ...DATA.articulos[k]}));
}
function sinUbicarLista(){
  return articulosLista()
    .filter(a=>!a.ubicaciones || !Object.keys(a.ubicaciones).length)
    .sort((a,b)=>(b.fechaAlta||0)-(a.fechaAlta||0));
}
function nombreUbicacion(u){
  const est = (DATA.estanterias||{})[u.estanteriaId];
  const mod = est && est.modulos && est.modulos[u.moduloId];
  if(!est) return '(estantería eliminada)';
  return est.nombre + (mod ? ' · '+mod.nombre : '');
}
// Cuenta artículos por estantería y por módulo en una sola pasada
// (cada artículo cuenta una vez por estantería/módulo, aunque tenga varias asignaciones).
function contarUbicados(){
  const porEst = {}, porMod = {};
  for(const a of articulosLista()){
    const vistos = {};
    for(const uid in (a.ubicaciones||{})){
      const u = a.ubicaciones[uid];
      if(!vistos[u.estanteriaId]){ vistos[u.estanteriaId]=1; porEst[u.estanteriaId]=(porEst[u.estanteriaId]||0)+1; }
      if(u.moduloId){
        const mk = u.estanteriaId+':'+u.moduloId;
        if(!vistos[mk]){ vistos[mk]=1; porMod[mk]=(porMod[mk]||0)+1; }
      }
    }
  }
  return {porEst, porMod};
}

function actualizarBadges(){
  const n = sinUbicarLista().length;
  $('suBadge').textContent = n;
  const tb = $('tabBadgeSU');
  if(tb){ tb.textContent=n; tb.style.display = n>0 ? 'inline-block' : 'none'; }
}

// Mantiene el contador denormalizado de meta (para el resumen global)
function patchMetaContadores(){
  const total = Object.keys(DATA.articulos||{}).length;
  const sinUbi = sinUbicarLista().length;
  patchJSON(sucPath()+'/meta.json', {totalArticulos:total, sinUbicar:sinUbi}).catch(()=>{});
}

   VISTA BUSCAR

  $('cargaBox').innerHTML = canManage() ?

function aplicarSuAbierto(){
  $('suHead').classList.toggle('open', suAbierto);
  $('suBody').classList.toggle('open', suAbierto);
  if(suAbierto) renderSinUbicar();
}

function renderSinUbicar(){
  const lista = sinUbicarLista();
  aplicarBodySU(lista);
  function aplicarBodySU(lista){
    $('suHead').classList.toggle('open', suAbierto);
    $('suBody').classList.toggle('open', suAbierto);
    if(!suAbierto) return;
    $('suBody').innerHTML = lista.length
      ? lista.slice(0,200).map(a=>artCardHtml(a)).join('') + (lista.length>200?'<div class="hint" style="text-align:center">Mostrando 200 de '+lista.length+'.</div>':'')
      : '<div class="empty">🎉 No hay artículos sin ubicar.</div>';
    wireArtCards($('suBody'));
  }
}

function matchArticulo(a, q){
  return (a.codigo||'').toLowerCase().includes(q) || (a.descripcion||'').toLowerCase().includes(q);
}

function renderResultados(){
  const cont = $('searchResults');
  const q = searchQuery.trim().toLowerCase();
  const todos = articulosLista();
  if(!todos.length){
    const m = DATA.meta||{};
    cont.innerHTML = '<div class="empty">'+(m.ultimaCargaStock
      ? 'No hay artículos cargados.'
      : (canManage() ? 'Todavía no cargaste el stock de hoy.<br>Subí el Excel para empezar.' : 'Todavía no se cargó el stock de esta sucursal.'))+'</div>';
    return;
  }
  if(!q){
    cont.innerHTML = '<div class="hint" style="text-align:center;padding:14px 0">'+todos.length+' artículos en el depósito. Buscá por código o descripción.</div>';
    return;
  }
  const res = todos.filter(a=>matchArticulo(a,q))
    .sort((a,b)=>(a.codigo||'').localeCompare(b.codigo||''));
  cont.innerHTML = res.length
    ? res.slice(0,100).map(a=>artCardHtml(a)).join('') + (res.length>100?'<div class="hint" style="text-align:center">Mostrando 100 de '+res.length+' resultados.</div>':'')
    : '<div class="empty">Sin resultados para “'+esc(searchQuery)+'”.</div>';
  wireArtCards(cont, {consulta:true});
  // resultado único con código "completo" tipeado/escaneado → se registra solo
  clearTimeout(autoRegTimer);
  if(res.length===1 && q.length>=4){
    const unico = res[0].key;
    autoRegTimer = setTimeout(()=> registrarConsulta(unico), 1200);
  }
}

/* ============================================================
   HISTORIAL DE CONSULTAS DEL DÍA
   Compartido por sucursal en Firebase (consultas/{YYYY-MM-DD}):
   cualquier puesto (salón o depósito) ve las consultas de todos
   y puede retomar una búsqueda con un toque.
   ============================================================ */
let autoRegTimer = null;

function registrarConsulta(artKey){
  const a = DATA.articulos[artKey]; if(!a || !SUC) return;
  const por = nombreOperador();
  // no repetir la misma consulta del mismo perfil en menos de 10 minutos
  const repetida = Object.values(DATA.consultas||{}).some(c=>
    c.key===artKey && c.por===por && (Date.now()-c.ts) < 10*60*1000);
  if(repetida) return;
  const entrada = {
    key: artKey, codigo: a.codigo,
    descripcion: (a.descripcion||'').slice(0,60),
    por, avatar: (MODE==='sucursal' && PERFIL && PERFIL.avatar) || null,
    ts: Date.now(),
  };
  postJSON(sucPath()+'/consultas/'+hoyKey()+'.json', entrada)
    .then(r=>{ if(r && r.name){ DATA.consultas[r.name]=entrada; lastHash=''; } })
    .catch(()=>{});
}

function consultasOrdenadas(){
  return Object.keys(DATA.consultas||{}).map(k=>({id:k, ...DATA.consultas[k]}))
    .sort((a,b)=>(b.ts||0)-(a.ts||0));
}

function abrirHistorial(){ renderHistorial(); $('histOverlay').classList.add('show'); }
function cerrarHistorial(){ $('histOverlay').classList.remove('show'); }

function renderHistorial(){
  const lista = consultasOrdenadas();
  $('histCnt').textContent = lista.length ? lista.length+' consulta'+(lista.length===1?'':'s') : '';
  $('histList').innerHTML = lista.length
    ? lista.map(c=>
        '<button class="hist-item" data-hist="'+esc(c.key)+'">'+
          avatarHtml({nombre:c.por, avatar:c.avatar})+
          '<div class="info"><div class="cod">'+esc(c.codigo)+'</div>'+
          '<div class="desc">'+esc(c.descripcion||'')+'</div>'+
          '<div class="quien">'+esc(c.por)+'</div></div>'+
          '<div class="hora">'+fmtHora(c.ts)+'</div>'+
        '</button>').join('')
    : '<div class="empty">Todavía no hay consultas hoy.<br><span class="hint">Tocá un artículo en los resultados de búsqueda y queda guardado acá.</span></div>';
  $('histList').querySelectorAll('[data-hist]').forEach(b=> b.addEventListener('click', ()=> irAConsulta(b.dataset.hist)));
}

function irAConsulta(artKey){
  cerrarHistorial();
  const a = DATA.articulos[artKey];
  if(!a){ toast('Ese artículo ya no está en el stock de hoy.'); return; }
  searchQuery = a.codigo;
  $('searchInput').value = a.codigo;
  $('searchClear').style.display = 'block';
  setTab('buscar');
  const card = document.querySelector('#searchResults .art-card[data-art="'+CSS.escape(artKey)+'"]');
  if(card){
    card.classList.add('flash');
    card.scrollIntoView({behavior:'smooth', block:'center'});
    setTimeout(()=> card.classList.remove('flash'), 1600);
  }
}

/* ============================================================
   MODO MOSTRADOR — lectora de código de barras USB
   La lectora "tipea" muy rápido y termina con Enter. Se detecta
   globalmente: no hace falta clickear el buscador; alcanza con
   estar dentro del módulo. Al detectar un escaneo se busca el
   código, se resalta la card y se registra la consulta.
   ============================================================ */
let scanBuf = '', scanLast = 0;
const SCAN_GAP_MS = 90;   // separación máxima entre teclas de una lectora
const SCAN_MIN_LEN = 4;   // largo mínimo para tratarlo como escaneo

document.addEventListener('keydown', e=>{
  if(!SUC || $('profileScreen').style.display==='flex') return;
  // si el foco está en un input de un formulario (no el buscador), no interferir
  const ae = document.activeElement;
  if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT') && ae.id!=='searchInput') return;
  const now = Date.now();
  if(now - scanLast > SCAN_GAP_MS) scanBuf = '';
  scanLast = now;
  // terminadores típicos de lectora: Enter (CR/LF) o Tab, según configuración
  if(e.key === 'Enter' || e.key === 'Tab'){
    if(scanBuf.length >= SCAN_MIN_LEN){
      e.preventDefault(); // solo si es un escaneo real; el Tab manual sigue navegando
      procesarEscaneo(scanBuf);
    }
    scanBuf = '';
  } else if(e.key.length === 1){
    scanBuf += e.key;
  }
});

function procesarEscaneo(codigo){
  cerrarSheet(); cerrarModal(); cerrarHistorial();
  if(tabActiva!=='buscar') setTab('buscar');
  searchQuery = codigo;
  $('searchInput').value = codigo;
  $('searchClear').style.display = 'block';
  renderResultados();
  // match exacto por clave, o único por inclusión (por si la etiqueta trae prefijos)
  const key = fbKey(codigo);
  let art = DATA.articulos[key] ? key : null;
  if(!art){
    const matches = articulosLista().filter(a=>matchArticulo(a, codigo.toLowerCase()));
    if(matches.length===1) art = matches[0].key;
  }
  if(art){
    clearTimeout(autoRegTimer); // el escaneo registra ya, sin esperar el debounce
    registrarConsulta(art);
    const card = document.querySelector('#searchResults .art-card[data-art="'+CSS.escape(art)+'"]');
    if(card){
      card.classList.add('flash');
      card.scrollIntoView({block:'center'});
      setTimeout(()=> card.classList.remove('flash'), 1600);
    }
  } else {
    toast('El código escaneado no está en el stock de hoy: '+codigo);
  }
}

// limpieza: consultas se conservan 7 días (alimentan el Top de Actividad),
// movimientos 30 días.
const consultasPruned = {};
function podarConsultas(){
  if(!SUC || consultasPruned[SUC]) return;
  consultasPruned[SUC] = true;
  const validas = new Set();
  for(let i=0;i<7;i++){
    const d = new Date(Date.now()-i*86400000);
    validas.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  fetchJSON(sucPath()+'/consultas.json?shallow=true').then(dias=>{
    Object.keys(dias||{}).forEach(d=>{ if(!validas.has(d)) delJSON(sucPath()+'/consultas/'+d+'.json'); });
  }).catch(()=>{});
  fetchJSON(sucPath()+'/movimientos.json').then(movs=>{
    const lim = Date.now()-30*86400000;
    const patch = {};
    Object.keys(movs||{}).forEach(id=>{ if((movs[id].ts||0) < lim) patch[id]=null; });
    if(Object.keys(patch).length) patchJSON(sucPath()+'/movimientos.json', patch);
  }).catch(()=>{});
}

function wireArtCards(cont, opts){
  cont.querySelectorAll('.art-card').forEach(card=>{
    const key = card.dataset.art;
    card.querySelectorAll('[data-quitar]').forEach(b=> b.addEventListener('click', ()=> quitarUbicacion(key, b.dataset.quitar)));
    const add = card.querySelector('[data-agregar]');
    if(add) add.addEventListener('click', ()=> abrirSheetAsignar(key));
    const fbBtn = card.querySelector('[data-fb]');
    if(fbBtn) fbBtn.addEventListener('click', ()=> abrirSheetFeedback(key));
    const histBtn = card.querySelector('[data-histart]');
    if(histBtn) histBtn.addEventListener('click', ()=> verHistorialArticulo(key));
    if(opts && opts.consulta){
      // tocar la card = "esta fue mi consulta" → queda en el historial del día
      card.style.cursor = 'pointer';
      card.addEventListener('click', e=>{
        if(e.target.closest('button')) return;
        registrarConsulta(key);
        card.classList.add('flash');
        setTimeout(()=> card.classList.remove('flash'), 900);
      });
    }
  });
}

/* ---- asignación (bottom sheet: estantería → módulo) ---- */
function estanteriasOrdenadas(){
  return Object.keys(DATA.estanterias||{}).map(id=>({id, ...DATA.estanterias[id]}))
    .sort((a,b)=>(a.orden||99)-(b.orden||99));
}
function modulosOrdenados(est){
  return Object.keys(est.modulos||{}).map(id=>({id, ...est.modulos[id]}))
    .sort((a,b)=>(a.orden||99)-(b.orden||99));
}

function abrirSheetAsignar(artKey){
  const a = DATA.articulos[artKey]; if(!a) return;
  const ests = estanteriasOrdenadas();
  if(!ests.length){
    toast(canManage() ? 'Primero creá estanterías en la pestaña Estanterías.' : 'No hay estanterías creadas. Pedile al encargado que las cargue.');
    return;
  }
  $('sheetBody').innerHTML =
    '<div class="sheet-title">'+esc(a.codigo)+'</div>'+
    '<div class="sheet-sub">'+esc(a.descripcion||'')+' — elegí la estantería</div>'+
    ests.map(e=>'<button class="sheet-opt" data-est="'+e.id+'">'+esc(e.nombre)+
      '<span class="n">'+Object.keys(e.modulos||{}).length+' módulos</span></button>').join('');
  $('sheetOverlay').classList.add('show');
  $('sheetBody').querySelectorAll('[data-est]').forEach(b=> b.addEventListener('click', ()=> sheetElegirModulo(artKey, b.dataset.est)));
}

function sheetElegirModulo(artKey, estId){
  const a = DATA.articulos[artKey]; const est = DATA.estanterias[estId];
  if(!a || !est) return cerrarSheet();
  const mods = modulosOrdenados(est);
  if(!mods.length){
    // estantería sin módulos: se asigna a la estantería sola
    return asignarUbicacion(artKey, estId, null);
  }
  $('sheetBody').innerHTML =
    '<div class="sheet-title">'+esc(a.codigo)+' → '+esc(est.nombre)+'</div>'+
    '<div class="sheet-sub">Elegí el módulo</div>'+
    mods.map(m=>'<button class="sheet-opt" data-mod="'+m.id+'">'+esc(m.nombre)+'</button>').join('')+
    '<button class="btn btn-outline btn-block" id="sheetVolver" style="margin-top:6px">← Volver</button>';
  $('sheetBody').querySelectorAll('[data-mod]').forEach(b=> b.addEventListener('click', ()=> asignarUbicacion(artKey, estId, b.dataset.mod)));
  $('sheetVolver').addEventListener('click', ()=> abrirSheetAsignar(artKey));
}

function cerrarSheet(){ $('sheetOverlay').classList.remove('show'); }

async function asignarUbicacion(artKey, estId, modId){
  cerrarSheet();
  const a = DATA.articulos[artKey]; if(!a) return;
  // evitar duplicado exacto
  for(const uid in (a.ubicaciones||{})){
    const u=a.ubicaciones[uid];
    if(u.estanteriaId===estId && (u.moduloId||null)===(modId||null)){ toast('Ya estaba asignado ahí.'); return; }
  }
  const entrada = { estanteriaId:estId, moduloId:modId||null, por:nombreOperador(), ts:Date.now() };
  try{
    const r = await postJSON(sucPath()+'/articulos/'+encodeURIComponent(artKey)+'/ubicaciones.json', entrada);
    if(!a.ubicaciones) a.ubicaciones={};
    a.ubicaciones[r.name] = entrada;
    lastHash=''; renderVistaActiva(); renderStatusbar();
    patchMetaContadores();
    registrarMovimiento(artKey, 'asigna', nombreUbicacion(entrada));
    toast('Ubicación asignada ✓');
  }catch(e){ toast('No se pudo guardar. Probá de nuevo.'); }
}

async function quitarUbicacion(artKey, uid){
  const a = DATA.articulos[artKey]; if(!a || !a.ubicaciones || !a.ubicaciones[uid]) return;
  const nombreUbi = nombreUbicacion(a.ubicaciones[uid]);
  try{
    await delJSON(sucPath()+'/articulos/'+encodeURIComponent(artKey)+'/ubicaciones/'+uid+'.json');
    delete a.ubicaciones[uid];
    registrarMovimiento(artKey, 'quita', nombreUbi);
    lastHash=''; renderVistaActiva(); renderStatusbar();
    patchMetaContadores();
    toast('Ubicación quitada.');
  }catch(e){ toast('No se pudo quitar. Probá de nuevo.'); }
}

async function agregarFeedback(artKey, tipo){
  const a = DATA.articulos[artKey]; if(!a) return;
  const por = nombreOperador();
  const fb = (DATA.feedback||{})[artKey];
  const repetido = fb && fb.items && Object.values(fb.items).some(i=>i.tipo===tipo && i.por===por);
  if(repetido){ toast('Ya dejaste ese comentario en este artículo.'); return; }
  const id = newId('f');
  const item = { tipo, por, avatar:(MODE==='sucursal' && PERFIL && PERFIL.avatar)||null, ts:Date.now() };
  // un solo PATCH multi-path: datos del artículo + el comentario nuevo
  const patch = { codigo:a.codigo, descripcion:(a.descripcion||'').slice(0,60) };
  patch['items/'+id] = item;
  try{
    await patchJSON(sucPath()+'/feedback/'+encodeURIComponent(artKey)+'.json', patch);

    lastHash='';
    cerrarSheet(); renderVistaActiva();
    toast('Comentario guardado ✓ El encargado lo ve en Pedidos Semanales.');
  }catch(e){ toast('No se pudo guardar. Probá de nuevo.'); }
}

async function quitarFeedback(artKey, itemId){
  try{
    await delJSON(sucPath()+'/feedback/'+encodeURIComponent(artKey)+'/items/'+itemId+'.json');
    const fb = DATA.feedback && DATA.feedback[artKey];
    if(fb && fb.items) delete fb.items[itemId];
    lastHash='';

   CARGA DE STOCK (Excel → sync)
   ============================================================ */
function onFileStock(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'array'});
      abrirModalMapeo(wb);
    }catch(err){
      toast('No se pudo leer el archivo. ¿Es un .xlsx válido?');
    }
  };
  reader.readAsArrayBuffer(file);
}

// Heurísticas de detección de columnas
const RX_COD  = /^(c[oó]d(igo)?|art[ií]culo|sku|referencia|ref)/i;
const RX_DESC = /(descrip|detalle|nombre|denominaci)/i;
const RX_STK  = /(stock|cantidad|existencia|unidades|^cant)/i;
const RX_UBI  = /ubicaci/i;

function detectarEncabezado(rows){
  for(let i=0; i<Math.min(rows.length, 25); i++){
    const row = rows[i]||[];
    let iCod=-1, iDesc=-1, iStk=-1, iUbi=-1;
    row.forEach((c,j)=>{
      const t = String(c||'').trim();
      if(!t) return;
      if(iCod<0  && RX_COD.test(t))  iCod=j;
      if(iDesc<0 && RX_DESC.test(t)) iDesc=j;
      if(iStk<0  && RX_STK.test(t))  iStk=j;
      if(iUbi<0  && RX_UBI.test(t))  iUbi=j;
    });
    if(iCod>=0 && iStk>=0) return {fila:i, iCod, iDesc, iStk, iUbi};
  }
  return null;
}

// "EST 2 - MOD 1" con variantes sucias: orden invertido, espacios/guiones
// irregulares y "MOD 3y4" (dos módulos). Devuelve [{est, mod|null}].
function parseUbicacionTexto(txt){
  const t = String(txt||'').toUpperCase();
  const est = t.match(/EST\s*\.?\s*(\d+)/);
  if(!est) return [];
  const myn = t.match(/MOD\s*\.?\s*(\d+)\s*Y\s*(\d+)/);
  if(myn) return [{est:+est[1], mod:+myn[1]}, {est:+est[1], mod:+myn[2]}];
  const mod = t.match(/MOD\s*\.?\s*(\d+)/);
  return [{est:+est[1], mod: mod ? +mod[1] : null}];
}

function abrirModalMapeo(wb, hojaElegida){
  const hojas = wb.SheetNames;
  const rowsCache = wb.__rowsCache = wb.__rowsCache || {};
  const rowsDe = n => rowsCache[n] || (rowsCache[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, defval:''}));

  // hoja por defecto: se prefiere una llamada "UBICACION" con encabezados
  // detectables; si no, la primera hoja donde se detecten encabezados.
  const hoja = hojaElegida
    || hojas.find(n=>RX_UBI.test(n) && detectarEncabezado(rowsDe(n)))
    || hojas.find(n=>detectarEncabezado(rowsDe(n)))
    || hojas[0];
  const rows = rowsDe(hoja);
  const det = detectarEncabezado(rows) || {fila:0, iCod:-1, iDesc:-1, iStk:-1, iUbi:-1};

  function selCol(id, sel, opcional){
    const hdr = rows[parseInt($('mapFila').value,10)]||[];
    return '<select id="'+id+'">'+(opcional?'<option value="-1"'+(sel<0?' selected':'')+'>— No importar —</option>':'')+
      hdr.map((c,j)=>'<option value="'+j+'"'+(j===sel?' selected':'')+'>'+esc(String(c||('(col '+(j+1)+')')).slice(0,40))+'</option>').join('')+'</select>';
  }

  $('modalBody').innerHTML =
    '<div class="modal-title">Cargar stock — mapeo de columnas</div>'+
    '<div class="hint" style="margin-bottom:10px">'+rows.length+' filas. '+
      (det.iCod>=0?'Se detectaron las columnas automáticamente; revisá y confirmá.':'⚠ No se pudieron detectar las columnas: elegilas a mano.')+'</div>'+
    (hojas.length>1
      ? '<div class="fld"><label>Hoja del archivo</label><select id="mapHoja">'+
          hojas.map(n=>'<option value="'+esc(n)+'"'+(n===hoja?' selected':'')+'>'+esc(n)+'</option>').join('')+'</select></div>'
      : '')+
    '<div class="fld"><label>Fila de encabezados</label><select id="mapFila">'+
      rows.slice(0,25).map((r,i)=>'<option value="'+i+'"'+(i===det.fila?' selected':'')+'>Fila '+(i+1)+': '+
        esc(r.slice(0,5).map(c=>String(c||'—').slice(0,14)).join(' | ').slice(0,70))+'</option>').join('')+'</select></div>'+
    '<div class="fld"><label>Columna código</label><span id="wrapCod"></span></div>'+
    '<div class="fld"><label>Columna descripción</label><span id="wrapDesc"></span></div>'+
    '<div class="fld"><label>Columna stock</label><span id="wrapStk"></span></div>'+
    '<div class="fld"><label>Columna ubicación (opcional)</label><span id="wrapUbi"></span>'+
      '<div class="hint" style="margin-top:4px">Si se importa, solo se aplica a artículos que todavía no tienen ninguna ubicación asignada en la app. Crea las estanterías/módulos que falten.</div></div>'+
    '<div id="mapPreview"></div>'+
    '<div class="modal-footer">'+
      '<button class="btn btn-outline" id="mapCancelar">Cancelar</button>'+
      '<button class="btn btn-primary" id="mapConfirmar">Sincronizar</button></div>';
  $('modalOverlay').classList.add('show');

  const selHoja = $('mapHoja');
  if(selHoja) selHoja.addEventListener('change', ()=> abrirModalMapeo(wb, selHoja.value));

  function refrescarSelects(iCod,iDesc,iStk,iUbi){
    $('wrapCod').innerHTML  = selCol('mapCod',  iCod);
    $('wrapDesc').innerHTML = selCol('mapDesc', iDesc);
    $('wrapStk').innerHTML  = selCol('mapStk',  iStk);
    $('wrapUbi').innerHTML  = selCol('mapUbi',  iUbi, true);
    ['mapCod','mapDesc','mapStk','mapUbi'].forEach(id=> $(id).addEventListener('change', preview));
    preview();
  }

  function parsearConMapeo(){
    const f = parseInt($('mapFila').value,10);
    const iCod=parseInt($('mapCod').value,10), iDesc=parseInt($('mapDesc').value,10),
          iStk=parseInt($('mapStk').value,10), iUbi=parseInt($('mapUbi').value,10);
    const porCodigo = {};
    let filasLeidas = 0;
    for(let i=f+1; i<rows.length; i++){
      const r = rows[i]||[];
      const codigo = String(r[iCod]===0?'0':(r[iCod]||'')).trim();
      if(!codigo) continue;
      const stock = parseFloat(String(r[iStk]).replace(',','.'));
      const desc = String(r[iDesc]||'').trim();
      filasLeidas++;
      // agrupar por código (si el reporte viene abierto por talle, se suma)
      if(!porCodigo[codigo]) porCodigo[codigo] = {codigo, descripcion:desc, stock:0, ubis:[]};
      if(!porCodigo[codigo].descripcion && desc) porCodigo[codigo].descripcion = desc;
      porCodigo[codigo].stock += isNaN(stock)?0:stock;
      if(iUbi>=0){
        for(const u of parseUbicacionTexto(r[iUbi])){
          if(!porCodigo[codigo].ubis.some(x=>x.est===u.est && x.mod===u.mod)) porCodigo[codigo].ubis.push(u);
        }
      }
    }
    return {lista:Object.values(porCodigo), filasLeidas, conUbi:iUbi>=0};
  }

  function preview(){
    const {lista, filasLeidas, conUbi} = parsearConMapeo();
    const ubicados = conUbi ? lista.filter(a=>a.ubis.length).length : 0;
    $('mapPreview').innerHTML = !lista.length
      ? '<div class="hint" style="color:var(--red)">No se leyó ningún artículo con este mapeo.</div>'
      : '<div class="hint" style="margin:4px 0">'+filasLeidas+' filas leídas → <b>'+lista.length+' artículos</b>'+
          (filasLeidas>lista.length?' (agrupados por código, stock sumado)':'')+

    try{ await sincronizarStock(lista); }

  });

async function sincronizarStock(lista){
  // leer artículos y estanterías actuales JUSTO antes, para preservar ubicaciones
  const prev = await fetchJSON(sucPath()+'/articulos.json').catch(()=>({})) || {};
  const ests = await fetchJSON(sucPath()+'/estanterias.json').catch(()=>({})) || {};
  const now = Date.now();
  const out = {};
  const nuevos = [], eliminados = [];
  let actualizados = 0;

  for(const art of lista){
    const key = fbKey(art.codigo);
    const p = prev[key];
    const rec = {
      codigo: art.codigo,
      descripcion: art.descripcion || (p ? p.descripcion : ''),
      stock: art.stock,
      ultimaCarga: now,
      fechaAlta: p && p.fechaAlta ? p.fechaAlta : now,
    };
    if(p && p.ubicaciones) rec.ubicaciones = p.ubicaciones;
    if(p) actualizados++; else nuevos.push(rec);
    out[key] = rec;
  }
  for(const key in prev){ if(!out[key]) eliminados.push(prev[key]); }

  // ubicaciones de la planilla (columna opcional): solo para artículos que
  // no tienen ninguna asignada en la app; crea estanterías/módulos faltantes.
  let estsCambiadas = false, ubicacionesImportadas = 0;
  const asegurarEstanteria = num => {
    for(const id in ests){ const m = String(ests[id].nombre||'').match(/(\d+)/); if(m && +m[1]===num) return id; }
    const id = 'est'+num;
    ests[id] = {nombre:'Estantería '+num, orden:num, modulos:{}};
    estsCambiadas = true; return id;
  };
  const asegurarModulo = (estId, num) => {
    const e = ests[estId]; if(!e.modulos) e.modulos = {};
    for(const id in e.modulos){ const m = String(e.modulos[id].nombre||'').match(/(\d+)/); if(m && +m[1]===num) return id; }
    const id = 'mod'+num;
    e.modulos[id] = {nombre:'Módulo '+num, orden:num};
    estsCambiadas = true; return id;
  };
  for(const art of lista){
    if(!art.ubis || !art.ubis.length) continue;
    const rec = out[fbKey(art.codigo)];
    if(rec.ubicaciones && Object.keys(rec.ubicaciones).length) continue; // no pisar lo ubicado en la app
    rec.ubicaciones = {};
    for(const u of art.ubis){
      const estId = asegurarEstanteria(u.est);
      const modId = u.mod !== null ? asegurarModulo(estId, u.mod) : null;
      rec.ubicaciones[newId('u')] = { estanteriaId:estId, moduloId:modId, por:nombreOperador()+' (planilla)', ts:now };
    }
    ubicacionesImportadas++;
  }
  if(estsCambiadas) await putJSON(sucPath()+'/estanterias.json', ests);
  DATA.estanterias = ests;

  // una sola escritura grande (PUT del set completo) + meta
  await putJSON(sucPath()+'/articulos.json', out);

  // feedback de artículos que ya no vienen en el Excel → se limpia
  try{
    const fbAll = await fetchJSON(sucPath()+'/feedback.json') || {};
    const huerfanos = Object.keys(fbAll).filter(k=>!out[k]);
    if(huerfanos.length){
      const patchFb = {}; huerfanos.forEach(k=>{ patchFb[k]=null; delete (DATA.feedback||{})[k]; });
      await patchJSON(sucPath()+'/feedback.json', patchFb);
    }
  }catch(e){}
  const sinUbi = Object.values(out).filter(a=>!a.ubicaciones || !Object.keys(a.ubicaciones).length).length;
  await patchJSON(sucPath()+'/meta.json', {
    ultimaCargaStock: now,
    cargadoPor: nombreOperador(),
    totalArticulos: Object.keys(out).length,
    sinUbicar: sinUbi,
  });

  DATA.articulos = out;
  DATA.meta = {...DATA.meta, ultimaCargaStock:now, cargadoPor:nombreOperador(), totalArticulos:Object.keys(out).length, sinUbicar:sinUbi};
  lastHash='';
  mostrarResumenCarga(nuevos, actualizados, eliminados, ubicacionesImportadas);
  renderVistaActiva(); renderStatusbar();
}

  try{
    await putJSON(sucPath()+'/estanterias/'+id+'.json', rec);
    DATA.estanterias[id]=rec; lastHash=''; renderEstanterias();
  }catch(e){ toast('No se pudo crear.'); }

async function renombrarEstanteria(id){
  const e = DATA.estanterias[id]; if(!e) return;
  const nombre = prompt('Nuevo nombre:', e.nombre);
  if(!nombre || !nombre.trim() || nombre.trim()===e.nombre) return;
  try{
    await patchJSON(sucPath()+'/estanterias/'+id+'.json', {nombre:nombre.trim()});
    e.nombre=nombre.trim(); lastHash=''; renderEstanterias();
  }catch(err){ toast('No se pudo renombrar.'); }
}

async function moverEstanteria(id, dir){
  const ests = estanteriasOrdenadas();
  const i = ests.findIndex(e=>e.id===id);
  const j = i+dir;
  if(i<0 || j<0 || j>=ests.length) return;
  // normalizamos orden 1..n y swapeamos
  const patch = {};
  ests.forEach((e,idx)=>{ e.orden=idx+1; });
  const tmp = ests[i].orden; ests[i].orden = ests[j].orden; ests[j].orden = tmp;
  ests.forEach(e=>{ patch[e.id+'/orden'] = e.orden; DATA.estanterias[e.id].orden = e.orden; });
  try{
    await patchJSON(sucPath()+'/estanterias.json', patch);
    lastHash=''; renderEstanterias();
  }catch(e){ toast('No se pudo reordenar.'); }
}

function articulosAfectados(estId, modId){
  // [artKey, uid] de cada asignación que apunta a esa estantería/módulo
  const afect = [];
  for(const a of articulosLista())
    for(const uid in (a.ubicaciones||{})){
      const u=a.ubicaciones[uid];
      if(u.estanteriaId===estId && (!modId || u.moduloId===modId)) afect.push([a.key, uid]);
    }
  return afect;
}

function eliminarEstanteria(id){
  const e = DATA.estanterias[id]; if(!e) return;
  const afect = articulosAfectados(id, null);
  confirmarModal(
    'Eliminar '+esc(e.nombre),
    afect.length
      ? '<b>Hay '+afect.length+' artículo'+(afect.length===1?'':'s')+' ubicado'+(afect.length===1?'':'s')+' acá.</b><br>'+
        'Si confirmás, se quitan esas asignaciones y los que queden sin ninguna ubicación pasan a <b>SIN UBICAR</b>.'
      : 'La estantería no tiene artículos asignados.',
    async ()=>{
      // un solo PATCH multi-path sobre la sucursal
      const patch = {['estanterias/'+id]: null};
      afect.forEach(([artKey,uid])=>{ patch['articulos/'+artKey+'/ubicaciones/'+uid] = null; });

        await patchJSON(sucPath()+'.json', patch);

        toast('Estantería eliminada.');
