# wrangler.toml — Portal Mateu Sports (Cloudflare Pages)
#
# El portal se publica en Cloudflare Pages y deploya solo con cada push a main.
# Este archivo NO cambia ese flujo: sirve para `wrangler pages dev` (probar las
# Pages Functions + D1 en local) y para declarar el binding de la base D1 que usa
# el módulo Control de Recepciones (functions/api/[[route]].js).
#
# El resto de los módulos usa Firebase; D1 es exclusivo de Recepciones.

name = "mateu-sports-portal"
pages_build_output_dir = "."
compatibility_date = "2024-11-01"

# --- Base D1 del módulo Control de Recepciones ---
# database_id lo genera Cloudflare al crear la base; pegarlo acá (ver README de
# recepciones/). Placeholder a propósito: NO inventar un id.
[[d1_databases]]
binding = "DB"
database_name = "mateu_recepciones"
database_id = "<pendiente-pegar-database_id>"
