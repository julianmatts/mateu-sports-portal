<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedidos Semanales — Mateu Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#ffffff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#ffffff;--border:#dce3f0;
  --ok:#2e7d32;--warn:#b36200;--bad:#8b0000;--neutral:#9aa5bb;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --radius:10px;--shadow:0 1px 4px rgba(11,21,39,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--off);color:var(--navy);min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
select{font-family:inherit}

.top{background:var(--navy);padding:14px 28px;display:flex;align-items:center;
  border-bottom:3px solid var(--red);flex-wrap:wrap;gap:10px}
.top-left{flex:1;display:flex;align-items:center;min-width:0}
.top-title{line-height:1.05}
.top-title .n{font-family:var(--font-d);font-size:20px;letter-spacing:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-title .s{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted-light)}
.top-center{flex:0 0 auto;display:flex;align-items:center}
.top-center img{height:32px;filter:brightness(0) invert(1)}
.top-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:14px}
.sel-semana{padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.25);
  background:var(--navy-soft);color:#fff;font-family:var(--font-c);font-size:12.5px}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:14px;font-weight:600;color:#fff}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--red-soft)}
.logout{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;transition:all .15s}
.logout:hover{color:#fff;border-color:#fff}

nav{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;
  overflow-x:auto;position:sticky;top:0;z-index:50}
.nav-tab{font-family:var(--font-c);font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:12px 16px;border:none;background:transparent;color:var(--muted);border-bottom:3px solid transparent;
  transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--navy)}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red)}

main{max-width:1180px;margin:0 auto;padding:26px 20px 60px}
.view{display:none}
.view.active{display:block}

.pg-title{font-family:var(--font-d);font-size:30px;letter-spacing:1px;color:var(--navy);line-height:1}
.pg-sub{font-family:var(--font-c);font-size:13px;font-weight:500;color:var(--muted);margin-top:4px}
.head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}

.ph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px 24px}
.ph-card ul{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:6px}
.ph-card li{font-size:14px}
.ph-card b{color:var(--navy)}

.badge-estado{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-c);font-size:11px;
  font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge-ok{background:#e8f5e9;color:var(--ok)}
.badge-bad{background:#fce4e4;color:var(--bad)}
.badge-warn{background:#fff3e0;color:var(--warn)}
.badge-neutral{background:#eef1f8;color:var(--muted)}

.warn-box{background:#fff3e0;color:#b36200;border:1px solid #ffe0b3;border-radius:8px;padding:14px 16px;
  font-size:13.5px;margin-bottom:20px}
.error-box{background:#fce4e4;color:var(--bad);border:1px solid #f6c6c6;border-radius:8px;padding:14px 16px;font-size:13.5px}
.hint{font-size:12.5px;color:var(--muted);padding:10px 2px}
.info-box{background:#eef4ff;color:#233a60;border:1px solid #c9d7f2;border-radius:8px;padding:12px 14px;
  font-size:13px;line-height:1.45;margin-bottom:14px}
.info-box b{color:var(--navy)}
.rubro-alert{font-size:11.5px;color:#745000;background:#fff8e1;border:1px solid #f0c24b;border-radius:7px;
  padding:7px 9px;margin:8px 0}

/* ===== SEMÁFORO ===== */
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px}
.dot-ok{background:var(--ok)}
.dot-warn{background:var(--warn)}
.dot-bad{background:var(--bad)}
.dot-neutral{background:var(--neutral)}
.dot-label{font-family:var(--font-c);font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}

/* ===== RUBROS / LÍNEAS ===== */
.rubro-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.rubro-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
  background:var(--off);border-bottom:1px solid var(--border)}
.rubro-head .t{font-family:var(--font-d);font-size:18px;letter-spacing:.5px}
.rubro-head .cnt{font-family:var(--font-c);font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:1px}
.rubro-body{padding:6px 18px 16px}

.linea-table{width:100%;border-collapse:collapse}
.linea-table th{font-family:var(--font-c);font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);white-space:nowrap}
.linea-table td{padding:6px;border-bottom:1px solid #eef0f7;vertical-align:middle}
.linea-table input, .linea-table select{width:100%;min-width:70px;padding:6px 8px;border:1px solid var(--border);
  border-radius:6px;font-size:12.5px;font-family:inherit;color:var(--navy)}
.linea-table input:disabled, .linea-table select:disabled{background:#f4f6fb;color:var(--muted)}
.txt-fixed{font-size:12.5px;color:var(--muted);white-space:nowrap}
.col-estado{min-width:100px}
.linea-coment-prod{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;max-width:160px}
.col-del{width:26px;text-align:center}
.btn-eliminar{background:transparent;border:none;color:var(--bad);font-size:16px;line-height:1;padding:4px 6px}
.btn-eliminar:hover{color:#5a0000}

.btn-add-rubro{margin-top:10px;background:transparent;border:1px dashed var(--border);border-radius:8px;padding:8px 14px;
  font-family:var(--font-c);font-size:12.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.btn-add-rubro:hover{border-color:var(--red);color:var(--red)}

.btn-enviar{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-family:var(--font-c);
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.btn-enviar:hover{background:#a00000}

/* ===== VISTA PRODUCTO ===== */
.filtros-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.filtros-bar select, .filtros-bar input[type=text]{padding:8px 10px;border:1px solid var(--border);border-radius:6px;
  font-size:13px;font-family:inherit;color:var(--navy)}
.grp-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.grp-toggle button{padding:8px 14px;border:none;background:#fff;font-family:var(--font-c);font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.grp-toggle button.active{background:var(--navy);color:#fff}
.btn-masivo{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font-c);
  font-size:12.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.btn-masivo:hover{background:var(--navy-mid)}

.chips-contadores{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip-contador{background:var(--off);border:1px solid var(--border);border-radius:20px;padding:5px 12px;
  font-size:11.5px;font-family:var(--font-c);font-weight:600;color:var(--muted)}
.chip-contador b{color:var(--navy)}
.chip-duplicado{background:#fff8e1;border-color:#f0c24b;color:#745000}
.uso-rubros{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.uso-chip{display:inline-flex;align-items:center;gap:4px;border-radius:16px;padding:3px 8px;
  font-family:var(--font-c);font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.uso-ok{background:#e8f5e9;color:var(--ok);border:1px solid #bfe2c2}
.uso-warn{background:#fff3e0;color:var(--warn);border:1px solid #ffd59a}
.uso-bad{background:#fce4e4;color:var(--bad);border:1px solid #f2b8b8}
.uso-neutral{background:#eef1f8;color:var(--muted);border:1px solid var(--border)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;min-width:25px;height:20px;margin-right:7px;
  border-radius:12px;font-family:var(--font-c);font-size:10.5px;font-weight:800;letter-spacing:.4px}
.rank-ok{background:#e8f5e9;color:var(--ok);border:1px solid #bfe2c2}
.rank-warn{background:#fff3e0;color:var(--warn);border:1px solid #ffd59a}
.rank-bad{background:#fce4e4;color:var(--bad);border:1px solid #f2b8b8}
.fila-duplicada td{background:#fffdf4}
.dup-cell{background:#fff4bf!important;border-left:2px solid #d6a500;font-weight:600;color:var(--navy)}
.dup-badge{display:inline-flex;margin-left:6px;padding:2px 6px;border-radius:14px;background:#f0c24b;color:#4d3500;
  font-family:var(--font-c);font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}

.estado-toggle{display:flex;gap:4px}
.btn-toggle{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--muted);
  font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.btn-toggle:hover{border-color:var(--navy-mid)}
.btn-aprobar.active{background:var(--ok);border-color:var(--ok);color:#fff}
.btn-rechazar.active{background:var(--bad);border-color:var(--bad);color:#fff}
.btn-toggle:disabled, .btn-masivo:disabled{opacity:.4;cursor:default}

/* ===== CONTROL / CONFIG ===== */
.btn-reabrir{margin-left:8px;background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 9px;
  font-family:var(--font-c);font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.btn-reabrir:hover{border-color:var(--red);color:var(--red)}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.fld label{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px}
.fld input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--navy)}

@media(max-width:720px){
  main{padding:20px 14px 48px}
  .pg-title{font-size:24px}
  .linea-table{font-size:11px}
  .rubro-body{overflow-x:auto}
}
</style>
</head>

// (ni como destino que carga pedido, ni del lado Producto que aprueba/rechaza): el grupo admin de

// session.outlet_id), así no hace falta mapear emails a mano.

  {id:'plaza',      nombre:'Plaza Italia'},

const SUCURSAL_BY_ID = {}; SUCURSALES.forEach(s=>SUCURSAL_BY_ID[s.id]=s);

  'calle-12':'ms-c12','city-bell':'ms-cb','diagonal':'ms-d80','calle-47':'ms-c47','calle-49':'ms-c49',

};

/* ============================================================
   UTILIDADES
   ============================================================ */
const $ = id => document.getElementById(id);
function esc(s){ return String(s===null||s===undefined?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fbConfigurado(){ return !!FB && FB.indexOf('{{')!==0; }
function fmtDateTime(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleDateString('es-AR')+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function putJSON(url, data){
  return fetch(url,{method:'PUT',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
function patchJSON(url, data){
  return fetch(url,{method:'PATCH',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
async function postJSON(url, data){
  const r = await fetch(url,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
  return r.json(); // {name: pushKey}
}
function deleteJSON(url){
  return fetch(url,{method:'DELETE'});
}

/* ============================================================
   SESIÓN — la maneja el Portal (mateu_portal_session). Este
   módulo no tiene login propio: si no hay sesión válida con
   acceso a esta herramienta, vuelve al Portal.
   ============================================================ */
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s? JSON.parse(s):null; }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }
function logout(){ clearSession(); location.href='../'; }

function miDestinoId(session){ return session.sucursal || session.outlet_id || null; }
function esControl(email){ return CONTROL_EMAILS.includes((email||'').toLowerCase()); }
function esConfig(email){ return (email||'').toLowerCase() === CONFIG_EMAIL; }

/* ============================================================
   SEMANA ACTIVA (lunes en huso horario Argentina, UTC-3 sin DST)
   ============================================================ */
function fechaHoyAR(){
  return new Intl.DateTimeFormat('en-CA', {timeZone:'America/Argentina/Buenos_Aires', year:'numeric', month:'2-digit', day:'2-digit'}).format(new Date());
}
function lunesDeSemanaActiva(){
  const [y,m,d] = fechaHoyAR().split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  const dow = dt.getUTCDay(); // 0=domingo
  dt.setUTCDate(dt.getUTCDate() + (dow===0 ? -6 : 1-dow));
  return dt.toISOString().slice(0,10);
}
function fmtFechaCorta(iso){ const [y,m,d] = iso.split('-'); return d+'.'+m+'.'+y.slice(2); }
function sumarDiasIso(iso, dias){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate() + dias);
  return dt.toISOString().slice(0,10);
}
function semanaVigenteEditable(){
  return SEMANA_SEL === LUNES_ACTIVO && fechaHoyAR() <= sumarDiasIso(LUNES_ACTIVO, 2);
}

async function asegurarSemana(lunes){
  let meta = null;
  try{ meta = await fetchJSON(FB+'/semanas/'+lunes+'/meta.json'); }catch(e){}
  if(!meta){
    meta = { creada: Date.now(), estado:'activa' };
    try{ await putJSON(FB+'/semanas/'+lunes+'/meta.json', meta); }catch(e){}
  }
  return meta;
}
async function listaSemanas(){

    return Object.keys(data||{}).sort().reverse();
  }catch(e){ return []; }
}

/* ============================================================
   CONFIG (límites por rubro)
   ============================================================ */
let CONFIG_LIMITES = {calzado:20, indumentaria:20, accesorios:10};
let CONFIG_LIMITES_MV = {calzado:20, indumentaria:20, accesorios:10};
const DEFAULT_LIMITES_CAT = {
  cat1:{calzado:20, indumentaria:20, accesorios:10},
  cat2:{calzado:15, indumentaria:15, accesorios:8}
};
let CONFIG_LIMITES_CAT = {
  cat1:Object.assign({}, DEFAULT_LIMITES_CAT.cat1),
  cat2:Object.assign({}, DEFAULT_LIMITES_CAT.cat2)
};
let ASIGNACION_MARCAS = null;
let ASIGNACION_MARCAS_OK = false;
async function cargarConfig(){
  try{ const l = await fetchJSON(FB+'/config/limites.json'); if(l) CONFIG_LIMITES = l; }catch(e){}
  try{ const l = await fetchJSON(FB+'/config/limitesMenosVendidos.json'); if(l) CONFIG_LIMITES_MV = l; }catch(e){}
  try{
    const l = await fetchJSON(FB+'/config/limitesPorCategoria.json');
    if(l) CONFIG_LIMITES_CAT = {
      cat1:Object.assign({}, DEFAULT_LIMITES_CAT.cat1, l.cat1 || {}),
      cat2:Object.assign({}, DEFAULT_LIMITES_CAT.cat2, l.cat2 || {})
    };
  }catch(e){}
}

async function cargarAsignacionMarcas(){
  try{
    const val = await fetchJSON(FB_MARCAS);
    ASIGNACION_MARCAS = val && (val.data || val);
    ASIGNACION_MARCAS_OK = !!ASIGNACION_MARCAS;
  }catch(e){
    ASIGNACION_MARCAS_OK = false;
  }
}

function marcasIdParaSucursal(destinoId){
  return SUCURSAL_PORTAL_TO_MARCAS[destinoId] || null;
}

function buscarSucursalMarcas(destinoId){
  if(!ASIGNACION_MARCAS) return null;
  const idMarcas = marcasIdParaSucursal(destinoId);
  if(!idMarcas) return null;
  for(const canal of Object.values(ASIGNACION_MARCAS)){
    const lista = canal && Array.isArray(canal.sucursales) ? canal.sucursales : [];
    const suc = lista.find(s=>s.id === idMarcas);
    if(suc) return suc;
  }
  return null;
}

function categoriaSucursal(destinoId){
  const sucMarcas = buscarSucursalMarcas(destinoId);
  return sucMarcas && sucMarcas.cat ? sucMarcas.cat : null;
}

function marcasCalzadoParaSucursal(destinoId){
  const sucMarcas = buscarSucursalMarcas(destinoId);
  if(!sucMarcas || !Array.isArray(sucMarcas.brands)) return null;
  return Array.from(new Set(sucMarcas.brands.map(b=>b && b.n).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
}

function limitesParaSucursal(base, destinoId){
  const cat = categoriaSucursal(destinoId);
  const catLimites = cat && CONFIG_LIMITES_CAT[cat] ? CONFIG_LIMITES_CAT[cat] : null;
  const out = {};
  RUBROS.forEach(r=>{
    const k = rubroKey(r);
    const desdeCat = Number(catLimites && catLimites[k]);
    const desdeBase = Number(base && base[k]);
    const desdeDefault = Number(DEFAULT_LIMITES_CAT.cat1[k]);
    out[k] = desdeCat || desdeBase || desdeDefault || 1;
  });
  return out;
}

function esSucursalMateuOuOutlet(destinoId){
  const cat = categoriaSucursal(destinoId);
  return cat === 'cat1' || cat === 'cat2' || cat === 'outlet';
}

let SESSION = null;
let LUNES_ACTIVO = null;
let SEMANA_SEL = null;

let POLL_TIMER = null;
const debounceTimers = {};

const CACHE_PRODUCTO = {};
const META_CACHE = {};

function cacheKey(){
  return Array.from(arguments).join('|');
}

function clonar(obj){
  return JSON.parse(JSON.stringify(obj || {}));
}

function generarPushKey(){
  return 'ln_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,10);
}

async function refrescarSemanaMeta(){
  const ahora = Date.now();
  const cache = META_CACHE[SEMANA_SEL];
  if(cache && ahora - cache.ts < 30000){
    SEMANA_META = cache.data;
    return;
  }
  try{ SEMANA_META = await fetchJSON(FB+'/semanas/'+SEMANA_SEL+'/meta.json') || {estado:'activa'}; }
  catch(e){ SEMANA_META = SEMANA_META || {estado:'activa'}; }
  META_CACHE[SEMANA_SEL] = {ts: ahora, data: SEMANA_META};
}

  return '<div class="head-row"><div><div class="pg-title">'+esc(titulo)+'</div><div class="pg-sub">'+subHtml+'</div></div>'+
    (accionHtml? '<div>'+accionHtml+'</div>':'')+'</div>';
}

async function renderTabContent(){
  if(!SESSION) return;
  if(!fbConfigurado()){
    $('view-tab').innerHTML = headerHtml('Pedidos Semanales', 'Sesión: '+esc(SESSION.email))+
      '<div class="warn-box">Falta configurar <b>FIREBASE_URL</b> en el código (constante <code>FB</code>). '+

function marcaFieldHtml(linea, destinoId, soloLectura){
  const dis = soloLectura ? 'disabled' : '';
  if((linea.rubro || '') !== 'Calzado') return '<input class="lf" data-f="marca" value="'+esc(linea.marca||'')+'" '+dis+'>';
  const marcas = marcasCalzadoParaSucursal(destinoId);
  if(!ASIGNACION_MARCAS_OK || !marcas) return '<input class="lf" data-f="marca" value="'+esc(linea.marca||'')+'" '+dis+'>';
  const actual = (linea.marca || '').trim();
  const extra = actual && !marcas.includes(actual) ? '<option value="'+esc(actual)+'" selected>'+esc(actual)+' (revisar)</option>' : '';
  return '<select class="lf" data-f="marca" '+dis+'><option value="">Marca</option>'+extra+
    marcas.map(m=>'<option value="'+esc(m)+'"'+(actual===m?' selected':'')+'>'+esc(m)+'</option>').join('')+
    '</select>';
}

function construirFilaHtml(linea, tipoCfg, destinoId, soloLectura){
  const dis = soloLectura ? 'disabled' : '';
  let origenCell;
  if(tipoCfg.origenEditable){
    origenCell = '<select class="lf" data-f="origen" '+dis+'><option value="">—</option>'+
      SUCURSALES.map(s=>'<option value="'+s.id+'"'+(linea.origen===s.id?' selected':'')+'>'+esc(s.nombre)+'</option>').join('')+
      '<option value="deposito"'+(linea.origen==='deposito'?' selected':'')+'>Depósito</option></select>';
  } else {
    const nombreProp = (SUCURSAL_BY_ID[destinoId]&&SUCURSAL_BY_ID[destinoId].nombre) || destinoId;
    origenCell = '<span class="txt-fixed">'+esc(nombreProp)+'</span>';
  }
  let destinoCell = '';
  if(tipoCfg.campoDestino){
    destinoCell = '<td><select class="lf" data-f="destino" '+dis+'><option value="">A definir</option>'+
      SUCURSALES.map(s=>'<option value="'+s.id+'"'+(linea.destino===s.id?' selected':'')+'>'+esc(s.nombre)+'</option>').join('')+
      '</select></td>';
  }
  const info = ESTADO_INFO[linea.estado] || ESTADO_INFO.pendiente;
  return '<tr data-id="'+linea.id+'">'+
    '<td>'+origenCell+'</td>'+
    '<td>'+marcaFieldHtml(linea,destinoId,soloLectura)+'</td>'+
    '<td><input class="lf" data-f="codigo" value="'+esc(linea.codigo||'')+'" '+dis+'></td>'+
    '<td><input class="lf" data-f="articulo" value="'+esc(linea.articulo||'')+'" '+dis+'></td>'+
    '<td><input class="lf" data-f="descripcion" value="'+esc(linea.descripcion||'')+'" '+dis+'></td>'+
    destinoCell+
    '<td><input class="lf" data-f="comentarioSucursal" value="'+esc(linea.comentarioSucursal||'')+'" '+dis+' placeholder="Comentario"></td>'+
    '<td class="col-estado"><span class="dot dot-'+info.tono+'"></span><span class="dot-label">'+info.label+'</span>'+
      (linea.comentarioProducto? '<div class="linea-coment-prod">"'+esc(linea.comentarioProducto)+'"</div>':'')+
    '</td>'+
    '<td class="col-del">'+(soloLectura?'':'<button class="btn-eliminar" data-del="'+linea.id+'" title="Eliminar">×</button>')+'</td>'+
  '</tr>';
}

function construirRubroCard(rubro, lineas, limite, tipoCfg, destinoId, soloLectura){
  const count = lineas.length;
  const puedeAgregar = !soloLectura && count < limite;
  const marcasCalzado = marcasCalzadoParaSucursal(destinoId);
  const avisoMarca = rubro === 'Calzado' && ASIGNACION_MARCAS_OK && (!marcasCalzado || !marcasCalzado.length)
    ? '<div class="rubro-alert">No hay asignacion de marcas de calzado vinculada para esta sucursal. Avisar a Juli si falta cargarla en el modulo Marcas.</div>'
    : '';
  const headCols = '<th>Origen</th><th>Marca</th><th>Código</th><th>Artículo</th><th>Descripción</th>'+
    (tipoCfg.campoDestino?'<th>Destino sugerido</th>':'')+'<th>Comentario</th><th>Estado</th><th></th>';
  return '<div class="rubro-card">'+
    '<div class="rubro-head"><div class="t">'+esc(rubro)+'</div><div class="cnt">'+count+'/'+limite+'</div></div>'+
    '<div class="rubro-body">'+
      avisoMarca+
      (lineas.length?
        '<table class="linea-table"><thead><tr>'+headCols+'</tr></thead><tbody>'+
          lineas.map(l=>construirFilaHtml(l,tipoCfg,destinoId,soloLectura)).join('')+
        '</tbody></table>'
        : '<div class="hint">Sin líneas cargadas.</div>')+
      (puedeAgregar? '<button class="btn-add-rubro" data-add-rubro="'+esc(rubro)+'">+ Agregar línea</button>':'')+
    '</div></div>';
}

async function renderVistaSucursal(){
  const tipoCfg = TIPOS[ACTIVE_TAB];
  const destinoId = miDestinoId(SESSION);
  const suc = SUCURSAL_BY_ID[destinoId];
  if(!suc){
    $('view-tab').innerHTML = headerHtml(tipoCfg.label, '')+
      '<div class="error-box">Tu usuario ('+esc(SESSION.email)+') no está mapeado a una sucursal de Pedidos Semanales. Avisá a Juli.</div>';
    return;
  }

  await refrescarSemanaMeta();
  let pedido = null;
  const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
  if(CACHE_SUCURSAL[cKey]){
    pedido = clonar(CACHE_SUCURSAL[cKey]);
  } else {
    try{ pedido = await fetchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'.json'); }catch(e){}
    CACHE_SUCURSAL[cKey] = clonar(pedido || {});
  }
  pedido = pedido || {};
  pedido.lineas = pedido.lineas || {};
  pedido.estado = pedido.estado || 'borrador';

  const editablePorFecha = semanaVigenteEditable();
  const soloLectura = (SEMANA_SEL !== LUNES_ACTIVO) || !editablePorFecha || SEMANA_META.estado === 'cerrada';
  const limitesBase = ACTIVE_TAB === 'pedidos' ? CONFIG_LIMITES : CONFIG_LIMITES_MV;
  const limites = ACTIVE_TAB === 'pedidos' ? limitesParaSucursal(limitesBase, destinoId) : limitesBase;

  const porRubro = {}; RUBROS.forEach(r=>porRubro[r]=[]);
  Object.keys(pedido.lineas).forEach(id=>{
    const linea = Object.assign({id}, pedido.lineas[id]);
    const r = RUBROS.includes(linea.rubro) ? linea.rubro : RUBROS[0];
    porRubro[r].push(linea);
  });
  RUBROS.forEach(r=> porRubro[r].sort((a,b)=>(a.creadaAt||0)-(b.creadaAt||0)));

  let accion = '';
  if(SEMANA_SEL !== LUNES_ACTIVO){
    accion = '<span class="badge-estado badge-neutral">Semana anterior — solo lectura</span>';
  } else if(SEMANA_META.estado === 'cerrada'){
    accion = '<span class="badge-estado badge-bad">Semana cerrada</span>';
  } else if(!editablePorFecha){
    accion = '<span class="badge-estado badge-bad">Plazo cerrado</span>';
  } else if(pedido.estado === 'enviado'){
    accion = '<span class="badge-estado badge-ok">Enviado '+esc(fmtDateTime(pedido.enviadoAt))+' - editable hasta miercoles</span>';
  } else {
    accion = '<button class="btn-enviar" id="btnEnviarPedido">Enviar pedido</button>';
  }

  const sub = 'Semana del '+fmtFechaCorta(SEMANA_SEL)+' · '+esc(suc.nombre);
  const aclaraciones = '<div class="info-box"><b>Objetivo:</b> usar esta planilla para reponer los mejores vendidos de la ultima semana a 15 dias.</div>'+
    (ACTIVE_TAB === 'pedidos'
      ? '<div class="info-box"><b>Deposito:</b> los pedidos con origen Deposito no se hacen por esta planilla, sino directo a Deposito por llamado o por mail. Aca solo se piden articulos que estan en otras sucursales y que quieras reponer porque tuvieron buena venta.</div>'
      : '')+
    (ACTIVE_TAB === 'pedidos' && esSucursalMateuOuOutlet(destinoId)
      ? '<div class="info-box"><b>Ruge:</b> para Mateu Sports y Outlet, el pedido de la marca Ruge corresponde hacerlo directo a deposito por mail o telefono, porque generalmente hay reserva en deposito.</div>'
      : '')+
    (tipoCfg.importaExcel && !soloLectura
      ? '<div class="info-box"><b>Importar Excel:</b> con Descargar planilla bajás la planilla vacía (ORIGEN, CÓDIGO, ARTÍCULO, DESCRIPCIÓN y RUBRO), la completás y la subís con Importar Excel. También sirve el F8 que exporta Producto (como no tiene columna RUBRO, esas líneas entran a Calzado). Se importa hasta completar el límite de líneas de cada rubro.</div>'
      : '');
  const barraImportar = tipoCfg.importaExcel && !soloLectura
    ? '<div class="filtros-bar"><button class="btn-masivo" id="btnImportarExcel">⬆ Importar Excel</button>'+
      '<button class="btn-masivo" id="btnDescargarPlantilla">⬇ Descargar planilla</button>'+
      '<input type="file" id="inpImportF8" accept=".xlsx,.xls,.xlsm" style="display:none"></div>'
    : '';
  $('view-tab').innerHTML = headerHtml(tipoCfg.label, sub, accion)+aclaraciones+barraImportar+
    RUBROS.map(r=> construirRubroCard(r, porRubro[r], limites[rubroKey(r)] ?? 20, tipoCfg, destinoId, soloLectura)).join('');

  bindVistaSucursalEvents(tipoCfg, destinoId);
}

function bindVistaSucursalEvents(tipoCfg, destinoId){
  $('view-tab').querySelectorAll('.lf').forEach(el=>{
    const handler = ()=>{
      const tr = el.closest('tr');
      programarGuardado(tr.dataset.id, tipoCfg, destinoId, tr);
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  $('view-tab').querySelectorAll('[data-add-rubro]').forEach(btn=>{
    btn.addEventListener('click', ()=> agregarLinea(btn.dataset.addRubro, tipoCfg, destinoId));
  });
  $('view-tab').querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=> eliminarLinea(tipoCfg, destinoId, btn.dataset.del));
  });
  const btnEnviar = $('btnEnviarPedido');
  if(btnEnviar) btnEnviar.addEventListener('click', ()=> enviarPedido(tipoCfg, destinoId));

  const inpImport = $('inpImportF8');
  if(inpImport){
    $('btnImportarExcel').addEventListener('click', ()=>{ inpImport.value = ''; inpImport.click(); });
    inpImport.addEventListener('change', ()=>{
      const file = inpImport.files && inpImport.files[0];
      if(file) importarExcelF8(file, tipoCfg, destinoId);
    });
    $('btnDescargarPlantilla').addEventListener('click', ()=> descargarPlantillaF8(destinoId));
  }
}

function leerFilaValores(rowEl, tipoCfg){
  const data = {
    marca: rowEl.querySelector('[data-f="marca"]').value,
    codigo: rowEl.querySelector('[data-f="codigo"]').value,
    articulo: rowEl.querySelector('[data-f="articulo"]').value,
    descripcion: rowEl.querySelector('[data-f="descripcion"]').value,
    comentarioSucursal: rowEl.querySelector('[data-f="comentarioSucursal"]').value,
  };
  if(tipoCfg.origenEditable){ data.origen = rowEl.querySelector('[data-f="origen"]').value; }
  if(tipoCfg.campoDestino){ data.destino = rowEl.querySelector('[data-f="destino"]').value; }
  return data;
}

function programarGuardado(lineaId, tipoCfg, destinoId, rowEl){
  clearTimeout(debounceTimers[lineaId]);
  debounceTimers[lineaId] = setTimeout(()=>{
    const data = leerFilaValores(rowEl, tipoCfg);
    const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
    const pedido = CACHE_SUCURSAL[cKey];
    if(pedido && pedido.lineas && pedido.lineas[lineaId]){
      Object.assign(pedido.lineas[lineaId], data);
    }
    patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'/lineas/'+lineaId+'.json', data).catch(()=>{});
  }, 1000);
}

async function agregarLinea(rubro, tipoCfg, destinoId){
  const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
  const lineaId = generarPushKey();
  const nueva = {
    rubro, estado:'pendiente', creadaAt: Date.now(),
    marca:'', codigo:'', articulo:'', descripcion:'', comentarioSucursal:'',
  };
  if(tipoCfg.campoDestino){ nueva.origen = destinoId; nueva.destino = ''; }
  else { nueva.origen = ''; }

  const pedido = CACHE_SUCURSAL[cKey] = CACHE_SUCURSAL[cKey] || {estado:'borrador', lineas:{}};
  const estadoPedido = pedido.estado === 'enviado' ? 'enviado' : 'borrador';
  pedido.estado = estadoPedido;
  pedido.lineas = pedido.lineas || {};
  pedido.lineas[lineaId] = nueva;
  renderVistaSucursal();

  Promise.all([
    patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'.json', {estado:estadoPedido}),
    putJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'/lineas/'+lineaId+'.json', nueva)
  ]).catch(()=>{
    delete pedido.lineas[lineaId];
    alert('No se pudo guardar la línea. Revisá la conexión e intentá de nuevo.');
    renderVistaSucursal();
  });
}

async function eliminarLinea(tipoCfg, destinoId, lineaId){
  const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
  const pedido = CACHE_SUCURSAL[cKey];
  const backup = pedido && pedido.lineas ? pedido.lineas[lineaId] : null;
  if(pedido && pedido.lineas) delete pedido.lineas[lineaId];
  renderVistaSucursal();
  deleteJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'/lineas/'+lineaId+'.json').catch(()=>{
    if(backup && pedido && pedido.lineas) pedido.lineas[lineaId] = backup;
    alert('No se pudo eliminar la línea. Revisá la conexión e intentá de nuevo.');
    renderVistaSucursal();
  });
}

async function enviarPedido(tipoCfg, destinoId){
  if(!semanaVigenteEditable() || SEMANA_META.estado === 'cerrada'){
    alert('El plazo de carga de esta semana ya cerró. La próxima carga corresponde a la semana próxima.');
    renderVistaSucursal();
    return;
  }
  const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
  const pedido = CACHE_SUCURSAL[cKey] = CACHE_SUCURSAL[cKey] || {lineas:{}};
  const anterior = {estado:pedido.estado, enviadoAt:pedido.enviadoAt};
  const enviadoAt = Date.now();
  pedido.estado = 'enviado';
  pedido.enviadoAt = enviadoAt;
  renderVistaSucursal();
  patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'.json', {estado:'enviado', enviadoAt}).catch(()=>{
    pedido.estado = anterior.estado || 'borrador';
    pedido.enviadoAt = anterior.enviadoAt || null;
    alert('No se pudo enviar. Revisá la conexión e intentá de nuevo.');
    renderVistaSucursal();
  });
}

/* ============================================================
   IMPORTAR EXCEL — la sucursal carga todo su pedido desde un
   archivo con encabezados ORIGEN / CÓDIGO / ARTÍCULO /
   DESCRIPCIÓN en B:E. Si el archivo tiene columna RUBRO (la
   planilla descargable la trae), cada fila va a su rubro; si no
   (F8 de Producto), van a Calzado. Respeta el límite por rubro.
   ============================================================ */
function normalizarNombre(v){
  return String(v||'').normalize('NFD').replace(new RegExp('[\\u0300-\\u036f]','g'),'').trim().toLowerCase();
}
function origenIdDesdeNombre(nombre){
  const n = normalizarNombre(nombre);
  if(!n) return '';
  if(n === 'deposito') return 'deposito';
  const suc = SUCURSALES.find(s=> normalizarNombre(s.nombre) === n);
  return suc ? suc.id : '';
}
function extraerFilasF8(sheetRows){
  let headerIdx = -1, rubroCol = -1;
  for(let i=0; i<sheetRows.length; i++){
    const r = sheetRows[i] || [];
    if(normalizarNombre(r[1])==='origen' && normalizarNombre(r[2])==='codigo'){
      headerIdx = i;
      rubroCol = r.findIndex(c=> normalizarNombre(c)==='rubro');
      break;
    }
  }
  if(headerIdx === -1) return null;
  const filas = [];
  for(let i=headerIdx+1; i<sheetRows.length; i++){
    const r = sheetRows[i] || [];
    const codigo = String(r[2] ?? '').trim();
    const articulo = String(r[3] ?? '').trim();
    const descripcion = String(r[4] ?? '').trim();
    if(!codigo && !articulo && !descripcion) continue;
    const rubroTxt = rubroCol >= 0 ? normalizarNombre(r[rubroCol]) : '';
    const rubro = RUBROS.find(x=> normalizarNombre(x) === rubroTxt) || RUBROS[0];
    filas.push({origen: origenIdDesdeNombre(r[1]), codigo, articulo, descripcion, rubro});
  }
  return filas;
}
async function importarExcelF8(file, tipoCfg, destinoId){
  if(typeof XLSX === 'undefined'){ alert('No se pudo cargar la librería de Excel. Revisá la conexión.'); return; }
  if(!semanaVigenteEditable() || SEMANA_META.estado === 'cerrada'){
    alert('El plazo de carga de esta semana ya cerró.');
    renderVistaSucursal();
    return;
  }
  let filas;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const hoja = wb.Sheets[wb.SheetNames[0]];
    filas = extraerFilasF8(XLSX.utils.sheet_to_json(hoja, {header:1, defval:''}));
  }catch(e){
    alert('No se pudo leer el archivo. Verificá que sea un Excel válido.');
    return;
  }
  if(filas === null){
    alert('El archivo no tiene el formato esperado: no se encontró la fila de encabezados ORIGEN / CÓDIGO / ARTÍCULO / DESCRIPCIÓN.');
    return;
  }
  if(!filas.length){ alert('El archivo no tiene líneas para importar.'); return; }

  const cKey = cacheKey(SEMANA_SEL, tipoCfg.node, destinoId);
  const pedido = CACHE_SUCURSAL[cKey] = CACHE_SUCURSAL[cKey] || {estado:'borrador', lineas:{}};
  pedido.lineas = pedido.lineas || {};
  const limites = limitesParaSucursal(CONFIG_LIMITES, destinoId);
  // cupo disponible por rubro = límite - líneas ya cargadas
  const usadas = {}; RUBROS.forEach(r=> usadas[r] = 0);
  Object.keys(pedido.lineas).forEach(id=>{
    const r = pedido.lineas[id].rubro;
    usadas[RUBROS.includes(r) ? r : RUBROS[0]]++;
  });

  const ahora = Date.now();
  const nuevas = {};
  const importadas = {}; RUBROS.forEach(r=> importadas[r] = 0);
  let omitidas = 0, orden = 0;
  filas.forEach(f=>{
    const limite = limites[rubroKey(f.rubro)] ?? 20;
    if(usadas[f.rubro] + importadas[f.rubro] >= limite){ omitidas++; return; }
    importadas[f.rubro]++;
    nuevas[generarPushKey()] = {
      rubro: f.rubro, estado:'pendiente', creadaAt: ahora + (orden++),
      marca:'', codigo:f.codigo, articulo:f.articulo, descripcion:f.descripcion,
      comentarioSucursal:'', origen:f.origen,
    };
  });
  const total = orden;
  if(!total){
    alert('No se importó ninguna línea: los rubros del archivo ya están en su límite.');
    return;
  }

  const estadoPedido = pedido.estado === 'enviado' ? 'enviado' : 'borrador';
  pedido.estado = estadoPedido;
  Object.assign(pedido.lineas, nuevas);
  renderVistaSucursal();
  try{
    await patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'.json', {estado:estadoPedido});
    await patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+destinoId+'/lineas.json', nuevas);
    const detalle = RUBROS.filter(r=>importadas[r]).map(r=> importadas[r]+' a '+r).join(', ');
    alert('Se importaron '+total+' líneas ('+detalle+').'+
      (omitidas ? (omitidas===1? ' Se omitió 1 fila' : ' Se omitieron '+omitidas+' filas')+' por superar el límite del rubro.' : ''));
  }catch(e){
    Object.keys(nuevas).forEach(id=> delete pedido.lineas[id]);
    alert('No se pudo guardar la importación. Revisá la conexión e intentá de nuevo.');
    renderVistaSucursal();
  }
}

/* ============================================================
   VISTA PRODUCTO — Julian, Cristian Campion, Federico y Producto
   (Depósito no participa de este módulo). Ve las líneas de las
   22 sucursales para la semana seleccionada, agrupa, filtra,
   aprueba/rechaza y comenta. No tiene restricción de solo-lectura
   por semana: puede seguir resolviendo semanas pasadas.
   ============================================================ */
const VISTA_PRODUCTO_STATE = { agrupar:'sucursal', marca:'', busqueda:'' };
const debounceTimersProd = {};

function estadoBotonesHtml(linea, disabled){
  const d = disabled ? 'disabled' : '';
  return '<div class="estado-toggle">'+
    '<button class="btn-toggle btn-aprobar'+(linea.estado==='aprobado'?' active':'')+'" '+d+' data-accion="aprobado" data-id="'+linea.id+'" data-suc="'+linea.sucursalId+'" title="Aprobar">✓</button>'+
    '<button class="btn-toggle btn-rechazar'+(linea.estado==='rechazado'?' active':'')+'" '+d+' data-accion="rechazado" data-id="'+linea.id+'" data-suc="'+linea.sucursalId+'" title="Rechazar">✕</button>'+
    '</div>';
}

function headColsProducto(tipoCfg){
  return '<th>Sucursal</th><th>Rubro</th><th>'+(tipoCfg.campoDestino?'Destino sugerido':'Origen')+'</th>'+
    '<th>Marca</th><th>Código</th><th>Artículo</th><th>Descripción</th>'+
    '<th>Comentario Sucursal</th><th>Comentario Producto</th><th>Estado</th>';
}

function campoVariableTexto(linea, tipoCfg){
  if(tipoCfg.campoDestino){
    return linea.destino ? ((SUCURSAL_BY_ID[linea.destino]&&SUCURSAL_BY_ID[linea.destino].nombre)||linea.destino) : 'A definir';
  }
  if(linea.origen === 'deposito') return 'Depósito';
  return linea.origen ? ((SUCURSAL_BY_ID[linea.origen]&&SUCURSAL_BY_ID[linea.origen].nombre)||linea.origen) : '—';
}

function normalizarCodigo(v){
  return String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
}
function normalizarArticulo(v){
  return String(v||'').toUpperCase().replace(/\s+/g,' ').trim();
}
function detectarDuplicados(lineas){
  const porCodigo = {}, porArticulo = {};
  lineas.forEach(l=>{
    const codigo = normalizarCodigo(l.codigo);
    const articulo = normalizarArticulo(l.articulo);
    if(codigo){ (porCodigo[codigo] = porCodigo[codigo] || new Set()).add(l.sucursalId); }
    if(articulo){ (porArticulo[articulo] = porArticulo[articulo] || new Set()).add(l.sucursalId); }
  });
  let codigos = 0, articulos = 0;
  lineas.forEach(l=>{
    const codigo = normalizarCodigo(l.codigo);
    const articulo = normalizarArticulo(l.articulo);
    l._dupCodigoSucursales = codigo && porCodigo[codigo] && porCodigo[codigo].size > 1 ? porCodigo[codigo].size : 0;
    l._dupArticuloSucursales = articulo && porArticulo[articulo] && porArticulo[articulo].size > 1 ? porArticulo[articulo].size : 0;
    if(l._dupCodigoSucursales) codigos++;
    if(l._dupArticuloSucursales) articulos++;
  });
  return {codigos, articulos};
}

function construirFilaProductoHtml(linea, tipoCfg, semanaCerrada){
  const sucNombre = (SUCURSAL_BY_ID[linea.sucursalId]&&SUCURSAL_BY_ID[linea.sucursalId].nombre) || linea.sucursalId;
  const dupFila = linea._dupCodigoSucursales || linea._dupArticuloSucursales;
  const badgeCodigo = linea._dupCodigoSucursales ? '<span class="dup-badge">'+linea._dupCodigoSucursales+' suc.</span>' : '';
  const badgeArticulo = linea._dupArticuloSucursales ? '<span class="dup-badge">'+linea._dupArticuloSucursales+' suc.</span>' : '';
  return '<tr class="'+(dupFila?'fila-duplicada':'')+'" data-id="'+linea.id+'" data-suc="'+linea.sucursalId+'">'+
    '<td class="txt-fixed">'+esc(sucNombre)+'</td>'+
    '<td class="txt-fixed">'+esc(linea.rubro||'—')+'</td>'+
    '<td class="txt-fixed">'+esc(campoVariableTexto(linea, tipoCfg))+'</td>'+
    '<td class="txt-fixed">'+esc(linea.marca||'')+'</td>'+
    '<td class="txt-fixed '+(linea._dupCodigoSucursales?'dup-cell':'')+'">'+esc(linea.codigo||'')+badgeCodigo+'</td>'+
    '<td class="txt-fixed '+(linea._dupArticuloSucursales?'dup-cell':'')+'">'+esc(linea.articulo||'')+badgeArticulo+'</td>'+
    '<td class="txt-fixed">'+esc(linea.descripcion||'')+'</td>'+
    '<td class="txt-fixed">'+esc(linea.comentarioSucursal||'—')+'</td>'+
    '<td><input class="lf-prod" data-id="'+linea.id+'" data-suc="'+linea.sucursalId+'" value="'+esc(linea.comentarioProducto||'')+'" placeholder="Comentario"></td>'+
    '<td>'+estadoBotonesHtml(linea, semanaCerrada)+'</td>'+
  '</tr>';
}

function construirGrupoProductoHtml(nombreGrupo, lineas, tipoCfg, semanaCerrada){
  return '<div class="rubro-card">'+
    '<div class="rubro-head"><div class="t">'+esc(nombreGrupo)+'</div><div class="cnt">'+lineas.length+' líneas</div></div>'+
    '<div class="rubro-body"><table class="linea-table"><thead><tr>'+headColsProducto(tipoCfg)+'</tr></thead><tbody>'+
      lineas.map(l=>construirFilaProductoHtml(l, tipoCfg, semanaCerrada)).join('')+
    '</tbody></table></div></div>';
}

async function renderVistaProducto(){
  const tipoCfg = TIPOS[ACTIVE_TAB];
  const focoBusqueda = document.activeElement && document.activeElement.id === 'inpBusqueda';
  const cursorPos = focoBusqueda ? document.activeElement.selectionStart : null;

  await refrescarSemanaMeta();
  const semanaCerrada = SEMANA_META.estado === 'cerrada';

  let porSucursal = null;
  const pKey = cacheKey(SEMANA_SEL, tipoCfg.node);
  if(CACHE_PRODUCTO[pKey]){
    porSucursal = clonar(CACHE_PRODUCTO[pKey]);
  } else {
    try{ porSucursal = await fetchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'.json'); }catch(e){}
    CACHE_PRODUCTO[pKey] = clonar(porSucursal || {});
  }
  porSucursal = porSucursal || {};

  const lineas = [];
  Object.keys(porSucursal).forEach(sucId=>{
    const lns = (porSucursal[sucId]&&porSucursal[sucId].lineas) || {};
    Object.keys(lns).forEach(lid=> lineas.push(Object.assign({id:lid, sucursalId:sucId}, lns[lid])));
  });
  const duplicados = detectarDuplicados(lineas);

  // contadores de avance por sucursal (sobre el total, no sobre lo filtrado)
  const contadores = {};
  lineas.forEach(l=>{
    const c = contadores[l.sucursalId] = contadores[l.sucursalId] || {pendiente:0, aprobado:0, rechazado:0};
    c[l.estado||'pendiente'] = (c[l.estado||'pendiente']||0) + 1;
  });
  const chips = Object.keys(contadores).sort((a,b)=>{
    const na=(SUCURSAL_BY_ID[a]&&SUCURSAL_BY_ID[a].nombre)||a, nb=(SUCURSAL_BY_ID[b]&&SUCURSAL_BY_ID[b].nombre)||b;
    return na.localeCompare(nb);
  }).map(sucId=>{
    const c = contadores[sucId], nombre = (SUCURSAL_BY_ID[sucId]&&SUCURSAL_BY_ID[sucId].nombre)||sucId;
    return '<span class="chip-contador">'+esc(nombre)+' · <b>'+c.pendiente+'</b>P · <b>'+c.aprobado+'</b>A · <b>'+c.rechazado+'</b>R</span>';
  }).join('');
  const chipDuplicados = (duplicados.codigos || duplicados.articulos)
    ? '<span class="chip-contador chip-duplicado"><b>'+duplicados.codigos+'</b> líneas con código repetido · <b>'+duplicados.articulos+'</b> líneas con artículo repetido</span>'
    : '<span class="chip-contador">Sin códigos/artículos repetidos entre sucursales</span>';

  // marcas disponibles para el filtro
  const marcas = Array.from(new Set(lineas.map(l=>l.marca).filter(Boolean))).sort((a,b)=>a.localeCompare(b));

  // filtros
  const marcaF = VISTA_PRODUCTO_STATE.marca.toLowerCase();
  const busq = VISTA_PRODUCTO_STATE.busqueda.toLowerCase();
  const visibles = lineas.filter(l=>{
    if(marcaF && (l.marca||'').toLowerCase() !== marcaF) return false;
    if(busq && (l.codigo||'').toLowerCase().indexOf(busq)===-1 && (l.articulo||'').toLowerCase().indexOf(busq)===-1) return false;
    return true;
  });

  // agrupación
  const agrupado = {};
  visibles.forEach(l=>{
    const key = VISTA_PRODUCTO_STATE.agrupar === 'rubro'
      ? (RUBROS.includes(l.rubro) ? l.rubro : RUBROS[0])
      : ((SUCURSAL_BY_ID[l.sucursalId]&&SUCURSAL_BY_ID[l.sucursalId].nombre) || l.sucursalId);
    (agrupado[key] = agrupado[key] || []).push(l);
  });
  const gruposOrdenados = Object.keys(agrupado).sort((a,b)=>a.localeCompare(b));

  const filtros = '<div class="filtros-bar">'+
    '<div class="grp-toggle">'+
      '<button data-agrupar="sucursal" class="'+(VISTA_PRODUCTO_STATE.agrupar==='sucursal'?'active':'')+'">Por Sucursal</button>'+
      '<button data-agrupar="rubro" class="'+(VISTA_PRODUCTO_STATE.agrupar==='rubro'?'active':'')+'">Por Rubro</button>'+
    '</div>'+
    '<select id="selMarca"><option value="">Todas las marcas</option>'+
      marcas.map(m=>'<option value="'+esc(m)+'"'+(VISTA_PRODUCTO_STATE.marca===m?' selected':'')+'>'+esc(m)+'</option>').join('')+
    '</select>'+
    '<input type="text" id="inpBusqueda" placeholder="Buscar código o artículo…" value="'+esc(VISTA_PRODUCTO_STATE.busqueda)+'">'+
    '<button class="btn-masivo" id="btnAprobarVisible" '+(semanaCerrada?'disabled':'')+'>Aprobar todo lo visible</button>'+
    '<button class="btn-masivo" id="btnExportConsolidado">Exportar F8</button>'+
  '</div>';

  const cuerpo = gruposOrdenados.length
    ? gruposOrdenados.map(g=> construirGrupoProductoHtml(g, agrupado[g], tipoCfg, semanaCerrada)).join('')
    : '<div class="hint">Sin líneas que coincidan con los filtros.</div>';

  $('view-tab').innerHTML = headerHtml(tipoCfg.label, 'Semana del '+fmtFechaCorta(SEMANA_SEL)+(semanaCerrada?' · <span class="badge-estado badge-bad">Semana cerrada</span>':''))+
    ('<div class="chips-contadores">'+chipDuplicados+(chips||'<span class="hint">Sin líneas cargadas todavía.</span>')+'</div>')+
    filtros + cuerpo;

  bindVistaProductoEvents(tipoCfg, visibles, semanaCerrada);

  if(focoBusqueda){
    const el = $('inpBusqueda');
    if(el){ el.focus(); try{ el.setSelectionRange(cursorPos, cursorPos); }catch(e){} }
  }
}

function bindVistaProductoEvents(tipoCfg, visibles, semanaCerrada){
  $('view-tab').querySelectorAll('[data-agrupar]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ VISTA_PRODUCTO_STATE.agrupar = btn.dataset.agrupar; renderVistaProducto(); });
  });
  const selMarca = $('selMarca');
  if(selMarca) selMarca.addEventListener('change', (e)=>{ VISTA_PRODUCTO_STATE.marca = e.target.value; renderVistaProducto(); });
  const inpBusqueda = $('inpBusqueda');
  if(inpBusqueda) inpBusqueda.addEventListener('input', (e)=>{ VISTA_PRODUCTO_STATE.busqueda = e.target.value; renderVistaProducto(); });
  const btnMasivo = $('btnAprobarVisible');
  if(btnMasivo) btnMasivo.addEventListener('click', ()=> aprobarTodoVisible(tipoCfg, visibles));
  const btnExport = $('btnExportConsolidado');
  if(btnExport) btnExport.addEventListener('click', exportarConsolidadoSemana);

  $('view-tab').querySelectorAll('.lf-prod').forEach(el=>{
    el.addEventListener('input', ()=>{
      const lineaId = el.dataset.id, sucId = el.dataset.suc, valor = el.value;
      clearTimeout(debounceTimersProd[lineaId]);
      debounceTimersProd[lineaId] = setTimeout(()=>{
        const pKey = cacheKey(SEMANA_SEL, tipoCfg.node);
        const data = CACHE_PRODUCTO[pKey];
        if(data && data[sucId] && data[sucId].lineas && data[sucId].lineas[lineaId]){
          data[sucId].lineas[lineaId].comentarioProducto = valor;
        }
        patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+sucId+'/lineas/'+lineaId+'.json', {comentarioProducto:valor}).catch(()=>{});
      }, 1000);
    });
  });

  $('view-tab').querySelectorAll('.btn-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{

function actualizarEstadoProductoLocal(tipoCfg, sucId, lineaId, nuevoEstado){

    data[sucId].lineas[lineaId].resueltaAt = nuevoEstado==='pendiente' ? null : Date.now();

async function obtenerLineasTipo(tipoKey){

const F8_COLS = 33; // A:AG. AF es Total, AG queda como aviso de repetidos.

// se convierte una vez vía canvas al cargar la página (mismo patrón que managment/).
// El PNG que estaba embebido acá tenía el base64 truncado y colgaba writeBuffer().
let F8_LOGO_PNG = null;
(function(){
  try{
    const el = document.querySelector('.top-center img');
    if(!el || !el.src) return;
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      F8_LOGO_PNG = canvas.toDataURL('image/png');

})();
const F8_STYLE = {
  navy:'0B1527',
  red:'CC0000',
  white:'FFFFFF',
  off:'F5F7FC',
  border:'DCE3F0',
  repeat:'FFF4BF',
  repeatStrong:'F0C24B',
  text:'0B1527',

};

function cellAddr(r,c){ return XLSX.utils.encode_cell({r,c}); }
function setCell(ws, r, c, v, s){
  const a = cellAddr(r,c);
  ws[a] = ws[a] || {};
  if(v !== undefined) ws[a].v = v;
  if(s) ws[a].s = s;
}
function styleCell(ws, r, c, s){
  const a = cellAddr(r,c);
  ws[a] = ws[a] || {v:''};
  ws[a].s = s;
}
function eachCell(r1,c1,r2,c2, fn){
  for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++) fn(r,c);
}
function thinBorder(color){
  const c = {rgb: color || F8_STYLE.border};
  return {top:{style:'thin',color:c},bottom:{style:'thin',color:c},left:{style:'thin',color:c},right:{style:'thin',color:c}};
}

function filaF8(linea, tipoKey, filaExcel){
  const esMV = tipoKey === 'menos-vendidos';
  const origen = esMV ? nombreSucursal(linea.sucursalId) : nombreSucursal(linea.origen);
  const destino = esMV ? (linea.destino ? nombreSucursal(linea.destino) : 'A definir') : nombreSucursal(linea.sucursalId);
  const row = new Array(F8_COLS).fill('');
  row[1] = origen;
  row[2] = linea.codigo || '';
  row[3] = linea.articulo || '';
  row[4] = linea.descripcion || '';
  row[5] = destino;
  row[31] = {f:'SUM(H'+filaExcel+':AE'+filaExcel+')'};
  row[32] = (linea._dupCodigoSucursales || linea._dupArticuloSucursales) ? 'REPETIDO' : '';
  return row;
}

function aplicarEstilosF8(ws, lineas){
  const s = F8_STYLE;
  const base = {font:{name:'Barlow', sz:10, color:{rgb:s.text}}, alignment:{vertical:'center'}, border:thinBorder()};
  const center = Object.assign({}, base, {alignment:{horizontal:'center', vertical:'center'}});
  const brand = {font:{name:'Bebas Neue', sz:20, bold:true, color:{rgb:s.white}}, fill:{patternType:'solid', fgColor:{rgb:s.navy}}, alignment:{horizontal:'center', vertical:'center'}, border:thinBorder(s.navy)};
  const title = {font:{name:'Bebas Neue', sz:22, bold:true, color:{rgb:s.navy}}, fill:{patternType:'solid', fgColor:{rgb:s.white}}, alignment:{horizontal:'center', vertical:'center', wrapText:true}, border:{top:{style:'thick',color:{rgb:s.red}},bottom:{style:'thick',color:{rgb:s.navy}},left:{style:'thin',color:{rgb:s.border}},right:{style:'thin',color:{rgb:s.border}}}};
  const header = {font:{name:'Barlow Condensed', sz:11, bold:true, color:{rgb:s.white}}, fill:{patternType:'solid', fgColor:{rgb:s.navy}}, alignment:{horizontal:'center', vertical:'center'}, border:{bottom:{style:'medium',color:{rgb:s.red}},top:{style:'thin',color:{rgb:s.navy}},left:{style:'thin',color:{rgb:s.navy}},right:{style:'thin',color:{rgb:s.navy}}}};
  const sizeHeader = {font:{name:'Barlow Condensed', sz:10, bold:true, color:{rgb:s.navy}}, fill:{patternType:'solid', fgColor:{rgb:s.off}}, alignment:{horizontal:'center', vertical:'center'}, border:thinBorder(s.border)};
  const totalHeader = {font:{name:'Barlow Condensed', sz:11, bold:true, color:{rgb:s.white}}, fill:{patternType:'solid', fgColor:{rgb:s.red}}, alignment:{horizontal:'center', vertical:'center'}, border:thinBorder(s.red)};
  const alertHeader = {font:{name:'Barlow Condensed', sz:11, bold:true, color:{rgb:'4D3500'}}, fill:{patternType:'solid', fgColor:{rgb:s.repeatStrong}}, alignment:{horizontal:'center', vertical:'center'}, border:thinBorder(s.repeatStrong)};
  const repeatStyle = {font:{name:'Barlow', sz:10, bold:true, color:{rgb:s.text}}, fill:{patternType:'solid', fgColor:{rgb:s.repeat}}, alignment:{vertical:'center'}, border:thinBorder(s.repeatStrong)};
  const repeatCenter = Object.assign({}, repeatStyle, {alignment:{horizontal:'center', vertical:'center'}});

  eachCell(0,0,Math.max(8+lineas.length,30),F8_COLS-1,(r,c)=> styleCell(ws,r,c,base));
  eachCell(2,1,7,2,(r,c)=> styleCell(ws,r,c,brand));
  eachCell(2,3,7,5,(r,c)=> styleCell(ws,r,c,title));
  eachCell(2,6,8,30,(r,c)=> styleCell(ws,r,c,sizeHeader));
  eachCell(8,1,8,5,(r,c)=> styleCell(ws,r,c,header));
  eachCell(6,31,8,31,(r,c)=> styleCell(ws,r,c,totalHeader));
  eachCell(6,32,8,32,(r,c)=> styleCell(ws,r,c,alertHeader));
  setCell(ws,2,1,'MATEU\nSPORTS',brand);
  setCell(ws,2,3,'PEDIDOS\nSemana '+fmtFechaCorta(SEMANA_SEL),title);

  lineas.forEach((item, idx)=>{
    const r = idx + 9;
    const l = item.linea;
    const repetido = l._dupCodigoSucursales || l._dupArticuloSucursales;
    eachCell(r,1,r,F8_COLS-1,(rr,c)=> styleCell(ws,rr,c,repetido ? repeatStyle : base));
    [2,3,32].forEach(c=>{ if(repetido) styleCell(ws,r,c,c===32 ? repeatCenter : repeatStyle); });
    eachCell(r,6,r,31,(rr,c)=> styleCell(ws,rr,c,center));
  });
}

function excelBorder(color){
  const argb = 'FF'+(color || F8_STYLE.border);
  return {top:{style:'thin',color:{argb}},bottom:{style:'thin',color:{argb}},left:{style:'thin',color:{argb}},right:{style:'thin',color:{argb}}};
}

function excelFill(color){
  return {type:'pattern', pattern:'solid', fgColor:{argb:'FF'+color}};
}

function excelFont(color, bold, size, name){
  return {name:name || 'Barlow', size:size || 10, bold:!!bold, color:{argb:'FF'+color}};
}

function styleExcelRange(ws, r1, c1, r2, c2, style){
  for(let r=r1; r<=r2; r++){
    for(let c=c1; c<=c2; c++){
      const cell = ws.getCell(r,c);
      Object.assign(cell, style);
    }
  }
}

function descargarBufferXlsx(buffer, filename){
  const blob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function exportarConsolidadoSemana(){
  if(typeof ExcelJS === 'undefined' && typeof XLSX === 'undefined'){ alert('No se pudo cargar la librería de Excel. Revisá la conexión.'); return; }
  const [pedidos, menosVendidos] = await Promise.all([
    obtenerLineasTipo('pedidos'),
    obtenerLineasTipo('menos-vendidos')
  ]);
  const lineas = pedidos.filter(l=>l.estado==='aprobado').map(linea=>({tipoKey:'pedidos', linea}))
    .concat(menosVendidos.filter(l=>l.estado==='aprobado').map(linea=>({tipoKey:'menos-vendidos', linea})));
  if(!lineas.length){
    alert('No hay líneas aprobadas para exportar al formato F8.');
    return;
  }
  if(typeof ExcelJS !== 'undefined'){
    await exportarF8ExcelJS(lineas);
    return;
  }
  if(typeof XLSX === 'undefined'){ alert('No se pudo cargar la librería de Excel. Revisá la conexión.'); return; }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, crearHojaF8(lineas), 'F8');
  XLSX.writeFile(wb, 'F8 Pedidos Semanales '+fmtFechaCorta(SEMANA_SEL).replace(/\./g,'-')+'.xlsx');
}

   mensual (matriz sucursales × semanas con % cumplimiento).

const CONTROL_STATE = { vista:'semanal', mes:null, mensualTipo:'pedidos' };

function estadoSemaforo(nodo, login){
  if(nodo && nodo.estado === 'enviado') return 'enviado';
  if(nodo || login) return 'borrador';
  return 'no-ingreso';
}
function semaforoCeldaHtml(estado){
  const map = { enviado:['ok','Enviado'], borrador:['warn','Borrador'], 'no-ingreso':['neutral','No ingresó'] };
  const [tono, label] = map[estado];
  return '<span class="dot dot-'+tono+'"></span><span class="dot-label">'+label+'</span>';
}

function contarLineasPorRubro(nodo){
  const out = {}; RUBROS.forEach(r=>out[rubroKey(r)] = 0);
  const lineas = (nodo && nodo.lineas) || {};
  Object.keys(lineas).forEach(id=>{
    const r = RUBROS.includes(lineas[id].rubro) ? lineas[id].rubro : RUBROS[0];
    out[rubroKey(r)]++;
  });
  return out;
}

function totalLineasNodo(nodo){
  return Object.keys((nodo && nodo.lineas) || {}).length;
}

function tonoRanking(pos, total){
  if(total <= 1) return 'ok';
  const tercio = Math.ceil(total/3);
  if(pos < tercio) return 'ok';
  if(pos < tercio*2) return 'warn';
  return 'bad';
}

function rankBadgeHtml(pos, total){
  return '<span class="rank-badge rank-'+tonoRanking(pos,total)+'">#'+(pos+1)+'</span>';
}

function tonoUsoLineas(usadas, limite, enviado){
  if(!enviado) return 'neutral';
  if(!limite) return usadas ? 'ok' : 'neutral';
  if(usadas >= limite) return 'ok';
  if(usadas > limite/2) return 'warn';
  return 'bad';
}

function usoRubrosHtml(nodo, tipoKey, sucId){
  if(!nodo || nodo.estado !== 'enviado') return '';
  const base = tipoKey === 'pedidos' ? CONFIG_LIMITES : CONFIG_LIMITES_MV;
  const limites = tipoKey === 'pedidos' ? limitesParaSucursal(base, sucId) : base;
  const conteo = contarLineasPorRubro(nodo);
  return '<div class="uso-rubros">'+RUBROS.map(r=>{
    const k = rubroKey(r), usadas = conteo[k] || 0, limite = limites[k] ?? 0;
    return '<span class="uso-chip uso-'+tonoUsoLineas(usadas, limite, true)+'">'+esc(r)+' '+usadas+'/'+limite+'</span>';
  }).join('')+'</div>';
}

async function renderInformeSemanal(){
  let pedidosData=null, mvData=null, loginsData=null;
  try{ pedidosData = await fetchJSON(FB+'/semanas/'+SEMANA_SEL+'/pedidos.json'); }catch(e){}
  try{ mvData = await fetchJSON(FB+'/semanas/'+SEMANA_SEL+'/menosVendidos.json'); }catch(e){}
  try{ loginsData = await fetchJSON(FB+'/logins/'+SEMANA_SEL+'.json'); }catch(e){}
  pedidosData = pedidosData||{}; mvData = mvData||{}; loginsData = loginsData||{};

  let enviaronPedidos=0, enviaronMV=0;
  const filas = SUCURSALES.map(s=>{
    const p = pedidosData[s.id], mv = mvData[s.id], login = loginsData[s.id];
    if(p && p.estado==='enviado') enviaronPedidos++;
    if(mv && mv.estado==='enviado') enviaronMV++;
    const totalLineas = (p && p.estado==='enviado' ? totalLineasNodo(p) : 0) + (mv && mv.estado==='enviado' ? totalLineasNodo(mv) : 0);
    return {s, p, mv, login, totalLineas, pEstado: estadoSemaforo(p, login), mvEstado: estadoSemaforo(mv, login)};
  }).sort((a,b)=> b.totalLineas-a.totalLineas || a.s.nombre.localeCompare(b.s.nombre));

  const html = '<div class="chips-contadores">'+
      '<span class="chip-contador"><b>'+enviaronPedidos+'</b> de '+SUCURSALES.length+' enviaron Pedidos</span>'+
      '<span class="chip-contador"><b>'+enviaronMV+'</b> de '+SUCURSALES.length+' enviaron Menos Vendidos</span>'+
    '</div>'+
    '<div style="overflow-x:auto"><table class="linea-table"><thead><tr><th>Sucursal</th><th>Último login</th><th>Pedidos</th><th>Menos Vendidos</th></tr></thead><tbody>'+
      filas.map((f,idx)=>'<tr>'+
        '<td class="txt-fixed">'+rankBadgeHtml(idx, filas.length)+esc(f.s.nombre)+' <span class="chip-contador"><b>'+f.totalLineas+'</b> líneas</span></td>'+
        '<td class="txt-fixed">'+esc(f.login? fmtDateTime(f.login.ultimoLogin) : '—')+'</td>'+
        '<td>'+semaforoCeldaHtml(f.pEstado)+(f.p&&f.p.estado==='enviado'? ' <button class="btn-reabrir" data-reabrir-tipo="pedidos" data-suc="'+f.s.id+'">Reabrir</button>'+usoRubrosHtml(f.p,'pedidos',f.s.id):'')+'</td>'+
        '<td>'+semaforoCeldaHtml(f.mvEstado)+(f.mv&&f.mv.estado==='enviado'? ' <button class="btn-reabrir" data-reabrir-tipo="menos-vendidos" data-suc="'+f.s.id+'">Reabrir</button>'+usoRubrosHtml(f.mv,'menos-vendidos',f.s.id):'')+'</td>'+
      '</tr>').join('')+
    '</tbody></table></div>';

  $('controlBody').innerHTML = html;
  $('controlBody').querySelectorAll('.btn-reabrir').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const tipoCfg = TIPOS[btn.dataset.reabrirTipo];
      await patchJSON(FB+'/semanas/'+SEMANA_SEL+'/'+tipoCfg.node+'/'+btn.dataset.suc+'.json', {estado:'borrador'});
      renderInformeSemanal();
    });
  });
}

function lunesDelMes(ym){
  const [y,m] = ym.split('-').map(Number);
  const ultimoDia = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const lunes = [];
  for(let d=1; d<=ultimoDia; d++){
    if(new Date(Date.UTC(y, m-1, d)).getUTCDay() === 1) lunes.push(new Date(Date.UTC(y,m-1,d)).toISOString().slice(0,10));
  }
  return lunes;
}
function listaMesesDisponibles(){
  const [y,m] = fechaHoyAR().split('-').map(Number);
  const arr = [];
  for(let i=0;i<12;i++){
    let yy=y, mm=m-i;
    while(mm<=0){ mm+=12; yy--; }
    arr.push(yy+'-'+String(mm).padStart(2,'0'));
  }
  return arr;
}
function etiquetaMes(ym){
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [y,m] = ym.split('-').map(Number);
  return MESES[m-1]+' '+y;
}

async function renderInformeMensual(){
  if(!CONTROL_STATE.mes) CONTROL_STATE.mes = fechaHoyAR().slice(0,7);
  const meses = listaMesesDisponibles();
  const lunes = lunesDelMes(CONTROL_STATE.mes);
  const hoy = fechaHoyAR();
  const lunesHabilitados = lunes.filter(l=> l<=hoy);
  const tipoCfg = TIPOS[CONTROL_STATE.mensualTipo];

  const datosPorSemana = {};
  for(const l of lunes){
    try{ datosPorSemana[l] = await fetchJSON(FB+'/semanas/'+l+'/'+tipoCfg.node+'.json'); }catch(e){ datosPorSemana[l] = null; }
  }

  const filas = SUCURSALES.map(s=>{
    let enviadas = 0, totalLineas = 0;
    const celdas = lunes.map(l=>{
      const nodo = datosPorSemana[l] && datosPorSemana[l][s.id];
      const estado = nodo && nodo.estado==='enviado' ? 'enviado' : (nodo ? 'borrador' : 'no-ingreso');
      const lineas = estado==='enviado' ? totalLineasNodo(nodo) : 0;
      if(estado==='enviado' && l<=hoy){
        enviadas++;
        totalLineas += lineas;
      }
      return {l, estado, nodo, lineas};
    });
    const pct = lunesHabilitados.length ? Math.round(enviadas/lunesHabilitados.length*100) : 0;
    return {s, celdas, pct, totalLineas};
  }).sort((a,b)=> b.totalLineas-a.totalLineas || b.pct-a.pct || a.s.nombre.localeCompare(b.s.nombre));

  const resumen = lunes.map(l=>{
    const enviaron = SUCURSALES.filter(s=>{
      const nodo = datosPorSemana[l] && datosPorSemana[l][s.id];
      return nodo && nodo.estado==='enviado';
    }).length;
    return Math.round(enviaron/SUCURSALES.length*100);
  });

  const selectorMes = '<select id="selMes">'+meses.map(m=>'<option value="'+m+'"'+(m===CONTROL_STATE.mes?' selected':'')+'>'+etiquetaMes(m)+'</option>').join('')+'</select>';
  const toggleTipo = '<div class="grp-toggle">'+
    '<button data-mensualtipo="pedidos" class="'+(CONTROL_STATE.mensualTipo==='pedidos'?'active':'')+'">Pedidos</button>'+
    '<button data-mensualtipo="menos-vendidos" class="'+(CONTROL_STATE.mensualTipo==='menos-vendidos'?'active':'')+'">Menos Vendidos</button>'+
  '</div>';

  const headCols = '<th>Sucursal</th>'+lunes.map(l=>'<th>'+fmtFechaCorta(l)+'</th>').join('')+'<th>Total líneas</th><th>% Cumplimiento</th>';
  const filasHtml = filas.map((f,idx)=>{
    const tono = f.pct>=75?'ok':(f.pct>=50?'warn':'bad');
    return '<tr><td class="txt-fixed">'+rankBadgeHtml(idx, filas.length)+esc(f.s.nombre)+'</td>'+
      f.celdas.map(c=>'<td>'+semaforoCeldaHtml(c.estado)+(c.estado==='enviado'? usoRubrosHtml(c.nodo, CONTROL_STATE.mensualTipo, f.s.id):'')+'</td>').join('')+
      '<td><span class="badge-estado badge-'+tonoRanking(idx, filas.length)+'">'+f.totalLineas+' líneas</span></td>'+
      '<td><span class="badge-estado badge-'+tono+'">'+f.pct+'%</span></td></tr>';
  }).join('');
  const filaResumen = '<tr><td class="txt-fixed"><b>% sucursales que enviaron</b></td>'+
    resumen.map(p=>'<td class="txt-fixed">'+p+'%</td>').join('')+'<td></td><td></td></tr>';

  $('controlBody').innerHTML =
    '<div class="filtros-bar">'+selectorMes+toggleTipo+'<button class="btn-masivo" id="btnExportMensual">Exportar Excel</button></div>'+
    '<div style="overflow-x:auto"><table class="linea-table"><thead><tr>'+headCols+'</tr></thead><tbody>'+filasHtml+filaResumen+'</tbody></table></div>';

  $('selMes').addEventListener('change', (e)=>{ CONTROL_STATE.mes = e.target.value; renderInformeMensual(); });
  document.querySelectorAll('[data-mensualtipo]').forEach(b=> b.addEventListener('click', ()=>{ CONTROL_STATE.mensualTipo = b.dataset.mensualtipo; renderInformeMensual(); }));
  $('btnExportMensual').addEventListener('click', ()=> exportarInformeMensual(lunes, filas, tipoCfg));
}

function exportarInformeMensual(lunes, filas, tipoCfg){
  if(typeof XLSX === 'undefined'){ alert('No se pudo cargar la librería de Excel. Revisá la conexión.'); return; }
  const header = ['Ranking', 'Sucursal', ...lunes.map(l=>'Semana '+fmtFechaCorta(l)), 'Total líneas', '% Cumplimiento'];
  const rows = filas.map((f,idx)=> ['#'+(idx+1), f.s.nombre, ...f.celdas.map(c=> c.estado==='enviado' ? ('Enviado - '+c.lineas+' líneas') : (c.estado==='borrador'?'Borrador':'No ingresó')), f.totalLineas, f.pct+'%']);
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Informe mensual');
  XLSX.writeFile(wb, 'informe-mensual-'+CONTROL_STATE.mes+'-'+tipoCfg.node+'.xlsx');
}

/* ============================================================
   POLLING — refresca semáforos/comentarios sin pisar lo que
   se esté escribiendo en ese momento (sucursal o Producto).
   ============================================================ */
function iniciarPolling(){
  if(POLL_TIMER) clearInterval(POLL_TIMER);
  POLL_TIMER = setInterval(()=>{
    if(!fbConfigurado() || !SESSION) return;
    if(ACTIVE_TAB !== 'pedidos' && ACTIVE_TAB !== 'menos-vendidos') return;
    const af = document.activeElement;
    if(af && $('view-tab').contains(af)) return;
    const tipoCfg = TIPOS[ACTIVE_TAB];
    if(SESSION.rol === 'admin'){
      delete CACHE_PRODUCTO[cacheKey(SEMANA_SEL, tipoCfg.node)];
    } else {
      const destinoId = miDestinoId(SESSION);
      delete CACHE_SUCURSAL[cacheKey(SEMANA_SEL, tipoCfg.node, destinoId)];
    }
    delete META_CACHE[SEMANA_SEL];
    renderTabContent();
  }, POLL_MS);
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(session){
  SESSION = session;
  $('whoName').textContent = session.email;
  $('whoRole').textContent = ROLE_LABEL[session.rol] || session.rol;

  const destinoId = miDestinoId(session);
  if(session.rol !== 'admin'){
    const suc = SUCURSAL_BY_ID[destinoId];
    $('hdrTitle').textContent = suc ? suc.nombre : 'Pedidos Semanales';
  } else {
    $('hdrTitle').textContent = 'Pedidos Semanales';
  }

  renderNav(session);

  if(!fbConfigurado()){
    await renderTabContent();
    return;
  }

  LUNES_ACTIVO = lunesDeSemanaActiva();
  await asegurarSemana(LUNES_ACTIVO);
  await cargarConfig();
  await cargarAsignacionMarcas();

  if(session.rol !== 'admin' && destinoId){
    patchJSON(FB+'/logins/'+LUNES_ACTIVO+'/'+destinoId+'.json', {ultimoLogin: Date.now(), email: session.email}).catch(()=>{});
  }

  let semanas = await listaSemanas();
  if(!semanas.includes(LUNES_ACTIVO)) semanas = [LUNES_ACTIVO, ...semanas];
  SEMANA_SEL = LUNES_ACTIVO;

  $('semanaSelector').innerHTML = semanas.map(s=>
    '<option value="'+s+'"'+(s===LUNES_ACTIVO?' selected':'')+'>Semana del '+fmtFechaCorta(s)+(s===LUNES_ACTIVO?' (activa)':'')+'</option>'
  ).join('');
  $('semanaSelector').addEventListener('change', async (e)=>{
    SEMANA_SEL = e.target.value;
    await asegurarSemana(SEMANA_SEL);
    await renderTabContent();
  });

  await renderTabContent();
  iniciarPolling();
}

  const s = readSession();
  if(!s || !(s.herramientas||[]).includes('pedidos-semanales')){ location.href='../'; return; }
  boot(s);
})();
