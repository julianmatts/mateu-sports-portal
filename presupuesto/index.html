<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto de Compras — Mateu Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#ffffff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#ffffff;--border:#dce3f0;
  --ok:#2e7d32;--warn:#b36200;--bad:#8b0000;--amber:#b36200;--green:#2e7d32;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --radius:10px;--shadow:0 1px 4px rgba(11,21,39,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-b);background:var(--off);color:var(--navy);min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}

/* ===== SHELL / HEADER navy ===== */
.top{background:var(--navy);padding:14px 28px;display:flex;align-items:center;
  border-bottom:3px solid var(--red);flex-wrap:wrap;gap:10px}
.top-left{flex:1;display:flex;align-items:center;min-width:0}
.top-title{line-height:1.05}
.top-title .n{font-family:var(--font-d);font-size:20px;letter-spacing:1px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-title .s{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted-light)}
.top-center{flex:0 0 auto;display:flex;align-items:center}
.top-center img{height:32px;filter:brightness(0) invert(1)}
.top-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:14px}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:14px;font-weight:600;color:#fff}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--red-soft)}
.logout{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;transition:all .15s}
.logout:hover{color:#fff;border-color:#fff}

/* ===== Tabs (Cargar / Visualizar) ===== */
.main-tabs{background:var(--navy-soft);padding:0 28px;display:flex;justify-content:center;gap:2px}
.main-tabs .tab{font-family:var(--font-c);font-size:13.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:13px 22px;border:none;background:transparent;color:rgba(255,255,255,.55);border-bottom:3px solid transparent;
  transition:all .15s}
.main-tabs .tab:hover{color:#fff}
.main-tabs .tab.active{color:#fff;border-bottom-color:var(--red)}

/* ===== Layout ===== */
.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 70px}
.view{display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== Hero (título por vista, navy) ===== */
.hero{background:radial-gradient(120% 160% at 50% 0%,#1a2f55 0%,#0B1527 65%);border-radius:14px;
  padding:22px 26px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero .eyebrow{font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red-soft)}
.hero h1{font-family:var(--font-d);font-size:34px;letter-spacing:1px;color:#fff;line-height:1;margin-top:4px}
.hero-per{display:flex;align-items:center;gap:10px}

/* ===== Card / form ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.form-grid{display:grid;grid-template-columns:1.4fr 1fr 1.2fr .8fr .9fr .9fr auto;gap:12px;align-items:end}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
input,select{font-size:15px;color:var(--navy);background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;width:100%;transition:border .15s}
input:focus,select:focus{outline:none;border-color:var(--navy-mid)}
input::placeholder{color:#aab4c8}

.btn{border:none;border-radius:8px;padding:10px 18px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:8px}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#a00000}
.btn-ghost{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--navy-mid)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:22px 0 14px}
.toolbar .spacer{flex:1}
.filter-sel{min-width:150px;width:auto}
.hero-per .filter-sel,.hero-per select{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.28);color:#fff}
.hero-per select option{color:var(--navy)}

/* ===== Table ===== */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;min-width:820px}
thead th{font-family:var(--font-c);font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;
  text-align:left;padding:13px 14px;background:#f0f3fa;border-bottom:1px solid var(--border)}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:14.5px;color:var(--navy)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f7f9fd}
.chip-exec{font-weight:700}
.row-act{color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--font-c);
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 9px;border-radius:6px}
.row-act:hover{color:var(--red);background:#fff0f0}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty b{font-family:var(--font-d);font-size:22px;letter-spacing:1px;display:block;margin-bottom:6px;color:var(--navy)}

/* Edición inline */
.cell-in{font-family:var(--font-b);font-size:14.5px;color:var(--navy);
  background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 7px;width:100%;transition:.12s}
.cell-in:hover{border-color:var(--border);background:#f7f9fd}
.cell-in:focus{outline:none;border-color:var(--navy-mid);background:#fff}
.cell-in.num{text-align:right;font-variant-numeric:tabular-nums}
td.edit{padding:5px 8px}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;
  position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
.kpi.k-green::after{background:var(--green)}
.kpi.k-amber::after{background:var(--amber)}
.kpi .lab{font-family:var(--font-c);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi .val{font-family:var(--font-d);font-size:32px;letter-spacing:1px;line-height:1.05;margin-top:6px;color:var(--navy)}
.kpi .val.small{font-size:26px}
.kpi .foot{font-size:12.5px;color:var(--muted);margin-top:3px}
.kpi .foot.pos{color:var(--green)}
.kpi .foot.neg{color:var(--amber)}

/* ===== Desglose (barras) ===== */
.grp-head{display:flex;align-items:center;gap:14px;margin:6px 0 16px;flex-wrap:wrap}
.grp-head h2{font-family:var(--font-d);font-size:24px;letter-spacing:1px;color:var(--navy);font-weight:400}
.seg{display:flex;gap:3px;background:#eef1f8;padding:3px;border-radius:8px;border:1px solid var(--border)}
.seg button{font-family:var(--font-c);font-size:12.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--muted);background:none;border:none;padding:6px 14px;border-radius:6px}
.seg button.active{background:var(--red);color:#fff}
.legend{display:flex;gap:16px;font-size:12.5px;color:var(--muted);margin-left:auto}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.legend .lp{background:var(--muted-light)}
.legend .le{background:var(--red)}

.bars{display:flex;flex-direction:column;gap:14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.brow{display:grid;grid-template-columns:180px 1fr;gap:16px;align-items:center}
.brow .name{font-size:15px;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brow .name small{display:block;font-family:var(--font-c);font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.track{display:flex;flex-direction:column;gap:5px}
.bar-line{display:flex;align-items:center;gap:10px}
.bar-line .cap{font-family:var(--font-c);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);width:42px;flex-shrink:0;font-weight:700}
.bar-bg{flex:1;height:15px;background:#eef1f8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.bar-fill.pres{background:var(--muted-light)}
.bar-fill.exec{background:var(--red)}
.bar-fill.over{background:repeating-linear-gradient(45deg,var(--red),var(--red) 7px,#ff5a50 7px,#ff5a50 14px)}
.bar-amt{font-size:13.5px;font-variant-numeric:tabular-nums;width:112px;text-align:right;flex-shrink:0;color:var(--muted)}
.brow .pct{font-size:12.5px;margin-top:4px;color:var(--muted)}
.brow .pct b{font-weight:700}
.pct .ok{color:var(--green)}.pct .warn{color:var(--amber)}.pct .over{color:var(--red)}

/* ===== Alertas de desvío ===== */
.alerts{margin-bottom:26px}
.alerts-head{font-family:var(--font-d);font-size:20px;letter-spacing:1px;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alerts-head .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(204,0,0,.15)}
.alert-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:#fff;
  border:1px solid var(--border);border-left:4px solid var(--red);border-radius:8px;margin-bottom:8px;box-shadow:var(--shadow)}
.alert-row .who2{font-weight:600;font-size:15px;flex:1;overflow:hidden;color:var(--navy)}
.alert-row .who2 small{display:block;font-family:var(--font-c);color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px}
.alert-row .over{font-family:var(--font-d);font-size:22px;color:var(--red);letter-spacing:.5px;white-space:nowrap}
.alert-row .opct{font-size:13px;color:var(--muted);width:56px;text-align:right;font-variant-numeric:tabular-nums}
.all-ok{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;
  border:1px solid var(--border);border-left:4px solid var(--green);border-radius:8px;color:var(--muted);box-shadow:var(--shadow)}
.all-ok .ico{color:var(--green);font-size:18px;font-weight:700}
.all-ok b{color:var(--green)}

/* ===== Tendencia ===== */
.trend-sec{margin-top:40px}
.trend-cols{display:flex;align-items:flex-end;gap:20px;height:230px;padding:18px 6px 0;
  border-bottom:1px solid var(--border);overflow-x:auto;background:#fff;border-radius:var(--radius) var(--radius) 0 0;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.tcol{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:60px;flex:1;height:100%;justify-content:flex-end}
.tcol .pair{display:flex;align-items:flex-end;gap:5px;flex:1;width:100%;justify-content:center;min-height:0}
.tcol .cb{width:22px;border-radius:4px 4px 0 0;height:0;transition:height 1s cubic-bezier(.2,.8,.2,1)}
.tcol .cb.p{background:var(--muted-light)}
.tcol .cb.e{background:var(--red)}
.tcol .pv{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.tcol .plab{font-family:var(--font-c);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:600}

@media(max-width:920px){
  .form-grid{grid-template-columns:1fr 1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .brow{grid-template-columns:1fr}
  .brow .name{white-space:normal}
}
@media(max-width:560px){
  .kpis{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .hero h1{font-size:26px}
  .top{padding:12px 16px}
  .main-tabs,.wrap{padding-left:16px;padding-right:16px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

<script>
/* ─────────────────────────────────────────────────────────────
   SESIÓN — la maneja el Portal (mateu_portal_session). Igual que
   el resto de los módulos: sin login propio; si no hay sesión o el
   usuario no tiene la herramienta, vuelve al Portal.
   ───────────────────────────────────────────────────────────── */
const SESSION_KEY = 'mateu_portal_session';
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s? JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){ window.__sess=null; } }
function logout(){ clearSession(); location.href='../'; }
const ROLE_LABEL = { admin:'Administrador', supervisor:'Supervisor', sucursal:'Sucursal', outlet:'Outlet' };

/* ─────────────────────────────────────────────────────────────
   CAPA DE PERSISTENCIA  (Firebase Realtime Database vía REST)
   Igual que el resto de los módulos: los datos viven en Firebase.
   FIREBASE_URL apunta a la base presupuesto-mateu (reglas abiertas).
   Si se cae la red, cae a localStorage y la UI sigue andando. El
   resto del código solo usa Store.load()/save().
   ───────────────────────────────────────────────────────────── */
const FIREBASE_URL = 'https://presupuesto-mateu-default-rtdb.firebaseio.com'; // base presupuesto-mateu
const FB_PATH = '/presupuesto.json';
const KEY = 'mateu:presupuesto:compras:v1'; // copia/fallback local

const localStore = {
  get(){ try{ const s = localStorage.getItem(KEY); return s ? JSON.parse(s) : null; }catch(e){ return null; } },
  set(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(e){ /* sin storage: se ignora */ } }
};

const Store = {
  async load(){
    if(!FIREBASE_URL) return localStore.get() || [];
    try{
      const r = await fetch(FIREBASE_URL + FB_PATH);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      const arr = Array.isArray(data) ? data : [];
      localStore.set(arr);
      return arr;
    }catch(e){
      console.error('Presupuesto: no se pudo leer de Firebase, uso copia local:', e);
      return localStore.get() || [];
    }
  },
  async save(lineas){
    localStore.set(lineas);
    if(!FIREBASE_URL) return;
    try{
      const r = await fetch(FIREBASE_URL + FB_PATH, {
        method:'PUT',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify(lineas)
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
    }catch(e){
      console.error('Presupuesto: no se pudo guardar en Firebase (queda en copia local):', e);
    }
  }
};

/* ── Estado ── */
let lineas = [];
let groupBy = 'proveedor';

/* ── Utils ── */
const ars = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const perLabel = p => {
  if(!p) return '—';
  const [y,m] = p.split('-');
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${meses[(+m)-1]||''} ${y}`;
};
const $ = id => document.getElementById(id);

/* ── Alta ── */
async function agregar(){
  const prov=$('f-prov').value.trim(), rubro=$('f-rubro').value.trim(),
        cat=$('f-cat').value.trim(), per=$('f-per').value,
        pres=+$('f-pres').value||0, exec=+$('f-exec').value||0;
  if(!prov){ $('f-prov').focus(); return; }
  const limpiar=()=>{ ['f-prov','f-cat','f-pres','f-exec'].forEach(i=>$(i).value=''); $('f-prov').focus(); };
  const dup = lineas.find(l =>
    l.proveedor.toLowerCase()===prov.toLowerCase() &&
    (l.rubro||'—')===(rubro||'—') && (l.categoria||'—')===(cat||'—') && l.periodo===per);
  if(dup){
    const ok = confirm(`Ya existe una línea para "${prov}" · ${rubro||'—'} · ${cat||'—'} en ${perLabel(per)}.\n\nAceptar: sumar estos montos a la línea existente.\nCancelar: no agregar nada.`);
    if(ok){ dup.presupuestado+=pres; dup.ejecutado+=exec; await Store.save(lineas); limpiar(); renderAll(); }
    return;
  }
  lineas.push({id:uid(),proveedor:prov,rubro:rubro||'—',categoria:cat||'—',periodo:per,presupuestado:pres,ejecutado:exec});
  await Store.save(lineas);
  limpiar();
  renderAll();
}

async function eliminar(id){
  lineas = lineas.filter(l=>l.id!==id);
  await Store.save(lineas);
  renderAll();
}

async function editarCampo(id, campo, valor){
  const l = lineas.find(x=>x.id===id); if(!l) return;
  l[campo] = (campo==='presupuestado'||campo==='ejecutado') ? (+valor||0) : valor;
  await Store.save(lineas);
  renderAll();
}

/* ── Filtros de tabla ── */
function lineasFiltradas(){
  const fp=$('flt-per').value, fpr=$('flt-prov').value;
  return lineas.filter(l=>(!fp||l.periodo===fp)&&(!fpr||l.proveedor===fpr));
}

/* ── Render tabla ── */
function renderTabla(){
  const tb=$('tbody'); const rows=lineasFiltradas();
  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="9" class="empty"><b>Sin líneas cargadas</b>Agregá una línea arriba o cargá datos de ejemplo para empezar.</td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(l=>{
    const saldo=l.presupuestado-l.ejecutado;
    const pct = l.presupuestado? l.ejecutado/l.presupuestado : 0;
    const col = pct>1?'var(--red)':pct>=.9?'var(--amber)':'var(--green)';
    return `<tr data-id="${l.id}">
      <td class="edit"><input class="cell-in" data-c="proveedor" value="${esc(l.proveedor)}"></td>
      <td class="edit"><input class="cell-in" data-c="rubro" value="${esc(l.rubro)}" list="dl-rubro"></td>
      <td class="edit"><input class="cell-in" data-c="categoria" value="${esc(l.categoria)}" list="dl-cat"></td>
      <td class="edit"><input class="cell-in" type="month" data-c="periodo" value="${l.periodo||''}"></td>
      <td class="edit num"><input class="cell-in num" type="number" data-c="presupuestado" value="${l.presupuestado}"></td>
      <td class="edit num"><input class="cell-in num" type="number" data-c="ejecutado" value="${l.ejecutado}"></td>
      <td class="num" style="color:${saldo<0?'var(--red)':'var(--green)'}">${ars(saldo)}</td>
      <td class="num chip-exec" style="color:${col}">${(pct*100).toFixed(0)}%</td>
      <td class="num"><button class="row-act" data-del="${l.id}">Borrar</button></td>
    </tr>`;
  }).join('');
}
const esc = s => (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── Selects de filtro + datalists ── */
function renderSelectores(){
  const pers=[...new Set(lineas.map(l=>l.periodo).filter(Boolean))].sort().reverse();
  const provs=[...new Set(lineas.map(l=>l.proveedor))].sort();
  const rubros=[...new Set(lineas.map(l=>l.rubro).filter(r=>r&&r!=='—'))].sort();
  const cats=[...new Set(lineas.map(l=>l.categoria).filter(c=>c&&c!=='—'))].sort();

  fillSel('flt-per', pers.map(p=>[p,perLabel(p)]), 'Todos los períodos');
  fillSel('vis-per', pers.map(p=>[p,perLabel(p)]), 'Todos los períodos');
  fillSel('flt-prov', provs.map(p=>[p,p]), 'Todos los proveedores');
  fillSel('trend-prov', provs.map(p=>[p,p]), 'Todos los proveedores');
  $('dl-rubro').innerHTML = rubros.map(r=>`<option value="${esc(r)}">`).join('');
  $('dl-cat').innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');
}
function fillSel(id, pairs, allLabel){
  const el=$(id); const cur=el.value;
  el.innerHTML=`<option value="">${allLabel}</option>`+pairs.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join('');
  if([...el.options].some(o=>o.value===cur)) el.value=cur;
}

/* ── Visualizar ── */
function datosVis(){
  const fp=$('vis-per').value;
  return lineas.filter(l=>!fp||l.periodo===fp);
}
function renderKPIs(){
  const d=datosVis();
  const pres=d.reduce((s,l)=>s+l.presupuestado,0);
  const exec=d.reduce((s,l)=>s+l.ejecutado,0);
  const saldo=pres-exec;
  const pct=pres?exec/pres*100:0;
  const saldoClass = saldo<0?'k-amber':'k-green';
  $('kpis').innerHTML=`
    <div class="kpi"><div class="lab">Presupuestado</div><div class="val">${ars(pres)}</div><div class="foot">${d.length} línea${d.length!==1?'s':''}</div></div>
    <div class="kpi"><div class="lab">Ejecutado</div><div class="val">${ars(exec)}</div><div class="foot">${pct.toFixed(0)}% del presupuesto</div></div>
    <div class="kpi ${pct>100?'k-amber':''}"><div class="lab">% Ejecución</div><div class="val">${pct.toFixed(0)}%</div><div class="foot ${pct>100?'neg':'pos'}">${pct>100?'Sobre-ejecutado':'En rango'}</div></div>
    <div class="kpi ${saldoClass}"><div class="lab">Saldo disponible</div><div class="val ${Math.abs(saldo)>=1e9?'small':''}">${ars(saldo)}</div><div class="foot ${saldo<0?'neg':'pos'}">${saldo<0?'Excedido':'Disponible'}</div></div>`;
}
function renderBars(){
  const d=datosVis();
  const map={};
  d.forEach(l=>{
    const k=l[groupBy]||'—';
    if(!map[k]) map[k]={pres:0,exec:0};
    map[k].pres+=l.presupuestado; map[k].exec+=l.ejecutado;
  });
  const grupos=Object.entries(map).sort((a,b)=>b[1].pres-a[1].pres);
  const max=Math.max(1,...grupos.map(g=>Math.max(g[1].pres,g[1].exec)));
  if(!grupos.length){
    $('bars').innerHTML=`<div class="empty"><b>Nada para mostrar</b>Cargá líneas de presupuesto para ver el desglose.</div>`;
    return;
  }
  $('bars').innerHTML=grupos.map(([name,v])=>{
    const pct=v.pres?v.exec/v.pres:0;
    const over=pct>1;
    const cls=over?'over':pct>=.9?'warn':'ok';
    const saldo=v.pres-v.exec;
    return `<div class="brow">
      <div class="name">${esc(name)}<small>${groupBy}</small></div>
      <div>
        <div class="track">
          <div class="bar-line"><span class="cap">Ppto</span><div class="bar-bg"><div class="bar-fill pres" data-w="${v.pres/max*100}"></div></div><span class="bar-amt">${ars(v.pres)}</span></div>
          <div class="bar-line"><span class="cap">Ejec</span><div class="bar-bg"><div class="bar-fill ${over?'over':'exec'}" data-w="${Math.min(v.exec,max)/max*100}"></div></div><span class="bar-amt">${ars(v.exec)}</span></div>
        </div>
        <div class="pct"><b class="${cls}">${(pct*100).toFixed(0)}% ejecutado</b> · saldo <b style="color:${saldo<0?'var(--red)':'var(--green)'}">${ars(saldo)}</b></div>
      </div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+'%'));
}

/* ── Ranking de desvíos ── */
function renderAlertas(){
  const d=datosVis();
  const desvios=d.filter(l=>l.ejecutado>l.presupuestado)
    .map(l=>({...l,over:l.ejecutado-l.presupuestado,pct:l.presupuestado?l.ejecutado/l.presupuestado:Infinity}))
    .sort((a,b)=>b.over-a.over);
  const el=$('alerts');
  if(!desvios.length){
    el.innerHTML=`<div class="all-ok"><span class="ico">✓</span><span><b>Todo dentro del presupuesto.</b> Ninguna línea del período supera lo asignado.</span></div>`;
    return;
  }
  const tot=desvios.reduce((s,l)=>s+l.over,0);
  el.innerHTML=`<div class="alerts-head"><span class="dot"></span>Desvíos · ${desvios.length} línea${desvios.length!==1?'s':''} sobre presupuesto · +${ars(tot)}</div>`+
    desvios.slice(0,6).map(l=>`<div class="alert-row">
      <div class="who2">${esc(l.proveedor)}<small>${esc(l.rubro)} · ${esc(l.categoria)} · ${perLabel(l.periodo)}</small></div>
      <div class="opct">${(l.pct*100).toFixed(0)}%</div>
      <div class="over">+${ars(l.over)}</div>
    </div>`).join('');
}

/* ── Tendencia por período ── */
function renderTendencia(){
  const prov=$('trend-prov').value;
  const base=lineas.filter(l=>(!prov||l.proveedor===prov)&&l.periodo);
  const map={};
  base.forEach(l=>{ if(!map[l.periodo])map[l.periodo]={pres:0,exec:0}; map[l.periodo].pres+=l.presupuestado; map[l.periodo].exec+=l.ejecutado; });
  const pers=Object.keys(map).sort();
  const el=$('trend');
  if(!pers.length){
    el.innerHTML=`<div class="empty" style="margin:auto"><b>Sin datos de tendencia</b>Cargá líneas con período para ver la evolución mes a mes.</div>`;
    return;
  }
  const max=Math.max(1,...pers.map(p=>Math.max(map[p].pres,map[p].exec)));
  el.innerHTML=pers.map(p=>{
    const v=map[p]; const pct=v.pres?v.exec/v.pres*100:0;
    return `<div class="tcol">
      <div class="pair">
        <div class="cb p" data-h="${v.pres/max*100}" title="Presupuestado ${ars(v.pres)}"></div>
        <div class="cb e" data-h="${v.exec/max*100}" title="Ejecutado ${ars(v.exec)}"></div>
      </div>
      <div class="pv">${pct.toFixed(0)}%</div>
      <div class="plab">${perLabel(p)}</div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>el.querySelectorAll('.cb').forEach(b=>b.style.height=b.dataset.h+'%'));
}

/* ── Orquestador ── */
function renderAll(){
  renderSelectores();
  renderTabla();
  renderKPIs();
  renderBars();
  renderAlertas();
  renderTendencia();
}

/* ── Datos de ejemplo ── */

/* ── Export / Import ── */
function exportar(){
  const blob=new Blob([JSON.stringify(lineas,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`presupuesto-compras-mateu-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}
function importar(file){
  const rd=new FileReader();
  rd.onload=async()=>{
    try{
      const data=JSON.parse(rd.result);
      if(!Array.isArray(data)) throw 0;
      lineas=data.map(l=>({id:l.id||uid(),proveedor:l.proveedor||'—',rubro:l.rubro||'—',
        categoria:l.categoria||'—',periodo:l.periodo||'',presupuestado:+l.presupuestado||0,ejecutado:+l.ejecutado||0}));
      await Store.save(lineas); renderAll();
    }catch(e){ alert('El archivo no tiene un formato válido.'); }
  };
  rd.readAsText(file);
}

/* ── Eventos ── */
$('btn-add').onclick=agregar;
document.querySelectorAll('.form-grid input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')agregar();}));
$('tbody').addEventListener('click',e=>{const id=e.target.dataset.del; if(id&&confirm('¿Borrar esta línea?')) eliminar(id);});
$('tbody').addEventListener('change',e=>{const inp=e.target;const tr=inp.closest('tr');if(tr&&inp.dataset.c) editarCampo(tr.dataset.id,inp.dataset.c,inp.value);});
$('flt-per').onchange=renderTabla;
$('flt-prov').onchange=renderTabla;
$('vis-per').onchange=()=>{renderKPIs();renderBars();renderAlertas();};
$('trend-prov').onchange=renderTendencia;
$('btn-demo').onclick=()=>{ if(!lineas.length||confirm('Esto reemplaza los datos actuales por el ejemplo. ¿Seguir?')) cargarDemo(); };
$('btn-clear').onclick=async()=>{ if(confirm('¿Vaciar todas las líneas? No se puede deshacer.')){ lineas=[]; await Store.save(lineas); renderAll(); }};
$('btn-export').onclick=exportar;
$('imp').onchange=e=>{ if(e.target.files[0]) importar(e.target.files[0]); e.target.value=''; };

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  t.classList.add('active');
  $('view-'+t.dataset.view).classList.add('active');
  if(t.dataset.view==='visualizar'){renderKPIs();renderBars();renderAlertas();renderTendencia();}
});
$('seg-group').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  $('seg-group').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); groupBy=b.dataset.g; renderBars();
});

/* ── Init (con guard de sesión del Portal) ── */
(async()=>{
  const s = readSession();
  if(!s || !(s.herramientas||[]).includes('presupuesto')){ location.href='../'; return; }
  $('whoName').textContent = s.email;
  $('whoRole').textContent = ROLE_LABEL[s.rol]||s.rol;
  $('logoutBtn').onclick = logout;
  $('f-per').value = new Date().toISOString().slice(0,7);
  lineas = await Store.load();
  renderAll();
})();
</script>
