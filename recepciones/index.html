<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Recepciones — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1527;        /* fondo */
  --panel:#13203a;       /* paneles un tono más claro */
  --panel-2:#1a2b4a;     /* hover / filas alternas */
  --line:#26365b;        /* bordes */
  --white:#F5F7FA;       /* texto */
  --red:#E11D2A;         /* acento */
  --red-dark:#b3111d;
  --muted:#8A97AD;       /* labels apagados */
  --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --exc:#7c3aed;
  --font-d:'Bebas Neue',sans-serif;
  --font-c:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--navy);color:var(--white);font-family:var(--font-c);min-height:100vh;font-size:15px}
a{color:inherit}

/* ===== HEADER ===== */
.top{background:#081020;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--red);position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:10px}
.top a.logo{display:flex;align-items:center;gap:11px;text-decoration:none;min-width:0}
.top img{height:30px;filter:brightness(0) invert(1)}
.top .tt{font-family:var(--font-d);font-size:20px;letter-spacing:1.5px;line-height:1}
.top .ts{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.top-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:13px;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--red)}
.salir{background:transparent;border:1px solid rgba(255,255,255,.22);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;cursor:pointer}
.salir:hover{color:#fff;border-color:#fff}

/* ===== TABS ===== */
.tabs{background:#0e1a30;border-bottom:1px solid var(--line);padding:0 16px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:54px;z-index:30}
.tab{padding:12px 16px;border:0;background:none;cursor:pointer;font-family:var(--font-c);font-size:15px;font-weight:600;
  letter-spacing:.5px;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:var(--white);border-bottom-color:var(--red)}
.tab:hover{color:var(--white)}
.tab:focus-visible{outline:2px solid var(--red);outline-offset:-2px}

/* ===== FILTROS ===== */
.filtros{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;position:sticky;top:99px;z-index:20}
.fgrp{display:flex;flex-direction:column;gap:4px;min-width:120px}
.fgrp label{font-family:var(--font-c);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}

main{max-width:1240px;margin:0 auto;padding:18px 16px 80px}

/* ===== CONTROLES ===== */
.sel,.inp{padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;color:var(--white);
  background:#0e1a30;font-family:var(--font-b)}
.sel:focus,.inp:focus{outline:none;border-color:var(--red)}
.btn{border:none;border-radius:7px;padding:9px 15px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s,border-color .15s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--white)}.btn-ghost:hover{border-color:var(--muted)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:focus-visible,.sel:focus-visible,.inp:focus-visible{outline:2px solid var(--red);outline-offset:2px}

/* ===== PANELES / CARDS ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.card-h{font-family:var(--font-d);font-size:19px;letter-spacing:1px;margin-bottom:2px}
.card-hs{font-family:var(--font-c);font-size:12px;color:var(--muted);margin-bottom:12px}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.sec-head h1{font-family:var(--font-d);font-size:30px;letter-spacing:1px;line-height:1}
.sec-head .sub{font-family:var(--font-c);font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.kpi .k{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.kpi .v{font-family:var(--font-d);font-size:34px;letter-spacing:.5px;margin-top:4px;line-height:1}
.kpi .v small{font-size:15px;color:var(--muted);font-family:var(--font-c);letter-spacing:0}

/* ===== BARRAS ===== */
.barlist{display:flex;flex-direction:column;gap:9px}
.barrow{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center;font-family:var(--font-c);font-size:13.5px}
.barrow .lb{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{height:10px;border-radius:5px;background:#0e1a30;overflow:hidden}
.bar>span{display:block;height:100%;background:var(--red);border-radius:5px}
.barrow .vv{font-family:var(--font-d);font-size:16px;letter-spacing:.5px;text-align:right;min-width:48px}

/* ===== TABLAS ===== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
th{background:#0e1a30;font-family:var(--font-c);font-weight:700;letter-spacing:.5px;padding:10px 11px;text-align:left;
  white-space:nowrap;position:sticky;top:0;color:var(--white);border-bottom:1px solid var(--line)}
th.num,td.num{text-align:right}
td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--panel-2)}
.mono{font-family:var(--font-b);font-variant-numeric:tabular-nums}
.big{font-family:var(--font-d);font-size:16px;letter-spacing:.5px}

/* ===== BADGES / ESTADOS ===== */
.badge{display:inline-block;font-family:var(--font-c);font-weight:700;font-size:11px;letter-spacing:.8px;
  text-transform:uppercase;padding:3px 9px;border-radius:20px}
.b-pendiente{background:#3a2130;color:#ff9db0}
.b-parcial{background:#3a3021;color:#ffcf8a}
.b-completo{background:#1e3a2a;color:#7ee0a5}
.b-excedido{background:#2e2140;color:#c9a8ff}
.chip{display:inline-block;background:#0e1a30;border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--muted);margin:0 3px 3px 0}

/* mini barra de avance en control */
.prog{height:8px;border-radius:4px;background:#0e1a30;overflow:hidden;min-width:90px}
.prog>span{display:block;height:100%;border-radius:4px;background:var(--ok)}
.prog.p-parcial>span{background:var(--warn)}
.prog.p-pendiente>span{background:var(--muted)}
.prog.p-excedido>span{background:var(--exc)}

/* ===== ESTADOS carga/vacío/error ===== */
.state{text-align:center;padding:44px 20px;color:var(--muted);font-family:var(--font-c)}
.state .big-ic{font-size:34px;margin-bottom:8px}
.state.err{color:#ff9db0}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spinner{animation:none}*{transition:none!important}}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(4,9,18,.72);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:24px 14px;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:820px;width:100%;padding:20px;margin:auto}
.modal h2{font-family:var(--font-d);font-size:24px;letter-spacing:1px;margin-bottom:2px}
.modal .msub{font-family:var(--font-c);font-size:12.5px;color:var(--muted);margin-bottom:14px}
.modal .close{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.field{margin-bottom:12px}
.field label{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field .inp,.field .sel{width:100%}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
textarea.code{width:100%;min-height:150px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#0e1a30;
  color:#cfe0ff;border:1px solid var(--line);border-radius:8px;padding:10px;resize:vertical}
.warn{background:#3a3021;border:1px solid #5a4a2a;color:#ffcf8a;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:10px}
.hint{background:#1e2a44;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:10px}
.accordion summary{cursor:pointer;color:var(--muted);font-family:var(--font-c);font-weight:700;letter-spacing:.5px;font-size:13px;padding:6px 0}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#0e1a30;border:1px solid var(--line);
  color:var(--white);padding:12px 18px;border-radius:9px;font-family:var(--font-c);font-size:14px;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:80;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--ok)}.toast.bad{border-color:var(--bad)}

.toggle-uv{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toggle-uv button{background:#0e1a30;border:none;color:var(--muted);padding:7px 13px;font-family:var(--font-c);font-weight:700;
  letter-spacing:.5px;cursor:pointer;font-size:12px}
.toggle-uv button.on{background:var(--red);color:#fff}

@media(max-width:640px){
  .filtros{top:99px}
  .sec-head h1{font-size:24px}
  .barrow{grid-template-columns:96px 1fr auto}
}
</style>
</head>

<!-- SheetJS por CDN (convención del portal: libs externas por <script src>) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../import.js"></script>
<script>
/* ============================================================
   Control de Recepciones — módulo self-contained del Portal.
   Frontend: lee la sesión del Portal (localStorage), sin login propio.
   Datos: API D1 en /api/* (Cloudflare Pages Functions). Es el único módulo
   con backend D1; el resto usa Firebase. Requiere `wrangler pages dev` (o el
   deploy de Pages) para que /api responda: abrir el index.html suelto por
   file:// muestra el estado de error de conexión.
   ============================================================ */
'use strict';
const $ = id => document.getElementById(id);
const API = '/api';

/* ---------- sesión ---------- */
const SESSION_KEY = 'mateu_portal_session';
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
const SESSION = readSession();
if(!SESSION || !SESSION.rol){ location.replace('../'); }
const puedeVer = SESSION && (SESSION.rol==='admin' || (SESSION.herramientas||[]).includes('recepciones'));
if(SESSION && SESSION.rol && !puedeVer){ location.replace('../'); }

/* ---------- helpers ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const fmtInt = n => (Math.round(n||0)).toLocaleString('es-AR');
const fmtMoney = n => '$'+(Math.round(n||0)).toLocaleString('es-AR');
function toast(msg, kind){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(kind||''); setTimeout(()=>{t.className='toast '+(kind||'');},2600); }
function stateLoading(){ return '<div class="state"><div class="spinner"></div>Cargando…</div>'; }
function stateEmpty(txt){ return '<div class="state"><div class="big-ic">📭</div>'+esc(txt||'Sin datos para los filtros actuales.')+'</div>'; }
function stateError(txt){ return '<div class="state err"><div class="big-ic">⚠️</div>'+esc(txt||'No se pudo conectar con la API.')+
  '<div style="margin-top:8px;font-size:12.5px;color:var(--muted)">El módulo necesita las Pages Functions + D1 (correr <code>wrangler pages dev</code>).</div></div>'; }

async function api(path, opts){
  const r = await fetch(API+path, opts);
  let data=null; try{ data=await r.json(); }catch(e){}
  if(!r.ok || (data && data.ok===false)) throw new Error((data&&data.error)||('HTTP '+r.status));
  return data;
}

/* ---------- estado global ---------- */
const state = {
  tab:'panel',
  filtros:{ semana:'', marca:'', rubro:'', disciplina:'', tipo:'' },
  dims:null,
  uv:'u'   // unidades | valores en el control
};

/* ---------- filtros de líneas del lado cliente ---------- */
function lineaPasa(l){
  const f=state.filtros;
  if(f.rubro && l.rubro!==f.rubro) return false;
  if(f.disciplina && l.disciplina!==f.disciplina) return false;
  if(f.tipo && l.tipo!==f.tipo) return false;
  return true;
}

/* ============================================================
   CARGA DE DIMENSIONES (filtros)
   ============================================================ */
async function cargarDims(){
  state.dims = await api('/dimensiones');
  fillSel('fSemana', state.dims.semanas, 'Todas');
  fillSel('fMarca', state.dims.marcas, 'Todas');
  fillSel('fRubro', state.dims.rubros, 'Todos');
  fillSel('fDisc', state.dims.disciplinas, 'Todas');
  fillSel('fTipo', state.dims.tipos, 'Todos');
}
function fillSel(id, arr, allLbl){
  const el=$(id); const cur=el.value;
  el.innerHTML='<option value="">'+allLbl+'</option>'+(arr||[]).map(v=>'<option value="'+esc(v)+'">'+esc(v)+'</option>').join('');
  if(arr && arr.includes(cur)) el.value=cur;
}

/* ============================================================
   RENDER SEGÚN TAB
   ============================================================ */
function render(){
  $('view').innerHTML = stateLoading();
  if(state.tab==='panel') return renderPanel();
  if(state.tab==='remitos') return renderRemitos();
  if(state.tab==='pedidos') return renderPedidos();
  if(state.tab==='control') return renderControl();
}

/* ---------- PANEL ---------- */
async function renderPanel(){
  try{
    const f=state.filtros;
    const [rem, ctrl] = await Promise.all([
      api('/remitos'+qs({marca:f.marca, semana:f.semana})),
      api('/control'+qs({marca:f.marca, rubro:f.rubro, disciplina:f.disciplina, tipo:f.tipo}))
    ]);
    // aplanar líneas de remitos aplicando filtros de línea
    let unidades=0, remitosCount=0; const porSemana={}, porMarca={}, porRubro={}; const marcasActivas={};
    (rem.remitos||[]).forEach(R=>{
      const lins=(R.lineas||[]).filter(lineaPasa);
      if(!lins.length) return;
      remitosCount++;
      marcasActivas[R.marca||'—']=1;
      lins.forEach(l=>{
        unidades+=l.cantidad||0;
        porSemana[R.semana||'—']=(porSemana[R.semana||'—']||0)+(l.cantidad||0);
        porMarca[R.marca||'—']=(porMarca[R.marca||'—']||0)+(l.cantidad||0);
        porRubro[l.rubro||'—']=(porRubro[l.rubro||'—']||0)+(l.cantidad||0);
      });
    });
    // cumplimiento desde control
    let ped=0, rec=0; (ctrl.control||[]).forEach(c=>{ ped+=c.cant_pedida||0; rec+=c.cant_recibida||0; });
    const cumpl = ped>0 ? Math.round(rec/ped*100) : (rec>0?100:0);

    if(!remitosCount && !(ctrl.control||[]).length){ $('view').innerHTML=seccionHead('Panel','Resumen de ingresos del depósito central')+stateEmpty('Todavía no hay ingresos ni pedidos cargados. Importá un Excel o cargá uno manual.'); return; }

    let html = seccionHead('Panel','Resumen de ingresos del depósito central');
    html += '<div class="kpis">'
      + kpi('Unidades ingresadas', fmtInt(unidades))
      + kpi('Remitos', fmtInt(remitosCount))
      + kpi('Marcas activas', fmtInt(Object.keys(marcasActivas).length))
      + kpi('Cumplimiento OC', cumpl+'<small>%</small>')
      + '</div>';
    html += '<div class="grid2">';
    html += cardBars('Ingresos por semana', 'Unidades ingresadas por semana ISO', porSemana, true);
    html += cardBars('Participación por marca', 'Unidades ingresadas por marca', porMarca, false);
    html += '</div>';
    html += cardBars('Desglose por rubro', 'Unidades ingresadas por rubro', porRubro, false, true);
    $('view').innerHTML = html;
  }catch(e){ $('view').innerHTML = seccionHead('Panel','')+stateError(e.message); }
}
function kpi(k,v){ return '<div class="kpi"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>'; }
function cardBars(title, sub, obj, keepOrder, full){
  let entries=Object.keys(obj).map(k=>[k,obj[k]]);
  if(!entries.length) return '<div class="card'+(full?'':'')+'"><div class="card-h">'+esc(title)+'</div><div class="card-hs">'+esc(sub)+'</div>'+stateEmpty('Sin datos.')+'</div>';
  if(keepOrder) entries.sort((a,b)=>a[0].localeCompare(b[0],'es'));
  else entries.sort((a,b)=>b[1]-a[1]);
  const max=Math.max.apply(null, entries.map(e=>e[1]))||1;
  const rows=entries.map(([k,v])=>'<div class="barrow"><span class="lb" title="'+esc(k)+'">'+esc(k)+'</span>'
    +'<span class="bar"><span style="width:'+Math.max(2,Math.round(v/max*100))+'%"></span></span>'
    +'<span class="vv">'+fmtInt(v)+'</span></div>').join('');
  return '<div class="card"><div class="card-h">'+esc(title)+'</div><div class="card-hs">'+esc(sub)+'</div><div class="barlist">'+rows+'</div></div>';
}

/* ---------- CONTROL ---------- */
async function renderControl(){
  try{
    const f=state.filtros;
    const ctrl = await api('/control'+qs({marca:f.marca, rubro:f.rubro, disciplina:f.disciplina, tipo:f.tipo}));
    const filas = ctrl.control||[];
    let html = seccionHead('Ingresos vs pedido','Cumplimiento de cada línea de OC contra lo recibido',
      '<div class="toggle-uv"><button id="uvU" class="'+(state.uv==='u'?'on':'')+'">Unidades</button><button id="uvV" class="'+(state.uv==='v'?'on':'')+'">Pesos $</button></div>');
    if(!filas.length){ html+=stateEmpty('No hay pedidos cargados para controlar. Importá una OC en “Pedidos de compra”.'); $('view').innerHTML=html; bindUV(); return; }
    const V = state.uv==='v';
    let tp=0,tr=0,tpe=0;
    const rows=filas.map(c=>{
      const ped = V? c.importe_pedido : c.cant_pedida;
      const rec = V? c.importe_recibido : c.cant_recibida;
      const pen = V? c.importe_pendiente : c.cant_pendiente;
      tp+=ped; tr+=rec; tpe+=pen;
      const fmt = V? fmtMoney : fmtInt;
      const pct = Math.max(0, Math.min(100, c.pct));
      return '<tr><td class="mono">'+esc(c.pedido_nro)+'</td><td>'+esc(c.marca||'')+'</td><td>'+esc(c.rubro||'')+'</td>'
        +'<td>'+esc(c.disciplina||'')+'</td><td>'+esc(c.tipo||'')+'</td>'
        +'<td class="num big">'+fmt(ped)+'</td><td class="num big">'+fmt(rec)+'</td>'
        +'<td class="num mono" style="color:'+(pen>0.001?'#ff9db0':(pen<-0.001?'#c9a8ff':'var(--muted)'))+'">'+fmt(pen)+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:8px"><div class="prog p-'+esc(c.estado)+'"><span style="width:'+pct+'%"></span></div><span class="mono" style="min-width:42px">'+c.pct+'%</span></div></td>'
        +'<td><span class="badge b-'+esc(c.estado)+'">'+esc(c.estado)+'</span></td></tr>';
    }).join('');
    const fmt = V? fmtMoney : fmtInt;
    html += '<div class="tbl-wrap"><table><thead><tr><th>OC</th><th>Marca</th><th>Rubro</th><th>Disciplina</th><th>Tipo</th>'
      +'<th class="num">Pedido</th><th class="num">Recibido</th><th class="num">Pendiente</th><th>Avance</th><th>Estado</th></tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'<tfoot><tr><th colspan="5" style="text-align:right">Totales</th><th class="num big">'+fmt(tp)+'</th><th class="num big">'+fmt(tr)+'</th><th class="num big">'+fmt(tpe)+'</th><th colspan="2"></th></tr></tfoot>'
      +'</table></div>';
    $('view').innerHTML = html;
    bindUV();
  }catch(e){ $('view').innerHTML = seccionHead('Ingresos vs pedido','')+stateError(e.message); }
}
function bindUV(){ const u=$('uvU'),v=$('uvV'); if(u)u.onclick=()=>{state.uv='u';renderControl();}; if(v)v.onclick=()=>{state.uv='v';renderControl();}; }

/* ---------- helpers de render ---------- */
function seccionHead(title, sub, actions){
  return '<div class="sec-head"><div><h1>'+esc(title)+'</h1>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>'
    +(actions?'<div style="display:flex;gap:8px;flex-wrap:wrap">'+actions+'</div>':'')+'</div>';
}
function qs(o){ const p=Object.keys(o).filter(k=>o[k]).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(o[k])); return p.length?('?'+p.join('&')):''; }

/* ============================================================
   IMPORTACIÓN DE EXCEL  (parse en el navegador → preview → confirmar → POST)
   ============================================================ */
let impCtx = null; // { tipoDoc, marca, mapping, docs, warnings, headers }

function openImport(tipoDoc){
  const marcas = (state.dims && state.dims.marcas) || [];
  impCtx = { tipoDoc, marca:'', mapping:null, docs:null, warnings:[], headers:[] };
  const marcaSel = tipoDoc==='pedido'
    ? '<div class="field"><label>Marca (define el mapeo)</label><select class="sel" id="impMarca"><option value="">Elegí una marca…</option>'
        + marcas.map(m=>'<option>'+esc(m)+'</option>').join('')
        + '<option value="__new">+ Otra marca…</option></select><input class="inp" id="impMarcaNew" placeholder="Nombre de la marca nueva" style="display:none;margin-top:8px;width:100%"></div>'
    : '';
  const titulo = tipoDoc==='pedido' ? 'Importar pedido de compra' : 'Importar remito de ingreso';
  const subt = tipoDoc==='pedido'
    ? 'El formato del Excel varía por marca: elegí la marca y su mapeo. Se previsualiza antes de guardar.'
    : 'Importá el Excel que exporta nuestro sistema de stock. Se previsualiza antes de guardar.';
  openModal(
    '<button class="close" onclick="closeModal()">×</button>'
    + '<h2>'+titulo+'</h2><div class="msub">'+subt+'</div>'
    + '<div class="hint">Nunca se guarda sin previsualizar. Podés ajustar el mapeo si alguna columna no matchea.</div>'
    + marcaSel
    + '<div class="field"><label>Archivo Excel (.xlsx / .xls)</label><input class="inp" type="file" id="impFile" accept=".xlsx,.xls" style="width:100%"></div>'
    + '<details class="accordion" id="mapWrap" style="display:none"><summary>Ver / editar mapeo</summary>'
      + '<div class="hint" id="mapPend" style="display:none"></div>'
      + '<textarea class="code" id="mapJson" spellcheck="false"></textarea>'
      + '<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" id="btnReproc">Re-procesar con este mapeo</button></div></details>'
    + '<div id="impPreview"></div>'
    + '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
      + '<button class="btn btn-primary" id="btnImpConfirm" disabled>Confirmar y guardar</button></div>'
  );
  const selM=$('impMarca');
  if(selM){ selM.onchange=()=>{
    const nw=$('impMarcaNew');
    if(selM.value==='__new'){ nw.style.display='block'; } else { nw.style.display='none'; impCtx.marca=selM.value; loadMapping(); }
  }; const nw=$('impMarcaNew'); if(nw) nw.oninput=()=>{ impCtx.marca=nw.value.trim(); loadMapping(); }; }
  $('impFile').onchange = onImpFile;
  $('btnImpConfirm').onclick = confirmImport;
  $('btnReproc').onclick = reprocesar;
}

function loadMapping(){
  const R = window.RecepImport;
  let m = R.getMapping(impCtx.marca, impCtx.tipoDoc);
  if(!m && impCtx.tipoDoc==='pedido') m = R.pedidoTemplate(impCtx.marca||'Marca');
  impCtx.mapping = m ? JSON.parse(JSON.stringify(m)) : null;
  if(impCtx.mapping){
    $('mapWrap').style.display='block';
    $('mapJson').value = JSON.stringify(impCtx.mapping, null, 2);
    const pend=$('mapPend');
    if(impCtx.mapping._pendiente){ pend.style.display='block'; pend.innerHTML='⚠️ Mapeo <b>pendiente</b>: los encabezados son placeholders (TODO_). Ajustalos con los del Excel real antes de confirmar.'; }
    else pend.style.display='none';
  }
  if(impCtx.rawBuffer) parseAndPreview();
}

async function onImpFile(e){
  const file = e.target.files[0];
  if(!file) return;
  impCtx.archivo = file.name;
  impCtx.rawBuffer = await file.arrayBuffer();
  if(impCtx.tipoDoc==='ingreso' && !impCtx.mapping) loadMappingIngreso();
  if(!impCtx.mapping){ $('impPreview').innerHTML='<div class="warn">Elegí primero la marca para cargar su mapeo.</div>'; return; }
  parseAndPreview();
}
function loadMappingIngreso(){
  const R=window.RecepImport; impCtx.mapping = JSON.parse(JSON.stringify(R.getMapping('','ingreso')));
  $('mapWrap').style.display='block'; $('mapJson').value=JSON.stringify(impCtx.mapping,null,2);
  const pend=$('mapPend'); if(impCtx.mapping._pendiente){ pend.style.display='block'; pend.innerHTML='⚠️ Mapeo de ingreso <b>pendiente</b>: confirmá los encabezados del export real de stock.'; }
}
function reprocesar(){
  try{ impCtx.mapping = JSON.parse($('mapJson').value); }
  catch(e){ toast('El JSON del mapeo no es válido','bad'); return; }
  if(impCtx.rawBuffer) parseAndPreview(); else toast('Elegí un archivo primero');
}

function parseAndPreview(){
  const R=window.RecepImport;
  try{
    const res = R.importFile(impCtx.rawBuffer, impCtx.mapping, {});
    impCtx.docs = res.docs; impCtx.warnings = res.warnings; impCtx.headers = res.headers;
    renderPreview();
  }catch(e){ $('impPreview').innerHTML='<div class="warn">No se pudo leer el Excel: '+esc(e.message)+'</div>'; $('btnImpConfirm').disabled=true; }
}

function renderPreview(){
  const docs = impCtx.docs||[];
  let totLineas = docs.reduce((a,d)=>a+d.lineas.length,0);
  let html='';
  (impCtx.warnings||[]).forEach(w=> html+='<div class="warn">'+esc(w)+'</div>');
  if(impCtx.headers && impCtx.headers.length) html+='<div class="hint">Columnas detectadas: '+impCtx.headers.map(h=>'<span class="chip">'+esc(h)+'</span>').join('')+'</div>';
  if(!docs.length){ html+='<div class="warn">No se detectaron filas. Revisá <b>headerRow</b> y la hoja en el mapeo.</div>'; $('impPreview').innerHTML=html; $('btnImpConfirm').disabled=true; return; }
  html+='<div class="card-hs" style="margin-top:6px">'+docs.length+' documento(s), '+totLineas+' línea(s). Vista previa de cómo quedó mapeado:</div>';
  docs.slice(0,20).forEach(d=>{
    html+='<div style="margin:10px 0 4px;font-family:var(--font-c);font-weight:700">'
      +esc(impCtx.tipoDoc==='pedido'?'OC ':'Remito ')+esc(d.nro||'(sin nº)')+' · '+esc(d.marca||'—')+' · '+esc(d.fecha||'sin fecha')
      +(d.pedido_nro?(' · OC '+esc(d.pedido_nro)):'')+'</div>';
    html+='<div class="tbl-wrap"><table style="min-width:500px"><thead><tr><th>Rubro</th><th>Disciplina</th><th>Tipo</th><th class="num">Cant.</th><th class="num">Costo U.</th></tr></thead><tbody>'
      + d.lineas.slice(0,8).map(l=>'<tr><td>'+esc(l.rubro)+'</td><td>'+esc(l.disciplina)+'</td><td>'+esc(l.tipo)+'</td><td class="num">'+fmtInt(l.cantidad)+'</td><td class="num mono">'+fmtMoney(l.costo_unitario)+'</td></tr>').join('')
      + (d.lineas.length>8?'<tr><td colspan="5" style="color:var(--muted)">… +'+(d.lineas.length-8)+' líneas</td></tr>':'')
      +'</tbody></table></div>';
  });
  if(docs.length>20) html+='<div class="card-hs">… y '+(docs.length-20)+' documentos más.</div>';
  // validaciones mínimas
  const problemas=[];
  docs.forEach(d=>{ if(!d.nro||d.nro==='(sin-nro)') problemas.push('Hay documentos sin nº.'); if(!d.fecha) problemas.push('Hay documentos sin fecha.'); });
  const okGuardar = !problemas.length;
  if(problemas.length) html+='<div class="warn">'+esc([...new Set(problemas)].join(' '))+' Corregí el mapeo antes de guardar.</div>';
  $('impPreview').innerHTML=html;
  $('btnImpConfirm').disabled = !okGuardar;
}

async function confirmImport(){
  const docs=impCtx.docs||[]; if(!docs.length) return;
  const endpoint = impCtx.tipoDoc==='pedido' ? '/pedidos' : '/remitos';
  const btn=$('btnImpConfirm'); btn.disabled=true; btn.textContent='Guardando…';
  let okN=0, errN=0, errMsgs=[];
  for(const d of docs){
    const body = impCtx.tipoDoc==='pedido'
      ? { nro:d.nro, fecha:d.fecha, comprador:d.comprador, proveedor:d.proveedor, marca:d.marca||impCtx.marca, moneda:d.moneda||'ARS', lineas:d.lineas, archivo:impCtx.archivo }
      : { nro:d.nro, fecha:d.fecha, proveedor:d.proveedor, marca:d.marca||impCtx.marca, pedido_nro:d.pedido_nro||null, lineas:d.lineas, archivo:impCtx.archivo };
    try{ await api(endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); okN++; }
    catch(e){ errN++; errMsgs.push(d.nro+': '+e.message); }
  }
  btn.textContent='Confirmar y guardar'; btn.disabled=false;
  if(errN && !okN){ toast('No se guardó nada. '+errMsgs[0], 'bad'); return; }
  closeModal();
  await cargarDims();
  render();
  toast(okN+' guardado(s)'+(errN?(' · '+errN+' con error'):''), errN?'':'ok');
  if(errN) console.warn('Errores de import:', errMsgs);
}

  $('aGuardar').onclick=()=>guardarAlta(tipoDoc);
}
function field(lbl, inner){ return '<div class="field"><label>'+esc(lbl)+'</label>'+inner+'</div>'; }
function addLinRow(){
  const tb=$('aLineas'); const tr=document.createElement('tr');
  tr.innerHTML='<td><input class="inp" style="width:100%"></td><td><input class="inp" style="width:100%"></td><td><input class="inp" style="width:100%"></td>'
    +'<td><input class="inp num" type="number" step="1" style="width:90px;text-align:right"></td>'
    +'<td><input class="inp num" type="number" step="0.01" style="width:100px;text-align:right"></td>'
    +'<td><button class="btn btn-ghost btn-sm" title="Quitar">✕</button></td>';
  tr.querySelector('button').onclick=()=>tr.remove();
  tb.appendChild(tr);
}
async function guardarAlta(tipoDoc){
  const esPed=tipoDoc==='pedido';
  const lineas=[...$('aLineas').querySelectorAll('tr')].map(tr=>{
    const c=tr.querySelectorAll('input');
    return { rubro:c[0].value.trim(), disciplina:c[1].value.trim(), tipo:c[2].value.trim(), cantidad:parseFloat(c[3].value)||0, costo_unitario:parseFloat(c[4].value)||0 };
  }).filter(l=>l.cantidad||l.costo_unitario||l.rubro||l.tipo);
  if(!$('aNro').value.trim()){ toast('Falta el nº','bad'); return; }
  if(!$('aFecha').value){ toast('Falta la fecha','bad'); return; }
  if(!lineas.length){ toast('Agregá al menos una línea','bad'); return; }
  const body = esPed
    ? { nro:$('aNro').value.trim(), fecha:$('aFecha').value, marca:$('aMarca').value.trim(), proveedor:$('aProv').value.trim(), comprador:$('aComp').value.trim(), moneda:$('aMon').value, lineas, archivo:'manual' }
    : { nro:$('aNro').value.trim(), fecha:$('aFecha').value, marca:$('aMarca').value.trim(), proveedor:$('aProv').value.trim(), pedido_nro:($('aOC')?$('aOC').value.trim():'')||null, lineas, archivo:'manual' };
  const btn=$('aGuardar'); btn.disabled=true; btn.textContent='Guardando…';
  try{
    await api(esPed?'/pedidos':'/remitos', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeModal(); await cargarDims(); render(); toast('Guardado','ok');
  }catch(e){ btn.disabled=false; btn.textContent='Guardar'; toast(e.message,'bad'); }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(html){ $('modal').innerHTML=html; $('overlay').classList.add('show'); document.addEventListener('keydown',escClose); }
function closeModal(){ $('overlay').classList.remove('show'); document.removeEventListener('keydown',escClose); impCtx=null; }
function escClose(e){ if(e.key==='Escape') closeModal(); }
$('overlay').addEventListener('click', e=>{ if(e.target===$('overlay')) closeModal(); });
window.closeModal=closeModal;

/* ============================================================
   ARRANQUE
   ============================================================ */
function bindTabs(){
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); state.tab=b.dataset.tab; render();
  });
}
function bindFiltros(){
  const map={fSemana:'semana',fMarca:'marca',fRubro:'rubro',fDisc:'disciplina',fTipo:'tipo'};
  Object.keys(map).forEach(id=>$(id).onchange=()=>{ state.filtros[map[id]]=$(id).value; render(); });
  $('fReset').onclick=()=>{ state.filtros={semana:'',marca:'',rubro:'',disciplina:'',tipo:''}; ['fSemana','fMarca','fRubro','fDisc','fTipo'].forEach(id=>$(id).value=''); render(); };
}
$('salir').onclick=()=>{ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} location.replace('../'); };

async function init(){
  $('whoName').textContent = SESSION.email||'—';
  $('whoRole').textContent = SESSION.rol||'—';
  bindTabs(); bindFiltros();
  try{ await cargarDims(); }
  catch(e){ $('view').innerHTML=stateError(e.message); return; }
  render();
}
init();
</script>
</body>
</html>
