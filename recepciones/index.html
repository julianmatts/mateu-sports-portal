<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Recepciones — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#fff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#fff;--border:#dce3f0;
  --ok:#16a34a;--warn:#d97706;--bad:#dc2626;--exc:#7c3aed;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --shadow:0 1px 4px rgba(11,21,39,.08);--shadow-md:0 8px 30px rgba(11,21,39,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--navy);font-family:var(--font-b);min-height:100vh}
img,svg{max-width:100%}

/* ===== HEADER ===== */
.top{background:var(--navy);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--red);position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:10px}
.top a.logo{display:flex;align-items:center;gap:11px;text-decoration:none;min-width:0}
.top img{height:32px;filter:brightness(0) invert(1)}
.top .tt{font-family:var(--font-d);font-size:19px;letter-spacing:1.5px;color:#fff;line-height:1}
.top .ts{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted-light)}
.top-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:13px;font-weight:600;color:#fff;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--red-soft)}
.salir{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;cursor:pointer}
.salir:hover{color:#fff;border-color:#fff}

/* ===== NAV TABS ===== */
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:57px;z-index:30}
.tab{padding:13px 16px;border:0;background:none;cursor:pointer;font-family:var(--font-c);font-size:14px;font-weight:600;
  letter-spacing:.5px;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:var(--navy);border-bottom-color:var(--red)}
.tab:hover{color:var(--navy)}
.tab:focus-visible{outline:2px solid var(--red);outline-offset:-2px}

/* ===== FILTROS ===== */
.filtros{background:#fff;border-bottom:1px solid var(--border);padding:11px 22px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;position:sticky;top:101px;z-index:20}
.fgrp{display:flex;flex-direction:column;gap:4px;min-width:120px}
.fgrp label{font-family:var(--font-c);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}

main{max-width:1180px;margin:0 auto;padding:22px 22px 80px}

.demo-banner{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:9px;padding:9px 14px;
  font-size:13px;margin-bottom:16px;display:none}
.demo-banner.show{display:block}
.demo-banner code{background:#fde9d3;padding:1px 5px;border-radius:4px;font-size:12px}

/* ===== CONTROLES ===== */
.sel,.inp{padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:14px;color:var(--navy);background:#fff;font-family:var(--font-b)}
.sel:focus,.inp:focus{outline:none;border-color:var(--navy-mid)}
.btn{border:none;border-radius:8px;padding:10px 16px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#a00000}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--navy)}.btn-outline:hover{border-color:var(--navy-mid)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:focus-visible,.sel:focus-visible,.inp:focus-visible{outline:2px solid var(--red);outline-offset:2px}

/* ===== CARDS / TIPO ===== */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sec-head h1{font-family:var(--font-d);font-size:30px;letter-spacing:1px;line-height:1}
.sec-head .sub{font-family:var(--font-c);font-size:13px;font-weight:500;color:var(--muted);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-h{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;margin-bottom:2px}
.card-hs{font-family:var(--font-c);font-size:12px;color:var(--muted);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.kpi .v{font-family:var(--font-d);font-size:32px;letter-spacing:.5px;margin-top:4px;line-height:1}
.kpi .v small{font-size:14px;color:var(--muted);font-family:var(--font-c)}

/* ===== BARRAS ===== */
.barlist{display:flex;flex-direction:column;gap:9px}
.barrow{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center;font-family:var(--font-c);font-size:13.5px}
.barrow .lb{color:var(--navy-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{height:9px;border-radius:5px;background:#e6ebf5;overflow:hidden}
.bar>span{display:block;height:100%;background:var(--red);border-radius:5px}
.barrow .vv{font-family:var(--font-d);font-size:16px;letter-spacing:.5px;text-align:right;min-width:48px;color:var(--navy)}

/* ===== TABLAS ===== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:11px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:640px}
th{background:var(--navy);color:#fff;font-family:var(--font-c);font-weight:600;letter-spacing:.5px;padding:9px 11px;text-align:left;white-space:nowrap;position:sticky;top:0}
th.num,td.num{text-align:right}
td{padding:8px 11px;border-bottom:1px solid #eef0f7;vertical-align:middle}
tbody tr:hover td{background:#f8f9fe}
tfoot th{background:#eef2fb;color:var(--navy-mid);position:static}
.mono{font-variant-numeric:tabular-nums}
.big{font-family:var(--font-d);font-size:16px;letter-spacing:.5px}

/* ===== BADGES / ESTADOS ===== */
.badge{display:inline-block;font-family:var(--font-c);font-weight:700;font-size:11px;letter-spacing:.8px;
  text-transform:uppercase;padding:3px 9px;border-radius:20px}
.b-pendiente{background:#eef1f7;color:#64748b}
.b-parcial{background:#fef3c7;color:#92620e}
.b-completo{background:#dcfce7;color:#15803d}
.b-excedido{background:#ede9fe;color:#6d28d9}
.chip{display:inline-block;background:#f1f5fd;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--navy-mid);margin:0 3px 3px 0}
.lnk-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 2px;line-height:1}
.lnk-del:hover{color:var(--bad)}
.lnk-del:focus-visible{outline:2px solid var(--red);outline-offset:1px}
.ped-card{background:#fff;border:1px solid var(--border);border-radius:11px;margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.ped-head{display:flex;align-items:center;gap:12px;padding:11px 15px;cursor:pointer}
.ped-head:hover{background:#f8f9fe}
.ped-dot{width:11px;height:11px;border-radius:50%;flex:none}
.ped-title{flex:1;min-width:0}
.ped-oc{font-family:var(--font-c);font-weight:700;font-size:15px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ped-sub{font-family:var(--font-c);font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ped-tot{text-align:right;flex:none}
.ped-tot .big{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;line-height:1}
.ped-chev{color:var(--muted);font-size:13px;width:12px;flex:none}
.ped-detail{border-top:1px solid var(--border);padding:10px 14px;background:#fbfcfe}
.barrow.drill{cursor:pointer;border-radius:6px;padding:2px 5px;margin:0 -5px}
.barrow.drill:hover{background:#f1f5fd}
.barrow.drill .lb{color:var(--red);font-weight:600}
.rep-badge{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-c);font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:6px 11px;border-radius:20px;border:none;line-height:1}
.rep-pend{background:#fef3c7;color:#92620e;cursor:pointer}
.rep-pend:hover{background:#fde68a}
.rep-done{background:#dcfce7;color:#15803d}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{background:#13233f}

.prog{height:8px;border-radius:4px;background:#e6ebf5;overflow:hidden;min-width:90px}
.prog>span{display:block;height:100%;border-radius:4px;background:var(--ok)}
.prog.p-parcial>span{background:var(--warn)}
.prog.p-pendiente>span{background:#94a3b8}
.prog.p-excedido>span{background:var(--exc)}

/* ===== ESTADOS ===== */
.state{text-align:center;padding:44px 20px;color:var(--muted);font-family:var(--font-c)}
.state .big-ic{font-size:34px;margin-bottom:8px}
.state.err{color:var(--bad)}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spinner{animation:none}*{transition:none!important}}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(11,21,39,.5);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:24px 14px;overflow:auto}
.overlay.show{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;max-width:820px;width:100%;padding:20px;margin:auto;box-shadow:var(--shadow-md)}
.modal h2{font-family:var(--font-d);font-size:24px;letter-spacing:1px;margin-bottom:2px}
.modal .msub{font-family:var(--font-c);font-size:12.5px;color:var(--muted);margin-bottom:14px}
.modal .close{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.field{margin-bottom:12px}
.field label{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field .inp,.field .sel{width:100%}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
textarea.code{width:100%;min-height:150px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#f8f9fe;
  color:#1e293b;border:1px solid var(--border);border-radius:8px;padding:10px;resize:vertical}
.warn{background:#fef3c7;border:1px solid #fcd34d;color:#92620e;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:10px}
.hint{background:#f1f5fd;border:1px solid var(--border);color:var(--navy-mid);border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:10px}
.accordion summary{cursor:pointer;color:var(--muted);font-family:var(--font-c);font-weight:700;letter-spacing:.5px;font-size:13px;padding:6px 0}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);
  color:#fff;padding:12px 18px;border-radius:9px;font-family:var(--font-c);font-size:14px;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:80;max-width:90vw;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#14532d}.toast.bad{background:#7f1d1d}

.toggle-uv{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.toggle-uv button{background:#fff;border:none;color:var(--muted);padding:8px 14px;font-family:var(--font-c);font-weight:700;
  letter-spacing:.5px;cursor:pointer;font-size:12px}
.toggle-uv button.on{background:var(--red);color:#fff}

/* ===== MÓVIL: teléfonos ~360-560px =====
   El desktop queda intacto; acá se compacta header, se apilan filtros y se
   evita el solapamiento de las barras sticky (el header envuelve y crece). */
@media(max-width:560px){
  /* Header compacto: menos padding, título más chico, nombre más corto */
  .top{padding:9px 14px;gap:8px}
  .top img{height:26px}
  .top .tt{font-size:16px;letter-spacing:1px}
  .top .ts{font-size:9px;letter-spacing:1.5px}
  .who .n{max-width:120px;font-size:12px}
  .salir{padding:6px 10px;font-size:10px}

  /* En móvil el header envuelve (2 líneas) y su alto ya no es 57px: si tabs y
     filtros siguen sticky en offsets fijos se solapan. Los volvemos estáticos
     (el header sí queda sticky arriba). */
  .tabs{position:static;top:auto;padding:0 10px}
  .filtros{position:static;top:auto;padding:10px 14px;gap:8px}
  .tab{padding:12px 12px;font-size:13px}

  /* Filtros en 2 columnas, controles full-width y tappables (~42px) */
  main{padding:16px 14px 72px}
  .filtros .fgrp{min-width:0;flex:1 1 calc(50% - 4px)}
  .filtros .sel,.filtros .inp{width:100%;min-height:42px}
  .filtros .btn{width:100%;min-height:40px}

  .sec-head h1{font-size:24px}
  .barrow{grid-template-columns:88px 1fr auto}
  /* KPIs y grillas a 1-2 columnas */
  .kpis{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .kpi .v{font-size:28px}
  .grid2{grid-template-columns:1fr}
  .card{padding:14px}
  /* Modales: usar todo el ancho y scroll interno */
  .overlay{padding:14px 8px}
  .modal{padding:16px}
  .formgrid{grid-template-columns:1fr}
}
</style>
</head>

<script>
/* ============================================================
   Control de Recepciones — módulo self-contained del Portal.
   Lee la sesión del Portal (localStorage), sin login propio.
   Datos en Firebase (Realtime Database vía REST), como el resto del portal.
   Sin URL configurada (FIREBASE_DB_URL) corre en MODO DEMO con datos de prueba
   en memoria (no persiste). El control ingresos-vs-pedido se calcula en el
   cliente. import.js parsea el Excel en el navegador (SheetJS por CDN).
   ============================================================ */
'use strict';
const $ = id => document.getElementById(id);

/* ---------- Firebase: pegar la URL de la base cuando Juli la cree ----------
   Ej: 'https://recepciones-mateu-default-rtdb.firebaseio.com'
   Vacío => modo demo. */
const FIREBASE_DB_URL = 'https://recepciones-mateu-default-rtdb.firebaseio.com';
const DEMO = !FIREBASE_DB_URL;
const ROOT = 'recepciones';   // rama raíz en la base

/* ---------- sesión ---------- */
const SESSION_KEY = 'mateu_portal_session';
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
const SESSION = readSession();
if(!SESSION || !SESSION.rol){ location.replace('../'); }
const puedeVer = SESSION && (SESSION.rol==='admin' || (SESSION.herramientas||[]).includes('recepciones'));
if(SESSION && SESSION.rol && !puedeVer){ location.replace('../'); }

/* ---------- helpers ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const num = x => { const n=Number(x); return isFinite(n)?n:0; };
const fmtInt = n => (Math.round(n||0)).toLocaleString('es-AR');
const fmtMoney = n => '$'+(Math.round(n||0)).toLocaleString('es-AR');
const cmp = (a,b)=>String(a).localeCompare(String(b),'es');
function toast(msg, kind){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(kind||''); setTimeout(()=>{t.className='toast '+(kind||'');},2600); }
function stateLoading(){ return '<div class="state"><div class="spinner"></div>Cargando…</div>'; }
function stateEmpty(txt){ return '<div class="state"><div class="big-ic">📭</div>'+esc(txt||'Sin datos para los filtros actuales.')+'</div>'; }
function stateError(txt){ return '<div class="state err"><div class="big-ic">⚠️</div>'+esc(txt||'No se pudo cargar la base.')+'</div>'; }

/* ---------- Firebase REST ---------- */
function fbUrl(path){ return FIREBASE_DB_URL.replace(/\/+$/,'') + '/' + path.split('/').map(encodeURIComponent).join('/') + '.json'; }
// nro -> key válida de Firebase (sin . # $ / [ ])
function fbKey(nro){ return String(nro||'').trim().replace(/[.#$/\[\]]/g,'~'); }
async function fbGet(path){ const r=await fetch(fbUrl(path)); if(!r.ok) throw new Error('Firebase HTTP '+r.status); return r.json(); }
async function fbPut(path, data){ const r=await fetch(fbUrl(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); if(!r.ok) throw new Error('Firebase HTTP '+r.status); return r.json(); }
async function fbDelete(path){ const r=await fetch(fbUrl(path),{method:'DELETE'}); if(!r.ok) throw new Error('Firebase HTTP '+r.status); return true; }
function nowISO(){ return new Date().toISOString().slice(0,19).replace('T',' '); }

/* semana ISO 8601 -> 'Sem NN' desde 'YYYY-MM-DD' */
function semanaISO(fecha){
  if(!fecha) return '';
  const p=String(fecha).split('-'); if(p.length<3) return '';
  const d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));
  const day=(d.getUTCDay()+6)%7;                 // lun=0..dom=6
  d.setUTCDate(d.getUTCDate()-day+3);            // jueves de esa semana
  const jueves=d.getTime();
  d.setUTCMonth(0,1);
  if(d.getUTCDay()!==4) d.setUTCMonth(0,1+((4-d.getUTCDay())+7)%7);
  const semana=1+Math.round((jueves-d.getTime())/(7*864e5));
  return 'Sem '+String(semana).padStart(2,'0');
}

const DATA = { pedidos:{}, remitos:{}, repartos:{} };   // keyed por fbKey(nro)
const state = { tab:'panel', filtros:{ mes:'', marca:'', rubro:'', disciplina:'', tipo:'', proveedor:'', reparto:'', q:'' }, dims:null, uv:'u' };
const vals = o => o ? Object.keys(o).map(k=>o[k]) : [];

async function cargarTodo(){
  if(DEMO){ const m = window.RECEP_MOCK || {pedidos:{},remitos:{}}; DATA.pedidos=JSON.parse(JSON.stringify(m.pedidos||{})); DATA.remitos=JSON.parse(JSON.stringify(m.remitos||{})); DATA.repartos={}; return; }
  const [ped, rem, rep] = await Promise.all([ fbGet(ROOT+'/pedidos'), fbGet(ROOT+'/remitos'), fbGet(ROOT+'/repartos') ]);
  DATA.pedidos = ped || {}; DATA.remitos = rem || {}; DATA.repartos = rep || {};
}

async function guardarPedido(doc){
  const key = fbKey(doc.nro);
  if(DATA.pedidos[key]) throw new Error('Ya existe un pedido con nº '+doc.nro+'.');
  const rec = { nro:doc.nro, fecha:doc.fecha, comprador:doc.comprador||'', proveedor:doc.proveedor||'', marca:doc.marca||'', moneda:doc.moneda||'ARS', creado_en:nowISO(), lineas:doc.lineas||[] };
  if(!DEMO) await fbPut(ROOT+'/pedidos/'+key, rec);
  DATA.pedidos[key] = rec;
}
async function guardarRemito(doc){
  const key = fbKey(doc.nro);
  if(DATA.remitos[key]) throw new Error('Ya existe un remito con nº '+doc.nro+'.');
  const rec = { nro:doc.nro, fecha:doc.fecha, proveedor:doc.proveedor||'', marca:doc.marca||'', pedido_nro:doc.pedido_nro||'', semana:semanaISO(doc.fecha), creado_en:nowISO(), lineas:doc.lineas||[] };
  if(!DEMO) await fbPut(ROOT+'/remitos/'+key, rec);
  DATA.remitos[key] = rec;
}
async function borrarPedido(nro){ const key=fbKey(nro); if(!DEMO) await fbDelete(ROOT+'/pedidos/'+key); delete DATA.pedidos[key]; }
async function borrarRemito(nro){ const key=fbKey(nro); if(!DEMO) await fbDelete(ROOT+'/remitos/'+key); delete DATA.remitos[key]; }

const MES_NOMBRES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function mesKey(fecha){ return String(fecha||'').slice(0,7); }
function mesLabel(x){ const p=String(x||'').split('-'); return (p.length>=2 && MES_NOMBRES[+p[1]-1]) ? MES_NOMBRES[+p[1]-1]+' '+p[0] : ''; }

/* ---------- dimensiones (cliente) ---------- */
function computeDims(){
  const marcas=new Set(),rubros=new Set(),disc=new Set(),tipos=new Set(),meses=new Set(),provs=new Set();
  vals(DATA.pedidos).forEach(p=>{ if(p.marca)marcas.add(p.marca); if(p.proveedor)provs.add(p.proveedor); if(p.fecha)meses.add(mesKey(p.fecha)); (p.lineas||[]).forEach(l=>{ if(l.rubro)rubros.add(l.rubro); if(l.disciplina)disc.add(l.disciplina); if(l.tipo)tipos.add(l.tipo); }); });
  vals(DATA.remitos).forEach(r=>{ if(r.marca)marcas.add(r.marca); if(r.proveedor)provs.add(r.proveedor); if(r.fecha)meses.add(mesKey(r.fecha)); (r.lineas||[]).forEach(l=>{ if(l.rubro)rubros.add(l.rubro); if(l.disciplina)disc.add(l.disciplina); if(l.tipo)tipos.add(l.tipo); }); });
  return { marcas:[...marcas].sort(cmp), rubros:[...rubros].sort(cmp), disciplinas:[...disc].sort(cmp), tipos:[...tipos].sort(cmp), meses:[...meses].sort(cmp), proveedores:[...provs].sort(cmp) };
}

/* ---------- control ingresos vs pedido (cliente, = vista v_control) ---------- */
function computeControl(f){
  const key=(marca,l)=>[marca||'',l.rubro||'',l.disciplina||'',l.tipo||''].join('|');
  const ped={};
  vals(DATA.pedidos).forEach(p=>{ if(f.mes && mesKey(p.fecha)!==f.mes) return; (p.lineas||[]).forEach(l=>{ const k=key(p.marca,l); const a=ped[k]||(ped[k]={marca:p.marca||'',rubro:l.rubro||'',disciplina:l.disciplina||'',tipo:l.tipo||'',cant_pedida:0,importe_pedido:0}); a.cant_pedida+=num(l.cantidad); a.importe_pedido+=num(l.cantidad)*num(l.costo_unitario); }); });
  const rec={};
  vals(DATA.remitos).forEach(r=>{ if(f.mes && mesKey(r.fecha)!==f.mes) return; (r.lineas||[]).forEach(l=>{ const k=key(r.marca,l); const a=rec[k]||(rec[k]={c:0,i:0}); a.c+=num(l.cantidad); a.i+=num(l.cantidad)*num(l.costo_unitario); }); });
  let rows = Object.keys(ped).map(k=>{
    const p=ped[k]; const rr=rec[k]||{c:0,i:0};
    const cant_recibida=rr.c, importe_recibido=rr.i;
    const cant_pendiente=p.cant_pedida-cant_recibida, importe_pendiente=p.importe_pedido-importe_recibido;
    const pct=p.cant_pedida>0?Math.round(cant_recibida/p.cant_pedida*1000)/10:(cant_recibida>0?100:0);
    const estado=cant_recibida<=0?'pendiente':(cant_recibida<p.cant_pedida?'parcial':(cant_recibida>p.cant_pedida?'excedido':'completo'));
    return Object.assign({},p,{cant_recibida,importe_recibido,cant_pendiente,importe_pendiente,pct,estado});
  });
  rows = rows.filter(c=>(!f.marca||c.marca===f.marca)&&(!f.rubro||c.rubro===f.rubro)&&(!f.disciplina||c.disciplina===f.disciplina)&&(!f.tipo||c.tipo===f.tipo));
  rows.sort((a,b)=>cmp(a.marca,b.marca)||cmp(a.rubro,b.rubro)||cmp(a.disciplina,b.disciplina)||cmp(a.tipo,b.tipo));
  return rows;
}

/* ---------- filtro de líneas ---------- */
function lineaPasa(l){ const f=state.filtros; if(f.rubro&&l.rubro!==f.rubro)return false; if(f.disciplina&&l.disciplina!==f.disciplina)return false; if(f.tipo&&l.tipo!==f.tipo)return false; return true; }
function matchQ(D, q){ if(!q) return true; q=q.toLowerCase(); if((((D.nro||'')+' '+(D.marca||'')+' '+(D.proveedor||'')+' '+(D.pedido_nro||'')+' '+(D.comprador||'')).toLowerCase()).indexOf(q)>-1) return true; return (D.lineas||[]).some(l=>(((l.modelo||'')+' '+(l.descripcion||'')+' '+(l.rubro||'')+' '+(l.disciplina||'')+' '+(l.tipo||'')).toLowerCase()).indexOf(q)>-1); }
function remitosFiltrados(){ const f=state.filtros; return vals(DATA.remitos).filter(r=>(!f.marca||r.marca===f.marca)&&(!f.mes||mesKey(r.fecha)===f.mes)&&(!f.proveedor||r.proveedor===f.proveedor)&&repartoPasa(r,f.reparto)&&matchQ(r,f.q)).sort((a,b)=>cmp(b.fecha,a.fecha)); }
function pedidosFiltrados(){ const f=state.filtros; return vals(DATA.pedidos).filter(p=>(!f.marca||p.marca===f.marca)&&(!f.proveedor||p.proveedor===f.proveedor)&&matchQ(p,f.q)).sort((a,b)=>cmp(b.fecha,a.fecha)); }

function render(){

/* ---------- PANEL ---------- */
function renderPanel(){
  const rem = remitosFiltrados();
  let unidades=0, importe=0, remitosCount=0; const porMes={}, porMarca={}, porRubro={}, marcasAct={};
  rem.forEach(R=>{ const lins=(R.lineas||[]).filter(lineaPasa); if(!lins.length) return; remitosCount++; marcasAct[R.marca||'—']=1;
    lins.forEach(l=>{ const c=num(l.cantidad); importe+=c*num(l.costo_unitario); unidades+=c; porMes[mesKey(R.fecha)]=(porMes[mesKey(R.fecha)]||0)+c; porMarca[R.marca||'—']=(porMarca[R.marca||'—']||0)+c; porRubro[l.rubro||'—']=(porRubro[l.rubro||'—']||0)+c; }); });
  const ctrl=computeControl(state.filtros); let ped=0,rec=0; ctrl.forEach(c=>{ped+=c.cant_pedida;rec+=c.cant_recibida;});
  const cumpl = ped>0?Math.round(rec/ped*100):(rec>0?100:0);

  let html = seccionHead('Panel','Resumen de ingresos del depósito central');
  if(!remitosCount && !ctrl.length){ $('view').innerHTML=html+stateEmpty('Todavía no hay ingresos ni pedidos cargados. Importá un Excel o cargá uno manual.'); return; }
  html += '<div class="kpis">'
    + kpi('Unidades ingresadas', fmtInt(unidades))
    + kpi('Ingresado $', fmtMoney(importe))
    + kpi('Remitos', fmtInt(remitosCount))
    + kpi('Marcas activas', fmtInt(Object.keys(marcasAct).length))
    + kpi('Cumplimiento OC', cumpl+'<small>%</small>') + '</div>';
  html += alertasCard(ctrl);
  html += '<div class="grid2">'
    + cardMeses(porMes)
    + cardBars('Participación por marca','Unidades por marca · click para ver el detalle', porMarca, false, null, 'marca') + '</div>';
  html += cardBars('Desglose por rubro','Unidades ingresadas por rubro', porRubro, false);
  $('view').innerHTML = html;
  document.querySelectorAll('#view [data-drill]').forEach(el=>el.onclick=()=>openMarcaDetalle(el.getAttribute('data-drill')));
}
function kpi(k,v){ return '<div class="kpi"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>'; }
function cardBars(title, sub, obj, keepOrder, labelFn, drillKey){
  let entries=Object.keys(obj).map(k=>[k,obj[k]]);
  if(!entries.length) return '<div class="card"><div class="card-h">'+esc(title)+'</div><div class="card-hs">'+esc(sub)+'</div>'+stateEmpty('Sin datos.')+'</div>';
  if(keepOrder) entries.sort((a,b)=>cmp(a[0],b[0])); else entries.sort((a,b)=>b[1]-a[1]);
  const max=Math.max.apply(null, entries.map(e=>e[1]))||1;
  const rows=entries.map(([k,v])=>{ const lbl=labelFn?labelFn(k):k; return '<div class="barrow'+(drillKey?' drill':'')+'"'+(drillKey?' data-drill="'+esc(k)+'"':'')+'><span class="lb" title="'+esc(lbl)+'">'+esc(lbl)+'</span><span class="bar"><span style="width:'+Math.max(2,Math.round(v/max*100))+'%"></span></span><span class="vv">'+fmtInt(v)+'</span></div>'; }).join('');
  return '<div class="card"><div class="card-h">'+esc(title)+'</div><div class="card-hs">'+esc(sub)+'</div><div class="barlist">'+rows+'</div></div>';
}

/* exportar a Excel la vista actual (SheetJS ya cargado) */

  try{

/* ============================================================
   CONVERSOR de OC de marca -> OC unificada Mateu Sports
   Importa la planilla que manda la marca, la convierte al modelo unificado Mateu
   (detalle por artículo con curva de talles), permite descargar Excel/PDF y
   guardar la OC al sistema (alimenta Pedidos y el control). El envío por mail se
   suma más adelante reusando functions/enviar-oc.js.
   ============================================================ */
const OC_DISC_MAP = { 'RUNNING':'RUNNING','FOOTBALL/SOCCER':'FUTBOL 11','NIKE BASKETBALL':'BASQUET','MEN TRAINING':'TRAINING','SPORTSWEAR':'CASUAL','TENNIS':'TENIS','JORDAN BRAND':'JORDAN','YOUNG ATHLETES':'CASUAL' };
const OC_TIPO_MAP = { 'MEN':'CALZADO ADULTO','WOMEN':'CALZADO ADULTO','UNISEX':'CALZADO ADULTO','KIDS':'CALZADO NIÑO' };
const OC_MESES = { enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,setiembre:9,octubre:10,noviembre:11,diciembre:12 };

function ocFromFilename(name, marcaDefault){
  const base=name.replace(/\.[^.]+$/,''); const low=base.toLowerCase(); let mes=0,anio=0;
  for(const k in OC_MESES){ if(low.includes(k)){ mes=OC_MESES[k]; const m=low.slice(low.indexOf(k)).match(/(\d{2,4})/); if(m) anio=m[1].length===2?2000+ +m[1]:+m[1]; break; } }
  const fecha=(mes&&anio)?anio+'-'+String(mes).padStart(2,'0')+'-01':'';
  const marca=/adidas/i.test(low)?'adidas':(/nike/i.test(low)?'Nike':(marcaDefault||base.split(/\s+/)[0]));
  const nro=base.replace(/^\s*copia de\s*/i,'').replace(/\s+/g,' ').trim();
  return { nro, fecha, marca };
}

/* Conversor Nike — hoja "Resumen Pedido" (modelo x talles) */
function convNike(wb){
  const sheet = wb.SheetNames.includes('Resumen Pedido')?'Resumen Pedido':wb.SheetNames[0];
  const raw = XLSX.utils.sheet_to_json(wb.Sheets[sheet],{header:1,defval:''});
  const H=raw[1]||[]; const col=n=>H.indexOf(n);
  const iMat=col('Material Nike'), iDesc=col('Descripcion Nike'), iCat=col('Categoria'), iGen=col('Genero'), iPw=col('Precio Whsl'), iTot=col('Total Unidades');
  if(iTot<0) throw new Error('No parece un Excel de OC Nike (falta "Total Unidades" en la hoja "Resumen Pedido").');
  const talleCols=[]; for(let j=iPw+1;j<iTot;j++){ if(H[j]!=='' && H[j]!=null) talleCols.push([j,String(H[j])]); }
  const arts=[];
  for(let i=2;i<raw.length;i++){ const r=raw[i]; const tot=num(r[iTot]); if(tot<=0) continue;
    if(/^total/i.test(String(r[iMat]||'').trim())) continue;
    const cat=String(r[iCat]||'').trim().toUpperCase(), gen=String(r[iGen]||'').trim().toUpperCase();
    const talles=[]; talleCols.forEach(([j,lbl])=>{ const q=num(r[j]); if(q>0) talles.push({talle:lbl,cant:q}); });
    arts.push({ modelo:String(r[iMat]||'').trim(), descripcion:String(r[iDesc]||'').trim(), genero:gen,
      rubro:'CALZADO', disciplina:OC_DISC_MAP[cat]||cat||'SIN DISCIPLINA', tipo:OC_TIPO_MAP[gen]||'CALZADO ADULTO',
      talles, cantidad:tot, costo_unitario:num(r[iPw]) });
  }
  return arts;
}

function convertirOC(marca, wb, filename){

/* ============================================================
   IMPORTACIÓN MASIVA de ingresos — reporte "Estadistica de remitos"
   El depósito sube el Excel matriz por mes; se reforma en el navegador (una fila
   por artículo-en-remito, con cantidad/valorizado por mes), se previsualiza y se
   SUMA a lo ya cargado (PATCH/merge en Firebase; no pisa lo existente).
   Para un remito suelto está el "Alta manual".
   ============================================================ */
function convEstadistica(wb){
  const sheet = wb.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheet], {defval:''});
  if(!rows.length) throw new Error('El Excel no tiene filas.');
  const MESES = Object.keys(rows[0]).map(h=>{ const m=h.match(/^(\d{2})-(\d{2}) Cantidad$/); return m?h.replace(/ Cantidad$/,''):null; }).filter(Boolean);
  if(!MESES.length) throw new Error('No parece el reporte "Estadistica de remitos" (faltan columnas "MM-YY Cantidad").');
  const marcasPorRemito = {};
  rows.forEach(r=>{ const n=r['Nro.remito']; if(n){ (marcasPorRemito[n]=marcasPorRemito[n]||new Set()).add(r['Marca']); } });
  const docs = {};
  rows.forEach(r=>{
    const nro=r['Nro.remito']; if(!nro) return;
    const marca=String(r['Marca']||'Desconocida').trim();
    const mes=MESES.find(m=>num(r[m+' Cantidad'])>0); if(!mes) return;
    const cant=num(r[mes+' Cantidad']), val=num(r[mes+' Valorizado']);
    const multi=(marcasPorRemito[nro]||new Set()).size>1;
    const docNro = multi ? (nro+' · '+marca) : nro;
    const key = fbKey(docNro);
    let d = docs[key];
    if(!d){ const parts=mes.split('-'); const fecha='20'+parts[1]+'-'+parts[0]+'-01'; d = docs[key] = { nro:docNro, fecha, proveedor:String(r['Proveedor']||'').trim(), marca, pedido_nro:'', semana:semanaISO(fecha), creado_en:nowISO(), origen:'import-estadistica', _lin:{} }; }
    const cod=String(r['Código barras']||'').trim(), art=String(r['Artículo']||'').trim();
    const lk = cod+'|'+art+'|'+(r['Rubro']||'')+'|'+(r['Disciplina']||'')+'|'+(r['Grupo 1']||'');
    const L = d._lin[lk] || (d._lin[lk]={ modelo:cod, descripcion:art, rubro:String(r['Rubro']||'').trim(), disciplina:String(r['Disciplina']||'').trim(), tipo:String(r['Grupo 1']||'').trim(), _c:0, _v:0 });
    L._c+=cant; L._v+=val;
  });
  const out = Object.keys(docs).map(k=>docs[k]);
  out.forEach(d=>{ d.lineas=Object.keys(d._lin).map(k=>{ const L=d._lin[k]; return { modelo:L.modelo, descripcion:L.descripcion, rubro:L.rubro, disciplina:L.disciplina, tipo:L.tipo, cantidad:L._c, costo_unitario: L._c>0?L._v/L._c:0 }; }); delete d._lin; });
  return out;
}

   FLUJO DE REPARTO (Fase 3)
   El depósito marca un remito como "necesita reparto de Compras" (⚑ en Ingresos).

   como hecho. Roles blandos por mail (como el resto del portal). Sin mail por ahora.

   creado_en, hecho_por?, hecho_en?}.
   ============================================================ */
const COMPRAS_MAILS=['julian@mateu.com.ar','julian.demarco@mateu.com.ar'];
const DEPOSITO_MAILS=['logistica@mateu.com.ar','deposito@mateu.com.ar'];
function _mail(){ return ((SESSION&&SESSION.email)||'').toLowerCase(); }
function esCompras(){ return !!SESSION && (SESSION.rol==='admin' || COMPRAS_MAILS.includes(_mail())); }
function esDeposito(){ return !!SESSION && (SESSION.rol==='admin' || DEPOSITO_MAILS.includes(_mail())); }

/* Estado de reparto en un nodo liviano recepciones/repartos/<key> (así el Portal
   puede contar los pendientes sin bajarse todos los remitos). */
function repartoDe(R){ return (DATA.repartos||{})[fbKey((R&&R.nro)||R)]||null; }
async function setReparto(nro, reparto){
  const key=fbKey(nro);
  if(reparto===null){ if(!DEMO) await fbDelete(ROOT+'/repartos/'+key); if(DATA.repartos) delete DATA.repartos[key]; }
  else { if(!DEMO) await fbPut(ROOT+'/repartos/'+key, reparto); DATA.repartos=DATA.repartos||{}; DATA.repartos[key]=reparto; }
}
function repartoPasa(R, filt){ if(!filt) return true; const r=repartoDe(R); if(filt==='sin') return !r; if(filt==='pendiente') return !!r&&r.estado==='pendiente'; if(filt==='hecho') return !!r&&r.estado==='hecho'; return true; }

function repChip(R){
  const r=repartoDe(R);
  if(!r) return esDeposito()?'<button class="btn btn-outline btn-sm" data-rep-open="'+esc(R.nro)+'" title="Marcar que este remito necesita reparto de Compras">⚑ Reparto</button>':'';
  if(r.estado==='pendiente') return '<button class="rep-badge rep-pend" data-rep-open="'+esc(R.nro)+'" title="Reparto pendiente'+(r.nota?(' — '+esc(r.nota)):'')+'">⚑ Pendiente</button>';
  return '<button class="rep-badge rep-done" data-rep-open="'+esc(R.nro)+'" title="Reparto hecho'+(r.hecho_por?(' por '+esc(r.hecho_por)):'')+'">✓ Repartido</button>';
}

function openRepartoModal(nro){
  const R=DATA.remitos[fbKey(nro)]; if(!R){ toast('Remito no encontrado','bad'); return; }
  const r=repartoDe(R); let u=0; (R.lineas||[]).forEach(l=>u+=num(l.cantidad));
  const editable = esDeposito()||esCompras();
  openModal('<button class="close" onclick="closeModal()">×</button><h2>Reparto · Remito '+esc(R.nro)+'</h2>'
    +'<div class="msub">'+esc(R.marca||'—')+' · '+esc(R.fecha||'')+' · '+fmtInt(u)+' u'+(r?(r.estado==='hecho'?' · ✓ hecho':' · ⚑ pendiente'):'')+'</div>'
    +'<div class="field"><label>Nota — qué hay que repartir</label><textarea class="inp" id="repNota" '+(editable?'':'disabled')+' placeholder="Ej: repartir 3 curvas a...">'+esc(r?(r.nota||''):'')+'</textarea></div>'
    +'<div class="field"><label>Sucursales destino</label><input class="inp" id="repDest" '+(editable?'':'disabled')+' placeholder="Ej: Calle 49, Diagonal 80" value="'+esc(r?(r.destino||''):'')+'" style="width:100%"></div>'
    +(r?('<div class="hint">'+(r.creado_por?('Marcado por '+esc(r.creado_por)+(r.creado_en?(' · '+esc(r.creado_en)):'')):'')+(r.hecho_por?('<br>Hecho por '+esc(r.hecho_por)+(r.hecho_en?(' · '+esc(r.hecho_en)):'')):'')+'</div>'):'')
    +'<div class="modal-actions">'+repModalBtns(r)+'</div>');
  bindRepModal(nro, r);
}
function repModalBtns(r){
  let b='<button class="btn btn-outline" onclick="closeModal()">Cerrar</button>';
  if(!r){ if(esDeposito()) b+='<button class="btn btn-primary" id="repSave">⚑ Marcar reparto</button>'; return b; }
  if(r.estado==='pendiente'){
    if(esDeposito()||esCompras()) b+='<button class="btn btn-outline" id="repEdit">Guardar cambios</button>';
    if(esDeposito()) b+='<button class="btn btn-outline" id="repDel">Desmarcar</button>';
    if(esCompras()) b+='<button class="btn btn-primary" id="repDone">Marcar hecho</button>';
  } else { if(esCompras()) b+='<button class="btn btn-outline" id="repReopen">Reabrir</button>'; }
  return b;
}
function bindRepModal(nro, r){
  const val=()=>({ nota:(($('repNota')||{}).value||'').trim(), destino:(($('repDest')||{}).value||'').trim() });
  const doSet=async(obj)=>{ try{ await setReparto(nro,obj); closeModal(); refreshDims(); render(); toast('Guardado','ok'); }catch(e){ toast('Error: '+e.message,'bad'); } };
  if($('repSave')) $('repSave').onclick=()=>{ const v=val(); doSet({estado:'pendiente',nota:v.nota,destino:v.destino,creado_por:_mail(),creado_en:nowISO()}); };
  if($('repEdit')) $('repEdit').onclick=()=>{ const v=val(); doSet(Object.assign({},r,{nota:v.nota,destino:v.destino})); };
  if($('repDel')) $('repDel').onclick=()=>{ if(confirm('¿Desmarcar el reparto de este remito?')) doSet(null); };
  if($('repDone')) $('repDone').onclick=()=>{ const v=val(); doSet(Object.assign({},r,{nota:v.nota,destino:v.destino,estado:'hecho',hecho_por:_mail(),hecho_en:nowISO()})); };
  if($('repReopen')) $('repReopen').onclick=()=>{ doSet(Object.assign({},r,{estado:'pendiente',hecho_por:null,hecho_en:null})); };
}

function updateRepartoBadge(){ const n=vals(DATA.repartos).filter(r=>r&&r.estado==='pendiente').length; const t=document.querySelector('.tab[data-tab="repartos"]'); if(t) t.textContent='Repartos'+(n?(' ('+n+')'):''); }

function renderRepartos(){
  const items=Object.keys(DATA.repartos||{}).map(k=>({r:DATA.repartos[k], R:DATA.remitos[k]})).filter(x=>x.r);
  const pend=items.filter(x=>x.r.estado==='pendiente').sort((a,b)=>cmp((b.R&&b.R.fecha)||'',(a.R&&a.R.fecha)||''));
  const hechos=items.filter(x=>x.r.estado==='hecho').sort((a,b)=>cmp(b.r.hecho_en||'',a.r.hecho_en||''));
  let html=seccionHead('Repartos','Remitos que el depósito marcó para que Compras haga el reparto');
  if(!items.length){ $('view').innerHTML=html+stateEmpty('No hay repartos marcados. El depósito los marca con ⚑ Reparto en cada remito (pestaña Ingresos).'); return; }
  html+=repList('Pendientes', pend, 'pendiente')+repList('Hechos', hechos, 'hecho');
  $('view').innerHTML=html;
  document.querySelectorAll('#view tr[data-rep-open]').forEach(tr=>tr.onclick=()=>openRepartoModal(tr.getAttribute('data-rep-open')));
}
function repList(titulo, arr, estado){
  const rows=arr.map(x=>{ const R=x.R||{nro:x.r.nro,marca:x.r.marca,fecha:x.r.fecha,lineas:[]}; const r=x.r; let u=0; (R.lineas||[]).forEach(l=>u+=num(l.cantidad));
    const quien = estado==='hecho'?(r.hecho_por?('hecho por '+esc(r.hecho_por)):''):(r.creado_por?('marcó '+esc(r.creado_por)):'');
    return '<tr data-rep-open="'+esc(R.nro)+'" style="cursor:pointer"><td class="mono">'+esc(R.nro)+'</td><td>'+esc(R.marca||'')+'</td><td class="mono">'+esc(R.fecha||'')+'</td><td class="num big">'+fmtInt(u)+'</td><td>'+esc(r.nota||'')+'</td><td>'+esc(r.destino||'')+'</td><td style="font-size:12px;color:var(--muted)">'+quien+'</td></tr>';
  }).join('');
  return '<div class="card"><div class="card-h">'+esc(titulo)+' ('+arr.length+')</div>'
    +(arr.length?('<div class="card-hs" style="margin-top:2px">Click en una fila para ver / gestionar</div><div class="tbl-wrap" style="margin-top:8px"><table style="min-width:700px"><thead><tr><th>Remito</th><th>Marca</th><th>Fecha</th><th class="num">Unid.</th><th>Nota</th><th>Destino</th><th>Quién</th></tr></thead><tbody>'+rows+'</tbody></table></div>'):'<div class="card-hs" style="margin-top:6px">—</div>')+'</div>';
}


/* ===== v2 (mejoras 1-5): roles, historial, tendencia/alertas, edición ===== */
function aplicarRol(){
  const dep = esDeposito() && !esCompras();
  const allowed = dep ? ['panel','remitos','repartos'] : ['panel','remitos','pedidos','control','repartos'];
  document.querySelectorAll('.tab').forEach(t=>{ t.style.display = allowed.includes(t.dataset.tab)?'':'none'; });
  if(!allowed.includes(state.tab)) state.tab=allowed[0];
}

/* Historial / auditoría — cada carga deja un registro en recepciones/log */
async function logCarga(tipo, detalle, cant){
  try{ if(DEMO) return; const k=nowISO().replace(/[^0-9]/g,'')+'-'+Math.floor((performance.now()*1000)%100000); await fbPut(ROOT+'/log/'+k,{ts:nowISO(),tipo:tipo,detalle:detalle||'',cant:cant||0,quien:_mail()}); }catch(e){}
}
async function openHistorial(){
  openModal('<button class="close" onclick="closeModal()">×</button><h2>Historial de cargas</h2><div class="msub">Últimas importaciones, ediciones y borrados.</div><div id="histBody">'+stateLoading()+'</div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cerrar</button></div>');
  try{
    const obj = DEMO ? {} : (await fbGet(ROOT+'/log')||{});
    const items = Object.keys(obj).map(k=>obj[k]).sort((a,b)=>cmp(b.ts||'',a.ts||'')).slice(0,150);
    const map={import:'Import masivo','alta-remito':'Alta remito','alta-pedido':'Alta pedido',oc:'OC convertida',editar:'Edición',borrado:'Borrado'};
    $('histBody').innerHTML = items.length ? ('<div class="tbl-wrap" style="max-height:58vh;overflow:auto"><table style="min-width:560px"><thead><tr><th>Fecha</th><th>Acción</th><th>Detalle</th><th class="num">Cant.</th><th>Quién</th></tr></thead><tbody>'+items.map(x=>'<tr><td class="mono">'+esc(x.ts||'')+'</td><td>'+esc(map[x.tipo]||x.tipo||'')+'</td><td>'+esc(x.detalle||'')+'</td><td class="num">'+(x.cant?fmtInt(x.cant):'')+'</td><td style="font-size:12px;color:var(--muted)">'+esc(x.quien||'')+'</td></tr>').join('')+'</tbody></table></div>') : stateEmpty('Sin registros todavía.');
  }catch(e){ $('histBody').innerHTML=stateError(e.message); }
}

/* Panel: ingresos por mes con variación vs mes anterior */
function cardMeses(obj){
  const ks=Object.keys(obj).sort(cmp);
  if(!ks.length) return '<div class="card"><div class="card-h">Ingresos por mes</div>'+stateEmpty('Sin datos.')+'</div>';
  const max=Math.max.apply(null,ks.map(k=>obj[k]))||1;
  const rows=ks.map((k,i)=>{ const v=obj[k]; const prev=i>0?obj[ks[i-1]]:null; const d=(prev&&prev>0)?Math.round((v-prev)/prev*100):null;
    const dh=d==null?'':(' <span style="font-size:11px;font-weight:700;color:'+(d>0?'#16a34a':d<0?'#dc2626':'#6B7A99')+'">'+(d>0?'▲+'+d:d<0?'▼'+d:'0')+'%</span>');
    return '<div class="barrow"><span class="lb">'+esc(mesLabel(k))+'</span><span class="bar"><span style="width:'+Math.max(2,Math.round(v/max*100))+'%"></span></span><span class="vv">'+fmtInt(v)+dh+'</span></div>'; }).join('');
  return '<div class="card"><div class="card-h">Ingresos por mes</div><div class="card-hs">Unidades por mes · variación vs mes anterior</div><div class="barlist">'+rows+'</div></div>';
}
/* Panel: alertas del control (pedidos sin ingresar / excedidos) */
function alertasCard(ctrl){
  const pend=ctrl.filter(c=>c.estado==='pendiente').sort((a,b)=>b.cant_pendiente-a.cant_pendiente).slice(0,8);
  const exc=ctrl.filter(c=>c.estado==='excedido').sort((a,b)=>a.cant_pendiente-b.cant_pendiente).slice(0,8);
  if(!pend.length && !exc.length) return '';
  const row=(c,t)=>'<div class="barrow" style="grid-template-columns:1fr auto"><span class="lb" title="'+esc(c.marca+' · '+c.disciplina+' / '+c.tipo)+'">'+esc(c.marca)+' · '+esc(c.disciplina)+' / '+esc(c.tipo)+'</span><span class="badge b-'+esc(c.estado)+'">'+(t==='p'?('faltan '+fmtInt(c.cant_pendiente)):('sobran '+fmtInt(-c.cant_pendiente)))+'</span></div>';
  let h='<div class="card"><div class="card-h">Alertas</div><div class="card-hs">Del control: pedidos sin ingresar y excedidos</div><div class="barlist">';
  if(pend.length) h+='<div style="font-family:var(--font-c);font-weight:700;font-size:12px;color:var(--muted)">Pendientes de ingresar</div>'+pend.map(c=>row(c,'p')).join('');
  if(exc.length) h+='<div style="font-family:var(--font-c);font-weight:700;font-size:12px;color:var(--muted);margin-top:6px">Excedidos</div>'+exc.map(c=>row(c,'e')).join('');
  return h+'</div></div>';
}

/* Editar remito / pedido (reemplaza el documento; conserva talles de líneas no tocadas) */
function openEditar(tipoDoc, key){
  const doc=(tipoDoc==='pedido'?DATA.pedidos:DATA.remitos)[key]; if(!doc){ toast('Documento no encontrado','bad'); return; }
  const esPed=tipoDoc==='pedido'; const marcas=(state.dims&&state.dims.marcas)||[];
  openModal('<button class="close" onclick="closeModal()">×</button><h2>Editar '+(esPed?'OC ':'remito ')+esc(doc.nro)+'</h2><div class="msub">Cambiá la cabecera y las líneas. Guardar reemplaza el documento.</div>'
    +'<div class="formgrid">'
      + field('Fecha','<input class="inp" type="date" id="eFecha" value="'+esc(doc.fecha||'')+'">')
      + field('Marca','<input class="inp" id="eMarca" list="eMarcaList" value="'+esc(doc.marca||'')+'"><datalist id="eMarcaList">'+marcas.map(m=>'<option>'+esc(m)+'</option>').join('')+'</datalist>')
      + field('Proveedor','<input class="inp" id="eProv" value="'+esc(doc.proveedor||'')+'">')
      + (esPed?field('Comprador','<input class="inp" id="eComp" value="'+esc(doc.comprador||'')+'">'):field('OC asociada','<input class="inp" id="eOC" value="'+esc(doc.pedido_nro||'')+'">'))
    +'</div><div style="margin:10px 0 6px;font-family:var(--font-c);font-weight:700;letter-spacing:.5px">Líneas</div>'
    +'<div class="tbl-wrap" style="max-height:40vh;overflow:auto"><table style="min-width:660px"><thead><tr><th>Código</th><th>Artículo</th><th>Rubro</th><th>Disciplina</th><th>Tipo</th><th class="num">Cant.</th><th class="num">Costo U.</th><th></th></tr></thead><tbody id="eLineas"></tbody></table></div>'
    +'<div style="margin-top:8px"><button class="btn btn-outline btn-sm" id="eAdd">+ Línea</button></div>'
    +'<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="eSave">Guardar cambios</button></div>');
  const tb=$('eLineas'); (doc.lineas||[]).forEach(l=>eLinRow(tb,l)); $('eAdd').onclick=()=>eLinRow(tb,{});
  $('eSave').onclick=()=>guardarEdicion(tipoDoc, key, doc);
}
function eLinRow(tb, l){
  const tr=document.createElement('tr'); tr._talles=l.talles||null;
  tr.innerHTML='<td><input class="inp" style="width:120px" value="'+esc(l.modelo||'')+'"></td><td><input class="inp" style="width:100%" value="'+esc(l.descripcion||'')+'"></td><td><input class="inp" style="width:100%" value="'+esc(l.rubro||'')+'"></td><td><input class="inp" style="width:100%" value="'+esc(l.disciplina||'')+'"></td><td><input class="inp" style="width:100%" value="'+esc(l.tipo||'')+'"></td><td><input class="inp num" type="number" step="1" style="width:80px;text-align:right" value="'+num(l.cantidad)+'"></td><td><input class="inp num" type="number" step="0.01" style="width:100px;text-align:right" value="'+num(l.costo_unitario)+'"></td><td><button class="btn btn-outline btn-sm" title="Quitar">✕</button></td>';
  tr.querySelector('button').onclick=()=>tr.remove(); tb.appendChild(tr);
}
async function guardarEdicion(tipoDoc, key, orig){
  const esPed=tipoDoc==='pedido';
  const lineas=[...$('eLineas').querySelectorAll('tr')].map(tr=>{ const c=tr.querySelectorAll('input'); const o={ modelo:c[0].value.trim(), descripcion:c[1].value.trim(), rubro:c[2].value.trim(), disciplina:c[3].value.trim(), tipo:c[4].value.trim(), cantidad:parseFloat(c[5].value)||0, costo_unitario:parseFloat(c[6].value)||0 }; if(tr._talles) o.talles=tr._talles; return o; }).filter(l=>l.cantidad||l.costo_unitario||l.rubro||l.tipo||l.modelo);
  if(!$('eFecha').value){ toast('Falta la fecha','bad'); return; }
  if(!lineas.length){ toast('Agregá al menos una línea','bad'); return; }
  const btn=$('eSave'); if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const doc=Object.assign({}, orig, { fecha:$('eFecha').value, marca:$('eMarca').value.trim(), proveedor:$('eProv').value.trim(), lineas });
  if(esPed) doc.comprador=$('eComp').value.trim(); else { doc.pedido_nro=($('eOC')?$('eOC').value.trim():''); doc.semana=semanaISO($('eFecha').value); }
  try{
    if(!DEMO) await fbPut(ROOT+'/'+(esPed?'pedidos':'remitos')+'/'+key, doc);
    (esPed?DATA.pedidos:DATA.remitos)[key]=doc;
    logCarga('editar',(esPed?'OC ':'Remito ')+doc.nro, lineas.reduce((s,l)=>s+num(l.cantidad),0));
    closeModal(); refreshDims(); render(); toast('Cambios guardados','ok');
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Guardar cambios'; } toast(e.message,'bad'); }
}


function openModal(html){ $('modal').innerHTML=html; $('overlay').classList.add('show'); document.addEventListener('keydown',escClose); }
function closeModal(){ $('overlay').classList.remove('show'); document.removeEventListener('keydown',escClose); impCtx=null; convCtx=null; }
function escClose(e){ if(e.key==='Escape') closeModal(); }
$('overlay').addEventListener('click', e=>{ if(e.target===$('overlay')) closeModal(); });
window.closeModal=closeModal;

function bindTabs(){ document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.tab=b.dataset.tab; render(); }); }
function bindFiltros(){
  const map={fMes:'mes',fMarca:'marca',fRubro:'rubro',fDisc:'disciplina',fTipo:'tipo',fProv:'proveedor',fRep:'reparto'};
  Object.keys(map).forEach(id=>{ const el=$(id); if(el) el.onchange=()=>{ state.filtros[map[id]]=el.value; render(); }; });
  let _qt; const fq=$('fQ'); if(fq) fq.oninput=()=>{ clearTimeout(_qt); _qt=setTimeout(()=>{ state.filtros.q=fq.value; render(); },180); };
  $('fReset').onclick=()=>{ state.filtros={mes:'',marca:'',rubro:'',disciplina:'',tipo:'',proveedor:'',reparto:'',q:''}; ['fMes','fMarca','fRubro','fDisc','fTipo','fProv','fRep','fQ'].forEach(id=>{const e=$(id); if(e)e.value='';}); render(); };
  $('fReload').onclick=recargar;
  const fh=$('fHist'); if(fh) fh.onclick=openHistorial;
}
async function recargar(){
  const btn=$('fReload'); if(btn){ btn.disabled=true; btn.textContent='Recargando…'; }
  try{ await cargarTodo(); refreshDims(); render(); toast('Datos actualizados','ok'); }
  catch(e){ toast('No se pudo recargar: '+e.message,'bad'); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='↻ Recargar'; } }
}
$('salir').onclick=()=>{ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} location.replace('../'); };

async function init(){
  $('whoName').textContent=SESSION.email||'—'; $('whoRole').textContent=SESSION.rol||'—';
  if(DEMO) $('demoBanner').classList.add('show');
  bindTabs(); bindFiltros();
  try{ await cargarTodo(); }
  catch(e){
    $('view').innerHTML=stateError('No se pudo cargar la base ('+e.message+').')
      +'<div style="text-align:center;margin-top:-22px;padding-bottom:26px"><button class="btn btn-primary btn-sm" id="btnRetry">Reintentar</button></div>';
    $('btnRetry').onclick=init; return;
  }
  refreshDims(); aplicarRol(); render();
}
init();
</script>
