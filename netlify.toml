# Configuración de Netlify para el monorepo del portal.
# El sitio se publica desde la raíz del repo (no hay build: son HTML estáticos).

[build]
  publish = "."
  command = ""

# Cabeceras de seguridad básicas (opcional, pero recomendado).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
