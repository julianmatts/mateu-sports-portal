<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/components/calendario-retail/calendario.css">
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#ffffff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#ffffff;--border:#dce3f0;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --shadow:0 1px 4px rgba(11,21,39,.08);--shadow-md:0 8px 30px rgba(11,21,39,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--navy);font-family:var(--font-b);min-height:100vh}

/* ===== LOGIN ===== */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 120% at 50% 0%,#13203a 0%,#0B1527 60%)}
.login-card{width:100%;max-width:360px;background:var(--card);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);overflow:hidden;animation:rise .5s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-head{background:var(--navy);padding:30px 28px 24px;text-align:center;border-bottom:3px solid var(--red)}
.login-head img{height:42px;filter:brightness(0) invert(1);margin-bottom:12px}
.login-head .t{font-family:var(--font-d);font-size:26px;letter-spacing:2px;color:#fff;line-height:1}
.login-head .s{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted-light);margin-top:4px}
.login-body{padding:26px 28px 28px}
.fld{margin-bottom:14px}
.fld label{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fld input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:var(--font-b);font-size:15px;color:var(--navy);transition:border .15s}
.fld input:focus{outline:none;border-color:var(--navy-mid)}
.login-btn{width:100%;margin-top:6px;padding:12px;border:none;border-radius:8px;background:var(--red);
  color:#fff;font-family:var(--font-c);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .15s}
.login-btn:hover{background:#a00000}
.login-err{display:none;margin-top:12px;background:#fff0f0;color:#991b1b;border:1px solid #fecaca;
  border-radius:7px;padding:9px 12px;font-size:13px;text-align:center}
.login-err.show{display:block;animation:rise .25s}

/* ===== DASHBOARD ===== */
#app{display:none}
.top{background:var(--navy);padding:14px 30px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--red)}
.top-left{flex:1;display:flex;align-items:center}
.top-center{flex:0 0 auto;display:flex;align-items:center}
.top img{height:36px;filter:brightness(0) invert(1)}
.top .lbl{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted-light)}
.top-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:14px}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:15px;font-weight:600;color:#fff}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--red-soft)}
.logout{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;cursor:pointer;transition:all .15s}
.logout:hover{color:#fff;border-color:#fff}
.gear-btn{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-size:15px;line-height:1;padding:7px 10px;cursor:pointer;transition:all .15s}
.gear-btn:hover{color:#fff;border-color:#fff}

main{max-width:1080px;margin:0 auto;padding:40px 30px 60px}
.greet{font-family:var(--font-d);font-size:34px;letter-spacing:1px;color:var(--navy);line-height:1}
.greet span{color:var(--red)}
.sub{font-family:var(--font-c);font-size:13px;font-weight:500;letter-spacing:.5px;color:var(--muted);
  margin-top:4px;margin-bottom:28px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.tile{display:block;text-decoration:none;background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;
  position:relative}
.tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.tile .accent{height:4px;background:var(--navy-mid)}
.tile.red .accent{background:var(--red)}
.tile-body{padding:22px 22px 24px}
.tile .ico{font-size:30px;line-height:1;margin-bottom:14px}
.tile .name{font-family:var(--font-d);font-size:23px;letter-spacing:1px;color:var(--navy);line-height:1.05}
.tile .desc{font-family:var(--font-b);font-size:13.5px;font-weight:400;color:var(--muted);
  margin-top:7px;line-height:1.4}
.tile .go{position:absolute;top:18px;right:20px;font-family:var(--font-c);font-size:20px;
  color:var(--muted-light);transition:color .18s,transform .18s}
.tile:hover .go{color:var(--red);transform:translateX(3px)}

.empty{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:34px;
  text-align:center;color:var(--muted);font-size:14px}

/* ===== AJUSTES / USUARIOS ===== */
.bc{margin-bottom:20px;font-family:var(--font-c);font-size:13px;font-weight:600;letter-spacing:.5px}
.bc .lnk{color:var(--red);cursor:pointer}
.bc .lnk:hover{text-decoration:underline}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.card-title{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;color:var(--navy);margin-bottom:12px}
.table-wrap{overflow-x:auto}
.settings-table{width:100%;border-collapse:collapse;font-size:13px}
.settings-table th{background:var(--navy);color:#fff;font-family:var(--font-c);font-weight:600;letter-spacing:.5px;
  padding:9px 10px;text-align:left;white-space:nowrap}
.settings-table td{padding:8px 10px;border-bottom:1px solid #eef0f7}
.settings-table tr:hover td{background:#f8f9fe}
.btn{border:none;border-radius:8px;padding:10px 18px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;transition:all .15s;cursor:pointer}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:#a00000}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--navy)}
.btn-outline:hover{border-color:var(--navy-mid)}
.btn-sm{padding:6px 12px;font-size:11px}
.sel{padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;color:var(--navy);background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .fld{margin-bottom:0}
.form-grid .fld input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.fld-full{grid-column:1/-1}
.hint{font-size:12.5px;color:var(--muted);margin-top:4px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}

/* ===== BANDEJA / MENSAJES ===== */
.msg-btn{position:relative;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;
  color:rgba(255,255,255,.7);font-size:15px;line-height:1;padding:7px 10px;cursor:pointer;transition:all .15s}
.msg-btn:hover{color:#fff;border-color:#fff}
.msg-badge{position:absolute;top:-7px;right:-7px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;
  background:var(--red);color:#fff;font-family:var(--font-c);font-size:10px;font-weight:700;line-height:17px;text-align:center}
.msg-tabs{display:flex;gap:8px;margin-bottom:16px}
.msg-tab{border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px 16px;cursor:pointer;
  font-family:var(--font-c);font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.msg-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.msg-picker{margin-bottom:14px}
.msg-thread{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;
  height:52vh;min-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg-empty{margin:auto;color:var(--muted);font-size:14px;text-align:center}
.bub{max-width:78%;padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.4}
.bub .meta{display:block;font-family:var(--font-c);font-size:10.5px;font-weight:600;letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:3px;opacity:.75}
.bub.mine{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:3px}
.bub.theirs{align-self:flex-start;background:#eef1f8;color:var(--navy);border-bottom-left-radius:3px}
.bub .time{font-size:10px;opacity:.55;margin-left:8px;white-space:nowrap}
.msg-compose{display:flex;gap:10px;margin-top:14px}
.msg-compose textarea{flex:1;resize:none;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:var(--font-b);font-size:14px;color:var(--navy);height:46px}
.msg-compose textarea:focus{outline:none;border-color:var(--navy-mid)}
.msg-notice{background:#fff8e6;border:1px solid #f5d98a;color:#8a6d1a;border-radius:10px;padding:16px 18px;
  font-size:14px;line-height:1.55}
.msg-notice code{background:#fdeecb;padding:1px 5px;border-radius:4px;font-size:13px}
.msg-filter{margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--font-c);font-size:12px;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.msg-filter .sel{text-transform:none;font-weight:400;letter-spacing:0}
.msg-compose-wrap{margin-top:14px}
.msg-dest-lbl{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.dest-chip{font-family:var(--font-c);font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.85;margin-left:6px}
/* Directos: bandeja de conversaciones */
.dm-wrap{display:grid;grid-template-columns:250px 1fr;gap:14px;align-items:start}
.dm-list{border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden}
.dm-new{padding:10px;border-bottom:1px solid var(--border)}
.dm-new .sel{width:100%}
.dm-convos{max-height:56vh;overflow-y:auto}
.dm-convo{padding:11px 13px;border-bottom:1px solid #eef0f7;cursor:pointer;transition:background .12s}
.dm-convo:last-child{border-bottom:none}
.dm-convo:hover{background:#f8f9fe}
.dm-convo.active{background:#eef1f8}
.dm-convo-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dm-convo-name{font-family:var(--font-c);font-weight:700;font-size:14px;color:var(--navy)}
.dm-convo-prev{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-dot{background:var(--red);color:#fff;font-family:var(--font-c);font-size:10px;font-weight:700;
  min-width:16px;height:16px;line-height:16px;text-align:center;border-radius:8px;padding:0 4px;flex:0 0 auto}
.dm-main{min-width:0}
.dm-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dm-back{display:none;font-family:var(--font-c);font-size:12px;font-weight:700;color:var(--red);cursor:pointer;
  text-transform:uppercase;letter-spacing:.5px}
.dm-title{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;color:var(--navy)}
@media(max-width:640px){
  .dm-wrap{grid-template-columns:1fr}
  .dm-wrap .dm-main{display:none}
  .dm-wrap.viewing .dm-list{display:none}
  .dm-wrap.viewing .dm-main{display:block}
  .dm-back{display:inline}
  .dm-convos{max-height:none}
}

/* ===== WIDGET FLOTANTE DE NOTIFICACIONES (esquina inferior derecha) ===== */
#notifWidget{position:fixed;right:22px;bottom:22px;z-index:1000;font-family:var(--font-b)}
.notif-fab{position:relative;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
  background:var(--navy);color:#fff;font-size:23px;line-height:1;box-shadow:var(--shadow-md);
  display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;
  border-bottom:3px solid var(--red)}
.notif-fab:hover{transform:translateY(-2px);background:var(--navy-mid)}
.notif-fab-badge{position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;padding:0 5px;border-radius:10px;
  background:var(--red);color:#fff;font-family:var(--font-c);font-size:11px;font-weight:700;line-height:20px;
  text-align:center;border:2px solid var(--navy)}
.notif-panel{position:absolute;right:0;bottom:70px;width:344px;max-width:calc(100vw - 44px);background:var(--card);
  border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-md);overflow:hidden;
  flex-direction:column;max-height:min(72vh,540px);animation:rise .2s}
.notif-head{background:var(--navy);color:#fff;padding:13px 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:3px solid var(--red)}
.notif-head .t{font-family:var(--font-d);font-size:19px;letter-spacing:1px}
.notif-close{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:22px;line-height:1;
  cursor:pointer;padding:0 2px}
.notif-close:hover{color:#fff}
.notif-list{flex:1;overflow-y:auto;padding:6px}
.notif-empty{color:var(--muted);font-size:13.5px;text-align:center;padding:34px 20px}
.notif-item{display:flex;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:background .12s}
.notif-item:hover{background:#f5f7fc}
.notif-item .ic{font-size:18px;line-height:1.2;flex:0 0 auto}
.notif-item .bd{flex:1;min-width:0}
.notif-item .hd{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.notif-item .au{font-family:var(--font-c);font-size:12px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--navy)}
.notif-item .tm{font-size:10.5px;color:var(--muted-light);white-space:nowrap}
.notif-item .tx{font-size:13.5px;color:var(--muted);margin-top:2px;line-height:1.4;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.notif-item .kind{display:inline-block;font-family:var(--font-c);font-size:9.5px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;padding:1px 6px;border-radius:5px;margin-top:5px}
.notif-item .kind.aviso{background:#fff0f0;color:var(--red)}
.notif-item .kind.tablero{background:#eef1f8;color:var(--navy-mid)}
.notif-item .kind.directo{background:#e9f7ee;color:#1c7a3f}
.notif-aviso{border-top:1px solid var(--border);padding:12px;background:#fafbff}
.notif-aviso textarea{width:100%;resize:none;height:52px;padding:9px 11px;border:1.5px solid var(--border);
  border-radius:8px;font-family:var(--font-b);font-size:13.5px;color:var(--navy);margin-bottom:8px}
.notif-aviso textarea:focus{outline:none;border-color:var(--navy-mid)}
.notif-aviso .btn{width:100%}
.notif-toast{position:absolute;right:0;bottom:70px;width:322px;max-width:calc(100vw - 44px);
  background:var(--card);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:12px;
  box-shadow:var(--shadow-md);padding:12px 14px;gap:11px;cursor:pointer;
  opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
.notif-toast.show{opacity:1;transform:none}
.notif-toast-ic{font-size:20px;line-height:1.1;flex:0 0 auto}
.notif-toast-bd{flex:1;min-width:0}
.notif-toast-hd{font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--navy)}
.notif-toast-more{color:var(--red)}
.notif-toast-tx{font-size:13.5px;color:var(--muted);margin-top:2px;line-height:1.4;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
@media(max-width:560px){#notifWidget{right:16px;bottom:16px}}

footer{text-align:center;padding:24px;font-family:var(--font-c);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted-light)}

@media(max-width:560px){
  main{padding:28px 18px 48px}.top{padding:12px 18px}
  .grid{grid-template-columns:1fr}.greet{font-size:28px}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">

const ROLE_LABEL = { admin:'Administrador', supervisor:'Supervisor', sucursal:'Sucursal', outlet:'Outlet' };
const SESSION_KEY = 'mateu_portal_session';

/* ============================================================
   LÓGICA — normalmente no hace falta tocar de acá para abajo.
   ============================================================ */
const $ = id => document.getElementById(id);

// localStorage envuelto en try/catch (así no rompe en previews sin storage)
function saveSession(s){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }catch(e){ window.__sess=s; } }
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s? JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){ window.__sess=null; } }

function esc(s){ return (s===null||s===undefined)?'':String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function firebaseKeyFromEmail(email){ return (email||'').toLowerCase().trim().replace(/\./g,','); }
async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function putJSON(url, data){
  return fetch(url,{method:'PUT',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
function patchJSON(url, data){
  return fetch(url,{method:'PATCH',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}

function esSettingsAdmin(session){
  return !!session && session.rol==='admin' && (session.email||'').toLowerCase()===ADMIN_SETTINGS_EMAIL;
}

// Sucursales y outlets siempre ven Asignación de Marcas (dentro del módulo
// cada una ve solo SU asignación), sin depender de cargarlo usuario por usuario.
function herramientasEfectivas(rol, herramientas){
  const h = (herramientas||[]).slice();
  // El admin (Juli) ve TODAS las herramientas sin cargarlas una por una: los
  // módulos ya le dan acceso total por rol, así que también le mostramos todos los tiles.
  if(rol==='admin'){ Object.keys(TOOLS).forEach(k=>{ if(!h.includes(k)) h.push(k); }); return h; }
  if(rol==='sucursal' || rol==='outlet'){
    if(!h.includes('marcas')) h.push('marcas');
    // Indicadores de Sucursal es la pantalla de inicio de estos roles: siempre disponible.
    if(!h.includes('indicadores')) h.push('indicadores');
    // Su propia evaluación de supervisor (vista de encargado).
    if(!h.includes('evaluaciones')) h.push('evaluaciones');
  }
  // El supervisor gestiona las Evaluaciones de sus sucursales; Indicadores le
  // sirve de contexto para el ítem de ratio de stock.
  if(rol==='supervisor'){
    if(!h.includes('evaluaciones')) h.push('evaluaciones');
    if(!h.includes('indicadores')) h.push('indicadores');
  }
  return h;
}

function showLogin(){ $('login').style.display='flex'; $('app').style.display='none'; $('p').value=''; }
function showApp(){ $('login').style.display='none'; $('app').style.display='block'; }
function showLoginErr(){ $('loginErr').classList.add('show'); }
function hideLoginErr(){ $('loginErr').classList.remove('show'); }

async function login(){
  const email = ($('u').value || '').trim().toLowerCase();
  const pin = ($('p').value || '').trim();
  hideLoginErr();
  if(!email || !pin) return;
  const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'Entrando…';
  try{
    const usuarios = await (await fetch(FB_USUARIOS)).json();
    let found = null;
    for(const k in (usuarios||{})){
      const u = usuarios[k];
      if(u && u.email && u.email.toLowerCase() === email){ found = u; break; }
    }
    if(!found || String(found.pin) !== pin){ showLoginErr(); btn.disabled=false; btn.textContent='Entrar'; return; }
    // `sucursales` (para rol supervisor) define qué sucursales ve/edita en
    // Evaluaciones. Alcance "blando" en el cliente, como el resto del portal.
    const session = { email:found.email, rol:found.rol, herramientas:herramientasEfectivas(found.rol, found.herramientas), sucursal:found.sucursal||null, outlet_id:found.outlet_id||null, sucursales:found.sucursales||null };
    saveSession(session);
    render(session);
  } catch(e){
    showLoginErr();
  }
  btn.disabled = false; btn.textContent = 'Entrar';
}

function logout(){
  if(MSG_BADGE_TIMER){ clearInterval(MSG_BADGE_TIMER); MSG_BADGE_TIMER=null; }
  $('msgBtn').style.display='none'; $('msgBadge').style.display='none';
  closeNotifPanel(); ocultarToast(); $('notifWidget').style.display='none';
  clearSession(); showLogin();
}

let CURRENT_SESSION = null;

function render(session){
  CURRENT_SESSION = session;
  // Los usuarios de sucursal/outlet aterrizan en Indicadores de Sucursal (su home),
  // no en la grilla de tiles. Excepción: si vienen a ver la bandeja desde la campana
  // del módulo (?ver=bandeja) no se los redirige, así pueden leer/responder mensajes.
  const verBandeja = new URLSearchParams(location.search).get('ver')==='bandeja';
  if(session && (session.rol==='sucursal' || session.rol==='outlet') && !verBandeja){
    location.replace('./indicadores/');
    return;
  }
  $('whoName').textContent = session.email;
  $('whoRole').textContent = ROLE_LABEL[session.rol] || session.rol;
  $('greet').innerHTML = 'Hola, <span>'+session.email+'</span>';
  $('gearBtn').style.display = esSettingsAdmin(session) ? 'inline-block' : 'none';
  $('msgBtn').style.display = 'inline-block';
  iniciarBandeja();
  $('notifWidget').style.display = MENSAJES_OK ? 'block' : 'none';

  const keys = session.herramientas || [];
  const grid = $('grid');
  grid.innerHTML = '';
  if(keys.length === 0){
    grid.innerHTML = '<div class="empty">No tenés herramientas asignadas todavía.</div>';
  } else {
    keys.forEach(k => {
      const t = TOOLS[k];
      if(!t) return;
      const a = document.createElement('a');
      a.className = 'tile' + (t.red ? ' red' : '');
      a.href = t.url;
      a.innerHTML =
        '<div class="accent"></div>'+
        '<div class="go">→</div>'+
        '<div class="tile-body">'+
          '<div class="ico">'+t.icon+'</div>'+
          '<div class="name">'+t.name+'</div>'+
          '<div class="desc">'+t.desc+'</div>'+
        '</div>';
      grid.appendChild(a);
    });
  }
  $('sub').textContent = keys.length === 1 ? 'Tenés 1 herramienta disponible.'
                                           : 'Tenés '+keys.length+' herramientas disponibles.';
  closeSettings();
  showApp();
  pintarBadgeEvaluaciones(session);

  // Si llegaron desde la campana del módulo Indicadores (?ver=bandeja), abrir la bandeja.
  if(verBandeja && MENSAJES_OK){
    const con = new URLSearchParams(location.search).get('con');
    if(con){ MSG_TAB='directos'; MSG_OTRO=con; } else { MSG_TAB='tablero'; }
    openMensajes();
  }
}

/* ============================================================
   BADGE de Evaluaciones en el tile (§6.6). Best-effort: lee la base
   Firebase evaluaciones-mateu. Pegá su URL en EVAL_DB_URL (la misma que en
   evaluaciones/index.html); vacío = sin badge. Gerencia/supervisor ven el
   agregado "X de N sin evaluar esta semana".
   ============================================================ */
const EVAL_DB_URL = 'https://evaluaciones-mateu-default-rtdb.firebaseio.com';   // misma base que el módulo (vacío = sin badge)
const EVAL_SUCS_TODAS = SUCURSALES.map(s=>s.slug).concat(OUTLETS_LIST.map(o=>o.id));
function isoWeekActual(){ const d=new Date(); const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(u.getUTCDay()+6)%7; u.setUTCDate(u.getUTCDate()-day+3); const f=new Date(Date.UTC(u.getUTCFullYear(),0,4)); const w=1+Math.round(((u-f)/864e5-3+((f.getUTCDay()+6)%7))/7); return u.getUTCFullYear()+'-W'+String(w).padStart(2,'0'); }
async function pintarBadgeEvaluaciones(session){
  try{
    if(!/^https?:\/\//.test(EVAL_DB_URL)) return;   // sin base configurada → sin badge
    const tile = $('grid') && $('grid').querySelector('a[href="./evaluaciones/"]');
    if(!tile) return;
    const semana = isoWeekActual();
    // Alcance por rol (blando, en cliente).
    let visibles;
    if(session.rol==='admin') visibles = EVAL_SUCS_TODAS;
    else if(session.rol==='supervisor') visibles = session.sucursales||[];
    else visibles = [session.rol==='outlet'?session.outlet_id:session.sucursal].filter(Boolean);
    if(!visibles.length) return;
    const veRanking = session.rol==='admin' || session.rol==='supervisor';
    const obj = await (await fetch(EVAL_DB_URL.replace(/\/$/,'')+'/evaluaciones.json')).json() || {};
    const evals = Object.keys(obj).map(k=>obj[k]);
    // Por cada sucursal visible, última 'enviada' <= semana.
    let sinEvaluar=0; let propio=null;
    visibles.forEach(suc=>{
      const l = evals.filter(e=>e && e.sucursal===suc && e.semana<=semana && e.estado==='enviada').sort((a,b)=>a.semana<b.semana?-1:1);
      const cur = l.find(r=>r.semana===semana) || l[l.length-1];
      if(!l.find(r=>r.semana===semana)) sinEvaluar++;
      if(!veRanking && cur){ const prev=l[l.indexOf(cur)-1]; propio={pts:cur.pts_total,nota:cur.nota,delta:prev?cur.pts_total-prev.pts_total:null,sin:!l.find(r=>r.semana===semana)}; }
    });
    let txt, cls;
    if(veRanking){ txt = sinEvaluar>0 ? (sinEvaluar+' de '+visibles.length+' sin evaluar') : ('Todas evaluadas · '+visibles.length); cls = sinEvaluar>0?'warn':'ok'; }
    else if(!propio){ txt='Sin evaluar'; cls='na'; }
    else { txt = propio.pts+' · '+propio.nota + (propio.delta?(propio.delta>0?' ▲+'+propio.delta:' ▼'+propio.delta):''); cls = propio.nota==='A'?'ok':propio.nota==='B'?'warn':'bad'; }
    const col = cls==='ok'?'#16a34a':cls==='warn'?'#d97706':cls==='bad'?'#CC0000':'#94a3b8';
    const badge = document.createElement('div');
    badge.textContent = txt;
    badge.style.cssText = 'position:absolute;top:16px;right:18px;background:'+col+';color:#fff;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:20px;z-index:2';
    tile.appendChild(badge);
  }catch(e){ /* sin badge si algo falla */ }
}

async function renderUsuariosView(container){
  container.innerHTML = '<div class="pg-title" style="font-family:var(--font-d);font-size:26px;color:var(--navy)">Gestión de Usuarios</div>'+
    '<div class="sub" style="margin-bottom:18px">Alta, baja, rol, herramientas y reseteo de PIN</div>'+
    '<div id="usrBody"><div class="hint">Cargando…</div></div>';
  const usuarios = await fetchJSON(FB_USUARIOS) || {};
  const body = $('usrBody');
  const HERRAMIENTAS_LIST = Object.keys(TOOLS).map(k => ({id:k, nombre:TOOLS[k].name}));

  function herramientasSelectHtml(k, u){
    const actuales = u.herramientas||[];
    return '<select class="sel" multiple size="4" data-herr="'+k+'" style="min-width:150px">'+
      HERRAMIENTAS_LIST.map(h=>'<option value="'+h.id+'"'+(actuales.includes(h.id)?' selected':'')+'>'+h.nombre+'</option>').join('')+
      '</select>';
  }

  // Locales asignables a un supervisor (sucursales + outlets).
  const LOCALES_SUP = SUCURSALES.map(s=>({id:s.slug,nombre:s.nombre}))
    .concat(OUTLETS_LIST.map(o=>({id:o.id,nombre:o.nombre})));
  function supervisorSucSelectHtml(k, u){
    const sel = u.sucursales||[];
    return '<select class="sel" multiple size="4" data-supsuc="'+k+'" style="min-width:150px">'+
      LOCALES_SUP.map(l=>'<option value="'+l.id+'"'+(sel.includes(l.id)?' selected':'')+'>'+l.nombre+'</option>').join('')+
      '</select>';
  }

  function draw(){
    const keys = Object.keys(usuarios).sort((a,b)=> (usuarios[a].email||'').localeCompare(usuarios[b].email||''));
    body.innerHTML =
      '<div class="card"><div class="table-wrap"><table class="settings-table"><thead><tr><th>Email</th><th>Rol</th><th>Sucursal/Outlet</th><th>Herramientas</th><th></th></tr></thead><tbody>'+
      keys.map(k=>{
        const u = usuarios[k];
        const sucCell = u.rol==='supervisor' ? supervisorSucSelectHtml(k,u) : esc(u.sucursal||u.outlet_id||'—');
        return '<tr><td>'+esc(u.email)+'</td><td>'+esc(u.rol)+'</td><td>'+sucCell+'</td>'+
          '<td>'+herramientasSelectHtml(k,u)+'</td>'+
          '<td><button class="btn btn-outline btn-sm" data-guardar-herr="'+k+'">Guardar</button> <button class="btn btn-outline btn-sm" data-reset="'+k+'">Resetear PIN</button> <button class="btn btn-outline btn-sm" data-del="'+k+'">Eliminar</button></td></tr>';
      }).join('')+
      '</tbody></table></div></div>'+
      '<div class="card"><div class="card-title">Nuevo usuario</div><div class="form-grid">'+
        '<div class="fld"><label>Email</label><input id="nuEmail" type="email"></div>'+
        '<div class="fld"><label>Rol</label><select class="sel" id="nuRol" style="width:100%">'+
          '<option value="admin">admin</option><option value="supervisor">supervisor</option><option value="sucursal">sucursal</option><option value="outlet">outlet</option>'+
        '</select></div>'+
        '<div class="fld"><label>Sucursal (si rol=sucursal)</label><select class="sel" id="nuSucursal" style="width:100%"><option value="">—</option>'+SUCURSALES.map(s=>'<option value="'+s.slug+'">'+s.nombre+'</option>').join('')+'</select></div>'+
        '<div class="fld"><label>Outlet (si rol=outlet)</label><select class="sel" id="nuOutlet" style="width:100%"><option value="">—</option>'+OUTLETS_LIST.map(o=>'<option value="'+o.id+'">'+o.nombre+'</option>').join('')+'</select></div>'+
        '<div class="fld fld-full"><label>Sucursales que supervisa (si rol=supervisor)</label><select class="sel" multiple size="5" id="nuSupSuc" style="width:100%">'+LOCALES_SUP.map(l=>'<option value="'+l.id+'">'+l.nombre+'</option>').join('')+'</select></div>'+
        '<div class="fld fld-full"><label>Herramientas</label><select class="sel" multiple size="6" id="nuHerramientas" style="width:100%">'+HERRAMIENTAS_LIST.map(h=>'<option value="'+h.id+'">'+h.nombre+'</option>').join('')+'</select></div>'+
      '</div><br><button class="btn btn-primary" id="btnNuevoUsuario">Crear usuario (PIN inicial 1111)</button></div>';

    body.querySelectorAll('button[data-guardar-herr]').forEach(b=> b.addEventListener('click', async ()=>{
      const k = b.dataset.guardarHerr;
      const sel = body.querySelector('select[data-herr="'+k+'"]');
      const herramientas = Array.from(sel.selectedOptions).map(o=>o.value);
      b.disabled=true; b.textContent='Guardando…';
      const patch = {herramientas};
      // Si es supervisor, guardamos también sus sucursales asignadas.
      const supSel = body.querySelector('select[data-supsuc="'+k+'"]');
      if(supSel){ patch.sucursales = Array.from(supSel.selectedOptions).map(o=>o.value); usuarios[k].sucursales = patch.sucursales; }
      await patchJSON(FB+'/usuarios/'+k+'.json', patch);
      usuarios[k].herramientas = herramientas;
      b.disabled=false; b.textContent='Guardado ✓';
      setTimeout(()=> b.textContent='Guardar', 1500);
    }));
    body.querySelectorAll('button[data-reset]').forEach(b=> b.addEventListener('click', async ()=>{
      const k = b.dataset.reset;
      await patchJSON(FB+'/usuarios/'+k+'.json', {pin:'1111'});
      alert('PIN reseteado a 1111.');
    }));
    body.querySelectorAll('button[data-del]').forEach(b=> b.addEventListener('click', async ()=>{
      const k = b.dataset.del;
      if(!confirm('¿Eliminar a '+usuarios[k].email+'?')) return;
      await fetch(FB+'/usuarios/'+k+'.json', {method:'DELETE'});
      delete usuarios[k]; draw();
    }));
    $('btnNuevoUsuario').addEventListener('click', async ()=>{
      const email = ($('nuEmail').value||'').trim().toLowerCase();
      const rol = $('nuRol').value;
      if(!email){ alert('Falta el email.'); return; }
      const herramientas = Array.from($('nuHerramientas').selectedOptions).map(o=>o.value);
      const rec = {email, pin:'1111', rol, herramientas};
      if(rol==='sucursal') rec.sucursal = $('nuSucursal').value;
      if(rol==='outlet') rec.outlet_id = $('nuOutlet').value;
      if(rol==='supervisor') rec.sucursales = Array.from($('nuSupSuc').selectedOptions).map(o=>o.value);
      const key = firebaseKeyFromEmail(email);
      await putJSON(FB+'/usuarios/'+key+'.json', rec);
      usuarios[key] = rec; draw();
    });
  }
  draw();
}

/* ============================================================
   BANDEJA DE ENTRADA — tablero común + mensajes directos 1-a-1.
   Vive en el Portal y está disponible para TODOS los usuarios.
   Backend: base Firebase EXCLUSIVA de mensajería. Juli la crea a
   mano (p.ej. "mensajes-mateu") y pega su URL en MENSAJES_DB_URL.
   Hasta entonces queda el placeholder y la bandeja avisa que falta
   configurarla (mismo patrón que el ledger de /regalias/).

   Estructura en la base:
     /tablero/{pushKey}          -> {de, texto, ts}   (muro de la cadena)
     /directos/{convKey}/{push}  -> {de, texto, ts}   (conversación 1-a-1)
     /lecturas/{miKey}/tablero   -> ts del último post leído
     /lecturas/{miKey}/con/{otroKey} -> ts del último directo leído
   convKey = las dos claves de email ordenadas y unidas con "__".
   ============================================================ */
const MENSAJES_DB_URL = 'https://mensajes-mateu-default-rtdb.firebaseio.com';
const MENSAJES_OK = !MENSAJES_DB_URL.includes('REEMPLAZAR');

let MSG_TAB = 'tablero';   // 'tablero' | 'directos'
let MSG_OTRO = null;       // email del interlocutor elegido en Directos
let MSG_BADGE_TIMER = null;
let MSG_FILTRO = '__todo'; // filtro "Ver" del tablero (destinatario)
let MSG_POSTS = [];        // cache de posts del tablero (para filtrar sin re-fetch)
let MSG_CONVOS = [];       // conversaciones directas del usuario (la bandeja)
let MSG_USUARIOS = [];     // otros usuarios, para iniciar una conversación nueva
let LAST_NOTIFS = [];      // últimas notificaciones no leídas (avisos + tablero + directos), más nueva arriba
let LAST_AVISO_TS = 0;     // ts del aviso más reciente (para marcar leídos)
let NOTIF_SEEN = new Set();// claves ya vistas, para no repetir el toast
let NOTIF_PRIMED = false;  // false en la primera carga (no dispara toast por lo ya existente)
let NOTIF_TOAST_TIMER = null;

function postJSON(url, data){
  return fetch(url,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
function nombreCorto(email){ return (email||'').split('@')[0] || email || '—'; }
function convKey(a, b){ return [firebaseKeyFromEmail(a), firebaseKeyFromEmail(b)].sort().join('__'); }
function horaCorta(ts){
  try{ return new Date(ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return ''; }
}
// {pushKey:{...ts}} -> [{id, ...}] ordenado por ts ascendente (más viejo arriba)
function objToSortedList(obj){
  return Object.keys(obj||{}).map(id=>Object.assign({id}, obj[id])).sort((a,b)=>(a.ts||0)-(b.ts||0));
}
function emailFromKey(k){ return (k||'').replace(/,/g,'.'); }
function recortar(s, n){ s = s||''; return s.length>n ? s.slice(0,n-1)+'…' : s; }

// Destinatarios del tablero: 'todos' | 'rol:<rol>' | 'suc:<slug>' | 'out:<id>'.
function etiquetaDestino(tok){
  if(tok==='todos') return 'Todos';
  if(tok.indexOf('rol:')===0) return {admin:'Administradores',sucursal:'Sucursales',outlet:'Outlets'}[tok.slice(4)] || tok;
  if(tok.indexOf('suc:')===0){ const s = SUCURSALES.find(x=>x.slug===tok.slice(4)); return s ? s.nombre : tok.slice(4); }
  if(tok.indexOf('out:')===0){ const o = OUTLETS_LIST.find(x=>x.id===tok.slice(4)); return o ? o.nombre : tok.slice(4); }
  return tok;
}
// <optgroup>s para el multi-select "Para" al publicar en el tablero.
function destinoOptgroups(selected){
  selected = selected || [];
  const opt = (v,l)=>'<option value="'+v+'"'+(selected.indexOf(v)!==-1?' selected':'')+'>'+esc(l)+'</option>';
  return opt('todos','Todos') +
    '<optgroup label="Roles">'+opt('rol:admin','Administradores')+opt('rol:sucursal','Sucursales')+opt('rol:outlet','Outlets')+'</optgroup>'+
    '<optgroup label="Sucursales">'+SUCURSALES.map(s=>opt('suc:'+s.slug, s.nombre)).join('')+'</optgroup>'+
    '<optgroup label="Outlets">'+OUTLETS_LIST.map(o=>opt('out:'+o.id, o.nombre)).join('')+'</optgroup>';
}
// Opciones del filtro "Ver" (single select) del tablero.
function filtroOptions(sel){
  const opt = (v,l)=>'<option value="'+v+'"'+(sel===v?' selected':'')+'>'+esc(l)+'</option>';
  return opt('__todo','Todo') + opt('__mi','Para mí') +
    '<optgroup label="Roles">'+opt('rol:admin','Administradores')+opt('rol:sucursal','Sucursales')+opt('rol:outlet','Outlets')+'</optgroup>'+
    '<optgroup label="Sucursales">'+SUCURSALES.map(s=>opt('suc:'+s.slug, s.nombre)).join('')+'</optgroup>'+
    '<optgroup label="Outlets">'+OUTLETS_LIST.map(o=>opt('out:'+o.id, o.nombre)).join('')+'</optgroup>';
}
// ¿El post (por su lista "para") está dirigido a mí?
function postParaMi(para){
  const s = CURRENT_SESSION; if(!s) return true;
  if(!para || !para.length || para.indexOf('todos')!==-1) return true;
  return para.some(tok=>
    tok==='rol:'+s.rol ||
    (s.sucursal && tok==='suc:'+s.sucursal) ||
    (s.outlet_id && tok==='out:'+s.outlet_id)
  );
}
// ¿El post coincide con el filtro "Ver" elegido?
function postCoincideFiltro(para){
  if(MSG_FILTRO==='__todo') return true;
  const p = (!para || !para.length) ? ['todos'] : para;
  if(MSG_FILTRO==='__mi') return postParaMi(p);
  return p.indexOf(MSG_FILTRO) !== -1;
}
// Chip "→ destinatario" para mostrar en cada post del tablero.
function destinoChip(para){
  const p = (!para || !para.length) ? ['todos'] : para;
  const txt = p.indexOf('todos')!==-1 ? 'Todos' : p.map(etiquetaDestino).join(', ');
  return ' <span class="dest-chip">→ '+esc(txt)+'</span>';
}

// Junta en una sola pasada las notificaciones no leídas del usuario:
// avisos (broadcast del admin) + posts del tablero + mensajes directos.
// Devuelve {items, msgCount, total, ultimoAvisoTs}; items ordenado más nuevo arriba.
async function cargarNotificaciones(){
  if(!MENSAJES_OK || !CURRENT_SESSION) return {items:[], msgCount:0, total:0, ultimoAvisoTs:0};
  const miEmail = (CURRENT_SESSION.email||'').toLowerCase();
  const miKey = firebaseKeyFromEmail(CURRENT_SESSION.email);
  const [tablero, directos, avisos, lecturas] = await Promise.all([
    fetchJSON(MENSAJES_DB_URL+'/tablero.json').catch(()=>null),
    fetchJSON(MENSAJES_DB_URL+'/directos.json').catch(()=>null),
    fetchJSON(MENSAJES_DB_URL+'/avisos.json').catch(()=>null),
    fetchJSON(MENSAJES_DB_URL+'/lecturas/'+miKey+'.json').catch(()=>null),
  ]);
  const lecTablero = (lecturas && lecturas.tablero) || 0;
  const lecAvisos  = (lecturas && lecturas.avisos)  || 0;
  const lecCon = (lecturas && lecturas.con) || {};
  const avisosList = objToSortedList(avisos);
  const items = [];
  // Avisos: los ve toda la cadena; se notifican aunque los publique otro admin (no si son míos).
  avisosList.forEach(a=>{
    if((a.ts||0) > lecAvisos && (a.de||'').toLowerCase() !== miEmail)
      items.push({kind:'aviso', de:a.de, texto:a.texto, ts:a.ts});
  });
  // Tablero (excluye mis propios posts y los dirigidos a otra sucursal/rol).
  objToSortedList(tablero).forEach(p=>{
    if((p.ts||0) > lecTablero && (p.de||'').toLowerCase() !== miEmail && postParaMi(p.para))
      items.push({kind:'tablero', de:p.de, texto:p.texto, ts:p.ts});
  });
  // Directos que me involucran (excluye los que mandé yo).
  Object.keys(directos||{}).forEach(ck=>{
    const partes = ck.split('__');
    if(!partes.includes(miKey)) return;
    const otroKey = partes[0]===miKey ? partes[1] : partes[0];
    const visto = lecCon[otroKey] || 0;
    objToSortedList(directos[ck]).forEach(m=>{
      if((m.ts||0) > visto && firebaseKeyFromEmail(m.de) !== miKey)
        items.push({kind:'directo', de:m.de, texto:m.texto, ts:m.ts});
    });
  });
  items.sort((a,b)=>(b.ts||0)-(a.ts||0));
  const avisoCount = items.filter(i=>i.kind==='aviso').length;
  return {items, msgCount: items.length - avisoCount, total: items.length,
          ultimoAvisoTs: avisosList.length ? avisosList[avisosList.length-1].ts : 0};
}

// Refresca los contadores: badge del sobre (solo mensajes) y del widget flotante (mensajes + avisos).
async function refreshBadge(){
  if(!MENSAJES_OK || !CURRENT_SESSION) return;
  try{
    const {items, msgCount, total, ultimoAvisoTs} = await cargarNotificaciones();
    LAST_NOTIFS = items;
    LAST_AVISO_TS = ultimoAvisoTs;
    const badge = $('msgBadge');
    if(msgCount > 0){ badge.textContent = msgCount>99 ? '99+' : msgCount; badge.style.display='block'; }
    else badge.style.display='none';
    const fab = $('notifFabBadge');
    if(fab){
      if(total > 0){ fab.textContent = total>99 ? '99+' : total; fab.style.display='block'; }
      else fab.style.display='none';
    }
    // Si el panel está abierto, repintar (el sondeo puede traer notificaciones nuevas).
    const panel = $('notifPanel');
    const panelAbierto = panel && panel.style.display==='flex';
    if(panelAbierto) pintarNotifList();
    // Toast por lo nuevo: solo después de la primera carga y con el panel cerrado.
    const nuevos = items.filter(n=> !NOTIF_SEEN.has(notifKey(n)));
    items.forEach(n=> NOTIF_SEEN.add(notifKey(n)));
    if(NOTIF_PRIMED && nuevos.length && !panelAbierto) mostrarToast(nuevos);
    NOTIF_PRIMED = true;
  }catch(e){ /* silencioso: la bandeja no debe romper el portal */ }
}
function notifKey(n){ return n.kind+'|'+(n.de||'')+'|'+(n.ts||0); }

/* ===== Panel flotante de notificaciones ===== */
function pintarNotifList(){
  const list = $('notifList'); if(!list) return;
  if(!LAST_NOTIFS.length){ list.innerHTML = '<div class="notif-empty">No tenés notificaciones nuevas.</div>'; return; }
  const IC  = {aviso:'📣', tablero:'📢', directo:'✉️'};
  const KND = {aviso:'Aviso', tablero:'Tablero', directo:'Directo'};
  list.innerHTML = LAST_NOTIFS.map((n,i)=>
    '<div class="notif-item" data-i="'+i+'">'+
      '<div class="ic">'+IC[n.kind]+'</div>'+
      '<div class="bd">'+
        '<div class="hd"><span class="au">'+esc(nombreCorto(n.de))+'</span><span class="tm">'+esc(horaCorta(n.ts))+'</span></div>'+
        '<div class="tx">'+esc(n.texto)+'</div>'+
        '<span class="kind '+n.kind+'">'+KND[n.kind]+'</span>'+
      '</div>'+
    '</div>').join('');
  list.querySelectorAll('.notif-item').forEach(el=>
    el.addEventListener('click', ()=> abrirNotif(LAST_NOTIFS[+el.dataset.i], el)));
}
// Aviso: expande el texto (no tiene vista propia). Tablero/Directo: abren la bandeja en su lugar.
function abrirNotif(n, el){
  if(!n) return;
  if(n.kind==='aviso'){ const tx = el.querySelector('.tx'); if(tx) tx.style.webkitLineClamp='unset'; return; }
  closeNotifPanel();
  if(n.kind==='directo'){ MSG_TAB='directos'; MSG_OTRO=n.de; } else { MSG_TAB='tablero'; }
  openMensajes();
}
function openNotifPanel(){
  const panel = $('notifPanel'); if(!panel) return;
  panel.style.display='flex';
  $('notifAvisoBox').style.display = (CURRENT_SESSION && CURRENT_SESSION.rol==='admin') ? 'block' : 'none';
  pintarNotifList();
}
function closeNotifPanel(){
  const panel = $('notifPanel'); if(!panel || panel.style.display!=='flex') return;
  panel.style.display='none';
  // Al cerrar, doy por leídos los avisos (los mensajes se marcan al abrir la bandeja).
  if(MENSAJES_OK && CURRENT_SESSION && LAST_AVISO_TS){
    putJSON(MENSAJES_DB_URL+'/lecturas/'+firebaseKeyFromEmail(CURRENT_SESSION.email)+'/avisos.json', LAST_AVISO_TS)
      .then(refreshBadge);
  }
}
function toggleNotifPanel(){
  const panel = $('notifPanel');
  if(panel && panel.style.display==='flex') closeNotifPanel(); else openNotifPanel();
}
// Publicar un aviso para toda la cadena (solo admin). Se marca leído para el autor.
async function publicarAviso(){
  const inp = $('notifAvisoInput'); const texto = (inp.value||'').trim();
  if(!texto || !CURRENT_SESSION) return;
  const btn = $('notifAvisoSend'); btn.disabled=true; btn.textContent='Publicando…';
  const ts = Date.now();
  try{
    await postJSON(MENSAJES_DB_URL+'/avisos.json', {de:CURRENT_SESSION.email, texto, ts});
    putJSON(MENSAJES_DB_URL+'/lecturas/'+firebaseKeyFromEmail(CURRENT_SESSION.email)+'/avisos.json', ts);
    inp.value='';
  }catch(e){ alert('No se pudo publicar el aviso.'); }
  btn.disabled=false; btn.textContent='Publicar aviso';
  refreshBadge();
}

/* ===== Toast: cartelito que salta al llegar algo nuevo (panel cerrado) ===== */
function mostrarToast(nuevos){
  const host = $('notifToast'); if(!host) return;
  const n = nuevos[0];   // el más nuevo (items viene ordenado desc)
  const IC  = {aviso:'📣', tablero:'📢', directo:'✉️'};
  const KND = {aviso:'Aviso', tablero:'Tablero', directo:'Directo'};
  const extra = nuevos.length>1 ? ' <span class="notif-toast-more">+'+(nuevos.length-1)+' más</span>' : '';
  host.innerHTML =
    '<div class="notif-toast-ic">'+IC[n.kind]+'</div>'+
    '<div class="notif-toast-bd">'+
      '<div class="notif-toast-hd">'+esc(KND[n.kind])+' · '+esc(nombreCorto(n.de))+extra+'</div>'+
      '<div class="notif-toast-tx">'+esc(n.texto)+'</div>'+
    '</div>';
  host.style.display='flex';
  setTimeout(()=> host.classList.add('show'), 20);  // dispara la transición (rAF se pausa en pestañas de fondo)
  host.onclick = ()=>{ ocultarToast(); abrirNotifDesdeToast(n); };
  if(NOTIF_TOAST_TIMER) clearTimeout(NOTIF_TOAST_TIMER);
  NOTIF_TOAST_TIMER = setTimeout(ocultarToast, 6000);
}
function ocultarToast(){
  const host = $('notifToast'); if(!host) return;
  host.classList.remove('show');
  setTimeout(()=>{ host.style.display='none'; }, 260);
}
function abrirNotifDesdeToast(n){
  if(n.kind==='aviso'){ openNotifPanel(); return; }
  if(n.kind==='directo'){ MSG_TAB='directos'; MSG_OTRO=n.de; } else { MSG_TAB='tablero'; }
  openMensajes();
}

// Arranca el sondeo del badge (cada 20s) al entrar al portal.
function iniciarBandeja(){
  if(!MENSAJES_OK) return;
  NOTIF_PRIMED = false; NOTIF_SEEN = new Set();  // primera carga: no dispara toast por lo ya existente
  refreshBadge();
  if(MSG_BADGE_TIMER) clearInterval(MSG_BADGE_TIMER);
  MSG_BADGE_TIMER = setInterval(refreshBadge, 20000);
}

function openMensajes(){ showView('mensajes'); renderMensajes(); }
function closeMensajes(){ showView('dashboard'); refreshBadge(); }

function renderMensajes(){
  const body = $('msgBody');
  if(!MENSAJES_OK){
    body.innerHTML = '<div class="msg-notice"><b>Falta conectar la base de mensajes.</b><br>'+
      'Creá una Realtime Database nueva en Firebase (p.ej. <code>mensajes-mateu</code>) y pegá su URL en '+
      '<code>MENSAJES_DB_URL</code>, dentro del <code>&lt;script&gt;</code> del <code>index.html</code> del Portal. '+
      'En cuanto la pegues, la bandeja funciona sola.</div>';
    return;
  }
  body.innerHTML =
    '<div class="msg-tabs">'+
      '<button class="msg-tab'+(MSG_TAB==='tablero' ?' active':'')+'" data-tab="tablero">📢 Tablero</button>'+
      '<button class="msg-tab'+(MSG_TAB==='directos'?' active':'')+'" data-tab="directos">✉️ Directos</button>'+
    '</div><div id="msgPane"></div>';

// Pinta una lista de mensajes como burbujas de chat en el contenedor dado.
function pintarMensajes(thread, msgs, opts){
  opts = opts || {};
  if(!msgs.length){ thread.innerHTML = '<div class="msg-empty">Todavía no hay mensajes. Escribí el primero.</div>'; return; }
  const miEmail = (CURRENT_SESSION.email||'').toLowerCase();
  thread.innerHTML = msgs.map(m=>{
    const mio = (m.de||'').toLowerCase() === miEmail;
    return '<div class="bub '+(mio?'mine':'theirs')+'">'+
      (opts.mostrarAutor && !mio ? '<span class="meta">'+esc(nombreCorto(m.de))+'</span>' : '')+
      esc(m.texto)+'<span class="time">'+esc(horaCorta(m.ts))+'</span></div>';
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}

async function renderTablero(){
  $('msgPane').innerHTML =
    '<div class="msg-filter">Ver <select class="sel" id="msgFiltro">'+filtroOptions(MSG_FILTRO)+'</select></div>'+
    '<div class="msg-thread" id="msgThread"><div class="msg-empty">Cargando…</div></div>'+
    '<div class="msg-compose-wrap">'+
      '<label class="msg-dest-lbl">Para</label>'+
      '<select class="sel" id="msgDest" multiple size="3" style="width:100%">'+destinoOptgroups(['todos'])+'</select>'+
      '<div class="msg-compose"><textarea id="msgInput" placeholder="Escribí un mensaje…"></textarea>'+
      '<button class="btn btn-primary" id="msgSend">Enviar</button></div>'+
    '</div>';
  const posts = objToSortedList(await fetchJSON(MENSAJES_DB_URL+'/tablero.json').catch(()=>null));
  MSG_POSTS = posts;
  pintarTablero();
  const ultTs = posts.length ? posts[posts.length-1].ts : Date.now();
  putJSON(MENSAJES_DB_URL+'/lecturas/'+firebaseKeyFromEmail(CURRENT_SESSION.email)+'/tablero.json', ultTs).then(refreshBadge);
  $('msgFiltro').addEventListener('change', e=>{ MSG_FILTRO = e.target.value; pintarTablero(); });
  $('msgSend').addEventListener('click', enviarTablero);
  $('msgInput').addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviarTablero(); } });
}
// Pinta el tablero aplicando el filtro "Ver" y mostrando el destinatario de cada post.
function pintarTablero(){
  const thread = $('msgThread'); if(!thread) return;
  const visibles = MSG_POSTS.filter(p=>postCoincideFiltro(p.para));
  if(!visibles.length){
    thread.innerHTML = '<div class="msg-empty">No hay mensajes'+(MSG_FILTRO!=='__todo'?' para este filtro':' todavía')+'.</div>';
    return;
  }
  const miEmail = (CURRENT_SESSION.email||'').toLowerCase();
  thread.innerHTML = visibles.map(m=>{
    const mio = (m.de||'').toLowerCase() === miEmail;
    return '<div class="bub '+(mio?'mine':'theirs')+'">'+
      '<span class="meta">'+(mio?'Vos':esc(nombreCorto(m.de)))+destinoChip(m.para)+'</span>'+
      esc(m.texto)+'<span class="time">'+esc(horaCorta(m.ts))+'</span></div>';
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}
async function enviarTablero(){
  const input = $('msgInput'); const texto = (input.value||'').trim();
  if(!texto) return;
  let para = Array.from($('msgDest').selectedOptions).map(o=>o.value);
  if(!para.length || para.indexOf('todos')!==-1) para = ['todos'];
  input.value = '';
  await postJSON(MENSAJES_DB_URL+'/tablero.json', {de:CURRENT_SESSION.email, texto, para, ts:Date.now()});
  renderTablero();
}

// Bandeja de directos: arma la lista de conversaciones del usuario (con último
// mensaje y no leídos) + los usuarios disponibles para iniciar una nueva.
async function renderDirectos(){
  const miKey = firebaseKeyFromEmail(CURRENT_SESSION.email);
  const [usuarios, directos, lecturas] = await Promise.all([
    fetchJSON(FB_USUARIOS).catch(()=>({})),
    fetchJSON(MENSAJES_DB_URL+'/directos.json').catch(()=>null),
    fetchJSON(MENSAJES_DB_URL+'/lecturas/'+miKey+'.json').catch(()=>null),
  ]);
  const lecCon = (lecturas && lecturas.con) || {};
  const convos = [];
  Object.keys(directos||{}).forEach(ck=>{
    const partes = ck.split('__'); if(partes.indexOf(miKey)===-1) return;
    const otroKey = partes[0]===miKey ? partes[1] : partes[0];
    const msgs = objToSortedList(directos[ck]); if(!msgs.length) return;
    const last = msgs[msgs.length-1];
    const visto = lecCon[otroKey] || 0;
    let noleidos = 0; msgs.forEach(m=>{ if((m.ts||0)>visto && firebaseKeyFromEmail(m.de)!==miKey) noleidos++; });
    convos.push({otroKey, email:emailFromKey(otroKey), last, noleidos});
  });
  convos.sort((a,b)=>(b.last.ts||0)-(a.last.ts||0));
  MSG_CONVOS = convos;
  MSG_USUARIOS = Object.keys(usuarios||{}).map(k=>usuarios[k])
    .filter(u=> u && u.email && u.email.toLowerCase() !== (CURRENT_SESSION.email||'').toLowerCase())
    .sort((a,b)=> a.email.localeCompare(b.email));
  renderDirectosLayout();
}
function renderDirectosLayout(){
  $('msgPane').innerHTML =
    '<div class="dm-wrap'+(MSG_OTRO?' viewing':'')+'">'+
      '<div class="dm-list">'+
        '<div class="dm-new"><select class="sel" id="dmNew"><option value="">＋ Nueva conversación…</option>'+
          MSG_USUARIOS.map(u=>'<option value="'+esc(u.email)+'">'+esc(nombreCorto(u.email))+' — '+esc(u.email)+'</option>').join('')+
        '</select></div>'+
        '<div class="dm-convos" id="dmConvos">'+convosHtml()+'</div>'+
      '</div>'+
      '<div class="dm-main" id="dmMain">'+dmMainHtml()+'</div>'+
    '</div>';
  $('dmNew').addEventListener('change', e=>{ if(e.target.value){ MSG_OTRO = e.target.value; renderDirectosLayout(); } });
  bindConvos();
  bindThread();
}
function convosHtml(){
  if(!MSG_CONVOS.length) return '<div class="msg-empty" style="min-height:0;padding:22px 16px">Sin conversaciones. Empezá una con el selector de arriba.</div>';
  const miEmail = (CURRENT_SESSION.email||'').toLowerCase();
  return MSG_CONVOS.map(c=>{
    const activa = MSG_OTRO && firebaseKeyFromEmail(MSG_OTRO)===c.otroKey;
    const prefijo = (c.last.de||'').toLowerCase()===miEmail ? 'Vos: ' : '';
    return '<div class="dm-convo'+(activa?' active':'')+'" data-email="'+esc(c.email)+'">'+
      '<div class="dm-convo-top"><span class="dm-convo-name">'+esc(nombreCorto(c.email))+'</span>'+
        (c.noleidos>0 ? '<span class="dm-dot">'+(c.noleidos>99?'99+':c.noleidos)+'</span>' : '')+'</div>'+
      '<div class="dm-convo-prev">'+esc(recortar(prefijo+(c.last.texto||''),46))+'</div>'+
    '</div>';
  }).join('');
}
function dmMainHtml(){
  if(!MSG_OTRO) return '<div class="msg-thread" style="height:auto;min-height:180px"><div class="msg-empty">Elegí una conversación de la izquierda o empezá una nueva.</div></div>';
  return '<div class="dm-head"><span class="dm-back" id="dmBack">← Conversaciones</span>'+
      '<span class="dm-title">'+esc(nombreCorto(MSG_OTRO))+'</span></div>'+
    '<div class="msg-thread" id="msgThread"><div class="msg-empty">Cargando…</div></div>'+
    '<div class="msg-compose"><textarea id="msgInput" placeholder="Escribí un mensaje…"></textarea>'+
    '<button class="btn btn-primary" id="msgSend">Enviar</button></div>';
}
function bindConvos(){
  document.querySelectorAll('.dm-convo').forEach(el=>
    el.addEventListener('click', ()=>{ MSG_OTRO = el.dataset.email; renderDirectosLayout(); }));
}
function bindThread(){
  const back = $('dmBack'); if(back) back.addEventListener('click', ()=>{ MSG_OTRO=null; renderDirectosLayout(); });
  if(!MSG_OTRO) return;
  const send = $('msgSend'); if(send) send.addEventListener('click', enviarDirecto);
  const input = $('msgInput'); if(input) input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviarDirecto(); } });
  cargarConversacion();
}
async function cargarConversacion(){
  const thread = $('msgThread'); if(!thread || !MSG_OTRO) return;
  const ck = convKey(CURRENT_SESSION.email, MSG_OTRO);
  const msgs = objToSortedList(await fetchJSON(MENSAJES_DB_URL+'/directos/'+ck+'.json').catch(()=>null));
  pintarMensajes(thread, msgs, {mostrarAutor:false});
  const ultTs = msgs.length ? msgs[msgs.length-1].ts : Date.now();
  const miKey = firebaseKeyFromEmail(CURRENT_SESSION.email);
  const otroKey = firebaseKeyFromEmail(MSG_OTRO);
  putJSON(MENSAJES_DB_URL+'/lecturas/'+miKey+'/con/'+otroKey+'.json', ultTs).then(refreshBadge);
  // Poner en 0 el contador de no leídos de esta conversación en la lista.
  const c = MSG_CONVOS.find(x=>x.otroKey===otroKey);
  if(c && c.noleidos){ c.noleidos = 0; const box = $('dmConvos'); if(box){ box.innerHTML = convosHtml(); bindConvos(); } }
}
async function enviarDirecto(){
  const input = $('msgInput'); const texto = (input.value||'').trim();
  if(!texto || !MSG_OTRO) return;
  input.value = '';
  const ck = convKey(CURRENT_SESSION.email, MSG_OTRO);
  const msg = {de:CURRENT_SESSION.email, texto, ts:Date.now()};
  await postJSON(MENSAJES_DB_URL+'/directos/'+ck+'.json', msg);
  // Reflejar el envío en la lista local sin recargar todo.
  const otroKey = firebaseKeyFromEmail(MSG_OTRO);
  let c = MSG_CONVOS.find(x=>x.otroKey===otroKey);
  if(!c){ c = {otroKey, email:MSG_OTRO, last:msg, noleidos:0}; MSG_CONVOS.unshift(c); }
  else c.last = msg;
  MSG_CONVOS.sort((a,b)=>(b.last.ts||0)-(a.last.ts||0));
  const box = $('dmConvos'); if(box){ box.innerHTML = convosHtml(); bindConvos(); }
  cargarConversacion();
}

$('msgBtn').addEventListener('click', openMensajes);
$('backFromMsg').addEventListener('click', closeMensajes);
$('notifFab').addEventListener('click', toggleNotifPanel);
$('notifClose').addEventListener('click', closeNotifPanel);
$('notifAvisoSend').addEventListener('click', publicarAviso);
// Cerrar el panel al hacer clic fuera del widget.
document.addEventListener('click', e=>{
  const w = $('notifWidget');
  if(w && w.style.display!=='none' && !w.contains(e.target)) closeNotifPanel();
});

// Al cargar: si hay sesión válida, entrar directo
(function init(){
  const s = readSession();
  if(s && s.email){
    // Normaliza sesiones ya guardadas (usuarios que quedaron logueados antes de este cambio)
    s.herramientas = herramientasEfectivas(s.rol, s.herramientas);
    saveSession(s);
    render(s);
  } else showLogin();
})();
</script>
<!-- Calendario retail del shell (se auto-monta en .top-right del header) -->
<script src="shared/components/calendario-retail/calendario.js" defer></script>
</body>
