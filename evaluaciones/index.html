<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaciones de Supervisor — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#fff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#fff;--border:#dce3f0;
  --ok:#16a34a;--warn:#d97706;--bad:#dc2626;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --shadow:0 1px 4px rgba(11,21,39,.08);--shadow-md:0 8px 30px rgba(11,21,39,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--navy);font-family:var(--font-b);min-height:100vh}

/* ===== HEADER ===== */
.top{background:var(--navy);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--red);position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:10px}
.top a.logo{display:flex;align-items:center;gap:11px;text-decoration:none;min-width:0}
.top img{height:32px;filter:brightness(0) invert(1)}
.top .tt{font-family:var(--font-d);font-size:19px;letter-spacing:1.5px;color:#fff;line-height:1}
.top .ts{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted-light)}
.top-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:13px;font-weight:600;color:#fff;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--red-soft)}
.salir{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;cursor:pointer}
.salir:hover{color:#fff;border-color:#fff}

/* ===== NAV TABS ===== */
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:57px;z-index:30}
.tab{padding:13px 16px;border:0;background:none;cursor:pointer;font-family:var(--font-c);font-size:14px;font-weight:600;
  letter-spacing:.5px;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:var(--navy);border-bottom-color:var(--red)}
.tab:hover{color:var(--navy)}

main{max-width:1120px;margin:0 auto;padding:22px 22px 70px}

.demo-banner{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:9px;padding:9px 14px;
  font-size:13px;margin-bottom:16px;display:none}
.demo-banner.show{display:block}

/* ===== TIPO / COMUNES ===== */
h1.page{font-family:var(--font-d);font-size:30px;letter-spacing:1px;line-height:1}
.page-sub{font-family:var(--font-c);font-size:13px;font-weight:500;color:var(--muted);margin:2px 0 18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-h{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;margin-bottom:2px}
.card-hs{font-family:var(--font-c);font-size:12px;color:var(--muted);margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.muted{color:var(--muted)}
.btn{border:none;border-radius:8px;padding:10px 16px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#a00000}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--navy)}.btn-outline:hover{border-color:var(--navy-mid)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.sel,.inp{padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:14px;color:var(--navy);background:#fff;font-family:var(--font-b)}
.sel:focus,.inp:focus{outline:none;border-color:var(--navy-mid)}
label.lbl{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
textarea.inp{width:100%;resize:vertical;min-height:60px;font-family:var(--font-b)}

/* nota badge */
.nota{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-d);letter-spacing:1px;
  color:#fff;border-radius:8px;line-height:1}
.nota.big{width:60px;height:60px;font-size:36px}
.nota.mid{width:38px;height:38px;font-size:22px}
.nota.sm{width:26px;height:26px;font-size:16px;border-radius:6px}
.nota.A{background:var(--ok)}.nota.B{background:var(--warn)}.nota.C{background:#e0562b}.nota.D{background:var(--bad)}
.nota.NA{background:#94a3b8}
.delta{font-family:var(--font-c);font-weight:700;font-size:13px}
.delta.up{color:var(--ok)}.delta.down{color:var(--bad)}.delta.flat{color:var(--muted)}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.kpi .v{font-family:var(--font-d);font-size:30px;letter-spacing:.5px;margin-top:4px;line-height:1}
.kpi .v small{font-size:14px;color:var(--muted);font-family:var(--font-c)}

/* ===== TABLA RANKING ===== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:11px;background:#fff}
table.rk{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
table.rk th{background:var(--navy);color:#fff;font-family:var(--font-c);font-weight:600;letter-spacing:.5px;padding:9px 11px;text-align:left;white-space:nowrap;position:sticky;top:0}
table.rk th.num,table.rk td.num{text-align:right}
table.rk td{padding:8px 11px;border-bottom:1px solid #eef0f7;vertical-align:middle}
table.rk tr:hover td{background:#f8f9fe}
.cad-row td{background:#eef2fb!important;font-family:var(--font-c);font-weight:700;letter-spacing:1px;text-transform:uppercase;
  font-size:11px;color:var(--navy-mid);padding:6px 11px}
.bar{height:7px;border-radius:4px;background:#e6ebf5;overflow:hidden;min-width:70px}
.bar>span{display:block;height:100%;border-radius:4px}

/* ===== FORM EVALUACIÓN ===== */
.form-head{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:8px}
.item-card{border:1px solid var(--border);border-radius:12px;padding:15px 16px;margin-bottom:12px;background:#fff}
.item-card .it-h{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.it-num{font-family:var(--font-d);font-size:20px;color:var(--red);line-height:1}
.it-t{font-family:var(--font-c);font-size:16px;font-weight:700;letter-spacing:.3px}
.it-d{font-size:12.5px;color:var(--muted);margin:3px 0 11px;line-height:1.35}
.seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.seg label{cursor:pointer}
.seg input{position:absolute;opacity:0;pointer-events:none}
.seg .opt{display:block;text-align:center;padding:13px 6px;border:2px solid var(--border);border-radius:10px;
  font-family:var(--font-c);font-weight:700;font-size:15px;letter-spacing:.5px;color:var(--muted);user-select:none;transition:all .12s}
.seg .opt small{display:block;font-size:11px;font-weight:600;opacity:.75}
.seg input:checked+.opt.bien{background:var(--ok);border-color:var(--ok);color:#fff}
.seg input:checked+.opt.regular{background:var(--warn);border-color:var(--warn);color:#fff}
.seg input:checked+.opt.mal{background:var(--bad);border-color:var(--bad);color:#fff}
.seg label:hover .opt{border-color:var(--navy-mid)}
.plan{margin-top:11px;display:none}
.plan.show{display:block}
.ctx{margin-top:10px;background:#f1f5fd;border:1px solid #dbe4f5;border-radius:9px;padding:9px 12px;font-size:12.5px;color:var(--navy-mid)}
.ctx b{color:var(--navy)}
.ctx .sug{display:inline-block;margin-top:4px;font-family:var(--font-c);font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-size:11px}
.prevtag{font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.prevtag.bien{background:#dcfce7;color:#166534}.prevtag.regular{background:#ffedd5;color:#9a3412}.prevtag.mal{background:#fee2e2;color:#991b1b}.prevtag.na{background:#eef0f7;color:var(--muted)}

/* score panel sticky */
.score{position:sticky;bottom:0;z-index:20;background:var(--navy);color:#fff;border-radius:12px;padding:13px 18px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(11,21,39,.25);margin-top:8px}
.score .tot{font-family:var(--font-d);font-size:34px;line-height:1}
.score .tot small{font-size:15px;color:var(--muted-light)}
.score .blk{font-family:var(--font-c);font-size:13px;color:var(--muted-light)}
.score .blk b{color:#fff;font-size:16px}
.score .autosave{font-family:var(--font-c);font-size:11px;letter-spacing:.5px;color:var(--muted-light)}
.score .spacer{flex:1}

/* pendientes / puntos mejora */
.pm{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:9px;background:#fff;display:flex;gap:11px;align-items:flex-start}
.pm .pm-b{flex:1}
.pm .pm-k{font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.pm .pm-t{font-size:13.5px;margin-top:2px}
.pm .pm-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.chip{font-family:var(--font-c);font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip.pendiente{background:#fef3c7;color:#92400e}.chip.resuelto{background:#dbeafe;color:#1e40af}.chip.confirmado{background:#dcfce7;color:#166534}

/* detalle read */
.det-item{border-bottom:1px solid #eef0f7;padding:11px 0;display:flex;gap:11px;align-items:flex-start}
.det-item:last-child{border-bottom:0}
.det-item .di-b{flex:1}
.det-item .di-t{font-family:var(--font-c);font-weight:700;font-size:14.5px}
.det-item .di-plan{font-size:12.5px;color:var(--navy-mid);margin-top:3px;background:#f6f8fd;border-radius:7px;padding:6px 9px}

.empty{background:#fff;border:1px dashed var(--border);border-radius:12px;padding:34px;text-align:center;color:var(--muted);font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;
  font-size:14px;box-shadow:var(--shadow-md);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.toast.show{opacity:1}
.toast.err{background:#7f1d1d}

svg text{font-family:var(--font-c)}

@media(max-width:640px){
  main{padding:16px 13px 70px}
  .top .tt{font-size:16px}.top .ts{display:none}
  h1.page{font-size:24px}
  .seg .opt{padding:15px 4px;font-size:16px}
}
@media print{
  .top,.tabs,.demo-banner,.btn,.score,.no-print{display:none!important}
  main{max-width:none;padding:0}
  .card{break-inside:avoid;box-shadow:none}
}
</style>
</head>

<script>
/* ============================================================
   Evaluaciones de Supervisor — módulo self-contained.
   Lee la sesión del Portal (localStorage), no tiene login propio.
   Lee/escribe a Firebase (base evaluaciones-mateu) por REST, como el resto del
   portal. Sin URL configurada (EVAL_DB_URL) corre en modo demo con mock-data.js.
   ============================================================ */
const E = window.Evaluacion;
const MOCK = window.EVALUACIONES_MOCK;

/* --- sesión --- */
const SESSION_KEY='mateu_portal_session';
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
const SESSION = readSession();
if(!SESSION || !SESSION.rol){ location.replace('../'); }

const ROL = SESSION.rol;
const esGerencia  = ROL==='admin';
const esSupervisor= ROL==='supervisor';
const esEncargado = ROL==='sucursal' || ROL==='outlet';
const puedeEditar = esGerencia || esSupervisor;
function ownSlug(){ return ROL==='outlet' ? SESSION.outlet_id : SESSION.sucursal; }

/* --- catálogo de locales (slug → nombre, cadena) --- */
const LOCALES=[
  {slug:'plaza',nombre:'Plaza Italia',cadena:'Mateu'},{slug:'calle-12',nombre:'Calle 12',cadena:'Mateu'},
  {slug:'city-bell',nombre:'City Bell',cadena:'Mateu'},{slug:'calle-47',nombre:'Calle 47',cadena:'Mateu'},
  {slug:'calle-49',nombre:'Calle 49',cadena:'Mateu'},{slug:'los-hornos',nombre:'Los Hornos',cadena:'Mateu'},
  {slug:'berisso',nombre:'Berisso',cadena:'Mateu'},{slug:'ensenada',nombre:'Ensenada',cadena:'Mateu'},
  {slug:'kids',nombre:'Kids',cadena:'Mateu'},{slug:'diagonal',nombre:'Diagonal',cadena:'Mateu'},
  {slug:'gonnet',nombre:'Outlet Gonnet',cadena:'Outlet'},{slug:'av-44',nombre:'Outlet Av. 44',cadena:'Outlet'},
  {slug:'calle-55',nombre:'Outlet Calle 55',cadena:'Outlet'},
  {slug:'aurelius-12',nombre:'Aurelius 12',cadena:'Aurelius'},{slug:'aurelius-5',nombre:'Aurelius 5',cadena:'Aurelius'},
  {slug:'aurelius-cb',nombre:'Aurelius City Bell',cadena:'Aurelius'},{slug:'aurelius-10',nombre:'Aurelius 10',cadena:'Aurelius'},
  {slug:'adidas-12',nombre:'Adidas 12',cadena:'Adidas'},{slug:'adidas',nombre:'Adidas Av. 7',cadena:'Adidas'},
  {slug:'originals',nombre:'Adidas Originals',cadena:'Adidas'},
];
const CADENAS=['Mateu','Outlet','Aurelius','Adidas'];
const LOC_BY_SLUG=LOCALES.reduce((m,l)=>{m[l.slug]=l;return m;},{});
function nombreSuc(slug){ return (LOC_BY_SLUG[slug]&&LOC_BY_SLUG[slug].nombre)||slug; }
function cadenaSuc(slug){ return (LOC_BY_SLUG[slug]&&LOC_BY_SLUG[slug].cadena)||'—'; }

/* --- mapas al dataset de Meses de Stock (mismos que Indicadores) --- */
const SLUG_SUC={'calle-12':'12-MS Calle 12','city-bell':'06-MS City Bell','calle-47':'08-MS Calle 47','calle-49':'19-MS Calle 49','los-hornos':'13-MS Los Hornos','plaza':'01-MS Plaza Italia','berisso':'16-MS Berisso','ensenada':'11-MS Ensenada','kids':'02-Mateu Kids','aurelius-12':'04-Aurelius Calle 12','aurelius-5':'18-Aurelius Calle 5','aurelius-cb':'17-Aurelius City Bell','adidas-12':'21-Adidas Calle 12','adidas':'09-Adidas Av. 7','originals':'15-Adidas Originals','gonnet':'14-Outlet Gonnet','av-44':'20-Outlet Av. 44','calle-55':'03-Outlet Calle 55','aurelius-10':'07-Aurelius Calle 10'};

/* --- semanas ISO --- */
function isoWeek(d){ d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-day+3); const f=new Date(Date.UTC(d.getUTCFullYear(),0,4)); const w=1+Math.round(((d-f)/864e5-3+((f.getUTCDay()+6)%7))/7); return d.getUTCFullYear()+'-W'+String(w).padStart(2,'0'); }
function recentWeeks(n){ const out=[],d=new Date(); for(let i=0;i<n;i++){ out.push(isoWeek(d)); d.setDate(d.getDate()-7);} return out; }
function fmtSemana(s){ if(!s)return'—'; const[a,w]=s.split('-W'); return 'Sem '+Number(w)+' · '+a; }
// Base Firebase (evaluaciones-mateu). Vacío = modo demo con mock-data.js.
const EVAL_DB_URL = 'https://evaluaciones-mateu-default-rtdb.firebaseio.com';
const USA_FIREBASE = /^https?:\/\//.test(EVAL_DB_URL);
// En Firebase la semana "actual" es la real; en demo, la del set de prueba.
const SEMANA_ACTUAL = USA_FIREBASE ? isoWeek(new Date()) : ((typeof MOCK!=='undefined' && MOCK && MOCK.semana_actual) || isoWeek(new Date()));

/* --- helpers DOM --- */

/* ============================================================
   CAPA DE DATOS — Firebase RTDB por REST (como marcas/turnero/mensajes).
   La URL (EVAL_DB_URL) se define arriba. Sin URL → modo demo con mock-data.js.
   Seguridad "blanda" como el resto del portal: el alcance por rol se aplica en
   el cliente (scopeVisibles). No hay enforcement de servidor.

/* --- alcance por rol (blando, en el cliente) --- */
function scopeVisibles(){
  if(esGerencia) return LOCALES.map(l=>l.slug);
  if(esSupervisor){
    if(Array.isArray(SESSION.sucursales) && SESSION.sucursales.length) return SESSION.sucursales.slice();
    if(MOCK) return MOCK.sucursal_supervisor.filter(x=>x.supervisor===(SESSION.email||'').toLowerCase()).map(x=>x.sucursal);
    return [];
  }
  const o=ownSlug(); return o?[o]:[];
}
// items {key:{...}} (Firebase) → array [{item_key,...}] (lo que espera la UI)
function itemsObjToArr(itemsObj){
  return E.ITEMS.map(it=>{ const v=(itemsObj&&itemsObj[it.key])||{};
    return {item_key:it.key,categoria:it.categoria,valor:v.valor||null,puntos:(v.puntos!=null?v.puntos:E.puntosDe(v.valor)),plan_accion:v.plan_accion||null}; });
}
// Resumen/ranking a partir de un array de evaluaciones (§6.6/§7). Puro.
function computeResumen(evals, semana){
  const vis=scopeVisibles();
  const items=vis.map(suc=>{
    const l=evals.filter(e=>e.sucursal===suc&&e.semana<=semana&&e.estado==='enviada').sort((a,b)=>a.semana<b.semana?-1:1);
    if(!l.length) return {sucursal:suc,sin_historial:true,sin_evaluar:true,semana_pedida:semana};
    let idx=l.findIndex(r=>r.semana===semana); const sinEval=idx<0; if(idx<0) idx=l.length-1;
    const cur=l[idx], prev=idx>0?l[idx-1]:null;
    return {sucursal:suc,encargado:cur.encargado,evaluacion_id:cur.id,semana:cur.semana,semana_pedida:semana,
      pts_total:cur.pts_total,pts_operativa:cur.pts_operativa,pts_actitudinal:cur.pts_actitudinal,nota:cur.nota,
      delta:prev?cur.pts_total-prev.pts_total:null,estado:cur.estado,visto_encargado:cur.visto_encargado,sin_evaluar:sinEval,sin_historial:false};
  });
  return {ok:true,semana,ve_ranking:puedeEditar,meta:{total:vis.length,sin_evaluar:items.filter(i=>i.sin_evaluar).length},items};
}

/* ============================================================
   FireStore — la base real (Firebase RTDB). Árbol:
     evaluaciones/<suc>__<semana> = {..., items:{<item_key>:{...}}}
     puntos_mejora/<pushid>       = {sucursal,item_key,semana_origen,texto,estado,...}
   ============================================================ */
const FireStore=(function(){
  const BASE=EVAL_DB_URL.replace(/\/$/,'');
  async function req(method,path,data){
    const r=await fetch(BASE+path+'.json',{method,headers:data!==undefined?{'Content-Type':'application/json'}:undefined,body:data!==undefined?JSON.stringify(data):undefined});
    if(!r.ok) throw new Error('Firebase HTTP '+r.status);
    return r.json();
  }
  const get=p=>req('GET',p), put=(p,d)=>req('PUT',p,d), patch=(p,d)=>req('PATCH',p,d);
  const post=(p,d)=>req('POST',p,d).then(x=>x&&x.name), del=p=>req('DELETE',p);
  const keyOf=(suc,sem)=>suc+'__'+sem;
  function nowIso(){ return new Date().toISOString().slice(0,19).replace('T',' '); }

  let _evals=null;                      // cache de evaluaciones; se refresca al escribir
  async function allEvals(force){
    if(_evals && !force) return _evals;
    const obj=await get('/evaluaciones')||{};
    _evals=Object.keys(obj).map(k=>Object.assign({id:k}, obj[k]));
    return _evals;
  }
  async function allPuntos(){
    const obj=await get('/puntos_mejora')||{};
    return Object.keys(obj).map(k=>Object.assign({id:k}, obj[k]));
  }
  return {
    async getResumen(semana){ return computeResumen(await allEvals(), semana); },
    async getEvaluacion(suc,semana){
      const raw=await get('/evaluaciones/'+keyOf(suc,semana));
      const ev=raw?Object.assign({id:keyOf(suc,semana)}, raw, {items:itemsObjToArr(raw.items)}):null;
      const evs=await allEvals();
      const ant=evs.filter(e=>e.sucursal===suc&&e.semana<semana).sort((a,b)=>a.semana<b.semana?1:-1)[0]||null;
      const anterior=ant?Object.assign({},ant,{items:itemsObjToArr(ant.items)}):null;
      const puntos=await allPuntos();
      // pendientes = de semanas anteriores (para el form del supervisor);
      // abiertos = incluye los de esta semana (para que el encargado los resuelva).
      const pend=puntos.filter(p=>p.sucursal===suc&&p.semana_origen<semana&&p.estado!=='confirmado').sort((a,b)=>a.semana_origen<b.semana_origen?-1:1);
      const abiertos=puntos.filter(p=>p.sucursal===suc&&p.semana_origen<=semana&&p.estado!=='confirmado').sort((a,b)=>a.semana_origen<b.semana_origen?-1:1);
      return {ok:true,evaluacion:ev,anterior,pendientes:pend,puntos_abiertos:abiertos};
    },
    async upsert(payload){
      const valores={}; E.ITEM_KEYS.forEach(k=>valores[k]=(payload.valores[k]&&payload.valores[k].valor)||null);
      const calc=E.calcularEvaluacion(valores);
      const key=keyOf(payload.sucursal,payload.semana);
      const prev=await get('/evaluaciones/'+key)||{};
      const items={}; E.ITEMS.forEach(it=>{ const v=payload.valores[it.key]||{}; items[it.key]={categoria:it.categoria,valor:v.valor||null,puntos:E.puntosDe(v.valor),plan_accion:(v.plan_accion||'').trim()||null}; });
      const rec={sucursal:payload.sucursal,encargado:payload.encargado||null,supervisor:SESSION.email,semana:payload.semana,
        pts_operativa:calc.pts_operativa,pts_actitudinal:calc.pts_actitudinal,pts_total:calc.pts_total,nota:calc.nota,
        obs_operativa:payload.obs_operativa||null,obs_actitudinal:payload.obs_actitudinal||null,estado:payload.estado,
        visto_encargado:prev.visto_encargado||0,visto_en:prev.visto_en||null,visto_comentario:prev.visto_comentario||null,
        created_at:prev.created_at||nowIso(),updated_at:nowIso(),items};
      await put('/evaluaciones/'+key, rec);
      // sync puntos_mejora de esta semana
      const deSemana=(await allPuntos()).filter(p=>p.sucursal===payload.sucursal&&p.semana_origen===payload.semana);
      for(const it of E.ITEMS){
        const v=payload.valores[it.key]||{}; const t=(v.plan_accion||'').trim();
        const cal=(v.valor==='regular'||v.valor==='mal')&&t; const ex=deSemana.find(p=>p.item_key===it.key);
        if(cal&&!ex) await post('/puntos_mejora',{sucursal:payload.sucursal,item_key:it.key,semana_origen:payload.semana,texto:t,estado:'pendiente',created_at:nowIso()});
        else if(cal&&ex) await patch('/puntos_mejora/'+ex.id,{texto:t});
        else if(!cal&&ex&&ex.estado==='pendiente') await del('/puntos_mejora/'+ex.id);
      }
      await allEvals(true);
      return {ok:true,evaluacion:Object.assign({id:key},rec,{items:itemsObjToArr(items)})};
    },
    async acuse(id,comentario){
      await patch('/evaluaciones/'+id,{visto_encargado:1,visto_en:nowIso(),visto_comentario:comentario||null});
      await allEvals(true);
      const raw=await get('/evaluaciones/'+id);
      return {ok:true,evaluacion:Object.assign({id},raw,{items:itemsObjToArr(raw&&raw.items)})};
    },
    async updatePunto(id,estado){
      const d=estado==='resuelto'?{estado,marcado_por:SESSION.email,marcado_en:nowIso()}:{estado,confirmado_por:SESSION.email,confirmado_en:nowIso()};
      await patch('/puntos_mejora/'+id, d);
      return {ok:true};
    },
  };
})();

/* ============================================================
   MOCK — demo sin backend, sobre mock-data.js. No persiste (memoria).
   ============================================================ */
const Mock=(function(){
  if(!MOCK) return {getResumen:()=>computeResumen([],SEMANA_ACTUAL),getEvaluacion:()=>({ok:true,evaluacion:null,anterior:null,pendientes:[]}),upsert:()=>{throw new Error('sin datos de prueba')},acuse:()=>({ok:true}),updatePunto:()=>({ok:true})};
  const D=MOCK;
  function itemsDe(id){ return D.evaluacion_items.filter(i=>i.evaluacion_id===id).map(i=>Object.assign({},i)); }
  function evalDe(suc,sem){ return D.evaluaciones.find(e=>e.sucursal===suc&&e.semana===sem)||null; }
  function anteriorDe(suc,sem){ return D.evaluaciones.filter(e=>e.sucursal===suc&&e.semana<sem).sort((a,b)=>a.semana<b.semana?1:-1)[0]||null; }
  return {
    getResumen(semana){ return computeResumen(D.evaluaciones, semana); },
    getEvaluacion(suc,semana){
      const ev=evalDe(suc,semana); if(ev){ ev.items=itemsDe(ev.id); }
      const ant=anteriorDe(suc,semana); if(ant){ ant.items=itemsDe(ant.id); }
      const pend=D.puntos_mejora.filter(p=>p.sucursal===suc&&p.semana_origen<semana&&p.estado!=='confirmado').sort((a,b)=>a.semana_origen<b.semana_origen?-1:1);
      const abiertos=D.puntos_mejora.filter(p=>p.sucursal===suc&&p.semana_origen<=semana&&p.estado!=='confirmado').sort((a,b)=>a.semana_origen<b.semana_origen?-1:1);
      return {ok:true,evaluacion:ev?Object.assign({},ev):null,anterior:ant?Object.assign({},ant):null,pendientes:pend.map(p=>Object.assign({},p)),puntos_abiertos:abiertos.map(p=>Object.assign({},p))};
    },
    upsert(payload){
      const valores={}; E.ITEM_KEYS.forEach(k=>{ valores[k]=(payload.valores[k]&&payload.valores[k].valor)||null; });
      const calc=E.calcularEvaluacion(valores);
      let ev=evalDe(payload.sucursal,payload.semana);
      if(!ev){ ev={id:Math.max(0,...D.evaluaciones.map(e=>e.id))+1,sucursal:payload.sucursal,semana:payload.semana,created_at:'now'}; D.evaluaciones.push(ev); }
      Object.assign(ev,{encargado:payload.encargado,supervisor:SESSION.email,pts_operativa:calc.pts_operativa,pts_actitudinal:calc.pts_actitudinal,pts_total:calc.pts_total,nota:calc.nota,obs_operativa:payload.obs_operativa,obs_actitudinal:payload.obs_actitudinal,estado:payload.estado,visto_encargado:ev.visto_encargado||0,updated_at:'now'});
      D.evaluacion_items=D.evaluacion_items.filter(i=>i.evaluacion_id!==ev.id);
      E.ITEMS.forEach(it=>{ const v=payload.valores[it.key]||{}; D.evaluacion_items.push({id:Math.max(0,...D.evaluacion_items.map(x=>x.id))+1,evaluacion_id:ev.id,categoria:it.categoria,item_key:it.key,valor:v.valor||null,puntos:E.puntosDe(v.valor),plan_accion:v.plan_accion||null}); });
      const existentes=D.puntos_mejora.filter(p=>p.sucursal===payload.sucursal&&p.semana_origen===payload.semana);
      E.ITEMS.forEach(it=>{ const v=payload.valores[it.key]||{}; const t=(v.plan_accion||'').trim(); const cal=(v.valor==='regular'||v.valor==='mal')&&t; const ex=existentes.find(p=>p.item_key===it.key);
        if(cal&&!ex) D.puntos_mejora.push({id:Math.max(0,...D.puntos_mejora.map(x=>x.id))+1,sucursal:payload.sucursal,item_key:it.key,semana_origen:payload.semana,texto:t,estado:'pendiente',evaluacion_id:ev.id});
        else if(cal&&ex) ex.texto=t;
        else if(!cal&&ex&&ex.estado==='pendiente') D.puntos_mejora=D.puntos_mejora.filter(p=>p!==ex); });
      const out=Object.assign({},ev); out.items=itemsDe(ev.id);
      return {ok:true,evaluacion:out};
    },
    acuse(id,comentario){ const ev=D.evaluaciones.find(e=>String(e.id)===String(id)); if(ev){ ev.visto_encargado=1; ev.visto_en='now'; ev.visto_comentario=comentario||null; } const out=Object.assign({},ev); out.items=itemsDe(ev.id); return {ok:true,evaluacion:out}; },
    updatePunto(id,estado){ const p=D.puntos_mejora.find(x=>String(x.id)===String(id)); if(p){ p.estado=estado; if(estado==='resuelto'){p.marcado_por=SESSION.email;p.marcado_en='now';} else {p.confirmado_por=SESSION.email;p.confirmado_en='now';} } return {ok:true,punto:Object.assign({},p)}; },
  };
})();

/* ============================================================
   CRUCE con Meses de Stock (§6.3) — ratio real por sucursal.
   ============================================================ */
function ratioStock(suc){
  const S=window.STOCK_DATA; if(!S) return null;
  const nombre=SLUG_SUC[suc]; if(!nombre||!S.sucursales[nombre]) return null;
  const rubros=S.sucursales[nombre].rubros||{}; const meses=S.meses||[];
  const ultMes=[...meses].reverse().find(m=>Object.values(rubros).some(r=>r.serie&&r.serie[m]));
  if(!ultMes) return null;
  const detalle=[]; let stk=0,vts=0;
  ['CALZADO','INDUMENTARIA','ACCESORIOS'].forEach(rk=>{ const r=rubros[rk]; const p=r&&r.serie&&r.serie[ultMes];
    if(p&&p.ventas>0){ stk+=p.stock; vts+=p.ventas; detalle.push({rubro:rk,ratio:p.ratio}); } });
  if(vts<=0) return null;
  return {mes:ultMes, ratio:+(stk/vts).toFixed(2), detalle};
}

let SEMANA_SEL = SEMANA_ACTUAL;
let TAB = esEncargado ? 'mi' : 'dashboard';

function buildTabs(){
  const tabs = esEncargado
    ? [{k:'mi',t:'Mi evaluación'}]
    : [{k:'dashboard',t:'Ranking'},{k:'form',t:'Nueva evaluación'},{k:'graficos',t:'Gráficos'}];
  $('tabs').innerHTML = tabs.map(t=>`<button class="tab${t.k===TAB?' on':''}" data-tab="${t.k}">${t.t}</button>`).join('');
  $('tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ TAB=b.dataset.tab; buildTabs(); route(); });
  if(!esEncargado && tabs.length<=1) $('tabs').style.display='none';
}

function route(){
  const v=$('view'); v.innerHTML='<div class="empty">Cargando…</div>';
  if(esEncargado) return renderEncargado();
  if(TAB==='dashboard') return renderDashboard();
  if(TAB==='form') return renderForm();
  if(TAB==='graficos') return renderGraficos();
}

/* ============================================================
   DASHBOARD / RANKING (§7)  — gerencia y supervisor
   ============================================================ */
let DASH_METRIC='total', DASH_CADENA='';
async function renderDashboard(){
  const v=$('view'); v.innerHTML='<div class="empty">Cargando ranking…</div>';
  let data; try{ data=await Store.getResumen(SEMANA_SEL); }catch(e){ v.innerHTML=errBox(e); return; }
  const items=data.items||[];
  const evaluadas=items.filter(i=>!i.sin_historial);
  const metricVal=i=> DASH_METRIC==='operativa'?i.pts_operativa : DASH_METRIC==='actitudinal'?i.pts_actitudinal : i.pts_total;
  const conNota=evaluadas.filter(i=>i.pts_total!=null);
  const prom = conNota.length? Math.round(conNota.reduce((a,i)=>a+metricVal(i),0)/conNota.length) : null;
  const mejor = conNota.slice().sort((a,b)=>metricVal(b)-metricVal(a))[0];
  const peor  = conNota.slice().sort((a,b)=>metricVal(a)-metricVal(b))[0];

  v.innerHTML=`
    <h1 class="page">Ranking de sucursales</h1>
    <div class="page-sub">${fmtSemana(SEMANA_SEL)} · alcance de ${esGerencia?'gerencia (todas)':'tus sucursales'}</div>
    <div class="row no-print" style="margin-bottom:16px">
      <div><label class="lbl">Semana</label>${semanaSelect('dSem',SEMANA_SEL)}</div>
      <div><label class="lbl">Cadena</label><select class="sel" id="dCad"><option value="">Todas</option>${CADENAS.map(c=>'<option value="'+c+'"'+(c===DASH_CADENA?' selected':'')+'>'+c+'</option>').join('')}</select></div>
      <div><label class="lbl">Puntaje</label><select class="sel" id="dMet">
        <option value="total"${DASH_METRIC==='total'?' selected':''}>Total /100</option>
        <option value="operativa"${DASH_METRIC==='operativa'?' selected':''}>Operativa /50</option>
        <option value="actitudinal"${DASH_METRIC==='actitudinal'?' selected':''}>Actitudinal /50</option>
      </select></div>
      <div class="spacer"></div>
      <div style="align-self:flex-end"><button class="btn btn-outline btn-sm" id="dPrint">🖨️ Exportar PDF</button></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="k">Promedio</div><div class="v">${prom!=null?prom:'—'}<small>/${DASH_METRIC==='total'?100:50}</small></div></div>
      <div class="kpi"><div class="k">Mejor sucursal</div><div class="v" style="font-size:20px">${mejor?esc(nombreSuc(mejor.sucursal)):'—'}</div><div class="k">${mejor?metricVal(mejor)+' · '+mejor.nota:''}</div></div>
      <div class="kpi"><div class="k">Necesita atención</div><div class="v" style="font-size:20px">${peor?esc(nombreSuc(peor.sucursal)):'—'}</div><div class="k">${peor?metricVal(peor)+' · '+peor.nota:''}</div></div>
      <div class="kpi"><div class="k">Sin evaluar</div><div class="v">${data.meta.sin_evaluar}<small>/${data.meta.total}</small></div></div>
    </div>
    <div class="tbl-wrap"><table class="rk"><thead><tr>
      <th>Sucursal</th><th>Encargado</th><th class="num">Puntaje</th><th>Nota</th><th>Δ</th><th>Semana</th><th></th>
    </tr></thead><tbody id="rkBody"></tbody></table></div>`;

  $('dSem').onchange=e=>{ SEMANA_SEL=e.target.value; renderDashboard(); };
  $('dCad').onchange=e=>{ DASH_CADENA=e.target.value; renderDashboard(); };
  $('dMet').onchange=e=>{ DASH_METRIC=e.target.value; renderDashboard(); };
  $('dPrint').onclick=()=>window.print();

  const maxV = DASH_METRIC==='total'?100:50;
  const body=$('rkBody'); let html='';
  CADENAS.filter(c=>!DASH_CADENA||c===DASH_CADENA).forEach(cad=>{
    const rows=items.filter(i=>cadenaSuc(i.sucursal)===cad).sort((a,b)=>(metricVal(b)||-1)-(metricVal(a)||-1));
    if(!rows.length) return;
    html+='<tr class="cad-row"><td colspan="7">'+cad+'</td></tr>';
    rows.forEach(i=>{
      const val=metricVal(i);
      const barColor=i.nota==='A'?'var(--ok)':i.nota==='B'?'var(--warn)':i.nota==='C'?'#e0562b':'var(--bad)';
      html+='<tr>'
        +'<td><b>'+esc(nombreSuc(i.sucursal))+'</b></td>'
        +'<td class="muted">'+esc(i.encargado||'—')+'</td>'
        +'<td class="num">'+(i.sin_historial?'—':'<div style="display:flex;align-items:center;gap:8px;justify-content:flex-end"><div class="bar" style="flex:1;max-width:90px"><span style="width:'+Math.round((val/maxV)*100)+'%;background:'+barColor+'"></span></div><b>'+val+'</b></div>')+'</td>'
        +'<td>'+notaBadge(i.nota,'sm')+'</td>'
        +'<td>'+(i.sin_historial?'':deltaHtml(i.delta))+'</td>'
        +'<td class="muted" style="font-size:12px">'+(i.sin_historial?'sin historial':(i.sin_evaluar?'<span style="color:#b45309">sin evaluar · '+fmtSemana(i.semana)+'</span>':fmtSemana(i.semana)))+'</td>'
        +'<td style="white-space:nowrap">'
          +(i.sin_historial?'':'<button class="btn btn-outline btn-sm" data-ver="'+i.sucursal+'" data-sem="'+(i.semana)+'">Ver</button> ')
          +(puedeEditar?'<button class="btn btn-primary btn-sm" data-eval="'+i.sucursal+'">Evaluar</button>':'')
        +'</td></tr>';
    });
  });
  body.innerHTML=html||'<tr><td colspan="7" class="muted" style="padding:20px;text-align:center">Sin sucursales en tu alcance.</td></tr>';
  body.querySelectorAll('[data-ver]').forEach(b=>b.onclick=()=>renderDetalle(b.dataset.ver,b.dataset.sem));
  body.querySelectorAll('[data-eval]').forEach(b=>b.onclick=()=>openForm(b.dataset.eval,SEMANA_SEL));
}

let FORM=null, AUTOSAVE_T=null, VISIBLES=null;
async function renderForm(preSuc,preSem){
  const v=$('view'); v.innerHTML='<div class="empty">Cargando…</div>';
  if(!VISIBLES){ try{ const r=await Store.getResumen(SEMANA_SEL); VISIBLES=(r.items||[]).map(i=>i.sucursal); }catch(e){ VISIBLES=LOCALES.map(l=>l.slug); } }
  if(!VISIBLES.length){ v.innerHTML='<div class="empty">No tenés sucursales asignadas para evaluar.</div>'; return; }
  const suc = preSuc && VISIBLES.includes(preSuc) ? preSuc : VISIBLES[0];
  const sem = preSem || SEMANA_SEL;
  await loadForm(suc,sem);
}
async function loadForm(suc,sem){
  const v=$('view'); v.innerHTML='<div class="empty">Cargando evaluación…</div>';
  let d; try{ d=await Store.getEvaluacion(suc,sem); }catch(e){ v.innerHTML=errBox(e); return; }
  const ev=d.evaluacion;
  FORM={ suc, sem, encargado:(ev&&ev.encargado)|| (d.anterior&&d.anterior.encargado) ||'', valores:{}, obs_op:(ev&&ev.obs_operativa)||'', obs_act:(ev&&ev.obs_actitudinal)||'', estado:(ev&&ev.estado)||'borrador', evalId:ev&&ev.id, anterior:d.anterior, pendientes:d.pendientes||[], dirty:false };
  E.ITEM_KEYS.forEach(k=>FORM.valores[k]={valor:null,plan_accion:''});
  if(ev&&ev.items) ev.items.forEach(it=>{ if(FORM.valores[it.item_key]) FORM.valores[it.item_key]={valor:it.valor,plan_accion:it.plan_accion||''}; });
  drawForm();
}
function anteriorValor(key){ if(!FORM.anterior||!FORM.anterior.items) return null; const it=FORM.anterior.items.find(i=>i.item_key===key); return it?it.valor:null; }

async function renderGraficos(){
  const v=$('view'); v.innerHTML='<div class="empty">Cargando gráficos…</div>';
  const weeks=recentWeeks(6).reverse();
  const snaps={}; for(const w of weeks){ try{ snaps[w]=await Store.getResumen(w); }catch(e){ snaps[w]={items:[]}; } }
  // matriz suc → {semana:pts}
  const sucs=new Set(); weeks.forEach(w=>(snaps[w].items||[]).forEach(i=>{ if(!i.sin_historial) sucs.add(i.sucursal); }));
  const sucList=[...sucs];
  const matrix={}; sucList.forEach(s=>{ matrix[s]={}; weeks.forEach(w=>{ const it=(snaps[w].items||[]).find(x=>x.sucursal===s); matrix[s][w]= it&&!it.sin_evaluar? it.pts_total : null; }); });

  // cadena avg para SEMANA_SEL (última con datos)
  const wLast=weeks[weeks.length-1];
  const cadAvg=CADENAS.map(c=>{ const vals=sucList.filter(s=>cadenaSuc(s)===c).map(s=>matrix[s][wLast]).filter(x=>x!=null); return {cad:c, avg: vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null}; });

  v.innerHTML=`
    <h1 class="page">Gráficos</h1><div class="page-sub">Últimas ${weeks.length} semanas</div>
    <div class="card"><div class="card-h">Evolución por sucursal</div><div class="card-hs">Elegí una o varias para comparar.</div>
      <select class="sel" id="gSel" multiple size="6" style="width:100%;max-width:340px;margin-bottom:12px">${sucList.map(s=>'<option value="'+s+'">'+esc(nombreSuc(s))+'</option>').join('')}</select>
      <div id="gEvo"></div></div>
    <div class="card"><div class="card-h">Comparativo por cadena</div><div class="card-hs">Promedio ${fmtSemana(wLast)}</div>${barChart(cadAvg.map(c=>({label:c.cad,val:c.avg})),100)}</div>
    <div class="card"><div class="card-h">Heatmap sucursales × semanas</div><div class="card-hs">Color por nota.</div>${heatmap(sucList,weeks,matrix)}</div>`;

  const sel=$('gSel'); if(sucList.length){ const def=[]; if(!esGerencia){ sucList.forEach((s,i)=>{ sel.options[i].selected=true; }); } else { sel.options[0].selected=true; } }
  const drawEvo=()=>{ const chosen=[...sel.selectedOptions].map(o=>o.value); const series=chosen.map(s=>({name:nombreSuc(s), points:weeks.map(w=>({x:w,y:matrix[s][w]}))})); $('gEvo').innerHTML=multiLine(series,weeks); };
  sel.onchange=drawEvo; drawEvo();
}
/* --- SVG helpers --- */
const PALETTE=['#CC0000','#0B1527','#16a34a','#d97706','#2563eb','#7c3aed','#0891b2'];
function lineChart(points,w,h){ return multiLine([{name:'',points:points.map(p=>({x:p.x,y:p.y}))}], points.map(p=>p.x), w, h); }
function multiLine(series,weeks,W,H){ W=W||560; H=H||200; const P={l:34,r:12,t:12,b:26};
  const ys=series.flatMap(s=>s.points.map(p=>p.y)).filter(v=>v!=null); const maxY=Math.max(100,...ys), minY=Math.min(0,...ys);
  const x=i=>P.l+(weeks.length<2?0:i*(W-P.l-P.r)/(weeks.length-1)); const y=val=>H-P.b-((val-minY)/(maxY-minY||1))*(H-P.t-P.b);
  let g='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;height:auto">';
  [0,25,50,75,100].forEach(gl=>{ if(gl>=minY&&gl<=maxY){ g+='<line x1="'+P.l+'" y1="'+y(gl)+'" x2="'+(W-P.r)+'" y2="'+y(gl)+'" stroke="#eef0f7"/><text x="4" y="'+(y(gl)+3)+'" font-size="9" fill="#6B7A99">'+gl+'</text>'; } });
  weeks.forEach((w,i)=>{ g+='<text x="'+x(i)+'" y="'+(H-8)+'" font-size="8.5" fill="#6B7A99" text-anchor="middle">'+('W'+w.split('-W')[1])+'</text>'; });
  series.forEach((s,si)=>{ const col=PALETTE[si%PALETTE.length]; let d='',pts='';
    s.points.forEach((p,i)=>{ if(p.y==null) return; const cx=x(i),cy=y(p.y); d+=(d?'L':'M')+cx+' '+cy+' '; pts+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="'+col+'"/>'; });
    g+='<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"/>'+pts; });
  g+='</svg>';
  if(series.length>1||series[0].name){ g+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:12px">'+series.map((s,si)=>'<span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:'+PALETTE[si%PALETTE.length]+';vertical-align:middle"></span> '+esc(s.name)+'</span>').join('')+'</div>'; }
  return g;
}
function barChart(data,maxV){ const W=560,H=Math.max(80,data.length*42),P={l:90,r:30}; let g='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;height:auto">';
  data.forEach((d,i)=>{ const yy=i*42+14, bw=d.val!=null?(d.val/maxV)*(W-P.l-P.r):0; const col=d.val>=80?'#16a34a':d.val>=60?'#d97706':d.val>=40?'#e0562b':'#dc2626';
    g+='<text x="'+(P.l-8)+'" y="'+(yy+16)+'" font-size="12" fill="#0B1527" text-anchor="end">'+esc(d.label)+'</text>';
    g+='<rect x="'+P.l+'" y="'+yy+'" width="'+Math.max(bw,1)+'" height="22" rx="4" fill="'+(d.val!=null?col:'#e6ebf5')+'"/>';
    g+='<text x="'+(P.l+bw+6)+'" y="'+(yy+16)+'" font-size="12" font-weight="700" fill="#0B1527">'+(d.val!=null?d.val:'—')+'</text>'; });
  return g+'</svg>';
}
function heatmap(sucs,weeks,matrix){ if(!sucs.length) return '<div class="muted">Sin datos.</div>';
  const cell=v=> v==null?'#eef0f7': v>=80?'#16a34a': v>=60?'#d97706': v>=40?'#e0562b':'#dc2626';
  let h='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px"><tr><td></td>'+weeks.map(w=>'<td style="padding:3px 5px;color:#6B7A99;text-align:center">W'+w.split('-W')[1]+'</td>').join('')+'</tr>';
  sucs.forEach(s=>{ h+='<tr><td style="padding:3px 8px;white-space:nowrap;color:#0B1527">'+esc(nombreSuc(s))+'</td>'+weeks.map(w=>{ const v=matrix[s][w]; return '<td title="'+(v!=null?v:'sin dato')+'" style="width:30px;height:24px;text-align:center;color:#fff;font-weight:600;background:'+cell(v)+'">'+(v!=null?v:'')+'</td>'; }).join('')+'</tr>'; });
  return h+'</table></div>';
}

if(Q.get('ver')){ renderDetalle(Q.get('ver'), Q.get('semana')||SEMANA_ACTUAL); }
else route();
