<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apertura Diagonal 80 — Mateu Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0B1527;--navy-mid:#1a2f55;--navy-soft:#13203a;
  --red:#CC0000;--red-soft:#ff3b3b;
  --white:#ffffff;--off:#f5f7fc;--muted:#6B7A99;--muted-light:#b0bcd4;
  --card:#ffffff;--border:#dce3f0;
  --ok:#15803d;--warn:#b45309;--bad:#b91c1c;
  --font-d:'Bebas Neue',sans-serif;--font-c:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
  --shadow:0 1px 4px rgba(11,21,39,.08);--shadow-md:0 8px 30px rgba(11,21,39,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--navy);font-family:var(--font-b);min-height:100vh}

/* ===== LOGIN ===== */
#login{min-height:100vh;display:none;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 120% at 50% 0%,#13203a 0%,#0B1527 60%)}
.login-card{width:100%;max-width:360px;background:var(--card);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);overflow:hidden;animation:rise .5s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-head{background:var(--navy);padding:30px 28px 24px;text-align:center;border-bottom:3px solid var(--red)}
.login-head img{height:38px;filter:brightness(0) invert(1);margin-bottom:12px}
.login-head .t{font-family:var(--font-d);font-size:24px;letter-spacing:1.5px;color:#fff;line-height:1}
.login-head .s{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted-light);margin-top:4px}
.login-body{padding:26px 28px 28px}
.fld{margin-bottom:14px}
.fld label{display:block;font-family:var(--font-c);font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fld input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:var(--font-b);font-size:15px;color:var(--navy);transition:border .15s}
.fld input:focus{outline:none;border-color:var(--navy-mid)}
.login-btn{width:100%;margin-top:6px;padding:12px;border:none;border-radius:8px;background:var(--red);
  color:#fff;font-family:var(--font-c);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .15s}
.login-btn:hover{background:#a00000}
.login-btn:disabled{opacity:.6;cursor:default}
.login-err{display:none;margin-top:12px;background:#fff0f0;color:#991b1b;border:1px solid #fecaca;
  border-radius:7px;padding:9px 12px;font-size:13px;text-align:center}
.login-err.show{display:block;animation:rise .25s}

/* ===== APP SHELL ===== */
#app{display:none}
.top{background:var(--navy);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;
  gap:14px;border-bottom:3px solid var(--red)}
.top-left{display:flex;align-items:center;gap:16px;min-width:0}
.top-left a.logo-lnk{display:flex;align-items:center;flex-shrink:0}
.top img{height:34px;filter:brightness(0) invert(1)}
.hdr-titles{line-height:1.05;min-width:0}
.hdr-titles .t{font-family:var(--font-d);font-size:24px;letter-spacing:1.5px;color:#fff;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.hdr-titles .s{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted-light)}
.top-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.who{text-align:right;line-height:1.1}
.who .n{font-family:var(--font-c);font-size:14px;font-weight:600;color:#fff}
.who .r{font-family:var(--font-c);font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--red-soft)}
.logout{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);
  font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;cursor:pointer;transition:all .15s}
.logout:hover{color:#fff;border-color:#fff}

/* ===== TABS ===== */
nav.tabs{background:var(--navy-soft);display:flex;gap:2px;padding:0 26px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted-light);
  font-family:var(--font-c);font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:13px 18px 10px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--red)}

/* ===== MAIN / VISTAS ===== */
main{max-width:1240px;margin:0 auto;padding:26px 26px 60px}
.view{display:none}
.view.active{display:block;animation:rise .3s}
.pg-title{font-family:var(--font-d);font-size:28px;letter-spacing:1px;color:var(--navy);line-height:1}
.pg-sub{font-family:var(--font-c);font-size:13px;font-weight:500;letter-spacing:.5px;color:var(--muted);
  margin-top:4px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;
  box-shadow:var(--shadow);margin-bottom:18px}
.empty{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:40px 24px;
  text-align:center;color:var(--muted);font-size:14px}
.empty .big{font-size:30px;margin-bottom:10px}
.hint{font-size:12.5px;color:var(--muted)}
.badge-rol{display:inline-block;background:#eef2fb;border:1px solid var(--border);border-radius:20px;
  padding:3px 12px;font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted)}

/* ===== BOTONES ===== */
.btn{border:none;border-radius:8px;padding:10px 18px;font-family:var(--font-c);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;transition:all .15s;cursor:pointer;background:#fff;
  border:1.5px solid var(--border);color:var(--navy)}
.btn:hover{border-color:var(--navy-mid)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#a00000;border-color:#a00000}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{color:var(--navy);border-color:var(--border)}
.btn:disabled{opacity:.55;cursor:default}

/* ===== KPIs ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .v{font-family:var(--font-d);font-size:26px;letter-spacing:.5px;color:var(--navy);line-height:1}
.kpi .l{font-family:var(--font-c);font-size:11px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);margin-top:4px}

/* ===== TOOLBAR / FILTROS ===== */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
.toggle{display:inline-flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.tgl-btn{border:none;background:transparent;padding:8px 14px;font-family:var(--font-c);font-size:12px;
  font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s}
.tgl-btn.on{background:var(--navy);color:#fff}
.sel{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--navy);
  background:#fff;font-family:var(--font-b);max-width:160px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border-radius:20px;
  padding:5px 10px 5px 13px;font-family:var(--font-c);font-size:12px;font-weight:600;letter-spacing:.5px;
  cursor:pointer;transition:background .15s}
.chip:hover{background:var(--red)}
.chip .x{font-size:10px;opacity:.7}

/* ===== GRÁFICOS DE BARRAS ===== */
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;align-items:start;margin-bottom:4px}
.chart-wide{grid-column:1/-1}
.chart-title{font-family:var(--font-d);font-size:17px;letter-spacing:.5px;color:var(--navy);margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;padding:3px 4px;cursor:pointer;border-radius:6px;transition:background .1s}
.bar-row:hover{background:#f4f6fc}
.bar-row .bl{flex:0 0 118px;font-family:var(--font-c);font-size:12.5px;font-weight:600;color:var(--navy);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.bar-row .bt{flex:1;height:14px;background:#eef1f8;border-radius:4px;overflow:hidden}
.bar-row .bf{display:block;height:100%;background:var(--navy-mid);border-radius:4px;min-width:2px;transition:width .25s}
.bar-row.on .bf{background:var(--red)}
.bar-row.on .bl{color:var(--red)}
.bar-row .bv{flex:0 0 54px;font-size:12px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}

/* ===== CARGA EXCEL ===== */
.dropzone{border:2px dashed var(--border);border-radius:12px;padding:30px 20px;text-align:center;
  color:var(--muted);cursor:pointer;transition:all .15s;background:#fbfcff}
.dropzone:hover,.dropzone.drag{border-color:var(--red);background:#fff6f6;color:var(--navy)}
.dropzone .dz-ico{font-size:26px;margin-bottom:8px}
.dropzone .dz-main{font-family:var(--font-c);font-size:15px;font-weight:600;letter-spacing:.5px}
.upstatus{font-size:13px;margin-top:10px}
.upstatus.ok{color:var(--ok)}
.upstatus.err{color:var(--bad)}

/* ===== EXHIBICIÓN (zonas) ===== */
.table-wrap{overflow-x:auto}
.ztable{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.ztable th{background:var(--navy);color:#fff;font-family:var(--font-c);font-weight:600;letter-spacing:.5px;
  padding:8px 10px;text-align:left;white-space:nowrap}
.ztable td{padding:7px 10px;border-bottom:1px solid #eef0f7;white-space:nowrap}
.ztable tr:hover td{background:#f8f9fe}
.ztable .num{text-align:right;font-variant-numeric:tabular-nums}
.ztable .zn{font-weight:600;color:var(--navy)}
.ztable .zu{font-size:11.5px;color:var(--muted)}
.badge{display:inline-block;border-radius:12px;padding:2px 9px;font-family:var(--font-c);font-size:11px;
  font-weight:600;letter-spacing:.5px;white-space:nowrap}
.badge.gris{background:#eef1f8;color:var(--muted)}
.badge.rojo{background:#fdecec;color:var(--bad)}
.badge.verde{background:#e8f6ee;color:var(--ok)}
.btn-mini{border:1px solid var(--border);background:#fff;border-radius:6px;padding:4px 9px;font-size:11px;
  cursor:pointer;color:var(--navy);font-family:var(--font-c);font-weight:600;letter-spacing:.5px;transition:all .12s}
.btn-mini:hover{border-color:var(--navy-mid)}
.btn-mini.danger{color:var(--bad)}
.btn-mini.danger:hover{border-color:var(--bad)}

/* editor de zona */
.zform{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.zform .fld{margin-bottom:0}
.zform input,.zform select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;
  font-family:var(--font-b);font-size:14px;color:var(--navy);background:#fff}
.zform input:focus,.zform select:focus{outline:none;border-color:var(--navy-mid)}
.zform .fld-full{grid-column:1/-1}
.zform input:disabled{background:#f2f4fa;color:var(--muted)}
.cap-calc{font-family:var(--font-d);font-size:24px;color:var(--navy);line-height:1.2}
.chk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--navy);cursor:pointer;user-select:none}
.chk input{width:auto}

/* ===== ANÁLISIS ===== */
.badge.amarillo{background:#fef3c7;color:#92400e}
.an-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;
  box-shadow:var(--shadow);overflow:hidden}
.an-head{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;flex-wrap:wrap;transition:background .12s}
.an-head:hover{background:#f8f9fe}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot.rojo{background:var(--bad)}
.dot.verde{background:var(--ok)}
.dot.amarillo{background:#eab308}
.dot.gris{background:#b0bcd4}
.an-title{font-family:var(--font-d);font-size:19px;letter-spacing:.5px;color:var(--navy);flex:1;min-width:120px}
.an-nums{display:flex;gap:18px;align-items:center;font-size:13px;color:var(--muted);flex-wrap:wrap}
.an-nums b{color:var(--navy);font-variant-numeric:tabular-nums}
.an-det{border-top:1px solid var(--border);padding:14px 16px;background:#fbfcff}
.an-det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:12px}
.mini-title{font-family:var(--font-c);font-size:12px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.mini-row{display:flex;align-items:center;gap:7px;padding:2px 0;font-size:12.5px;color:var(--navy)}
.mini-row .ml{flex:0 0 95px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;
  font-family:var(--font-c);font-weight:600}
.mini-row .mt{flex:1;height:10px;background:#eef1f8;border-radius:3px;overflow:hidden}
.mini-row .mf{display:block;height:100%;background:var(--navy-mid);min-width:2px}
.mini-row .mv{flex:0 0 46px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:11.5px}
.res-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:7px;border-radius:20px;padding:6px 14px;
  font-family:var(--font-c);font-size:13px;font-weight:700;letter-spacing:.5px;background:#fff;border:1.5px solid var(--border)}
.alert-line{font-size:13.5px;padding:7px 0;border-bottom:1px solid #eef0f7;color:var(--navy)}
.alert-line:last-child{border-bottom:none}
.alert-line b{font-family:var(--font-c);letter-spacing:.5px}

/* ===== VALIDACIÓN ===== */
.val-title{font-family:var(--font-d);font-size:20px;letter-spacing:.5px;color:var(--navy);margin-bottom:10px}
.val-sec{font-family:var(--font-c);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin:14px 0 6px}
.val-grid{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.val-row{display:flex;align-items:center;padding:7px 12px;font-size:13px;border-bottom:1px solid #eef0f7;background:#fff}
.val-row:last-child{border-bottom:none}
.val-row.hdr{background:var(--navy);color:#fff;font-family:var(--font-c);font-weight:600;letter-spacing:.5px}
.val-row .vc{flex:1.4;min-width:0}
.val-row .vn{flex:1;text-align:right;font-variant-numeric:tabular-nums}
.val-row .vk{flex:0 0 34px;text-align:right;font-weight:700}
.vn.ok,.vk.ok{color:var(--ok)}
.vn.nok,.vk.nok{color:var(--bad)}
.val-actions{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px}
.warn-box{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;
  padding:10px 14px;font-size:13px;margin-top:12px}

footer{text-align:center;padding:24px;font-family:var(--font-c);font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted-light)}

@media(max-width:640px){
  .top{padding:10px 14px}
  .top-left{gap:10px}
  .top img{height:28px}
  .hdr-titles .t{font-size:19px;letter-spacing:1px}
  .hdr-titles .s{display:none}
  .hide-m{display:none}
  .who .n{display:none}
  nav.tabs{padding:0 10px}
  .tab{padding:12px 13px 9px;font-size:13px}
  main{padding:18px 14px 48px}
  .pg-title{font-size:24px}
}
</style>
</head>

const $ = id => document.getElementById(id);

function esc(s){ return (s===null||s===undefined)?'':String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtNum(n){ return (n||0).toLocaleString('es-AR'); }
function fmtDate(ts){ if(!ts) return '—'; const d=new Date(ts); return d.toLocaleDateString('es-AR')+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
function putJSON(url, data){
  return fetch(url,{method:'PUT',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
function patchJSON(url, data){
  return fetch(url,{method:'PATCH',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}});
}
function postFireAndForget(url, data){
  try{ fetch(url,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}}).catch(()=>{}); }catch(e){}
}

function esAdmin(){ return ST.session && ST.session.rol==='admin'; }

function currentYYYYMM(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

// Log de acciones admin en /diagonal80/actividad/{YYYY-MM} (mismo patrón que Discontinuos)
function logActividad(accion, detalle){
  if(!FIREBASE_URL || !ST.session) return;
  postFireAndForget(fbBase()+'/actividad/'+currentYYYYMM()+'.json', {
    accion, detalle: detalle||null,
    usuario: ST.session.email, rol: ST.session.rol, timestamp: Date.now(),
  });
}

// Sin tildes, mayúsculas, espacios colapsados — para comparar textos del Excel
function normTxt(s){
  return String(s===null||s===undefined?'':s).normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/\s+/g,' ').trim().toUpperCase();
}

// Subrubro del Excel → Género normalizado
function normGenero(sr){
  const s = normTxt(sr);
  if(s.includes('HOMBRE'))  return 'Hombre';
  if(s.includes('DAMA'))    return 'Dama';
  if(s.includes('NINO'))    return 'Niño';
  if(s.includes('INFANTE')) return 'Infante';
  if(s.includes('UNISEX'))  return 'Unisex';
  if(s.includes('VARIOS'))  return 'Varios';
  return String(sr||'').trim() || 'Sin género';
}

// '02-CALZADO' → 'Calzado' (solo para mostrar; el dato se guarda crudo)
function rubroCorto(r){
  const s = String(r||'').replace(/^\d+\s*-\s*/,'').trim();
  return s ? s.charAt(0) + s.slice(1).toLowerCase() : '—';
}

function saveSession(s){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }catch(e){ window.__sess=s; } }
function readSession(){ try{ const s=localStorage.getItem(SESSION_KEY); return s? JSON.parse(s):null; }catch(e){ return window.__sess||null; } }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){ window.__sess=null; } }

function showLogin(){ $('login').style.display='flex'; $('app').style.display='none'; $('p').value=''; }
function showApp(){ $('login').style.display='none'; $('app').style.display='block'; }

function login(){
  const email = ($('u').value||'').trim().toLowerCase();
  const pin = ($('p').value||'').trim();
  $('loginErr').classList.remove('show');
  if(!email || !pin) return;
  const u = USUARIOS.find(x => x.email.toLowerCase()===email && String(x.pin)===pin);
  if(!u){ $('loginErr').classList.add('show'); return; }
  const session = { email:u.email, nombre:u.nombre, rol:u.rol };
  saveSession(session);
  boot(session);
}

function logout(){ clearSession(); showLogin(); }

function buildNav(){
  $('navTabs').innerHTML = TABS.map(t =>
    '<button class="tab" data-tab="'+t.id+'">'+t.label+'</button>'
  ).join('');
  document.querySelectorAll('.tab').forEach(b =>
    b.addEventListener('click', ()=> goTab(b.dataset.tab))
  );
}

function goTab(id){
  ST.tab = id;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('view-'+id).classList.add('active');
  renderTab(id);
}

function renderTab(id){
  if(id==='dashboard')  renderDashboard($('view-dashboard'));
  if(id==='exhibicion') renderExhibicion($('view-exhibicion'));
  if(id==='analisis')   renderAnalisis($('view-analisis'));
  if(id==='detalle')    renderDetalle($('view-detalle'));
}

function kpi(v, l){

}

/* ============================================================
   FILTROS Y GRÁFICOS DEL DASHBOARD
   ============================================================ */
const DIMS = {
  r:  { label:'Rubro' },
  m:  { label:'Marca' },
  d:  { label:'Disciplina' },
  sr: { label:'Género' },
  g1: { label:'Silueta' },
};

function dimDisplay(dim, v){ return dim==='r' ? rubroCorto(v) : v; }
function hayFiltros(){ return Object.keys(DIMS).some(d => ST.filtros[d].length); }

function filasFiltradas(){
  if(!ST.transferencias) return [];
  const f = ST.filtros;
  return ST.transferencias.filas.filter(x =>
    (!f.r.length  || f.r.includes(x.r))   &&
    (!f.m.length  || f.m.includes(x.m))   &&
    (!f.d.length  || f.d.includes(x.d))   &&
    (!f.sr.length || f.sr.includes(x.sr)) &&
    (!f.g1.length || f.g1.includes(x.g1))
  );
}

// Agrupa filas por campo según la medida activa ('u' unidades / 'sku' artículos), orden desc.
function agrupar(filas, key, forzarUnidades){
  const m = {};
  const porSku = !forzarUnidades && ST.medida==='sku';
  filas.forEach(f => {
    const k = f[key] || '—';
    m[k] = (m[k]||0) + (porSku ? 1 : (f.env||0));
  });
  return Object.keys(m).map(k => ({ k, v:m[k] })).sort((a,b) => b.v - a.v);
}

// Un select por dimensión, con todos los valores del dataset completo (agrega/quita filtro)
function selectsFiltroHtml(){
  let h = '';
  Object.keys(DIMS).forEach(dim => {
    const vals = agrupar(ST.transferencias.filas, dim, true);
    h += '<select class="sel f-add" data-dim="'+dim+'">'+
      '<option value="">'+DIMS[dim].label+'…</option>'+
      vals.map(v => '<option value="'+esc(v.k)+'">'+esc(dimDisplay(dim, v.k))+' ('+fmtNum(v.v)+')</option>').join('')+
      '</select>';
  });
  if(hayFiltros()) h += '<button class="btn btn-ghost" id="btnLimpiar">✕ Limpiar filtros</button>';
  return h;
}

function toolbarHtml(){
  return '<div class="toolbar">'+
    '<div class="toggle">'+
      '<button class="tgl-btn'+(ST.medida!=='sku'?' on':'')+'" data-med="u">Unidades</button>'+
      '<button class="tgl-btn'+(ST.medida==='sku'?' on':'')+'" data-med="sku">SKUs</button>'+
    '</div>'+
    selectsFiltroHtml()+
  '</div>';
}

function chipsHtml(){
  const parts = [];
  Object.keys(DIMS).forEach(dim => {
    ST.filtros[dim].forEach(v => {
      parts.push('<span class="chip" data-dim="'+dim+'" data-val="'+esc(v)+'" title="Quitar filtro">'+
        DIMS[dim].label+': '+esc(dimDisplay(dim, v))+' <span class="x">✕</span></span>');
    });
  });
  return parts.length ? '<div class="chips">'+parts.join('')+'</div>' : '';
}

function barChart(titulo, dim, datos, ancho){
  let h = '<div class="card'+(ancho?' chart-wide':'')+'" style="margin-bottom:0">'+
    '<div class="chart-title">'+esc(titulo)+'</div>';
  if(!datos.length){
    h += '<div class="hint">Sin datos con los filtros activos.</div>';
  } else {
    const max = datos[0].v || 1;
    datos.forEach(dt => {
      const on = ST.filtros[dim].includes(dt.k);
      h += '<div class="bar-row'+(on?' on':'')+'" data-dim="'+dim+'" data-val="'+esc(dt.k)+'" title="'+esc(dimDisplay(dim, dt.k))+'">'+
        '<span class="bl">'+esc(dimDisplay(dim, dt.k))+'</span>'+
        '<span class="bt"><span class="bf" style="width:'+Math.max(0,(dt.v/max*100)).toFixed(1)+'%"></span></span>'+
        '<span class="bv">'+fmtNum(dt.v)+'</span></div>';
    });
  }
  h += '</div>';
  return h;
}

function wireDashboard(el){
  el.querySelectorAll('.bar-row').forEach(b =>
    b.addEventListener('click', ()=> toggleFiltro(b.dataset.dim, b.dataset.val)));
  el.querySelectorAll('.chip[data-dim]').forEach(c =>
    c.addEventListener('click', ()=> toggleFiltro(c.dataset.dim, c.dataset.val)));
  el.querySelectorAll('.f-add').forEach(s =>
    s.addEventListener('change', ()=>{ if(s.value) toggleFiltro(s.dataset.dim, s.value); }));
  el.querySelectorAll('.tgl-btn[data-med]').forEach(b =>
    b.addEventListener('click', ()=>{ ST.medida = b.dataset.med; renderTab(ST.tab); }));
  const lc = el.querySelector('#btnLimpiar');
  if(lc) lc.addEventListener('click', limpiarFiltros);
}

function toggleFiltro(dim, val){
  const a = ST.filtros[dim];
  const i = a.indexOf(val);
  if(i >= 0) a.splice(i, 1); else a.push(val);
  renderTab(ST.tab);
}

function limpiarFiltros(){
  Object.keys(DIMS).forEach(d => ST.filtros[d] = []);
  renderTab(ST.tab);
}

/* ============================================================
   EXHIBICIÓN — zonas, muebles y capacidad

function seedZonas(){
  const z = {};
  SEED_MUEBLES.forEach(par => {
    const tipo = par[0], n = par[1];
    const t = TIPOS_MUEBLE[tipo];
    for(let i=1; i<=n; i++){
      z[tipo+'-'+i] = {
        nombre: t.nombre + (n>1 ? ' '+i : ''),
        tipo, ubicacion:'', disciplina:'', rubro:'', genero:'',
        medida: t.um==='un' ? 1 : 0,
        densidad: DENSIDADES_DEFAULT[tipo] || 0,
        capManual:false, capacidad:0,
        noExhibe: !!t.noExhibe, notas:'',
      };
    }
  });
  for(let i=1; i<=SEED_PAREDES; i++){
    z['pared-'+i] = {
      nombre:'Pared — Vista '+i, tipo:'pared', ubicacion:'Vista '+i,
      disciplina:'', rubro:'', genero:'', medida:0,
      densidad: DENSIDADES_DEFAULT['pared'], capManual:false, capacidad:0,
      noExhibe:false, notas:'',
    };
  }
  return z;
}

function cargarZonasLocales(){
  try{
    const s = localStorage.getItem(ZONAS_LS_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return null;
}

// Persiste zonas: siempre en localStorage (respaldo) y en Firebase si hay URL.
function guardarZonas(accion, detalle){
  const zonas = ST.exhibicion.zonas;
  try{ localStorage.setItem(ZONAS_LS_KEY, JSON.stringify(zonas)); }catch(e){}
  if(FIREBASE_URL){
    putJSON(fbBase()+'/exhibicion/zonas.json', zonas).catch(()=>{});
  }
  logActividad(accion, detalle);
}

// Capacidad de una zona: medida × densidad (cm se pasa a ml), o pisada a mano.
function capacidadDe(z){
  if(!z || z.noExhibe) return 0;
  if(z.capManual) return Math.round(Number(z.capacidad)) || 0;
  const m = Number(z.medida) || 0, d = Number(z.densidad) || 0;
  const um = (TIPOS_MUEBLE[z.tipo] || {}).um;
  return Math.round((um==='cm' ? m/100 : m) * d);
}

function umDe(z){ return (TIPOS_MUEBLE[z.tipo] || {}).um || 'un'; }
function umLabel(um){ return um==='ml' ? 'Medida (ml)' : um==='cm' ? 'Ancho (cm)' : 'Cant. de muebles'; }
function densLabel(um){ return um==='un' ? 'Unidades por mueble' : 'Unidades por ml'; }
function medidaTxt(z){
  const um = umDe(z), m = Number(z.medida)||0;
  if(um==='ml') return m ? m+' ml' : '—';
  if(um==='cm') return m ? m+' cm' : '—';
  return m+' u.';
}

function disciplinasDelExcel(){
  if(!ST.transferencias) return [];
  const s = new Set(); ST.transferencias.filas.forEach(f => s.add(f.d));
  return Array.from(s).sort();
}
function rubrosDelExcel(){
  if(!ST.transferencias) return [];
  const s = new Set(); ST.transferencias.filas.forEach(f => s.add(f.r));
  return Array.from(s).sort();
}

const ORDEN_TIPOS = Object.keys(TIPOS_MUEBLE);
function zonasOrdenadas(){
  const zonas = ST.exhibicion.zonas;
  return Object.keys(zonas).sort((a,b) => {
    const ta = ORDEN_TIPOS.indexOf(zonas[a].tipo), tb = ORDEN_TIPOS.indexOf(zonas[b].tipo);
    if(ta !== tb) return ta - tb;
    return a.localeCompare(b, 'es', { numeric:true });
  });
}

function wireExhibicion(el){
  const nz = el.querySelector('#btnNuevaZona');
  if(nz) nz.addEventListener('click', ()=>{ ST.editandoZona='__nueva__'; renderTab('exhibicion'); });

  el.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', ()=>{
    const id = b.dataset.id, zonas = ST.exhibicion.zonas;
    if(b.dataset.act==='editar'){ ST.editandoZona = id; renderTab('exhibicion'); }
    if(b.dataset.act==='duplicar'){
      const nid = id+'-copia-'+Date.now().toString(36);
      zonas[nid] = JSON.parse(JSON.stringify(zonas[id]));
      zonas[nid].nombre += ' (copia)';
      guardarZonas('zona-duplicada', { id:nid, desde:id });
      renderTab('exhibicion');
    }
    if(b.dataset.act==='eliminar'){
      if(!confirm('¿Eliminar la zona "'+zonas[id].nombre+'"?')) return;
      const nombre = zonas[id].nombre;
      delete zonas[id];
      if(ST.editandoZona===id) ST.editandoZona = null;
      guardarZonas('zona-eliminada', { id, nombre });
      renderTab('exhibicion');
    }
  }));

  const ed = el.querySelector('#zEditor');
  if(!ed) return;

  function leerForm(){
    return {
      nombre: $('zf-nombre').value.trim(),
      tipo: $('zf-tipo').value,
      ubicacion: $('zf-ubicacion').value,
      disciplina: $('zf-disciplina').value,
      rubro: $('zf-rubro').value,
      genero: $('zf-genero').value,
      medida: parseFloat($('zf-medida').value) || 0,
      densidad: parseFloat($('zf-densidad').value) || 0,
      capManual: $('zf-capmanual').checked,
      capacidad: parseInt($('zf-capacidad').value, 10) || 0,
      noExhibe: $('zf-noexhibe').checked,
      notas: $('zf-notas').value.trim(),
    };
  }
  function refrescarCalc(){
    const z = leerForm();
    $('zf-cap-calc').textContent = fmtNum(capacidadDe(z));
    $('zf-capacidad').disabled = !z.capManual;
    const um = umDe(z);
    $('zf-medida-lbl').textContent = umLabel(um);
    $('zf-densidad-lbl').textContent = densLabel(um);
  }
  ['zf-medida','zf-densidad','zf-capacidad'].forEach(id => $(id).addEventListener('input', refrescarCalc));
  ['zf-capmanual','zf-noexhibe'].forEach(id => $(id).addEventListener('change', refrescarCalc));
  $('zf-tipo').addEventListener('change', ()=>{
    // al cambiar el tipo, proponer la densidad default de ese tipo
    $('zf-densidad').value = DENSIDADES_DEFAULT[$('zf-tipo').value] || 0;
    refrescarCalc();
  });

  $('zf-guardar').addEventListener('click', ()=>{
    const z = leerForm();
    if(!z.nombre){ alert('Poné un nombre para la zona.'); return; }
    const nueva = ST.editandoZona === '__nueva__';
    const id = nueva ? 'zona-'+Date.now().toString(36) : ST.editandoZona;
    ST.exhibicion.zonas[id] = z;
    ST.editandoZona = null;
    guardarZonas(nueva ? 'zona-creada' : 'zona-editada', { id, nombre:z.nombre, capacidad:capacidadDe(z) });
    renderTab('exhibicion');
  });
  $('zf-cancelar').addEventListener('click', ()=>{ ST.editandoZona = null; renderTab('exhibicion'); });
}

/* ============================================================
   ANÁLISIS — cruce enviado (Excel) vs. capacidad (Exhibición)
   ============================================================ */
const ESTADOS = {
  'faltante':      { label:'FALTANTE',               emoji:'🔴', cls:'rojo' },
  'ok':            { label:'OK',                     emoji:'🟢', cls:'verde' },
  'sobrante':      { label:'SOBRANTE',               emoji:'🟡', cls:'amarillo' },
  'sin-capacidad': { label:'SIN CAPACIDAD ASIGNADA', emoji:'⚪', cls:'gris' },
};

function calcularAnalisis(){
  const filas = ST.transferencias ? ST.transferencias.filas : [];
  const zonas = (ST.exhibicion && ST.exhibicion.zonas) || {};

  const porDisc = {};
  filas.forEach(f => {
    const e = porDisc[f.d] = porDisc[f.d] || { enviado:0, capacidad:0, zonas:[] };
    e.enviado += f.env || 0;
  });

  let capMulti = 0; const zonasMulti = [];
  Object.keys(zonas).forEach(id => {
    const z = zonas[id];
    if(z.noExhibe || !z.disciplina) return;
    const cap = capacidadDe(z);
    if(z.disciplina === 'MULTIDISCIPLINA'){
      capMulti += cap; zonasMulti.push(z.nombre);
      return;
    }
    const e = porDisc[z.disciplina] = porDisc[z.disciplina] || { enviado:0, capacidad:0, zonas:[] };
    e.capacidad += cap;
    e.zonas.push({ nombre:z.nombre, cap });
  });

  const items = Object.keys(porDisc).map(d => {
    const e = porDisc[d];
    const ratio = e.capacidad > 0 ? e.enviado / e.capacidad : null;
    let estado, gravedad = 0;
    if(e.capacidad === 0){
      estado = 'sin-capacidad';
    } else if(ratio < UMBRALES.faltante){
      estado = 'faltante'; gravedad = 1 - ratio / UMBRALES.faltante;
    } else if(ratio > UMBRALES.sobrante){
      estado = 'sobrante'; gravedad = ratio / UMBRALES.sobrante - 1;
    } else {
      estado = 'ok';
    }
    return { d, enviado:e.enviado, capacidad:e.capacidad, ratio, estado, gravedad, zonas:e.zonas };
  });

  const ordenEstado = { 'faltante':0, 'sobrante':1, 'sin-capacidad':2, 'ok':3 };
  items.sort((a,b) => {
    if(ordenEstado[a.estado] !== ordenEstado[b.estado]) return ordenEstado[a.estado] - ordenEstado[b.estado];
    if(a.estado==='faltante' || a.estado==='sobrante') return b.gravedad - a.gravedad;
    return b.enviado - a.enviado;
  });

  return { items, capMulti, zonasMulti };
}

function alertaTexto(i){
  if(i.estado === 'sobrante')
    return '<b>'+esc(i.d)+'</b>: capacidad '+fmtNum(i.capacidad)+' u., enviadas '+fmtNum(i.enviado)+
      ' u. → sobrante '+Math.round((i.ratio-1)*100)+'%';
  if(i.estado === 'faltante')
    return '<b>'+esc(i.d)+'</b>: capacidad '+fmtNum(i.capacidad)+' u., enviadas '+fmtNum(i.enviado)+
      ' u. → cubre solo el '+Math.round(i.ratio*100)+'%';
  return '<b>'+esc(i.d)+'</b>: '+fmtNum(i.enviado)+' u. enviadas sin ninguna zona configurada';
}

function miniBars(titulo, datos){
  if(!datos.length) return '';
  const max = datos[0].v || 1;
  let h = '<div><div class="mini-title">'+esc(titulo)+'</div>';
  datos.forEach(x => {
    h += '<div class="mini-row"><span class="ml" title="'+esc(x.k)+'">'+esc(x.k)+'</span>'+
      '<span class="mt"><span class="mf" style="width:'+(x.v/max*100).toFixed(1)+'%"></span></span>'+
      '<span class="mv">'+fmtNum(x.v)+'</span></div>';
  });
  return h + '</div>';
}

function contarPor(filas, key, top){
  const m = {};
  filas.forEach(f => { const k = key==='r' ? rubroCorto(f.r) : f[key]; m[k] = (m[k]||0) + (f.env||0); });
  const arr = Object.keys(m).map(k => ({k, v:m[k]})).sort((a,b) => b.v - a.v);
  return top ? arr.slice(0, top) : arr;
}

  { c:'r',    label:'Rubro',    num:false },
  { c:'m',    label:'Marca',    num:false },
  { c:'d',    label:'Disciplina', num:false },
  { c:'sr',   label:'Género',   num:false },
  { c:'g1',   label:'Silueta',  num:false },
  { c:'art',  label:'Artículo', num:false },
  { c:'cb',   label:'Cód. barras', num:false },
  { c:'item', label:'Item',     num:false },
  { c:'env',  label:'Enviado',  num:true },
];

function filasDetalle(){
  let filas = filasFiltradas();
  const q = normTxt(ST.busqueda);
  if(q){
    filas = filas.filter(f =>
      normTxt(f.art).includes(q) || normTxt(f.item).includes(q) || normTxt(f.cb).includes(q));
  }
  const o = ST.orden;
  if(o.col){
    const col = o.col, dir = o.dir;
    filas = filas.slice().sort((a,b) => {
      if(col==='env') return (a.env - b.env) * dir;
      return String(a[col]).localeCompare(String(b[col]), 'es', { numeric:true }) * dir;
    });
  }
  return filas;
}

/* ============================================================
   CARGA DEL EXCEL DE TRANSFERENCIAS (solo admin, load-and-replace)
   ============================================================ */
function wireCarga(){
  const dz = $('dropzone'), fi = $('fileInput');
  if(!dz || !fi) return;
  dz.addEventListener('click', ()=> fi.click());
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag'));
  dz.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(f) handleFile(f);
  });
  fi.addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0];
    if(f) handleFile(f);
    e.target.value = '';
  });
}

function setUpStatus(text, cls){
  ST.cargaMsg = text ? { text, cls: cls||'' } : null;
  const card = $('cargaCard');
  if(!card) return;
  let st = card.querySelector('.upstatus');
  if(text){
    if(!st){ st = document.createElement('div'); card.insertBefore(st, $('valPanel')); }
    st.className = 'upstatus '+(cls||'');
    st.textContent = text;
  } else if(st){ st.remove(); }
}

async function handleFile(file){
  setUpStatus('Leyendo '+file.name+'…');
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });   // soporta .xls legacy (BIFF) y .xlsx
    const parsed = parseTransferencias(wb, file.name);
    ST.pendiente = parsed;
    setUpStatus('Parseado: '+fmtNum(parsed.meta.totalFilas)+' filas · '+fmtNum(parsed.meta.totalUnidades)+' unidades. Verificá y confirmá.', 'ok');
    showValidation(parsed);
  }catch(err){
    ST.pendiente = null;
    $('valPanel').innerHTML = '';
    setUpStatus('Error: '+err.message, 'err');
  }
}

function parseTransferencias(wb, nombreArchivo){
  const ws = wb.Sheets[wb.SheetNames[0]];
  if(!ws) throw new Error('el archivo no tiene hojas.');
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  if(!rows.length) throw new Error('la hoja está vacía.');

  // Validar columnas por nombre de encabezado (fila 1), tolerante a tildes
  const hdr = rows[0].map(normTxt);
  const idx = {};
  const faltantes = [];
  COLUMNAS_XLS.forEach(c => {
    const i = hdr.indexOf(normTxt(c));
    if(i === -1) faltantes.push(c); else idx[c] = i;
  });
  if(faltantes.length)
    throw new Error('faltan columnas en el Excel: '+faltantes.join(', ')+'. No se tocaron los datos cargados.');

  const filas = [];
  let totalUnidades = 0;
  rows.slice(1).forEach(r => {
    if(!r || !r.some(c => c !== null && c !== '')) return; // saltear filas vacías
    const env = parseInt(r[idx['Enviado']], 10) || 0;
    filas.push({
      r:    String(r[idx['Rubro']]||'').trim(),
      m:    String(r[idx['Marca']]||'').trim(),
      d:    String(r[idx['Disciplina']]||'').trim(),
      sr:   normGenero(r[idx['Subrubro']]),          // Subrubro = género, normalizado
      g1:   String(r[idx['Grupo 1']]||'').trim(),    // silueta
      art:  String(r[idx['Artículo']]||'').trim(),
      cb:   String(r[idx['Código barras']]||'').trim(),
      item: String(r[idx['Item']]||'').trim(),
      env,
    });
    totalUnidades += env;
  });
  if(!filas.length) throw new Error('no se encontraron filas de datos.');

  // Resúmenes para la validación
  const porRubro = {}, porGenero = {}, porDisciplina = {};
  filas.forEach(f => {
    porRubro[f.r] = (porRubro[f.r]||0) + f.env;
    porGenero[f.sr] = (porGenero[f.sr]||0) + f.env;
    porDisciplina[f.d] = (porDisciplina[f.d]||0) + f.env;
  });

  return {
    filas,
    meta: { archivo: nombreArchivo, totalFilas: filas.length, totalUnidades },
    porRubro, porGenero, porDisciplina,
  };
}

function valRow(nombre, leido, esperado){
  const ok = leido === esperado;
  return { ok, html:
    '<div class="val-row"><span class="vc">'+esc(nombre)+'</span>'+
    '<span class="vn '+(ok?'ok':'nok')+'">'+fmtNum(leido)+'</span>'+
    '<span class="vn">'+fmtNum(esperado)+'</span>'+
    '<span class="vk '+(ok?'ok':'nok')+'">'+(ok?'✓':'✗')+'</span></div>' };
}

function showValidation(p){
  let allOk = true;
  const add = row => { if(!row.ok) allOk = false; return row.html; };
  const hdrRow = '<div class="val-row hdr"><span class="vc">Concepto</span>'+
    '<span class="vn">Leído</span><span class="vn">Control</span><span class="vk"></span></div>';

  let h = '<div class="val-sec">Totales</div><div class="val-grid">'+hdrRow;
  h += add(valRow('Filas', p.meta.totalFilas, CONTROL.filas));
  h += add(valRow('Unidades', p.meta.totalUnidades, CONTROL.unidades));
  h += '</div>';

  h += '<div class="val-sec">Unidades por rubro</div><div class="val-grid">'+hdrRow;
  Object.keys(CONTROL.rubros).forEach(r => { h += add(valRow(rubroCorto(r), p.porRubro[r]||0, CONTROL.rubros[r])); });
  h += '</div>';

  h += '<div class="val-sec">Unidades por género</div><div class="val-grid">'+hdrRow;
  Object.keys(CONTROL.generos).forEach(g => { h += add(valRow(g, p.porGenero[g]||0, CONTROL.generos[g])); });
  h += '</div>';

  h += '<div class="val-sec">Top disciplinas</div><div class="val-grid">'+hdrRow;
  Object.keys(CONTROL.disciplinasTop).forEach(d => { h += add(valRow(d, p.porDisciplina[d]||0, CONTROL.disciplinasTop[d])); });
  h += '</div>';

  // Resumen del reemplazo: qué hay cargado hoy vs. lo nuevo
  const t = ST.transferencias;
  if(t && t.meta){
    h += '<div class="warn-box">Esto va a <b>reemplazar por completo</b> lo cargado: '+
      fmtNum(t.meta.totalFilas)+' filas · '+fmtNum(t.meta.totalUnidades)+' unidades ('+
      esc(t.meta.archivo||'—')+', '+fmtDate(t.meta.fechaCarga)+').</div>';
  }
  if(!allOk){
    h += '<div class="warn-box">Algunos totales <b>no coinciden</b> con los números de control de la primera carga. '+
      'Si es un Excel actualizado es esperable; si no, revisá el archivo.</div>';
  }

  h += '<div class="val-actions">';
  if(FIREBASE_URL){
    h += '<button class="btn btn-primary" onclick="confirmSync()">'+(allOk?'Sincronizar a Firebase':'Sincronizar igual')+'</button>';
  } else {
    h += '<button class="btn btn-primary" disabled title="Falta configurar FIREBASE_URL">Sincronizar a Firebase</button>';
  }
  h += '<button class="btn" onclick="previewLocal()">Solo vista previa</button>';
  h += '<button class="btn btn-ghost" onclick="closeVal()">Cancelar</button>';
  h += '</div>';
  if(!FIREBASE_URL){
    h += '<div class="warn-box">⚠️ Falta pegar la URL de la Realtime Database en la constante <b>FIREBASE_URL</b> '+
      '(al tope del archivo). Mientras tanto podés usar la vista previa local.</div>';
  }

  $('valPanel').innerHTML = h;
}

async function confirmSync(){
  const p = ST.pendiente;
  if(!p || !FIREBASE_URL) return;
  setUpStatus('Subiendo a Firebase…');
  const meta = Object.assign({}, p.meta, { fechaCarga: Date.now(), usuario: ST.session.email });
  try{
    const r = await putJSON(fbBase()+'/transferencias.json', { meta, filas: p.filas });
    if(!r.ok) throw new Error('HTTP '+r.status);
    logActividad('carga-excel', { archivo: meta.archivo, filas: meta.totalFilas, unidades: meta.totalUnidades });
    ST.transferencias = { meta, filas: p.filas };
    ST.pendiente = null;
    ST.cargaMsg = { text:'✓ Sincronizado: '+fmtNum(meta.totalFilas)+' filas · '+fmtNum(meta.totalUnidades)+' unidades.', cls:'ok' };
    renderTab(ST.tab);
  }catch(e){
    setUpStatus('Error al subir a Firebase: '+e.message, 'err');
  }
}

function previewLocal(){
  const p = ST.pendiente;
  if(!p) return;
  const meta = Object.assign({}, p.meta, { fechaCarga: Date.now(), usuario: ST.session.email, local: true });
  ST.transferencias = { meta, filas: p.filas };
  ST.pendiente = null;
  ST.cargaMsg = { text:'Vista previa local ('+fmtNum(meta.totalFilas)+' filas). No sincronizado a Firebase.', cls:'' };
  renderTab(ST.tab);
}

function closeVal(){
  ST.pendiente = null;
  ST.cargaMsg = null;
  const vp = $('valPanel');
  if(vp) vp.innerHTML = '';
  setUpStatus(null);
}

/* ============================================================
   POLLING — cada 30s, solo con la pestaña visible y URL configurada.
   Trae primero /transferencias/meta (liviano) y solo baja las filas
   si cambió la fecha de carga.
   ============================================================ */
async function refreshData(){
  if(!FIREBASE_URL) return;
  if(ST.editandoZona) return; // no pisar el formulario de zona abierto
  try{
    const meta = await fetchJSON(fbBase()+'/transferencias/meta.json');
    const actual = ST.transferencias && ST.transferencias.meta;
    let cambio = false;
    if(meta && (!actual || actual.fechaCarga !== meta.fechaCarga)){
      const filas = await fetchJSON(fbBase()+'/transferencias/filas.json') || [];
      ST.transferencias = { meta, filas };
      cambio = true;
    }
    const zonas = await fetchJSON(fbBase()+'/exhibicion/zonas.json');
    if(zonas){
      if(JSON.stringify(zonas) !== JSON.stringify(ST.exhibicion && ST.exhibicion.zonas)){
        ST.exhibicion = { zonas };
        try{ localStorage.setItem(ZONAS_LS_KEY, JSON.stringify(zonas)); }catch(e){}
        cambio = true;
      }
    }
    if(cambio) renderTab(ST.tab);
  }catch(e){ /* red o base vacía: silencioso, reintenta en el próximo poll */ }
}

function startPolling(){
  setInterval(()=>{
    if(document.visibilityState==='visible') refreshData();
  }, POLL_MS);
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(session){
  ST.session = session;
  $('whoName').textContent = session.nombre || session.email;
  $('whoRole').textContent = ROLE_LABEL[session.rol] || session.rol;
  // Arrancar con el snapshot embebido; si Firebase tiene datos, el poll los pisa
  if(!ST.transferencias && SNAPSHOT) ST.transferencias = decodeSnapshot(SNAPSHOT);
  // Zonas: localStorage (respaldo local) o seed del plano; Firebase pisa en el poll
  if(!ST.exhibicion) ST.exhibicion = { zonas: cargarZonasLocales() || seedZonas() };
  buildNav();
  showApp();
  goTab(ST.tab);
  refreshData();
  startPolling();
}

(function init(){
  $('loginBtn').addEventListener('click', login);
  $('p').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  $('u').addEventListener('keydown', e => { if(e.key==='Enter') $('p').focus(); });
  $('logoutBtn').addEventListener('click', logout);

  const s = readSession();
  if(s && USUARIOS.some(u => u.email.toLowerCase()===(s.email||'').toLowerCase() && u.rol===s.rol)){
    boot(s);
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
